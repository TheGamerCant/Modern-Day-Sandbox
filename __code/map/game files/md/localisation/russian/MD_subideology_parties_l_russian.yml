 GUA.conservatism: "£generic_conservatism_small PAN"
 GUA.conservatism_desc: "Партия национального прогресса (Partido de Avanzada Nacional) - правая консервативная партия Гватемалы. Она была основана в 1989 году и победила на президентских выборах 1995 года. Это была самая сильная партия на выборах в конгресс в те годы. После этого она начала отставать от более актуальных партий, теряя голоса почти на всех последующих выборах."
 GUA.liberalism: "£generic_liberalism_small Партия Патриотов"
 GUA.liberalism_desc: "Патриотическая партия (Partido Patriota) - консервативно-либеральная партия, основанная в 2001 году. Она добилась огромных успехов на выборах 2007 и 2011 годов, но после этого теряла поддержку. В 2011 году она была самой сильной партией в конгрессе, получив 56 мест из 158."
 GUA.socialism: "£generic_socialism_small UNE"
 GUA.socialism_desc: "Социал-демократическая партия - Unidad Nacional de la Esperanza (Национальное единство надежды) - социал-демократическая партия в Гватемале. Она также определяет себя как социал-христианскую и является популистской. После своего основания в 2002 году она добилась огромного успеха на всеобщих выборах 2003 года и была крупнейшей партией в парламенте в 2019 и 2007 годах, где она также победила на президентских выборах. Партия выиграла первый тур президентских выборов в 2019 году, но проиграла во втором туре кандидату Вамоса."
 GUA.Communist-State: "£generic_Communist_State_small URNG-MAIZ"
 GUA.Communist-State_desc: "Гватемальское национальное революционное единство (Unidad Revolucionaria Nacional Guatemalteca) - коммунистическая партия Гватемалы. Она придерживается различных идеологий, в первую очередь марксизма-ленинизма, чавизма, боливарианства и популизма. Партия была основана в 1982 году, но смогла войти в парламент только в 2003 году. С тех пор всегда остается в нижних однозначных рейтингах, никогда не превышая 4%."
 GUA.anarchist_communism: "£generic_anarchist_communism_small Новый национальный альянс"
 GUA.anarchist_communism_desc: "Новый национальный альянс (Alianza Nueva Nación) - еще одна левая политическая партия. Альянс вошел в конгресс Гватемалы в 1999 году как третья по популярности партия. После этого постоянно терял голоса и в конце концов был вынужден распасться в 2007 году из-за отсутствия поддержки в соответствии с гватемальским избирательным законодательством."
 GUA.anarchist_communism_2007: "£generic_anarchist_communism_small Winaq"
 GUA.anarchist_communism_2007_desc: "Уинак (Winaq) - партия образована в 2007 году и является демократической социалистической партией в Гватемале. Она уходит родом в коренные общины этой страны и проводит кампании за равенство между этническими группами. Название \"Уинак\" - это кичеанское слово, означающее \"народ\", а киче - коренное американское население, происходящее от майя. Первоначально они баллотировались в коалиции с URNG-MAIZ, но затем ее покинули из-за роста своей популярности."
 GUA.Conservative: "£generic_Conservative_small Партия Юнионистов"
 GUA.Conservative_desc: "Юнионистская партия (Partido Unionista) - консервативная политическая партия. Ее сторонниками являются правые националисты и экономические либералисты. Главная цель партии - воссоздание центральноамериканского союза. Первоначально она имела незначительный успех на уровне 6% поддержки, но после 2007 года популярность упала. В дальнейшем она вошла в избирательную коалицию с Compromiso, Renovación y Orden (CREO)."
 GUA.Neutral_conservatism: "£generic_Neutral_conservatism_small LIDER"
 GUA.Neutral_conservatism_desc: "Нейтрально-консервативная - Libertad Democrática Renovada (Обновленная демократическая свобода) была недолговечной правоцентристской партией в Гватемале. Она отделилась от партии UNE в 2010 году и имела первоначальный успех на выборах 2011 года, приблизившись к 9%. На следующих выборах им удалось более чем удвоить свои результаты, набрав почти 19%. В 2016 году они были запрещены из-за постоянных нарушений Закона об избирательных и политических партиях. Также сообщалось, что она имеет тесные связи с группами наркоторговцев."
 GUA.Neutral_conservatism_2017: "£generic_Neutral_conservatism_small Vamos"
 GUA.Neutral_conservatism_2017_desc: "Neutral Conservative - Vamos — консервативная политическая партия в Гватемале. Она была образована в 2017 году и быстро выросла, став второй по величине партией в 2019 году, а также выиграла второй тур президентских выборов в том же году. Она социально консервативна и экономически либеральна. Ее полное официальное название — «Vamos por una Guatemala Diferente», что в буквальном переводе означает «Мы идем за другой Гватемалой»."
 GUA.Neutral_Libertarian: "£generic_Neutral_Libertarian_small UCN"
 GUA.Neutral_Libertarian_desc: "Национальный союз перемен (Unión del Cambio Nacional) - гватемальская националистическая партия. Она была основана в 2006 году и преуспела, получив более 4% голосов на всеобщих выборах 2007 года и почти 10% следом в 2011 году. Затем рейтинг немного упал, но с тех пор всегда оставался выше 5%."
 GUA.Neutral_green: "£generic_Neutral_green_small Todos"
 GUA.Neutral_green_desc: "Todos - центристская политическая партия, которая вдобавок умеренно националистична и выступает за христианскую демократию и гуманизм, а также за рыночную экономику. Она была образована после того, как группа депутатов от UNE покинула партию и сформировала правительственную фракцию, известную как \"Пурпурные галстуки\" за их наряд. В середине 2012 года они присоединились к Зеленым, которые изменили свое название с логотипом и стали \"Todos\" (что означает \"Все\"). Партия стала третьей по величине, но после 2015 года потеряла до половины своих предыдущих мест."
 GUA.neutral_Social: "£generic_neutral_Social_small Encuentro"
 GUA.neutral_Social_desc: "Вместе за Гватемалу (Encuentro por Guatemala) - социал-демократическая партия, решительно отстаивающая права коренных народов в качестве своей основной философии. Их эмблема представляет четыре коренные группы Гватемалы: майя, гарифунас, синкас и ладинос. Они добились успеха на уровне поддержки в 6% с 2007 по 2015 год."
 GUA.Neutral_Communism: "£generic_Neutral_Communism_small MLP"
 GUA.Neutral_Communism_desc: "Движение за освобождение народов (Movimiento para la Liberación de los Pueblos) - партия коренных народов Гватемалы. Она была организована под предлогом того, что Winaq и URNG не представляют коренных жителей. Это новая партия, которая образована в конце 2016 года, но легализована только через два года."
 GUA.Nat_Populism: "£generic_Nat_Populism_small MLN"
 GUA.Nat_Populism_desc: "Правое крыло популистов - Movimiento de Liberación Naciona (Национальное освободительное движение) была крайне правой политической партией в Гватемале. Она была основана в 1954 году как Movimiento Democratico Nacional (Национальное демократическое движение). Переворот 1963 года привел к тому, что MLN стала основной политической платформой военных. Она также была классифицирована как правое крыло популистов, аграриев, консерваторов и экономически либералов. Она была распущена в 1999 году из-за потери всех мест в конгрессе на выборах того года."
 GUA.Nat_Populism_2008: "£generic_Nat_Populism_small FCN"
 GUA.Nat_Populism_2008_desc: "Правый популист - Frente de Convergencia Nacional (Национальный фронт конвергенции) - правая популистская партия в Гватемале. Она была основана в 2008 году отставными офицерами армии и является националистической, национально и социально консервативной, антикоммунистической и -социалистической, и националистической. Она не имела успеха на своих первых выборах в 2011 году, набрав всего 0,5%, но резко выросла в популярности, получив 9%. В 2019 году они снова потеряли огромное большинство своих мест."
 GUA.Nat_Fascism: "£generic_Nat_Fascism_small FRG"
 GUA.Nat_Fascism_desc: "Far Right - Frente Republicano Guatemalteco (Гватемальский республиканский фронт) была крайне правой политической партией. Она консервативная, республиканская и антикоммунистическая, а также правопопулистская. Она была создана в 1989 году бывшим президентом и диктатором Гватемалы Эфраином Риосом Монттом. Она имела огромный успех в 90-х годах, став крупнейшей партией в 1999 году с 42%. Однако ее голоса дважды уменьшались вдвое на следующих двух выборах, пока не достигли менее 3% в 2011 году. В 2015 году им не удалось получить ни одного места, и они распались в том же году. В 2013 году она изменила свое название на PRI."
 GUA.Nat_Fascism_2013: "£generic_Nat_Fascism_small PRI"
 GUA.Nat_Fascism_2013_desc: "Far Right - Partido Republicano Institucional (Институциональная республиканская партия) была крайне правой политической партией. Она консервативная, республиканская и антикоммунистическая, а также правопопулистская. Она была создана в 1989 году бывшим президентом и диктатором Гватемалы Эфраином Риосом Монттом. Она имела огромный успех в 90-х годах, став крупнейшей партией в 1999 году с 42%. Однако ее голоса дважды уменьшались вдвое на следующих двух выборах, пока они не достигли менее 3% в 2011 году. В 2015 году им не удалось получить ни одного места, и они распались в том же году. До 2013 года она была известна как FRG."
 GUA.Nat_Autocracy: "£generic_Nat_Autocracy_small Вооруженные силы Гватемалы"
 GUA.Nat_Autocracy_desc: ""
 GUA.oligarchism: "£generic_oligarchism_small Хуисты"
 GUA.oligarchism_desc: ""
 GUB.socialism: "£generic_socialism_small PRS"
 GUB.socialism_desc: "Partido da Renovaçao Social (Партия за социальное обновление) - социал-демократическая партия в Гвинее-Бисау."
 GUB.neutral_Social: "£generic_neutral_Social_small Madem G-15"
 GUB.neutral_Social_desc: "Movimento Para Alternância Democrâtica (Движение за демократическую альтернативу) - социал-демократическая партия в Гвинее-Бисау."
 GUB.Communist-State: "£GUB_emerging_left_wing_radical PAIGC (Радикальная)"
 GUB.Communist-State_icon: "£GUB_emerging_left_wing_radical"
 GUB.Communist-State_desc: "Коммунистическая партия - Partido Africano para a Independência da Guiné e Cabo Verde (Африканская партия за независимость Гвинеи и Кабо-Верде) изначально была создана для мирной борьбы за независимость от Португалии, в 1960-х годах партия перешла к вооруженному конфликту и была одной из воюющих сторон в войне за независимость Гвинеи-Бисау. К концу войны партия создала марксистско-ленинское однопартийное государство, прежде чем в начале 1990-х годов была введена демократия."
 GUB.anarchist_communism: "£GUB_emerging_left_wing_radical PAIGC (Умеренная) "
 GUB.anarchist_communism_icon: "£GUB_emerging_left_wing_radical"
 GUB.anarchist_communism_desc: "Левое крыло радикалов - Partido Africano para a Independência da Guiné e Cabo Verde (Африканская партия за независимость Гвинеи и Кабо-Верде) изначально была создана для мирной кампании за независимость от Португалии, партия перешла к вооруженному конфликту в 1960-х годах и была одной из воюющих сторон в войне за независимость Гвинеи-Бисау. К концу войны партия создала марксистско-ленинское однопартийное государство, прежде чем в начале 1990-х годов была введена демократия."
 GUB.Nat_Autocracy: "£generic_Nat_Autocracy_small FARP"
 GUB.Nat_Autocracy_desc: "Революционные вооруженные силы народа (Forças Armadas Revolucionárias do Povo)"
 GUI.Western_Autocracy: "£generic_Western_Autocracy_small Союз за прогресс и обновление"
 GUI.liberalism: "£generic_liberalism_small Союз демократических сил Гвинеи"
 GUI.Neutral_Autocracy: "£generic_Neutral_Autocracy_small Партия единства и прогресса"
 GUI.neutral_Social: "£generic_neutral_Social_small Объединение гвинейского народа"
 GUY.conservatism: "£GUY_western_conservative Объединённая сила"
 GUY.conservatism_icon: "£GUY_western_conservative"
 GUY.conservatism_desc: "Объединенная сила - это социально-консервативная гайанская партия. Она экономически либеральна, придерживается антироссийских настроений и идеологически правоцентристская. Была образована в 1960 году и продолжала работать до выборов 2015 года. Однако после 1968 года они больше никогда не набирали 5% голосов, оставаясь одной из самых значительных мелких партий."
 GUY.liberalism: "£GUY_western_liberal Альянс за перемены"
 GUY.liberalism_icon: "£GUY_western_liberal"
 GUY.liberalism_desc: "Альянс за перемены - социально-либеральная политическая партия. Она была сформирована в 2005 году тремя депутатами, покинувшими свои предыдущие партии. Она прогрессивная и многорасовая, занимает позицию от центра к левоцентризму. После своего основания они были третьей по величине партией в парламенте. С 2015 года работают в едином списке с APNU."
 GUY.socialism: "£GUY_western_social_democrat Народный национальный конгресс"
 GUY.socialism_icon: "£GUY_western_social_democrat"
 GUY.socialism_desc: "Социал-демократическая - Народный национальный конгресс-реформа - социал-демократическая партия в Гайане. Она также классифицируется как демократическая социалистическая и в прошлом была левонационалистической и популистской. Она занимает центрально-левое крыло политики. Она была образована в 1957 году и с тех пор является одной из двух крупных партий в Гайане, вместе с PPP/C. Ее в основном поддерживают афрогайанцы. В 2011 году она сформировала избирательный альянс с несколькими другими партиями под названием Партнерство ради национального единства."
 GUY.socialism_2011: "£GUY_western_social_democrat_alt APNU"
 GUY.socialism_2011_icon: "£GUY_western_social_democrat_alt"
 GUY.socialism_2011_desc: "Партнерство за национальное единство сформировано в 2011 году для проведения выборов в том же году 10 различными партиями, причем самым важным и популярным из них был Народный национальный конгресс. Группа состоит в основном из левых партий. Они получили большинство мест, но PPP/C была самой большой партией в целом и они выиграли президентство. На следующих выборах APNU и AFK объединились в единый список, что означало, что они могут баллотироваться в президенты, выставив кандидата."
 GUY.anarchist_communism: "£GUY_anarchist_communism PPP/C"
 GUY.anarchist_communism_icon: "£GUY_anarchist_communism"
 GUY.anarchist_communism_desc: "Коммунистическая - Народная прогрессивная партия/Гражданская - одна из двух крупных политических партий Гайаны. Она была образована в 1950 году в результате слияния Британской Гвианской лейбористской партии и Комитета по политическим вопросам. С момента своего образования она оставалась либо крупнейшей, либо второй по величине партией Гайаны. Она многоэтническая, но ее избирательная база в основном состоит из индогайанцев. Она является левоцентристской и левой и следует идеологии социал-демократии, демократического социализма и левого популизма. В прошлом ее классифицировали как левую националистическую и марксистско-ленинскую."
 GUY.Neutral_conservatism: "£GUY_non_aligned_conservative ROAR"
 GUY.Neutral_conservatism_icon: "£GUY_non_aligned_conservative"
 GUY.Neutral_conservatism_desc: "Поднимитесь, организуйте и восстановите Гайану - консервативная и притом первая партия, которая считала себя этнической, будучи индо-гайанской. Она была создана в 1999 году и плохо проявила себя на выборах 2001 года. Впоследствии сформировала альянс с GAP и добилась большего успеха, прежде чем многие из ее членов ушли в AFK в 2011 году прямо перед выборами."
 GUY.neutral_Social: "£GUY_neutral_Social WPA"
 GUY.neutral_Social_icon: "£GUY_neutral_Social"
 GUY.neutral_Social_desc: "Союз трудящихся - это левая гайанская партия. Она сформирована в 1974 году как альянс сразу трех левых партий и официально объявлена самостоятельной в 1979 году. В целом она имела небольшой успех, добившись своих лучших результатов на выборах 2001 года, где баллотировалась вместе с GAP."
 GUY.Neutral_Communism: "£GUY_Neutral_Communism GAP"
 GUY.Neutral_Communism_icon: "£GUY_Neutral_Communism"
 GUY.Neutral_Communism_desc: "Гайанская партия действий - левая политическая партия в Гайане. Она представляет коренное индейское население страны и была образована в 1989 году, но впервые баллотировалась лишь в 2001 году в союзе с WPA. В 2006 году объединилась с ROAR, а в 2011 году присоединилась и к APNU."
 GUY.Nat_Populism: "£GUY_Nat_Populism Объединенная республиканская партия"
 GUY.Nat_Populism_icon: "£GUY_Nat_Populism"
 GUY.Nat_Populism_desc: "Объединенная республиканская партия образована в 1985 году в Соединенных Штатах, а затем была создана и в Гайане в 1987 году. Все же в 1992 году ей не удалось завоевать ни одного места и она снова начала участвовать в выборах только с 2015 года, несмотря на то, что имела чрезвычайно мало популярности. Она хочет повысить уровень жизни и образования в Гайане, если придет к власти."
 GUY.Nat_Autocracy: "£GUY_Nat_Autocracy Силы обороны Гайаны"
 GUY.Nat_Autocracy_icon: "£GUY_Nat_Autocracy"
 GUY.Nat_Autocracy_desc: ""
 GUY.oligarchism: "£GUY_non_aligned_oligarchism Банда Агриколы-Бакстона"
 GUY.oligarchism_icon: "£GUY_non_aligned_oligarchism"
 GUY.oligarchism_desc: ""
 HAI.conservatism: "£generic_conservatism_small Объединение прогрессивных национал-демократов"
 HAI.conservatism_desc: "Христианская демократия - Rassemblement des Démocrates Nationaux Progressistes (или Объединение прогрессивных национал-демократов на русском языке) - одна из старейших существующих политических партий Гаити. Основанная в 1979 году, она была допущена к выборам в 1987 году вскоре после падения второго режима Дювалье.\n\nОна является членом Международной организации демократов-центристов и Христианско-демократической организации Америки."
 HAI.liberalism: "£generic_liberalism_small Партия гаитянских лысых голов"
 HAI.liberalism_desc: "Либерализм - Pati Ayisyen Tèt Kale (или Партия гаитянских лысых голов на русском языке) - либеральная партия, отделившаяся от RP в августе 2012 года. Хотя Мишель Мартелли никогда не был членом PHTK, они поддерживали тесные связи с партией RP."
 HAI.socialism: "£generic_socialism_small Семья Лавалас"
 HAI.socialism_desc: "Социал-демократический популизм - Фанми Лавалас (или Семья Лавалас на английском) - партия, названная в честь политического движения Лавалас, популярного во время президентской кампании Жана-Бертрана Аристида в 1990 году. Официально отделилась от Тганизасьон Пеп к ап Лайт (OPL) в 1996 году.\n\nПартия известна тем, что проводит политику \"роста и равенства\", придерживаясь западноевропейских социал-демократических принципов и отказываясь от требований МВФ по проведению мер жёсткой экономии."
 HAI.Communist-State: "£generic_Communist_State_small Новая гаитянская коммунистическая партия"
 HAI.Communist-State_desc: "Марксистско-ленинский коммунизм - Nouveau Parti Communiste Haïtien (Marxiste-Léniniste) (или Новая гаитянская коммунистическая партия (марксистско-ленинская) на английском языке) - партия, образованная в 2000 году, в состав которой входит смесь марксистов-ленинцев, маоистов и сталинистов.\n\nИх широко считают антиревизионистами, и они являются идеологическими потомками Parti Unifié des Communistes Haïtiens, бывшей коммунистической партии, репрессированной и в конечном итоге изгнанной во времена правления Франсуа «Папы Дока» Дювалье и его сына Жан-Клода «Бэби Дока» Дювалье."
 HAI.anarchist_communism: "£generic_anarchist_communism_small Дитя платформы Дессалин"
 HAI.anarchist_communism_desc: "Дессалинизм - Platfòm Pitit Desalin (или Дитя платформы Дессалин на русском языке) - демократическая социалистическая партия, основанная в декабре 2014 года и находящаяся под сильным влиянием широких экономических принципов дессалинизма.\n\n Партия получила свое название в честь первого правителя Гаити после революции Жан-Жака Дессалина (Jan-Jak Desalin на гаитянском). После окончательного запрета рабства Дессалин поставил все производство и обработку товарных культур под контроль нового гаитянского правительства, проводя крайне протекционистскую политику для защиты гаитянских экономических интересов. В целом он был не против иностранных инвестиций, но только тех, которые поступали из Франции."
 HAI.Neutral_conservatism: "£HAI_neutral_conservatives MCNH - Христианское движение за новое Гаити"
 HAI.Neutral_conservatism_desc: "Христианская демократия - Mouvement Chrétien pour une Nouvelle Haïti (или Христианское движение за новый Гаити на русском языке) - правоцентристская христианская демократическая партия, основанная в 1991 году конгломератом евангелических протестантских церквей на Гаити.\n\nПосле 1999 года избирательные органы признали партию официальным кандидатом на выборах."
 HAI.Neutral_green: "£generic_Neutral_green_small Крестьянский ответ"
 HAI.Neutral_green_desc: "Аграризм - Repons Peyizan (или Крестьянский ответ на русском языке) - партия, основанная в июле 2010 года как ответ на землетрясение, разрушившее страну в том году. Партия была основана благодаря Мишелю Мартелли, музыканту-компу, более известному под сценическим псевдонимом Свит Мики, который официально присоединился к политической жизни после того, как трудности, возникшие в результате стихийного бедствия, привели к ухудшению условий в стране."
 HAI.neutral_Social: "£generic_neutral_Social_small Организация борющегося народа"
 HAI.neutral_Social_desc: "Социал-демократическая - Òganizasyon Pèp k ap Lite (или Организация борющегося народа на русском языке) - политическая партия, основанная в 1991 году во время движения Лавалас.\n\nХотя партия находится под зонтиком социал-демократии, она поддерживает приватизацию и меры экономии как способ оживления больной гаитянской экономики, что привело к идеологическому расколу OPL и FL в 1996 году."
 HAI.Nat_Populism: "£generic_Nat_Populism_small Гаити в действии"
 HAI.Nat_Populism_desc: "Федералистский национализм - Ayiti an Aksyon (или Гаити в действии на русском языке) - одновременно националистическая и федералистская партия. Основанная в 2005 году, она стремилась добиться регионального контроля и самоопределения для департамента Латибонит, а вскоре после этого партия начала выступать за децентрализацию и федерализм в целом."
 HAI.Nat_Fascism: "£generic_Nat_Fascism_small Партия национального единства"
 HAI.Nat_Fascism_desc: "Тоталитарный черный национализм - Parti de l'Unité Nationale (или Партия национального единства на английском языке) - партия, изначально основанная в 1957 году как антиамериканская и гаитянская националистическая партия под руководством Франсуа «Папы Дока» Дювалье.\n\nПо мере того, как продолжалось правление Папы Дока, партия становилась все более и более авторитарной, используя своих грозных тонтон-макутов для подавления любой оппозиции. Папа Док Дювалье однажды использовал тонтон-макутов для поиска и убийства всех черных собак, полагая, что бывший лидер тонтон-макутов Клеман Барбо превратил себя в черную собаку."
 HAI.Nat_Autocracy: "£generic_Nat_Autocracy_small Вооружённые силы Гаити"
 HAI.Nat_Autocracy_desc: "Военное правление - Forces Armées d'Haïti (или Вооружённые силы Гаити на русском языке) - официальное название гаитянских вооружённых сил, которое было приостановлено и впоследствии распущено в 1995 году из-за участившихся случаев переворотов и попыток переворотов из рядов высшего военного командования."
 HEZ.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small Хезболла"
 HEZ.Vilayat_e_Faqih_desc: ""
 HKG.conservatism: "£generic_conservatism_small Демократический альянс за улучшение и прогресс Гонконга"
 HKG.conservatism_desc: "Центристская. Демократическая партия была крупнейшей партией в первом законодательном органе Гонконга, избранном в 1995 году. Это одна из самых умеренных пандемократических партий, ищущая компромисс с Пекином, что оттолкнуло некоторых из ее бывших сторонников."
 HKG.liberalism: "£generic_liberalism_small Демократическая партия"
 HKG.liberalism_desc: "Либерал - Гражданская партия, как и другие члены продемократического лагеря, призывает к всеобщему избирательному праву и защите индивидуальных свобод. Что отличает партию, так это ее забота об охране окружающей среды и правах меньшинств."
 HKG.liberalism_2006: "£generic_liberalism_small Гражданская партия"
 HKG.liberalism_2006_desc: "Либеральная - Гражданская партия - это основная продемократическая партия, основанная группой барристеров, которая фокусируется на вопросах всеобщего избирательного права, гражданских свобод и верховенства закона."
 HKG.socialism: "£generic_socialism_small Рубеж"
 HKG.socialism_desc: "Социал-демократ - детище Эмили Лау, Фронтир, является более радикальной продемократической партией, чем некоторые другие пандемократы, призывая к принятию новой конституции вместо Основного закона."
 HKG.socialism_2006: "£generic_socialism_small Лига социал-демократов (LSD)"
 HKG.socialism_2006_desc: "Социал-демократ - альянс Лиги социал-демократов - это партия \"прогрессивных демократов\", которая, в отличие от других пандемократических партий, тесно ассоциирует себя с программой уличных действий."
 HKG.socialism_2016: "£generic_socialism_small Народная сила - Лига социал-демократов (PP-LSD)"
 HKG.socialism_2016_desc: "Социал-демократ - Альянс Народная сила - Лига социал-демократов представляет собой комбинацию двух \"прогрессивных демократических\" партий, которые, в отличие от других пандемократических партий, тесно ассоциируют себя с программой уличных действий."
 HKG.Communist-State: "£HK_PLA Гарнизон Народно-освободительной армии Гонконга"
 HKG.Communist-State_icon: "£HK_PLA"
 HKG.Communist-State_desc: "Коммунистический - Гарнизон НОАК в Гонконге существует для поддержания обороны Специального административного района. Хотя Основной закон запрещает гарнизону вмешиваться в местные дела, гарнизон может быть призван для восстановления общественного порядка по требованию правительства Гонконга."
 HKG.Conservative: "£HKG_Conservative Демократический альянс за улучшение Гонконга (DAB)"
 HKG.Conservative_desc: "Консервативный - DAB был главной про-пекинской партией в Законодательном совете, последовательно поддерживая интеграцию с основной администрацией Гонконга. Партия также занимает социально консервативную позицию, выступая против однополых браков и поддерживая тесные связи с евангельскими христианскими организациями."
 HKG.Autocracy: "£HKG_Autocracy Новая народная партия (NPP)"
 HKG.Autocracy_desc: "Консервативная - Новая народная партия широко рассматривается как предвыборный инструмент видного про-пекинского политика Регины Ип. Ее поддержка законодательства о национальной безопасности и утверждения о том, что иностранные державы используют социальные сети для вмешательства в протесты, сделали ее противоречивой фигурой."
 HKG.anarchist_communism: "£HKG_anarchist_communism Гонконгская федерация профсоюзов (HKFTU)"
 HKG.anarchist_communism_desc: "Левый радикализм - Гонконгская федерация профсоюзов долгое время была тесно связана с КПК в Китае. Профсоюз сыграл важную роль в восстаниях левых 1967 года против британских колониальных властей и сегодня сохраняет свою пропекинскую, рабочую позицию, которая отличает его как от антипекинских пандемократов, так и от других, более пропекинских партий среднего класса."
 HKG.Neutral_conservatism: "£generic_Neutral_conservatism_small Путь демократии"
 HKG.Neutral_conservatism_desc: "Центрист - Путь демократии - это небольшая центристская партия, которая изображает себя выше бинарного различия между про-пекинским лагерем и пан-демократами. Она настаивает на компромиссном подходе между двумя сторонами, но пользуется относительно небольшой поддержкой в этом стремлении."
 HKG.Neutral_Libertarian: "£generic_Neutral_Libertarian_small Третья Сторона"
 HKG.Neutral_Libertarian_desc: "Либертарианская - Третья сторона - это небольшая центристская партия, которая изображает себя выше бинарного различия между про-пекинским лагерем и пан-демократами. Она настаивает на подходе, который является компромиссным между двумя сторонами, но в этом стремлении она пользуется относительно небольшой поддержкой."
 HKG.oligarchism: "£generic_oligarchism_small Либеральная партия"
 HKG.oligarchism_desc: "Олигархический - Либеральная партия является про-бизнес и социально-консервативной политической партией. Несмотря на принадлежность к лагерю сторонников Пекина, партия не всегда была на одной волне со своими предполагаемыми союзниками, неоднократно выступая против правительства."
 HKG.Neutral_green: "£generic_Neutral_green_small Зеленая партия Гонконга"
 HKG.Neutral_green_desc: "Green - Зеленая партия Гонконга - это небольшая экологическая партия с левыми идеалами. Она является членом Азиатско-Тихоокеанской федерации зеленых"
 HKG.Nat_Populism: "£generic_Nat_Populism_small Локалисты"
 HKG.Nat_Populism_desc: "Националистический популизм. Локалисты — это политическая группировка, которая охватывает широкий спектр различных партий, объединенных стремлением к самоопределению в Гонконге. Такие группы, как Youngspiration, Demosisto и Hong Kong National Party, вышли на первый план во время протестов в Гонконге в 2014 году и представляют собой новый, более радикальный и более популистский бренд политики Гонконга, омраченный противоречиями. Некоторые локалисты выступают за сохранение уникальной культуры Гонконга, другие — за ограничения на туризм и иммиграцию с материка. Некоторые из наиболее радикальных локалистов выступают за независимость или даже за временное возвращение к британскому правлению в качестве переходной меры. Несмотря на это, значительная часть молодежи относится к ним с восхищением, а старшая часть населения относится к ним с неодобрением, граничащим с отвращением."

 SAU.Vilayat_e_Faqih: "£SAU_hardline_shite  (PGH) Партия Бога в Хиджазе"
 SAU.Vilayat_e_Faqih_icon: "£SAU_hardline_shite"
 SAU.Vilayat_e_Faqih_desc: "(Шиитские революционеры) - Партия Бога в Хиджазе (араб.: Хезболла аль-Хиджаз)\n\nХезболла аль-Хиджаз - подпольная группа, которая ведет вооруженную борьбу с правительством Саудовской Аравии с 1980-х годов. Она стремится заменить Дом Сауда Исламской Республикой, вдохновленной Иранской революцией 1979 года. Она придерживается идеологии Хомейни вилайат аль-факих, которая концентрирует власть в руках верховного юриста, и поэтому присоединилась к Ирану и Хезболле в Ливане. В отличие от умеренного Движения за реформы, она отказалась примириться с саудовской монархией и продолжает следовать экстремистской тактике."
 SAU.Mod_Vilayat_e_Faqih: "£generic_Mod_Vilayat_e_Faqih_small (РМ) Движение за реформы"
 SAU.Mod_Vilayat_e_Faqih_desc: "(Шиитские революционеры) - Реформаторское движение (Ширази) (араб. Islahiyyah)\n\nIslahiyyah, или Реформаторское движение, представляет собой свободную сеть шиитских ученых из Восточной провинции Саудовской Аравии, которая придерживается учений Мухаммеда аль-Ширази, видного шиитского деятеля, который выступил против аятоллы Хомейни и его идеологии вилайат аль-факих. Хотя Реформаторское движение когда-то вело подпольное восстание против саудовского правительства как Организация исламской революции на Аравийском полуострове, в 90-х годах оно смягчило свою риторику, разорвало связи с Ираном и согласилось самораспуститься, чтобы достичь соглашения с королем Фахдом, который согласился освободить его членов. Сегодня бывшие члены движения поддерживают умеренные реформы, а не революцию, вдохновленную Ираном, стратегия, которая позволила саудовской монархии терпеть их продолжающуюся деятельность, но которая оттолкнула более радикально настроенную шиитскую молодежь."
 SAU.Caliphate: "£SAU_salafist_jihadism (AQ) Аль-Каида"
 SAU.Caliphate_2009: "£SAU_salafist_jihadism (AQIA) Аль-Каида на Аравийском полуострове"
 SAU.Caliphate_icon: "£SAU_salafist_jihadism"
 SAU.Caliphate_desc: "(Салафит-джихадист) - Аль-Каида (араб. Al-Qaeda)\n\nАль-Каида - это салафитское джихадистское движение, основанное Усамой бен Ладеном и другими так называемыми «афганскими арабами», которые сражались на стороне моджахедов во время вторжения Советского Союза в Афганистан. Опираясь на идеологию Сайида Кутба, Аль-Каида стала организацией, наиболее часто ассоциируемой с исламским террором. Ее призыв к глобальному джихаду позволил ей обрести присутствие во всем мусульманском мире. С тех пор, как король Фахд отклонил предложение бен Ладена о военной помощи против Саддама Хусейна во время вторжения в Кувейт и вместо этого запросил американскую поддержку, Аль-Каида стремилась силой свергнуть Дом Сауда."
 SAU.Kingdom: "£SAU_kingdom (HoS) Дом Сауда"
 SAU.Kingdom_icon: "£SAU_kingdom"
 SAU.Kingdom_desc: "(Ваххабитский монархист) - Дом Сауда (араб. Āl Su'ūd)\n\nС тех пор как Абдулазиз «Ибн Сауд» завоевал большую часть Аравийского полуострова в начале 1900-х годов, Дом Сауда правил землями Неджда, Хиджаза, Восточной провинции, Асира, Джизана и Наджрана. Аль-Сауды опирались на союз с последователями аль-Ваххаба, салафитского священнослужителя, который выступал за возвращение к «более чистой» форме суннитского ислама. Религиозная легитимность, предоставленная ваххабизмом, поддерживала саудовское правление посредством выпуска фетв ваххабитскими священнослужителями, которые освящают саудовские политические решения. Саудовский бренд салафизма, который запрещает любую форму политической оппозиции и протеста, отличается от более популистских брендов салафизма, которые выступают против концентрации религиозной власти в руках политической элиты или выступают за всемирный джихад."
 SAU.Neutral_Muslim_Brotherhood: "£muslim_brotherhood_small (IAM) Движение исламского пробуждения"
 SAU.Neutral_Muslim_Brotherhood_desc: "(Умеренный исламизм) - Движение исламского пробуждения (араб.: Al-Sahwa Al-Islamiyya)\n\nСахва, или Движение исламского пробуждения, возникло в 1990-х годах как свободная сеть суннитских священнослужителей, которые считали, что саудовская монархия отходит от «истинного» ислама. Движение стремилось к подлинной политической реформе в Королевстве Саудовская Аравия, но не смогло добиться успеха из-за тюремного заключения и кооптации несогласных священнослужителей саудовской монархией."
 SAU.Neutral_Muslim_Brotherhood_icon: "£muslim_brotherhood_small"
 SAU.Neutral_Muslim_Brotherhood_2011: "£SAU_reformist_shite Исламская партия Умма"
 SAU.Neutral_Muslim_Brotherhood_2011_desc: "Умеренный исламист - Исламская партия Умма - это политическая организация, объединяющая саудовских исламистов, интеллектуалов, правозащитников и юристов, выступающих против саудовской монархии. Партия стала представлять модернистское направление в Саудовской Аравии, которое стремится объединить религиозность Саудовской Аравии с политическими реформами в противовес ваххабизму, запрещающему любую форму политического инакомыслия."
 SAU.Neutral_Muslim_Brotherhood_2011_icon: "£SAU_reformist_shite"

 TAT.Neutral_Muslim_Brotherhood_desc: "Партия «Иттифак» была первой некоммунистической партией в Татарстане. Обычно ее называют Татарской националистической партией. Она была названа в честь Иттифак аль-Муслимин — дореволюционной мусульманской политической партии, представленной в парламенте царской России."

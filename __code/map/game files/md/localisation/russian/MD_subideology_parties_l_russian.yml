 SOV.liberalism_yash_desc: "(Большая палатка) Коалиция Свободного Севера. (рус.: Коалиция Свободного Севера)\n\nКоалиция Свободного Севера — это союз всех видов либеральных партий и регионалистских организаций северных регионов России. Целью коалиции является создание свободного и независимого государства на территории Северной России и разгром войск ЧВК Вагнера."

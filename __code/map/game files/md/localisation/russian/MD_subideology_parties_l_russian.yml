 BSH.Autocracy: "£BSH_emerging_reactionary Правительство Муртазы Рахимова"
 BSH.Autocracy_icon: "£BSH_emerging_reactionary"
 BSH.Autocracy_desc: "Самодержавие - Самодержавие Рахимова или Первое правительство (Лидеры: Муртаза Рахимов - Урал Рахимов - Рафаэль Байдавлетов - Раиль Сарбаев). Первое правительство во главе с самодержцем Муртазой Рахимовым. Популярно за его национальные перемены, государственническую политику в экономике, в южных и юго-восточных провинциях. По-видимому, это коррумпированное правительство, состоящее из людей из КПСС, но с властными наклонностями. Обычно их называют байством."

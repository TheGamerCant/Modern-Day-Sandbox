 BSH.conservatism_1: "£SOV_western_cons1 Партия роста"
 BSH.conservatism_1_icon: "£SOV_western_cons1"
 BSH.socialism: "£BSH_western_social Социал-демократическая партия"
 BSH.socialism_icon: "£BSH_western_social"
 BSH.socialism_desc: "Социал-демократия - Социал-демократическая партия (Лидеры: Субидей Тоган). Башкирская социал-демократическая партия, основанная на истории первой Башкирской социалистической партии Ахмета Заки Валиди. Место лидера занял его сын Субидей Тоган, вернувшийся на историческую родину из Турции. Основана на принципах, заложенных в первую республику Ахметом Заки Валиди."
 BSH.Communist-State: "£SOV_emerging_communism Коммунистическая партия Башкортостана"
 BSH.Communist-State_icon: "£SOV_emerging_communism"
 BSH.Communist-State_desc: "Коммунистическое государство - Коммунистическая партия Башкортостана (Лидеры: Юнир Кутлугужин). Наследие коммунистов СССР - Коммунистическая партия Башкортостана. Ищем связи с коммунистами мира и России."
 BSH.Conservative: "£BSH_emerging_reactionary_1 Единая Россия"
 BSH.Conservative_icon: "£BSH_emerging_reactionary_1"
 BSH.Conservative_desc: "Реакционер - «Единая Россия» провозглашает своей официальной идеологией «русский консерватизм», но на самом деле фактически лишена идеологии и функционирует как широкомасштабная популистская партия, продвигающая стабильность как свою главную добродетель, в противовес революционному хаосу, который был характерен для России в постсоветскую эпоху до прихода Путина к власти."
 BSH.anarchist_communism: "£SOV_left_wing_radical Партия Жизни"

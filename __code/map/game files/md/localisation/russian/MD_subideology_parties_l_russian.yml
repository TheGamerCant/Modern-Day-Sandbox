 HPR.Autocracy_sov_icon: "£SOV_emerging_reactionary"
 HPR.neutral_Social: "£HPR_non_aligned_oligarchism Союз Процветания Харькова"
 HPR.neutral_Social_icon: "£HPR_non_aligned_oligarchism"
 HPR.neutral_Social_desc: "Социал-демократ - Харьковский Союз Процветания (Союз Процветания Харькова) — политическая партия, созданная владельцами промышленных комплексов Харькова. Партия представляет интересы бизнеса и выступает за создание условий для экономического процветания."

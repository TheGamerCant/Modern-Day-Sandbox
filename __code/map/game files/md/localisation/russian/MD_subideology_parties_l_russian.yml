 USA.American_Anarchist_Society: "£generic_anarchist_communism_small Американское анархистское общество"
 USA.American_Anarchist_Society_icon: "£generic_anarchist_communism_small"
 USA.American_Anarchist_Society_desc: "ААС или Американское анархистское общество — это преданная своему делу группа людей, которые стремятся восстановить более натуралистический порядок, приняв идею минархизма и более или менее идя дальше. Своего рода функционирование похоже на синдикализм с точки зрения социальной организации, но по формату больше похоже на сетку, тем не менее, основное внимание уделяется максимальной децентрализации, чтобы гарантировать, что самые справедливые формы общества реализуются через коллективные и взаимные выгоды с точки зрения экономических и социальных взаимодействий."
 USA.Commissariat_Corps: "£USA_Commissariat_Corps_small Корпус комиссариата"
 USA.Commissariat_Corps_icon: "£USA_Commissariat_Corps_small"
 USA.Commissariat_Corps_desc: "Корпус комиссариата является политическим органом вооруженных сил. Ориентируясь на политическую целостность нации, он, как ни странно, располагает компетентными офицерами, поскольку для того, чтобы войти в состав ЦК, необходимо отработать полный срок службы в одном из военных учреждений страны. Тем не менее, многие не считают это просто «запугивающим подразделением» партии, несмотря на четкие требования о вступлении. Их «План единства» также привлек внимание некоторых из-за его странного, почти противоречивого формата, в котором военная служба и социалистическая экономика используются как способ по-настоящему объединить нацию и ее народ для достижения общей цели. Но это ничего не значит, если они просто военные, а не политики... верно?"
 USA.Naturalist_NFP_Victory: "£USA_american_heritage_party Американская партия натуралистов"
 USA.Naturalist_NFP_Victory_icon: "£USA_american_heritage_party"
 USA.Naturalist_NFP_Victory_desc: "Американская партия натуралистов. ННП является псевдокоалиционной партией, в которой ультранационалистическое крыло старой НФП придерживалось единой идеологии. В его состав входят Натуалистическое движение, Американская нацистская партия, остатки ККК и небольшое количество других групп и организаций. Основная идеология сосредоточена вокруг американского натурализма, который представляет собой современную адаптацию Либерийского плана. Поскольку необоснованные убийства явно не одобряются, партия помогает правительству переехать за границу, чтобы сфокусировать свой план чистоты. Экономика, как правило, является формой государственного капитализма/авторитарного социализма, но поскольку никто не любит «красных», они просто подчищают названия, чтобы это работало. Внешняя политика представляет собой умеренный экспансионизм с сильным меркантильным и изоляционистским влиянием."
 USA.Militarist_NFP_Victory: "£USA_Nat_Autocracy_small Американское военное общество"
 USA.Militarist_NFP_Victory_icon: "£USA_Nat_Autocracy_small"
 USA.Militarist_NFP_Victory_desc: "Американское военное общество. AMS является продуктом политики НФП, которая привела к сдвигу партийной базы в сторону милитаристов и элиты Пентагона. Теперь во главе стоят те же самые генералы Пентагона, которым теперь нужно найти филиал, который будет заниматься гражданскими делами, чтобы они могли продолжать концентрироваться на цитатах, настоящей военной службе, конечной цитате. Тем не менее, публика полна энтузиазма, а национальная гордость находится на рекордно высоком уровне, так что давайте оседлать волну как можно дольше."
 USB.Western_Autocracy: "£USA_federalist Федералистская партия"
 USB.Western_Autocracy_icon: "£USA_federalist"
 USB.Western_Autocracy_desc: "£USA_federalist Партия федералистов (Правое крыло/ФПРВ). Главный антивыборный орган Партии федералистов занимает противоречивые позиции. Они не хотят выборов сейчас, может быть, позже. Они безразличны к идее воссоединения континента павших Соединенных Штатов, но, тем не менее, не выступают полностью против этой идеи. Тем не менее, они также, похоже, более склонны к финансовому затягиванию поясов, но в то же время хотят поощрять культурный прогрессизм. Некоторые могут сказать, что это новая эра прогрессивного республиканизма, другие говорят о его ложных надеждах на авторитарное будущее. Какова бы ни была конечная цель, мы узнаем только тогда, когда она произойдет."
 USB.conservatism: "£generic_conservatism_small Свободная консервативная партия"
 USB.conservatism_icon: "£generic_conservatism_small"
 USB.conservatism_desc: "£generic_conservatism_smallFree Консервативная партия (FCP) – умеренная консервативная партия, равнодушная к предвыборным дебатам. Однако финансовая и социальная политика заставила некоторые оппозиционные партии назвать их «мягкими правыми». Это политическое безразличие привело к тому, что они более или менее голосовали в соответствии с правой фракцией Партии федералистов. Поэтому многие задаются вопросом, насколько независима такая партия, когда они так много работают с другой."
 USB.liberalism: "£USA_federalist Федералистская партия"
 USB.liberalism_icon: "£USA_federalist"
 USB.liberalism_desc: "£USA_federalist Партия федералистов - (Левое крыло/ФПЛВ). Основная провыборная фракция ФП. Эта фракция состоит из смеси социал-демократов и левоцентристских идеологий. Многие рассматривают эту фракцию как Демократическую партию в стиле 1990-х годов с точки зрения сходства, однако главное отличие состоит в том, что эта партия выступает за ренавшизм и экспансионизм. Они рассматривают падение континента как признак ошибок старых руководителей, ведущих молодое поколение, и их неспособности достучаться до молодежи за новыми способами мышления. Поэтому эта часть Партии федералистов желает иметь правительство пропорционального представительства с ранжированным голосованием. Представитель для подсчета населения будет определен позже. Пока их главная цель – завоевать расположение общественности в надежде на реальное будущее."
 USB.socialism: "£generic_socialism_small Социал-демократическая рабочая партия"
 USB.socialism_icon: "£generic_socialism_small"
 USB.socialism_desc: "£generic_socialism_small Социал-демократическая рабочая партия (SDWP) — прогрессивно-левая партия, выбравшая свой собственный путь на политической сцене Свободного государства. Будучи намного более похожими на своих европейских коллег, они также считают, что из основных партий левое крыло Партии федералистов является лучшим и с которым легче всего работать для достижения своих целей. Однако одним из самых больших различий между FPLW и SDWP являются их подходы к налоговому кодексу и роль, которую сам налоговый кодекс играет как в экономическом наказании, так и в приношении пользы обществу."
 USB.Communist-State: "£USA_free_socialist_party Свободная социалистическая партия"
 USB.Communist-State_icon: "£USA_free_socialist_party"
 USB.Communist-State_desc: "£USA_free_socialist_party Свободная социалистическая партия - (Statist/FSPS) Более традиционный социалистический блок FSP, эта фракция партии будет стремиться установить диктатуру пролетариата, чтобы рабочие увидели справедливое обращение, которого они заслуживают. Их основные положения направлены против выборов, однако они являются сторонниками экспансионизма и иностранного интервенционизма. Хотя их самый спорный момент заключается в том, что они строго антиамериканистски настроены, то есть они не стремятся объединить континент, а скорее создают новую идентичность."
 USB.Neutral_Communism: "£generic_Neutral_Communism_small Коммунистическая лига свободы"
 USB.Neutral_Communism_icon: "£generic_Neutral_Communism_small"
 USB.Neutral_Communism_desc: "£generic_Neutral_Communism_small Коммунистическая Лига Свободы — (КФЛ) — марксистско-ленинская партия, ориентированная на обеспечение диктатуры пролетариата. Их основное влияние исходит от Кубы Кастро, а также от социалистического режима Венесуэлы. Через социалистическую экономику, а также внешнюю политику «полупериодического социализма», компромисса между сталинским социализмом в одной стране и перманентной революцией Троцкого. CFL ищет мантию «Социалистической судьбы» и готова работать с антивыборной фракцией Свободной социалистической партии, чтобы обеспечить достижение своих целей."
 USB.anarchist_communism: "£USA_free_socialist_party Свободная социалистическая партия"
 USB.anarchist_communism_icon: "£USA_free_socialist_party"
 USB.anarchist_communism_desc: "£USA_free_socialist_party Свободная социалистическая партия - (анархистская/FSPA) Крайняя минархистская фракция FSP, хотя и не является традиционным анархистом, но рассматривается как своего рода либертарианско-социалистическая партия. Эта фракция выступает за прямое демократическое голосование, пропорциональное представительство и рейтинговое голосование как способ максимизировать справедливость выборов. Они чрезвычайно выступают за выборы, однако они против экспансии и антиамериканизма. Они стремятся сформировать новую идентичность посредством самых чистых форм демократии и ограничить власть федерального правительства федеральными обязанностями. Многие молодые люди тянутся к этой фракции и ожесточенно конкурируют с государственнической фракцией ФСП в целом."
 USB.Neutral_green: "£generic_Neutral_green_small Партия «Зеленое будущее»"
 USB.Neutral_green_icon: "£generic_Neutral_green_small"
 USB.Neutral_green_desc: "£generic_Neutral_green_small Партия зеленого будущего – (GFP) GFP – это современный подход к «зеленому» мышлению. Понимание того, что наша планета сильна, но хрупка, дает более широкий взгляд на подход к внутренней политике в целом. Посредством мощного вооружения анархистской фракции Свободной социалистической партии GFP стремится использовать науку и технологии, чтобы проложить путь к «Зеленому будущему»."
 USB.oligarchism: "£USA_mid_atlantic_party Среднеатлантическая партия"
 USB.oligarchism_icon: "£USA_mid_atlantic_party"
 USB.oligarchism_desc: "£USA_mid_atlantic_party Среднеатлантическая партия — (Изоляционисты/МАПИ) — партия новой волны, одна из основных фракций которой является ярым изоляционистом. Эти люди желают найти новую среднеатлантическую идентичность и уйти от неудач прошлого в новом свете. Они настроены против выборов, безразличны к экспансии и иностранному вмешательству, но являются ярыми антиамериканистами. Обе фракции разделяют этот антиамериканизм, но их позиция по внешней политике и идее выборов и/или возврата к демократическим идеалам, похоже, выходит за рамки."
 USB.Autocracy: "£generic_Autocracy_small Партия Атлантической власти"
 USB.Autocracy_icon: "£generic_Autocracy_small"
 USB.Autocracy_desc: "£generic_Autocracy_small Партия Атлантических властей - (AAP) AAP - это партия, в значительной степени поддерживающая власть, которая стремится установить федеральные законы, которые определяют и обеспечивают полномочия, которыми обладают юридические агентства. Многие в оппозиции этой предполагаемой узколобой партии видят в них не более чем пешку перед изоляционистской фракцией Среднеатлантической партии. Хотя их имена схожи, изоляционисты MAP несколько более расслаблены в своих взглядах на власть, а скорее акцентируют внимание на том, что они являются властью с более антивыборной позицией. Эта антивыборная позиция является основным контраргументом АПА в борьбе с изоляционистской политикой ПДЧ, но их крики, похоже, остаются по большей части незамеченными."
 USB.Neutral_Libertarian: "£USA_mid_atlantic_party Среднеатлантическая партия"
 USB.Neutral_Libertarian_icon: "£USA_mid_atlantic_party"
 USB.Neutral_Libertarian_desc: "£USA_mid_atlantic_party Среднеатлантическая партия - (Новая идентичность/MAPNI). Это партия, которая полностью сосредоточена на созданной новой волновой идентичности. Будучи сторонниками выборов, но при этом придерживаясь своей изоляционистской половины в антиамериканизме, предполагаемые идентитаристы в основном сосредоточены на создании новой идентичности для себя. Хотя они и не против расширения, они не чувствуют необходимости переходить реку Миссисипи, если придет время."
 USB.Neutral_conservatism: "£generic_Neutral_conservatism_small Партия свободы и солидарности"
 USB.Neutral_conservatism_icon: "£generic_Neutral_conservatism_small"
 USB.Neutral_conservatism_desc: "£generic_Neutral_conservatism_small Партия свободы и солидарности — (FSP/F&SP) — это произоляционистская партия, которая стремится использовать средства науки и инноваций для обеспечения надлежащих стандартов жизни и удовольствия от жизни. Их основной экономической целью является автаркия, где это возможно, но не автаркия. С точки зрения социальной политики они довольно умеренны, с некоторым уклоном влево и вправо по предметному материалу. Примером могут служить геи в армии. Они верят и поддерживают эту вещь как первостепенную для любого гражданина, независимо от происхождения, но, тем не менее, они не полностью верят в однополые браки. Несмотря на это, они до конца держались своего ближайшего политического союзника, которым является изоляционистская фракция Среднеатлантической партии. Их общая вера в то, что прежний глобально ориентированный идеализм США привел к краху, приводит к своего рода закрытому подходу к международным проблемам и, по сути, ко всему, что выходит за рамки, скажем, их соседей."
 USB.Nat_Autocracy: "£USA_national_service_party Партия национальной службы"
 USB.Nat_Autocracy_icon: "£USA_national_service_party"
 USB.Nat_Autocracy_desc: "£USA_national_service_party Партия национальной службы – (Милитаристская/НСПМ). НСП – это партия проамериканизма и сильного шовинизма. Хотя партия в основном разделилась по поводу идеи выборов, милитаристское крыло партии категорически против этих выборов. Но эта фракция выступает за экспансию и находится под сильным влиянием идей почти полной меритократии."
 USB.Nat_Populism: "£generic_Nat_Populism_small Партия национального единства"
 USB.Nat_Populism_icon: "£generic_Nat_Populism_small"
 USB.Nat_Populism_desc: "£generic_Nat_Populism_small Партия национального союза - (ПНЕ) ПНЕ - это партия, выступающая за естествознание, что многих сбивает с толку, учитывая, что нация, в которой они находятся, вообще не существовала так долго. Тем не менее, ПНЕ использует тот факт, что большая часть ее избирательной базы состоит из ветеранов и небольшой группы людей, ориентированных на правые взгляды, для укрепления своей легитимности. Но, помимо всей проветеранской политики, их все больше и больше рассматривают как политическое крыло военных, что на удивление мало кто в партии считает ложным. Они тоже не говорят, что это правда, но и не отрицают этого."
 USB.Monarchist: "£USA_modern_monarchist_movement Партия национальной службы"
 USB.Monarchist_icon: "£USA_modern_monarchist_movement"
 USB.Monarchist_desc: "£USA_modern_monarchist_movement Партия национальной службы (Современный монархист/НСПММ). НСП, будучи по существу партией военных и экстренных служб, также полна мечтателей. МММ или Современное Монархическое Движение в рамках всей НСП сочло целесообразным вернуть Монархизм в моду, популяризировав систему Выборной Монархии. Идея состоит в том, что по сути идеи выборов и демократических принципов останутся прежними, но должности и их имена/цитаты, титулы будут закреплены за теми, за кого они проголосовали. Что касается жесткой провыборной позиции, фракция желает расшириться и создать больше новых идей. Многие слышали о предполагаемом Доме Арлингтонов, но никто не знает, что это значит. Но сейчас они должны убедить людей, что можно избрать сильное руководство и что даже однажды, если вы будете достаточно усердно работать, вы сможете стать королем, как вам говорили, когда вы были маленькими."
 USB.Neutral_Autocracy: "£generic_Neutral_Autocracy_small Партия Атлантического Единства"
 USB.Neutral_Autocracy_icon: "£generic_Neutral_Autocracy_small"
 USB.Neutral_Autocracy_desc: "£generic_Neutral_Autocracy_small Партия Атлантического Единства - (AUP) AUP - это партия закона и порядка, прямой демократии, но не такой прямой, и идеализма. Будучи подвергнутой критике как неосужденные автократы, АУП стремится обеспечить такие вещи, как голосование по ранговому выбору и прогрессивный налог, который ориентирован исключительно на пропорциональное налогообложение доходов граждан. Эти сходства, а также более идеалистические члены партии активно используют и сотрудничают с фракцией современных монархистов НСП. В конце концов, как сказал один лидер АУП: «Что плохого в небольшом косметическом блеске?»"
 USB.Conservative: "£generic_Conservative_small Партия «Союз Кондор»"
 USB.Conservative_icon: "£generic_Conservative_small"
 USB.Conservative_desc: "£generic_Conservative_small Партия Союза Кондора - (CUP) CUP - старая популистская партия. Не совсем левые, но и не совсем правые, как называют Кондоров как членов партии, убеждение, что не узнаешь, пока не попробуешь, является первостепенной стратегией в управлении. Эта партия рассматривается скорее как сбивающее с толку пятно, чем как настоящая партия, поскольку многие оппозиционные произведения почти противоречат тому, у какой основной партии они высасывают политическую благосклонность. Несмотря на это, CUP является принципиальной партией и прочной «третьей партией» в более широком политическом ландшафте страны."
 USB.neutral_Social: "£generic_neutral_Social_small Партия рабочих союзов"
 USB.neutral_Social_icon: "£generic_neutral_Social_small"
 USB.neutral_Social_desc: "£generic_neutral_Social_small Партия рабочих профсоюзов - (WUP) WUP - это партия, выступающая за профсоюзы и национализацию. Члены партии полагают, что ядро ​​национализированных отраслей, ориентированных на основы выживания, поможет частному сектору сделать приоритетной помощь и повышение стандартов своих собственных работников. Партия также верит в правила, ограничивающие корпоративные эксцессы в эксплуататорских манерах, и стремится обязать создать профсоюзную сеть для координации и решения проблем как на местном, региональном, так и на национальном уровне, если дойдет до критической ситуации."
 USB.Nat_Fascism: "£generic_Nat_Fascism_small Лига Свободной Нации"
 USB.Nat_Fascism_icon: "£generic_Nat_Fascism_small"
 USB.Nat_Fascism_desc: "£generic_Nat_Fascism_small Лига свободных наций (ФНЛ) — партия натуралистов с шокирующей ксенофобией по отношению к Ближнему Востоку. Они ясно дали понять, что религии и идеологии Ближнего Востока и предполагаемого «мусульманского мира» представляют опасность для свободы и стабильности нашей страны. Хотя они торгуются на этом предполагаемом «ограниченном расизме», факт заключается в том, что многие за пределами партии замечают объединение неонацистов, фашистов, а также членов старых отделений Клана. Хотя партия в лучшем случае маргинальна, а в худшем — террористическая группа, многие с политической точки зрения не рассматривают ее скорее как цирк правого экстремизма, который привлекает только тех, кто не может видеть или верить имеющимся фактам."
 CAR.liberalism_icon: "£CAR_western_liberalism"
 CAR.liberalism_2013_icon: "£CAR_western_liberalism_alt"
 CAR.socialism_icon: "£CAR_western_socialism"
 CAR.Conservative_icon: "£CAR_emergency_conservatism"
 CAR.anarchist_communism_icon: "£CAR_anarchist_communism"
 CAR.Neutral_conservatism_icon: "£CAR_neutral_conservatism"
 CAR.neutral_Social_icon: "£CAR_neutral_socialism"
 CAR.Neutral_green_icon: "£CAR_neutral_green"
 CAR.Neutral_Autocracy_icon: "£CAR_neutral_autocracy"
 CAR.Nat_Autocracy_icon: "£CAR_nationalist_junta"
 CAR.Monarchist_icon: "£CAR_nationalist_monarchism"
 CSA.Western_Autocracy: "£generic_Western_Autocracy_small Вечеринка Дикси и Дельты"
 CSA.Western_Autocracy_icon: "£generic_Western_Autocracy_small"
 CSA.Western_Autocracy_desc: "£generic_Western_Autocracy_small Партия Дикси и Дельта - (DDP/D&DP) является партией только в том случае, если вы о них не знаете. Предполагаемая партия, судя по всему, хочет сделать приоритетом развитие общественного транспорта, уделив особое внимание железнодорожному транспорту. Но помимо этого их другие политические решения, похоже, лишь отражают их основную платформу. Некоторые говорят, что это всего лишь партия, занимающаяся одной проблемой, другие считают, что это тупой подход к управлению страной через экономические дела. Независимо от того, будут ли они избраны, страна достаточно скоро узнает, кто они на самом деле."
 CSA.conservatism_icon: "£generic_conservatism_small"
 CSA.liberalism: "£generic_liberalism_small Парик вечеринки Дикси"
 CSA.liberalism_icon: "£generic_liberalism_small"
 CSA.liberalism_desc: "£generic_liberalism_small Партия Дикси (WPD) — партия, которая использует недавний распад профсоюза для возрождения старых партий. «Парики», как их называют, — это левоцентристская политическая партия, стремящаяся использовать классический либерализм как способ удержать республику от сползания назад. Работая с регионом страны, имеющим черный пояс, Партия париков, как правило, обладает значительной мягкой силой с точки зрения поддержания политического мира."
 CSA.socialism: "£generic_socialism_small Прогрессивная демократическая партия"
 CSA.socialism_icon: "£generic_socialism_small"
 CSA.socialism_desc: "£generic_socialism_small Партия Прогрессивной Демократии - (НДП) Прогрессивная партия Южной Республики Америки является чем-то вроде коротышки с точки зрения политической власти. Поскольку общая демографическая ситуация в республике является консервативной, лишь немногие районы на Юге являются действительно прогрессивными и долгоживущими. НДП получает большую часть поддержки со стороны портовых городов, городских центров, а также промышленных центров, а вот чем Юг на самом деле не известен, так это индустриализацией."
 CSA.Communist-State_icon: "£generic_Communist_State_small"
 CSA.anarchist_communism_icon: "£generic_anarchist_communism_small"
 CSA.Conservative_icon: "£generic_Conservative_small"
 CSA.Autocracy: "£generic_Autocracy_small Партия аграрного единства"
 CSA.Autocracy_icon: "£generic_Autocracy_small"
 CSA.Autocracy_desc: "£generic_Autocracy_small Партия аграрного единства - (AUP) AUP или Аграрная партия, как многие их сокращают, больше похожа на партию плантационного класса. Это означает, что большая часть их политики, как правило, отдает приоритет сельскохозяйственным разработкам и решениям, которые приносят пользу сельскохозяйственному сектору экономики по сравнению с большинством других секторов. В социальном отношении они апатичны до тех пор, пока сохраняется их статус королей экономики Юга."
 CSA.Neutral_Muslim_Brotherhood: "£generic_Neutral_Muslim_Brotherhood_small Нация Ислама"
 CSA.Neutral_Muslim_Brotherhood_icon: "£generic_Neutral_Muslim_Brotherhood_small"
 CSA.Neutral_Muslim_Brotherhood_desc: "£generic_Neutral_Muslim_Brotherhood_small Нация Ислама. Нация Ислама — это афроамериканская культурная группа, которая стремится продвигать и обеспечивать статус чернокожих в американском обществе, где доминируют белые. В Южной республике они имеют гораздо большее влияние благодаря региону Черного пояса, который составляет почти половину, если не более половины новой нации. Следовательно, как бы радикальны ни были члены Нации Ислама, они стремятся фактически создать новую нацию только для чернокожих, рассматривая эту новую нацию как спасение для чернокожих, живущих на континенте."
 CSA.Neutral_Autocracy: "£generic_Neutral_Autocracy_small Федерализовать партию Дикси"
 CSA.Neutral_Autocracy_icon: "£generic_Neutral_Autocracy_small"
 CSA.Neutral_Autocracy_desc: "£generic_Neutral_Autocracy_small Партия «Федерализация Дикси» (СвДП) «Южные федералисты», как их называют члены оппозиции, представляют собой партию, стремящуюся смоделировать новую республику на основе компромисса между нефункциональной системой Конфедеративных Штатов и чрезмерно унитаризмом старых Соединенных Штатов. С экономической и социальной точки зрения они склонны к левому уклону, хотя по некоторым вопросам они отказываются сдвинуться с места, занимая более правую позицию."
 CSA.Neutral_conservatism: "£generic_Neutral_conservatism_small Партия южной идентичности"
 CSA.Neutral_conservatism_icon: "£generic_Neutral_conservatism_small"
 CSA.Neutral_conservatism_desc: "£generic_Neutral_conservatism_small Партия южной идентичности - (SIP) SIPpers - это партия более или менее умеренного сидения на заборе. Будучи партией, занимающейся одной проблемой, Партия южной идентичности стремится культурно поднять и сделать уникальной южную идентичность. По иронии судьбы, когда их спрашивают о подобных вещах, многие члены ссылаются на тот факт, что «мы стремимся выстоять и быть своей собственной нацией, мы не воссоздаем историю, мы просто понимаем, чему мы можем научиться и взять из нее». Социалисты и либералы называют партию «безвольными работорговцами», что невозможно отделить прошлое от ее действий, но SIPper не заботит то, что они называют оппозиционным белым шумом."
 CSA.oligarchism_icon: "£generic_oligarchism_small"
 CSA.Neutral_Libertarian: "£USA_Neutral_Libertarian_small Партия Свободы Юга"
 CSA.Neutral_Libertarian_icon: "£USA_Neutral_Libertarian_small"
 CSA.Neutral_Libertarian_desc: "£USA_Neutral_Libertarian_small Партия Южной свободы - (SLP) SLP - это остатки старой Либертарианской партии Соединенных Штатов. SLP пропагандирует минархизм, а также более либеральный подход к национальной экономике. Что касается социальной политики, партия, кажется, разделилась по вопросу о том, являются ли они более социальными либералами или более социальными консерваторами, но они верят, что федеральное правительство не имеет права регулировать дела штата и отдельных лиц."
 CSA.Neutral_green: "£generic_Neutral_green_small Вечеринка южной красоты"
 CSA.Neutral_green_icon: "£generic_Neutral_green_small"
 CSA.Neutral_green_desc: "£generic_Neutral_green_small Партия южной красоты - (SBP) SBP - довольно стандартная партия зеленых с точки зрения политики и общих тем ее политики. Один из их наиболее интересных моментов заключается в том, что они верят, что настоящая южная партия должна быть такой, которая принимает Конфедерацию такой, какая она была, и что мы учимся у нее и двигаемся дальше. Эта декларация привела к расколу их базы из-за этого более противоречивого видения Юга, поскольку сторонники жесткой линии на либеральной стороне делают их фальшивками и расистами."
 CSA.neutral_Social: "£generic_neutral_Social_small Партия «Демократы за прогресс»"
 CSA.neutral_Social_icon: "£generic_neutral_Social_small"
 CSA.neutral_Social_desc: "£generic_neutral_Social_small Партия демократов за прогресс - (ДПП) Партия прогресса - это партия, занимающая промежуточное положение между группой жестких социалистов и умеренными левыми взглядами. Они верят в целенаправленную национализацию, а также в лучшую и адаптируемую форму современного государства всеобщего благосостояния, а также в пропрофсоюзное законодательство для борьбы с явным контролем со стороны корпоративных организаций."
 CSA.Neutral_Communism: "£generic_Neutral_Communism_small Южная коммунистическая ассоциация"
 CSA.Neutral_Communism_icon: "£generic_Neutral_Communism_small"
 CSA.Neutral_Communism_desc: "£generic_Neutral_Communism_small Южная коммунистическая ассоциация - (SCA) Ассоциация представляет собой собрание марксистов, ленинистов, сталинистов и других основных коммунистических верующих, которые хотят установить лозунг «Южная Социалистическая Республика». Они верят, что фермеры — это рабочие Маркса и что индустриализация — это то, что создает современный классовый разрыв. По существу, их планы индустриализации основаны на охвате всей страны и сбалансированности, чтобы не создавать современные промышленные центры, которые рассматриваются членами как «современные рабовладельческие поля»."
 CSA.Nat_Populism_icon: "£generic_Nat_Populism_small"
 CSA.Nat_Fascism_icon: "£generic_Nat_Fascism_small"
 CSA.Nat_Autocracy_icon: "£generic_Nat_Autocracy_small"
 CSA.Monarchist: "£generic_Monarchist_small Дом Меридиана"
 CSA.Monarchist_icon: "£generic_Monarchist_small"
 CSA.Monarchist_desc: "£generic_Monarchist_small Дом Меридиана - (HoM) Дом Меридиана - южная версия современного монархического движения или МММ. Они верят, что выборная монархия может идеально вписаться в современное общество и что титулы должностей можно просто заменить на косметически королевские титулы. Идея о том, что соглашение о числовых именах основано на людях, избранных на указанную должность, поскольку наименование происходит от имени. В социальном отношении они правоцентристские, а экономически – левоцентристские, причём движение на удивление про-профсоюзное, чтобы противостоять уязвимой южной экономике из-за лёгкости эксплуатации и аутсорсинга национального богатства."

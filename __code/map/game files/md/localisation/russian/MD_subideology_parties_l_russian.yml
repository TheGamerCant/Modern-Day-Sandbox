 IRQ.Autocracy_desc: "(Шиитский милитаризм) - Армия Махди (араб. Jaysh Al-Mahdi)\n\nАрмия Махди приобрела известность, когда дело дошло до противостояния иностранным или враждебным элементам в Ираке, а группу возглавил Муктада Аль-Садр. Группа сотрудничает с другими шиитскими ополчениями, такими как бригады Бадра."

 USA.conservatism: "£USA_conservatism_small Республиканская партия"
 USA.conservatism_icon: "£USA_conservatism_small"
 USA.conservatism_desc: "Республиканская партия является \"Великой старой партией\" американского консерватизма. Основанная как партия против рабства в 1854 году, ее современное воплощение было в значительной степени сформировано триумфом консерватизма Рональда Рейгана над более либеральными ценностями. В последние годы наблюдается массовый приток христиан-евангелистов, поскольку партия все больше превращается в лагерь с наличием идей социального консерватизма. Как и в любой партии \"широкой палатки\", существует крупный спектр мнений между основным умеренным истеблишментом и различными консервативными массовыми движениями."
 USA.liberalism: "£USA_liberalism_small Демократическая партия"
 USA.liberalism_icon: "£USA_liberalism_small"
 USA.liberalism_desc: "Либеральная - Демократическая партия, когда-то партия экономического либерализма, популизма и социального консерватизма, давно превратилась в партию с социальной справедливостью, равенством и социальным либерализмом в качестве основных ценностей. В то время как ее основное либеральное крыло выступает за свободную торговлю и политику поддержки бизнеса в рамках широкой центристской коалиции, у нее также есть большие крылья прогрессистов и социалистов, которые выступают за гораздо более левые решения."
 USA.socialism: "£USA_socialism_small Прогрессивные"
 USA.socialism_icon: "£USA_socialism_small"
 USA.socialism_desc: "Социал-демократы - прогрессивное крыло Демократической партии, выдвигающее своей главной целью преодоление растущей пропасти неравенства в доходах и растущей бедности в Соединенных Штатах. Рассматривая экономическую политику про-делового демократического истеблишмента как «неолиберализм», они выступают за то, чтобы обуздать ее структурной регулятивной реформой и увеличением расходов на социальное обеспечение, а также повышением налогов для самых богатых людей. Также они страстно поддерживают права меньшинств и защищают социальную справедливость."
 USA.progressives: "£USA_progressive_party Прогрессивисты"
 USA.progressives_icon: "£USA_progressive_party"
 USA.progressives_desc: "Прогрессивная партия ведет свою историю от администрации Тедди Рузвельта. Сильное сочетание регулирования, заботы об окружающей среде и ориентации на региональную, а не международную оборону означает, что Прогрессивная партия - это партия, ориентированная на внутреннюю политику. Хотя современная партия имеет более радикальные взгляды, она, тем не менее, разделяет многие основные ценности равенства и менталитет, подобный Роббину Гуду, в экономическом регулировании."
 USA.Communist-State: "£USA_Communist_State_small Коммунистическая партия США"
 USA.Communist-State_icon: "£USA_Communist_State_small"
 USA.Communist-State_desc: "Коммунистическое государство. Коммунистическая партия США была создана в 1919 году после крупного раскола внутри Социалистической партии Америки. Она была тесно связана с американским рабочим движением и другими коммунистическими партиями по всему миру. КП США была крупной силой в начале 20 века, пока не была вынуждена уйти в подполье из-за Первой красной паники. В последние годы партия приобрела незначительную поддержку среди молодых масс Америки."
 USA.anarchist_communism: "£USA_anarchist_communism_small Партия за социализм и освобождение"
 USA.anarchist_communism_icon: "£USA_anarchist_communism_small"
 USA.anarchist_communism_desc: "Партия за социализм и освобождение является революционной социалистической партией, которая откололась от партии «Рабочий мир». Они в основном посвящают себя поддержке всемирных социалистических и коммунистических движений, а также искоренению капитализма в Америке."
 USA.shepards_party: "£USA_shepards_party Партия Шепарда"
 USA.shepards_party_icon: "£USA_shepards_party"
 USA.shepards_party_desc: "Партия Шепарда - SP, официально известная как Партия социализма и освобождения или PSL, является партией, которая реформировалась в результате коалиции основных левых движений в Америке. Рассматриваемая как противодействие подъему НФП для правого крыла, Партия Шепарда стремится взять то, что хотят демократические социалисты Европы и Америки, но продать это американскому народу в более ясном и менее розовом свете. Основным направлением является реформирование экономики в рыночную социалистическую среду, давая людям истинный стандарт, которого они заслуживают. Хотя внешняя политика больше ориентирована на гегемонию во внутреннем полушарии, будущее может изменить желания самого руководства партии."
 USA.Conservative: "£USA_Conservative_small Первая партия Америки"
 USA.Conservative_icon: "£USA_Conservative_small"
 USA.Conservative_desc: "«Америка первая» - это партия, которая в основном занимается вопросами внешней политики, стремится вывести Америку из Организации Объединенных Наций и распустить NATO. Кроме того, партия желает укрепить право на ношение оружия, депортировать всех нелегальных иммигрантов и содействовать экономической независимости посредством высоких тарифов и отмены экологических норм."
 USA.Autocracy: "£USA_Autocracy_small Социалистическая рабочая партия"
 USA.Autocracy_icon: "£USA_Autocracy_small"
 USA.Autocracy_desc: "Социалистическая рабочая партия изначально была троцкистской коммунистической, которая постепенно во время холодной войны попала под влияние Фиделя Кастро. Сегодня их программа во многом посвящена пропаганде \"солидарности с Кубой\""
 USA.Neutral_Muslim_Brotherhood: "£USA_Neutral_Muslim_Brotherhood_small Нация ислама"
 USA.Neutral_Muslim_Brotherhood_icon: "£USA_Neutral_Muslim_Brotherhood_small"
 USA.Neutral_Muslim_Brotherhood_desc: "Нация ислама - это афроамериканское политическое и религиозное движение, основанное в 1930 году. Поднявшись на видное место под предыдущим харизматическим руководством Элайджи Мухаммеда и Малкольма X, она борется за социальную справедливость для афроамериканцев, мобилизуя миллионы людей на марши в Вашингтоне, округ Колумбия. Она обвиняется некоторыми организациями, в том числе еврейскими, - в экстремизме и демонстративном антисемитизме. Рассматриваемая многими как группа ненависти с идеологией черного превосходства (черный расизм) и считающаяся неортодоксальной в своем исламе иностранными суннитскими богословами, она тем не менее, имеет сильное ядро членов и нашла жизненно важных союзников на Ближнем Востоке и в Северной Африке."
 USA.Neutral_conservatism: "£USA_Neutral_conservatism_small Конституционалисты"
 USA.Neutral_conservatism_icon: "£USA_Neutral_conservatism_small"
 USA.Neutral_conservatism_desc: "Конституционалистское и либертарианское крыло Республиканской партии считает себя \"истинными консерваторами\" по образцу Барри Голдуотера и Рейгана. Провозглашая, что Америка слишком далеко отошла от своих основополагающих ценностей, они выступают за ограничение федеральной власти над Штатами, пропагандируют финансовый консерватизм, снижение налогов и отказ от иностранного государственного строительства."
 USA.constitutionalist: "£USA_constitutionalist Конституционная партия"
 USA.constitutionalist_icon: "£USA_constitutionalist"
 USA.constitutionalist_desc: "Партия конституционалистов, которую многие считают крайне правым движением, большинство политик конституционалистов можно свести к строгому следованию конституции Соединенных Штатов и подавляющему влиянию евангелического крыла американского общества. Хотя это и не ультраправое движение, она, безусловно по своей природе является стойким приверженцем традиционализма, поэтому многие не видят, что в ближайшее время они смогут занять президентское кресло."
 USA.neutral_Social: "£USA_neutral_Social_small Демократические социалисты"
 USA.neutral_Social_icon: "£USA_neutral_Social_small"
 USA.neutral_Social_desc: "Социалистическое крыло Демократической партии США, которое отвергает либерализм основного истеблишмента и постепенную политику прогрессистов в пользу более радикального решения - создания сильного государства всеобщего благосостояния с усиленным демократическим контролем над всеми важными секторами экономики. Они не приемлют американский милитаризм за рубежом и видят в войнах, ведущихся для \"защиты свободы и демократии\", только узкие цели для получения прибыли корпоративной элиты."
 USA.democratic_socialist: "£USA_democratic_socialist Партия Красной Демократии"
 USA.democratic_socialist_icon: "£USA_democratic_socialist"
 USA.democratic_socialist_desc: "Демократическое социалистическое движение Америки выдвинуло партию \"Робин\", более известную как Партия Красной Демократии. Эта партия находится под сильным влиянием своих европейских коллег. Лидеры партии, такие как Берни Сандерс, пропагандируют политику партии, которая заключается в использовании существующей системы для реформирования нации с целью достижения равенства в социальных и экономических средствах, а также достижения указанных целей путем изменения капиталистической экономической системы на социалистическую экономическую систему посредством реформ в правительственных органах страны."
 USA.Neutral_Libertarian: "£USA_Neutral_Libertarian_small Либертарианская партия"
 USA.Neutral_Libertarian_icon: "£USA_Neutral_Libertarian_small"
 USA.Neutral_Libertarian_desc: "Либертарианец - Либертарианская партия, по американским стандартам, была успешной \"третьей партией\", регулярно конкурирующей на всех выборах. Продвигая социальный либерализм и экономический консерватизм и считая себя \"воплощением американского духа индивидуализма\", они стремятся радикально либерализовать общество во всех аспектах и ​​сократить федеральное правительство до размеров, вернув власть штатам и народу. Отвергая как милитаризм, так и интернационализм, они выступают за невмешательство во внешнюю политику."
 USA.Neutral_Autocracy: "£USA_Neutral_Autocracy_small Партия реформ"
 USA.Neutral_Autocracy_icon: "£USA_Neutral_Autocracy_small"
 USA.Neutral_Autocracy_desc: "Партия реформ США была основана миллиардером Россом Перо из-за резкого несогласия с \"неоимпериалистической\" внешней политикой Республиканской партии, стремящейся вернуть страну к невмешательской внешней политике после победы в холодной войне. Партия выступает против NAFTA и стремится реформировать американскую политику посредством ограничения сроков и избирательной реформы. Достигнув беспрецедентных 18,9% голосов на выборах 1992 года и избрав Джесси Вентуру губернатором Миннесоты в 1998 году, партия надеется повторить эти подвиги и обеспечить жизнеспособную альтернативу ведущим Демократической и Республиканской партиям."
 USA.Neutral_green: "£USA_Neutral_green_small Партия зеленых"
 USA.Neutral_green_icon: "£USA_Neutral_green_small"
 USA.Neutral_green_desc: "Партия зеленых - это экосоциалистическая и антикапиталистическая партия, которая пропагандирует экологизм и феминизм. Она хочет реформировать экономику, чтобы та была основана на кооперативах и местных общинах."
 USA.green_party: "£USA_green_party Партия зеленых"
 USA.green_party_icon: "£USA_green_party"
 USA.green_party_desc: "Американская партия зеленых - это партия, представляющая собой смесь прогрессивных идеалов, крайнего экологизма и глобалистского взгляда на решение основных вопросов, на которых сосредоточена их партия. Партию можно рассматривать как пацифистскую и сбалансированную партию внутренней и внешней политики."
 USA.Neutral_Communism: "£USA_Neutral_Communism_small Партия \"Рабочий мир\""
 USA.Neutral_Communism_icon: "£USA_Neutral_Communism_small"
 USA.Neutral_Communism_desc: "Партия \"Рабочий мир\" была основана в 1959 году как отколовшаяся от Троцкистской социалистической рабочей партии за то, что она недостаточно троцкистская, хотя через несколько лет они сами же отказались от троцкизма. Сторонники ее в основном сосредоточены на уличной активности."
 USA.Nat_Populism: "£USA_Nat_Populism_small Правые народники"
 USA.Nat_Populism_icon: "£USA_Nat_Populism_small"
 USA.Nat_Populism_desc: "Правые народники - популистское и националистическое крыло Республиканской партии традиционно укоренилось на глубоком юге после массового исхода сегрегационистов из Демократической партии в 1960-х годах. Видя, что они находятся в осаде от либеральных культурных войн и высокого уровня иммиграции, они стремятся обратить вспять разрушение своей культуры и ценностей. Аутсорсинг приводит к тому, что многие промышленные центры приходят в упадок, а их риторика о том, что «их продали глобалистские политики, импортирующие избирателей из Мексики», в настоящее время находит все больший резонанс."
 USA.nationalist_front: "£USA_nationalist_front Партия Националистического фронта"
 USA.nationalist_front_icon: "£USA_nationalist_front"
 USA.nationalist_front_desc: "NFP — коалиционная партия правых мыслителей Америки, от традиционалистов до альтернативных правых. Это запутанная партия с противоположными взглядами на истинную политику, но большинство, похоже, согласны с более ограничительными иммиграционными реформами, уделяя больше внимания внутренней политике, чтобы возродить традиционную семью и вернуться к более традиционным ценностям в государственных учреждениях, таких как школы, где есть клятва верности и соответствие христианским ценностям."
 USA.Nat_Fascism: "£USA_Nat_Fascism_small Американская нацистская партия"
 USA.Nat_Fascism_icon: "£USA_nazi_party"
 USA.Nat_Fascism_desc: "Fasicst - The American Nazi Party - это белая супремасистская неонацистская партия. Хотя у нее долгая история, она в основном не имела народных последователей, будучи распущенной и созданной снова отдельными людьми во время внутренних распрей много раз."
 USA.Nat_Autocracy: "£USA_Nat_Autocracy_small Военные США"
 USA.Nat_Autocracy_icon: "£USA_Nat_Autocracy_small"
 USA.Nat_Autocracy_desc: "Армия США является одной из крупнейших и, возможно, наиболее влиятельных ветвей в рамках более широкого военно-промышленного комплекса. Благодаря карьерным генералам и мощному Министерству обороны армия США имеет наилучшие шансы обеспечить себе новое правительство, если худшее когда-либо случится в этих странах."
 USA.Monarchist: "£USA_nationalist_monarchist Монархисты"
 USA.Monarchist_icon: "£USA_nationalist_monarchist"
 USA.Monarchist_desc: "Американское монархическое движение — это маргинальное движение для тех, кто мечтал о многовековой давности. Хотя никто, конечно, не воспринимает это движение всерьез, за ​​исключением, конечно, своих собственных членов, реальность такова, что правительственные организации по своей сути не слишком отличаются друг от друга. Пара смен названия должности – и вот вы получили конституционную монархию. Но на данный момент движение стремится просто расти за счет массовых движений, и их легко объединить в более крупные движения, чтобы пассивно распространять свои идеи и идеалы."
 ARG.Western_Autocracy: "£ARG_western_autocracy Федеральное обязательство"
 ARG.Western_Autocracy_icon: "£ARG_western_autocracy"
 ARG.Western_Autocracy_desc: "Западная автократия - Федеральное обязательство (исп. Compromiso Federal) - перонистская политическая партия, основной целью которой является внедрение модели Сан-Луиса на национальном уровне."
 ARG.conservatism: "£ARG_conservatism Действие для республики"
 ARG.conservatism_icon: "£ARG_conservatism"
 ARG.conservatism_desc: "Действие для республики (Acción por la República) - консервативная политическая партия в Аргентине, основанная в 1997 году Доминго Кавальо для защиты неолиберальных идеологий."
 ARG.conservatism_alt: "£ARG_conservatism_alt Республиканское предложение"
 ARG.conservatism_alt_icon: "£ARG_conservatism_alt"
 ARG.conservatism_alt_desc: "Консерватизм - Республиканское предложение (исп. Propuesta Republicana) - консервативная неолиберальная политическая партия. Она является главной антиперонистской партией, а ее лидером является бывший президент Аргентины Маурисио Макри."
 ARG.liberalism: "£ARG_liberalism Гражданская коалиция АРИ"
 ARG.liberalism_icon: "£ARG_liberalism"
 ARG.liberalism_desc: "Гражданская коалиция ARI (Coalición Cívica ARI, CC-ARI) - это социал-либеральная аргентинская партия, основанная в 2001 году Элизой Каррио. Она является членом Cambiemos с центристскими и правоцентристскими партиями."
 ARG.socialism: "£ARG_socialism Гражданский радикальный союз"
 ARG.socialism_icon: "£ARG_socialism"
 ARG.socialism_desc: "Гражданский радикальный союз (Unión Cívica Radical, UCR) является центристской социал-либеральной политической партией в Аргентине. Основанная в 1891 году радикальными либералами, партия была идеологически неоднородной, начиная от социал-либерализма и заканчивая социал-демократией. Это старейшая политическая партия, действующая в Аргентине после Либеральной партии Корриентеса."
 ARG.Communist-State: "£ARG_Communist_State Коммунистическая партия Аргентины"
 ARG.Communist-State_icon: "£ARG_Communist_State"
 ARG.Communist-State_desc: "Коммунистическая партия Аргентины (Partido Comunista de la Argentina) - это левая партия Аргентины, основанная 6 января 1918 года. С самого начала поддерживала почти автоматически союз с Коммунистической партией Советского Союза, что порождало трения с остальной частью национальных левых, которые обвиняли партию в борьбе больше за геополитические интересы Советского Союза, чем за эффективное возникновение коммунистической революции в Аргентине."
 ARG.Autocracy: "£ARG_Autocracy Широкий фронт"
 ARG.Autocracy_icon: "£ARG_Autocracy"
 ARG.Autocracy_desc: "Широкий фронт (Frente Grande) - левая политическая партия, основанная в 1993 году. Была создана группой левых членов Юстициалистской партии Аргентинской палаты депутатов и других левых, которые были раздражены неолиберальной политикой в то время."
 ARG.anarchist_communism: "£ARG_left_wing_radical Непримиримая партия"
 ARG.anarchist_communism_icon: "£ARG_left_wing_radical"
 ARG.anarchist_communism_desc: "Непримиримая партия (Partido Intransigente) - левая, популистская политическая партия в Аргентине, основанная в 1963 году Оскаром Альенде. Его членами были Непримиримый радикальный Гражданский союз (Unión Cívica Radical Intransigente), одна из двух фракций, на которые Радикальный Гражданский союз разделился в 1956 году."
 ARG.Conservative: "£ARG_emerging_reactionary Партия Победы"
 ARG.Conservative_icon: "£ARG_emerging_reactionary"
 ARG.Conservative_desc: "Реакционеры - Партия Победы (исп. Partido de la Victoria) - левая перонистская партия, основанная бывшим президентом Аргентины Нестором Киршнером. Партия продвигает идеологию своего лидера - киршнеризм, который считается ответвлением перонизма."

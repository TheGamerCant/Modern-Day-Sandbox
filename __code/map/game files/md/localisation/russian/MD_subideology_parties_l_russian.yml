 SOV.Western_Autocracy: "£SOV_western_autocrat (OHR)Наш Дом - Россия"
 SOV.Western_Autocracy_icon: "£SOV_western_autocracy"
 SOV.Western_Autocracy_desc: "(Ельцинистский реформизм) Наш Дом - Россия (рус.: Nash Dom - Rossiya)\n\nНаш Дом - Россия - политическая партия, созданная в 90-х годах председателем правительства РФ Виктором Черномырденным. По сути, объединение было партией власти и было создано для укрепления позиций Президента РФ Бориса Ельцина в Думе. Партия декларировала либеральный курс и сотрудничала со всеми реформаторскими движениями."
 SOV.Western_Autocracy_ed: "£SOV_western_autocracy (UR)Единая Россия - §CПро-западное крыло§!"
 SOV.Western_Autocracy_ed_icon: "£SOV_western_autocracy"
 SOV.Western_Autocracy_ed_desc: "(Прозападные взгляды) Единая Россия (рус.: Единая Россия)\n\nЕР провозглашает своей официальной идеологией «русский консерватизм», но на самом деле она в значительной степени лишена реальной идеологии и функционирует как популистская партия с большим шатром, продвигающая стабильность как свою основную добродетель, в противовес революционному хаосу, который был характерен для России в постсоветскую эпоху до прихода Путина к власти."
 SOV.conservatism: "£SOV_western_conservative (URF)Союз правых сил"
 SOV.conservatism_icon: "£SOV_western_conservative"
 SOV.conservatism_desc: "(Свободный рыночный либерализм) Союз правых сил (рус.: Союз правых сил)\n\nСоюз правых сил был основан в 1999 году и выступает за приватизацию и свободный рыночный капитализм, а также решительно выступает против авторитаризма."
 SOV.conservatism_1: "£SOV_western_conservative_1 (RPR-PARNAS)Партия народной свободы"
 SOV.conservatism_1_icon: "£SOV_western_conservative_1"
 SOV.conservatism_1_desc: "(Либеральная демократия) Республиканская партия России - Партия народной свободы. (Русский: Республиканская партия России - Партия народной свободы)\n\nПартия народной свободы или ПАРНАС - одна из старейших партий, начинавшая как одна из платформ КПСС в 1990 году, позже выросшая в отдельную партию, она участвовала в выборах на всех уровнях, достигнув ограниченного успеха. Партия выступает за либерализм, рыночную экономику и антиавторитаризм."
 SOV.liberalism: "£SOV_western_liberal (RUDPY) Яблоко"
 SOV.liberalism_icon: "£SOV_western_liberal"
 SOV.liberalism_desc: "(Социал-либерализм) - Российская объединенная демократическая партия \"Яблоко\" (рус.: Российская объединенная демократическая партия \"Яблоко\")\n\n\"Яблоко\" - это социал-либеральная партия, продвигающая рыночную экономику и демократические ценности. \"Яблоко\", что в переводе с русского означает \"яблоко\", исторически было главной политической силой, выступающей против коммунизма и консерватизма в России."
 SOV.liberalism_alt: "£SOV_navalnyu (PA) Народный альянс"
 SOV.liberalism_alt_icon: "£SOV_navalnyu"
 SOV.liberalism_alt_desc: "(Прогрессивный либерализм) Народный Альянс (рус.: Народный Альянс)\n\nНародный Альянс — прогрессивная либеральная партия, созданная видным российским политическим деятелем Алексеем Навальным. Выступает за борьбу с коррупцией, либерализм и рыночную экономику."
 SOV.liberalism_alty: "£SOV_western_social_democrat33 (PP) Партия прогресс"
 SOV.liberalism_alty_icon: "£SOV_western_social_democrat33"
 SOV.liberalism_alty_desc: "(Прогрессивный либерализм) Партия Прогресса (рус.: Партия Прогресса)\n\nПартия Прогресса — прогрессивная либеральная партия, созданная видным российским политическим деятелем Алексеем Навальным. Выступает за борьбу с коррупцией, либерализм и рыночную экономику."
 SOV.liberalism_altyn: "£SOV_future (RF) Россия будущего"
 SOV.liberalism_altyn_icon: "£SOV_future"
 SOV.liberalism_altyn_desc: "(Прогрессивный либерализм) Россия будущего (рус.: Россия будущего)\n\nРоссия будущего — прогрессивная либеральная партия, созданная видным российским политическим деятелем Алексеем Навальным. Выступает за борьбу с коррупцией, либерализм и рыночную экономику."
 SOV.liberalism_nat: "£SOV_narod (NDAN) НАРОД"
 SOV.liberalism_nat_icon: "£SOV_narod"
 SOV.liberalism_nat_desc: "(Национальная демократия) Национально-демократическая партия «НАРОД» (рус.: Национально-демократическая партия «НАРОД» или «НАРОД»)\n\nНАРОД — национал-демократическая партия, созданная видным российским политическим деятелем Алексеем Навальным. Выступает за борьбу с коррупцией, национализм и демократию."
 SOV.socialism: "£SOV_western_social_democrat (PPRF) Народная партия Российской Федерации"
 SOV.socialism_icon: "£SOV_western_social_democrat"
 SOV.socialism_desc: "(Левый центризм) Народная партия Российской Федерации (рус.: Народная партия Российской Федерации)\n\nНародная партия Российской Федерации была создана на базе депутатской фракции «Народный депутат», которая полностью состоит из депутатов, избранных по одномандатным округам. Партия центристская, но часто выступает за расширение программ социального обеспечения."
 SOV.socialism_1: "£SOV_social_democrat_1 (JR) Справедливая Россия - §CПро-западное крыло§!"
 SOV.socialism_1_icon: "£SOV_social_democrat_1"
 SOV.socialism_1_desc: "(Социал-демократия) Справедливая Россия\n\nСправедливая Россия — это результат объединения различных левонационалистических, социалистических и прогрессистских партий. Хотя партия позиционирует себя как социалистическая, на самом деле она представляет собой широкую левую коалицию, в которую входят как левые националисты, так и левые либералы. Партия выступает за расширение социальных программ и более активное участие государства в экономике."
 SOV.socialism_alt: "£SOV_socialist_alt (PSR)Партия социалистов-революционеров"
 SOV.socialism_alt_icon: "£SOV_socialist_alt"
 SOV.socialism_alt_desc: "(Демократический социализм) Партия социалистов-революционеров (рус. Partiya Sotsialistov Revolutsionerov)\n\nПартия социалистов-революционеров была радикальной левой партией, существовавшей в Российской империи. Партия выступала за решение земельного вопроса путем социализации земли государством, что сделало бы землю общей для всех, свержение царского самодержавия и установление демократической республики, проведение широких народных реформ, но с приходом к власти большевиков многие члены правой фракции были репрессированы или эмигрировали. Однако идеи не были забыты. В результате раскола в «Справедливой России» демократическая фракция решила выйти из партии и заново воссоздать ПСР."
 SOV.socialism_dem: "£SOV_democratic_soyus (DU) Демократический союз"
 SOV.socialism_dem_icon: "£SOV_democratic_soyus"
 SOV.socialism_dem_desc: "(Радикальный либерализм) Демократический союз (рус.: Демократический союз)\n\nДемократический союз — старейшая политическая организация, основанная в 1988 году советскими диссидентами и активистами по правам человека. Союз выступает за демократизацию политической системы, декоммунизацию, пацифизм и выступает против авторитаризма."
 SOV.Communist-State: "£SOV_emerging_communism (CPRF) Коммунистическая партия Российской Федерации"
 SOV.Communist-State_icon: "£SOV_emerging_communism"
 SOV.Communist-State_desc: "(Социализм XXI века) Коммунистическая партия Российской Федерации (рус.: Коммунистическая партия Российской Федерации)\n\nКПРФ является преемницей старой Коммунистической партии Советского Союза. Она марксистско-ленинская и была второй по величине политической партией за всю постсоветскую историю России."
 SOV.Communist-State_alt: "£SOV_gorba (SDPR)Социал-демократическая партия России"
 SOV.Communist-State_alt_icon: "£SOV_gorba"
 SOV.Communist-State_alt_desc: "(Демократический социализм) Социал-демократическая партия России (рус.: Социал-демократическая партия России)\n\nСДПР — широкая социалистическая партия, созданная на базе Коммунистической партии Российской Федерации. Она является демократической социалистической и поддерживает политику Перестройки и Гласности."
 SOV.Communist-State_alty: "£SOV_kpss (CPSU)Коммунистическая партия Советского Союза  - §GЦентр§!"
 SOV.Communist-State_alty_icon: "£SOV_kpss"
 SOV.Communist-State_alty_desc: "(Марксизм-ленинизм) Коммунистическая партия Советского Союза (рус.: Коммунистическая партия Советского Союза)\n\nКПСС — правящая партия Советского Союза. Возрожденная в 21 веке, партия по-прежнему отстаивает марксизм-ленинизм и демократический централизм."
 SOV.Conservative: "£SOV_emerging_conserva Единство"
 SOV.Conservative_icon: "£SOV_emerging_conserva"
 SOV.Conservative_desc: "(Проправительственный центризм) Единство\n\nЕдинство — политическая партия и общественная организация, возникшая в результате слияния большого количества консервативных и деловых партий в конце 99-го года. Единство должно было стать партией власти и поддерживало курс сначала премьер-министра, а затем президента России — Владимира Путина. Председателем партии был Сергей Шойгу."
 SOV.Conservative_ed: "£SOV_emerging_reactionary (UR) Глава Чечни"
 SOV.Conservative_ed_icon: "£SOV_emerging_reactionary"
 SOV.Conservative_ed_desc: "(Большая палатка) Единая Россия (рус.: Единая Россия)\n\nЕР провозглашает своей официальной идеологией «русский консерватизм», но на самом деле она в значительной степени лишена реальной идеологии и функционирует как популистская партия с большой палаткой, продвигающая стабильность как свою основную добродетель, в противовес революционному хаосу, который был характерен для России в постсоветскую эпоху до прихода Путина к власти."
 SOV.anarchist_communism: "£SOV_left_wing_radical (RPL)Российская партия жизни"
 SOV.anarchist_communism_icon: "£SOV_left_wing_radical"
 SOV.anarchist_communism_desc: "(Левый центризм) Российская партия жизни (рус.: Российская партия жизни)\n\nРоссийская партия жизни была основана председателем Совета Федерации Сергеем Мироновым. Партия выступает за расширение социальных программ, повышение уровня жизни граждан и государственное регулирование экономики."
 SOV.anarchist_communism_1: "£SOV_left_wing_radical_1 (JR) Справедливая Россия"
 SOV.anarchist_communism_1_icon: "£SOV_left_wing_radical_1"
 SOV.anarchist_communism_1_desc: "(Левый популизм) Справедливая Россия\n\nСправедливая Россия — это результат объединения различных левонационалистических, социалистических и прогрессистских партий. Хотя партия позиционирует себя как социалистическая, на самом деле она представляет собой широкую левую коалицию, в которую входят как левые националисты, так и левые либералы. Партия выступает за расширение социальных программ и более активное участие государства в экономике."
 SOV.Autocracy: "£SOV_Autocracy (PPUM) Родина"
 SOV.Autocracy_icon: "£SOV_Autocracy"
 SOV.Autocracy_desc: "(Левый национализм) Народно-патриотический союз «Родина» (рус.: Народно-патриотический союз «Родина»)\n\nРодина — левая русская националистическая партия, которая пропагандирует патриотизм, национализм и широкое вмешательство государства в российскую экономику."
 SOV.Neutral_conservatism: "£SOV_conservative_one (PW) Народная воля"
 SOV.Neutral_conservatism_icon: "£SOV_conservative_one"
 SOV.Neutral_conservatism_1: "£SOV_conservatismus (PU) Народный союз"
 SOV.Neutral_conservatism_1_icon: "£SOV_conservatismus"
 SOV.Neutral_conservatism_2: "£SOV_non_aligned_conservative (ARPU)Российский общенародный союз"
 SOV.Neutral_conservatism_2_icon: "£SOV_non_aligned_conservative"
 SOV.Neutral_Autocracy: "£SOV_non_aligned_autocracy (PRR)Партия возрождения России"
 SOV.Neutral_Autocracy_icon: "£SOV_non_aligned_autocracy"
 SOV.Neutral_Autocracy_desc: "(Левый патриотизм) Партия возрождения России (рус.: Партия возрождения России)\n\nРоссийский общенародный союз — политическая партия, основанная ветераном и политиком Сергеем Бабауриным. Партия объединила вокруг себя бывших антиельцинистов, таких как Александр Руцкой и Николай Леонов. Народная воля поддерживает идеи патриотизма, русского национализма и национализма."
 SOV.oligarchism: "£SOV_oligarchists (FAR)Отечество - Вся Россия"
 SOV.oligarchism_icon: "£SOV_oligarchists"
 SOV.oligarchism_desc: "(Регионализм) Отечество - Вся Россия\n\nФАР - политический блок, созданный движением мэра Москвы Юрия Лужкова \"Отечество\" и \"Вся Россия\", организованный главами ряда российских регионов. В политической среде этот блок получил название \"Партия губернаторов\", поскольку в него вошло большинство региональной элиты и влиятельные губернаторы. Целью партии было представление интересов регионов в федеральном парламенте."
 SOV.oligarchism_ed: "£SOV_non_aligned_oligarchism Единая Россия - §gОлигархическое крыло§!"
 SOV.oligarchism_ed_icon: "£SOV_non_aligned_oligarchism"
 SOV.oligarchism_ed_desc: "(Олигархизм) Единая Россия (рус.: Единая Россия)\n\nЕР провозглашает своей официальной идеологией «русский консерватизм», но на самом деле она в значительной степени лишена реальной идеологии и функционирует как популистская партия с большим шатром, продвигающая стабильность как свою основную добродетель, в противовес революционному хаосу, который был характерен для России в постсоветскую эпоху до прихода Путина к власти."
 SOV.Neutral_Libertarian: "£SOV_non_aligned_libertarian (LPR)Либертарианская партия России"
 SOV.Neutral_Libertarian_icon: "£SOV_non_aligned_libertarian"
 SOV.Neutral_Libertarian_desc: "(Либертарианство) Либертарианская партия России (рус.: Либертарианская партия России)\n\nЛибертарианская партия России пропагандирует идеи либертарианства России. Как партия широкого профиля, она стремится привлечь большой круг людей, разделяющих идеи абсолютной свободы и незыблемости рыночных отношений. Партия имеет сложную организационную структуру, сложную систему взаимоотношений между отделениями. Партия разделяет идеи либертарианского развития страны, конфедеративного устройства и развития рыночных отношений."
 SOV.Neutral_Communism: "£SOV_non_aligned_communism (CR)Коммунисты России"
 SOV.Neutral_Communism_icon: "£SOV_non_aligned_communism"
 SOV.Neutral_Communism_desc: ""
 SOV.Neutral_Communism_alt: "£SOV_kpss (CPSU)Коммунистическая партия Советского Союза - §gЖёсткая линия§!"
 SOV.Neutral_Communism_alt_icon: "£SOV_kpss"
 SOV.Neutral_Communism_alt_desc: "(Марксизм-ленинизм) Коммунистическая партия Советского Союза (рус.: Коммунистическая партия Советского Союза)\n\nКПСС — правящая партия Советского Союза. Возрожденная в 21 веке, партия по-прежнему отстаивает марксизм-ленинизм и демократический централизм"
 SOV.Neutral_Communism_alty: "£SOV_neutral_communism_alt (LF)Левый фронт"
 SOV.Neutral_Communism_alty_icon: "£SOV_neutral_communism_alt"

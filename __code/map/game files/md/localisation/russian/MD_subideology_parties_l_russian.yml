 SOV.Neutral_green_icon: "£SOV_non_aligned_greens"
 SOV.Neutral_green_desc: ""
 SOV.neutral_Social: "£SOV_non_aligned_socialist_democrat (PR)Патриот России"
 SOV.neutral_Social_icon: "£SOV_non_aligned_socialist_democrat"
 SOV.neutral_Social_1: "£SOV_non_aligned_socialist_democrat_1 (NP)Новые люди"
 SOV.neutral_Social_1_icon: "£SOV_non_aligned_socialist_democrat_1"
 SOV.neutral_Social_desc: ""
 SOV.Neutral_Muslim_Brotherhood: "£SOV_muslim_brotherhood (RM)Русские мусульмане"
 SOV.Neutral_Muslim_Brotherhood_icon: "£SOV_muslim_brotherhood"
 SOV.Nat_Fascism: "£SOV_nationalist_fascism (NBP)Национал-Большевистская Партия"
 SOV.Nat_Fascism_icon: "£SOV_nationalist_fascism"
 SOV.Nat_Fascism_desc: "(НАЦИОНАЛ-БОЛЬШЕВИЗМ) Национал-Большевистская Партия (рус.: Национал-Большевистская Партия)\n\nНационал-Большевики — ультранационалистическое движение, сочетающее сталинистскую идеологию с элементами национал-социализма."
 SOV.Nat_Populism: "£SOV_nationalist_right_wing_populist (LDPR)Либерально-демократическая партия России"
 SOV.Nat_Populism_icon: "£SOV_nationalist_right_wing_populist"
 SOV.Nat_Populism_desc: "(Национал-популизм) Либерально-демократическая партия России (рус.: Либерально-демократическая партия России)\n\nЛДПР не является ни либеральной, ни демократической, а вместо этого стремится к авторитарному, популистскому и националистическому возрождению значительно расширенной Российской империи."
 SOV.Nat_Populism_alt: "£SOV_ldpss (LDPSS)Либерально-демократическая партия Советского Союза"
 SOV.Nat_Populism_alt_icon: "£SOV_ldpss"
 SOV.Nat_Populism_alt_desc: "(Национал-популизм) Либерально-демократическая партия Советского Союза (рус.: Либерально-демократическая партия Советского Союза)\n\nЛДПСС не является ни либеральной, ни демократической, а вместо этого стремится к авторитарному, популистскому и националистическому возрождению значительно расширенной Российской империи."

 KHM.liberalism_desc: "Либерал - Российская объединенная демократическая партия \"Яблоко\" (Российская объединенная демократическая партия \"Яблоко\") - социал-либеральная партия, выступающая за рыночную экономику и демократические ценности. \"Яблоко\", что в переводе с русского означает \"яблоко\", исторически было главной политической силой, выступавшей против коммунизма и консерватизма в России."

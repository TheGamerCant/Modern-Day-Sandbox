 BSH.Neutral_conservatism_desc: "Правопопулистская - Союз башкирской молодёжи (Лидеры: Артур Идельбаев). Первая националистическая организация, созданная для включения башкирской молодёжи в общественную жизнь Башкортостана. Позже она выросла в крупнейшую националистическую организацию. Имеет политические связи с турецкой организацией Bozkurtlar."

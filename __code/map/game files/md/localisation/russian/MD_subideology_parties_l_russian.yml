 USoE.Western_Autocracy: "£EU_parliament_PG_Western_Autocracy Альянс прозападных автократов"
 USoE.Western_Autocracy_icon: "£EU_parliament_PG_Western_Autocracy"
 USoE.Western_Autocracy_desc: "(Западное самодержавие) - Альянс прозападного самодержавия (APWA)\nАльянс прозападных автократов – относительно новая партия в большом масштабе Европейского парламента. Он придерживается внешней политики, ориентированной на Запад и обладающей автократическими характеристиками."
 USoE.conservatism: "£EU_parliament_PG_conservatism Европейская народная партия и Европейские демократы (EPP-ED)"
 USoE.conservatism_icon: "£EU_parliament_PG_conservatism"
 USoE.conservatism_desc: "EPP-ED родился в результате слияния Европейской народной партии, состоящей в основном из христианских демократов, и Европейского демократического союза, состоящего из консерваторов с более евроскептическим подходом. Его политическая повестка дня сосредоточена на уважении традиций и гарантировании индивидуальных социальных и экономических свобод, ценностей, которые следует преследовать с помощью индивидуальной ответственности, не пренебрегая окружающей средой и с оглядкой на государственный бюджет."
 USoE.conservatism_2017: "£EU_parliament_PG_2017_conservatism Европейская народная партия (EPP)"
 USoE.conservatism_2017_icon: "£EU_parliament_PG_2017_conservatism"
 USoE.conservatism_2017_desc: "EPP ранее известная как \"Европейская народная партия и Европейские демократы\", занимает правоцентристское место в парламенте USoE и состоит в основном из консерваторов и христианских демократов. Его политическая повестка дня сосредоточена на уважении традиций и гарантировании индивидуальных социальных и экономических свобод, ценностей, которые следует преследовать с помощью индивидуальной ответственности, не пренебрегая окружающей средой и с оглядкой на государственный бюджет."
 USoE.liberalism: "£EU_parliament_PG_liberalism Европейская либерально-демократическая и реформистская партия (ELDR)"
 USoE.liberalism_icon: "£EU_parliament_PG_liberalism"
 USoE.liberalism_desc: "ELDR ранее известная как Либерально-демократическая реформистская группа, она занимает левоцентристскую часть парламента USoE и состоит в основном из либералов. Его политическая повестка дня сосредоточена на гарантировании социальной и экономической свободы личности, защите окружающей среды и уменьшении роли государства в экономике."
 USoE.liberalism_2017: "£EU_parliament_PG_2017_liberalism Партия \"Альянс либералов и демократов за Европу\" (ALDE)"
 USoE.liberalism_2017_icon: "£EU_parliament_PG_2017_liberalism"
 USoE.liberalism_2017_desc: "ALDE ранее известная как Европейская либерально-демократическая и реформистская партия, она занимает левоцентристскую часть парламента USoE и состоит в основном из либералов. Его политическая повестка дня сосредоточена на гарантировании социальной и экономической свободы личности, защите окружающей среды и уменьшении роли государства в экономике."
 USoE.socialism: "£EU_parliament_PG_socialism Партия европейских социалистов (PES)"
 USoE.socialism_icon: "£EU_parliament_PG_socialism"
 USoE.socialism_desc: "PES занимает левую часть парламента USoE и состоит в основном из либеральных социалистов. Его политическая повестка дня сосредоточена на борьбе с бедностью и неравенством, гарантировании социальных прав, прав трудящихся и защите окружающей среды. Она стремится достичь этих целей с помощью прогрессивного налогообложения и умеренно высокого государственного вмешательства, признавая при этом важность экономических свобод и торговли."
 USoE.socialism_2017: "£EU_parliament_PG_2017_socialism Партия европейских социалистов (PES)"
 USoE.socialism_2017_icon: "£EU_parliament_PG_2017_socialism"
 USoE.socialism_2017_desc: "PES занимает левую часть парламента USoE и состоит в основном из либеральных социалистов. Его политическая повестка дня сосредоточена на борьбе с бедностью и неравенством, гарантировании социальных прав, прав трудящихся и защите окружающей среды. Она стремится достичь этих целей с помощью прогрессивного налогообложения и умеренно высокого государственного вмешательства, признавая при этом важность экономических свобод и торговли."
 USoE.Communist-State: "£EU_parliament_PG_Communist_State Союз коммунистов"
 USoE.Communist-State_icon: "£EU_parliament_PG_Communist_State"
 USoE.Communist-State_desc: "Союз коммунистов занимает крайнюю левую часть парламента USoE. Его сторонники верят в необходимость замены капитализма экономической системой, в которой все средства производства принадлежат лишь государству. Организация стремится достичь истинного социализма с помощью революции, насильственной, если это необходимо, чтобы свергнуть существующий строй и признать необходимость переходного периода, когда власть удерживается диктатурой."
 USoE.Communist-State_2017: "£EU_parliament_PG_2017_Communist_State Инициатива коммунистических и рабочих партий (INITIATIVE)"
 USoE.Communist-State_2017_icon: "£EU_parliament_PG_2017_Communist_State"
 USoE.Communist-State_2017_desc: "Инициатива коммунистических и рабочих партий занимает крайнюю левую часть парламента USoE и состоит в основном из коммунистов. Партия верит в необходимость замены капитализма плановой экономической системой, в которой все средства производства принадлежат государству. Она стремится достичь истинного социализма с помощью революции, если это необходимо, чтобы свергнуть существующий строй и признать необходимость переходного периода, когда власть удерживается диктатурой."
 USoE.anarchist_communism: "£EU_parliament_PG_anarchist_communism Европейские антикапиталистические левые (EACL)"
 USoE.anarchist_communism_icon: "£EU_parliament_PG_anarchist_communism"
 USoE.anarchist_communism_desc: "EACL является крайне левой партией в парламенте USoE и состоит в основном из умеренных коммунистов. Она верит в необходимость замены капитализма экономической системой, в которой все средства производства принадлежат только народу. Она направлена на достижение истинного социализма с демократическим и реформистским подходом."
 USoE.anarchist_communism_2017: "£EU_parliament_PG_2017_anarchist_communism Теперь народ! "
 USoE.anarchist_communism_2017_icon: "£EU_parliament_PG_2017_anarchist_communism"
 USoE.anarchist_communism_2017_desc: "Теперь народ! - крайне левая партия в парламенте USoE, состоящая в основном из умеренных коммунистов. Она верит в необходимость замены капитализма экономической системой, в которой все средства производства принадлежат исключительно государству. Она направлена на достижение истинного социализма с демократическим и реформистским подходом."
 USoE.Conservative: "£EU_parliament_PG_Conservative Альянс реакционеров"
 USoE.Conservative_icon: "£EU_parliament_PG_Conservative"
 USoE.Conservative_desc: "AoR - это крайне правая, евроскептическая и националистическая партия, которая стремится разрушить Европейский Союз и восстановить нации, основанные на этнических группах. Его политические взгляды сосредоточены на защите традиций, отказе от иммиграции и борьбе с глобализацией."
 USoE.Conservative_2017: "£EU_parliament_PG_2017_Conservative Альянс европейских национальных движений (AENM)"
 USoE.Conservative_2017_icon: "£EU_parliament_PG_2017_Conservative"
 USoE.Conservative_2017_desc: "AENM - это крайне правая, евроскептическая и националистическая партия, которая стремится разрушить Европейский Союз и восстановить нации, основанные на этнических группах. Его политические взгляды сосредоточены на защите традиций, отказе от иммиграции и борьбе с глобализацией."
 USoE.Autocracy: "£EU_parliament_PG_Autocracy Альянс автократов"
 USoE.Autocracy_icon: "£EU_parliament_PG_Autocracy"
 USoE.Autocracy_desc: "(Новые автократы) - Альянс автократов (AoA)\n\nАльянс автократов включает в себя группу и новое явление вместе с Соединенными Штатами Европы, которое должно двигаться в сторону России и Китая, но с новым методом управления. Они сосредотачивают усилия и проводят кампанию за более авторитарную форму правления, в которой государство стоит превыше всего, а люди должны быть ему лояльны."
 USoE.Mod_Vilayat_e_Faqih: "£EU_parliament_PG_Mod_Vilayat_e_Faqih Альянс умеренных шиитских революционеров"
 USoE.Mod_Vilayat_e_Faqih_icon: "£EU_parliament_PG_Mod_Vilayat_e_Faqih"
 USoE.Mod_Vilayat_e_Faqih_desc: "(Умеренные шиитские революционеры) - Альянс умеренных шиитских революционеров (АОМС)\n\nАльянс умеренных шиитских революционеров (AoMS) является более умеренной версией своей родственной партии, Альянса жестких шиитских революционеров, стремящегося внедрить шиитскую политику в правительство Соединенных Штатов Европы, не будучи таким же фундаменталистским, и более открытым для различных направлений мысль."
 USoE.Vilayat_e_Faqih: "£EU_parliament_PG_Vilayat_e_Faqih Альянс радикальных шиитских революционеров"
 USoE.Vilayat_e_Faqih_icon: "£EU_parliament_PG_Vilayat_e_Faqih"
 USoE.Vilayat_e_Faqih_desc: "(Жесткие шиитские революционеры) - Альянс жестких шиитских революционеров (AoHSR)\n\nАльянс жестких шиитских революционеров (AoHSR) представляет шиитские интересы тех, кто тесно связан с более радикальными шиитскими революционерами. Они верят в радикальный поворот партии в сторону шиитского образа жизни и готовы принять любые меры для достижения этой цели."
 USoE.Kingdom: "£EU_parliament_PG_Kingdom Союз ваххабитских монархистов"
 USoE.Kingdom_icon: "£EU_parliament_PG_Kingdom"
 USoE.Kingdom_desc: "(Ваххабитский Монархизм) - Альянс Ваххабитских Монархистов (AoWM)\n\n"
 USoE.Caliphate: "£EU_parliament_PG_Caliphate Альянс джихадистов"
 USoE.Caliphate_icon: "£EU_parliament_PG_Caliphate"
 USoE.Caliphate_desc: "(Салафитский джихадист) - Альянс салафитских джихадистов (AoSJ)\n\n"
 USoE.Neutral_Muslim_Brotherhood: "£EU_parliament_PG_Neutral_Muslim_Brotherhood Альянс умеренных исламистов"
 USoE.Neutral_Muslim_Brotherhood_icon: "£EU_parliament_PG_Neutral_Muslim_Brotherhood"
 USoE.Neutral_Muslim_Brotherhood_desc: "(Умеренные исламисты) - Альянс умеренных исламистов (AoMI)\n\n"
 USoE.Neutral_Autocracy: "£EU_parliament_PG_Neutral_Autocracy Альянс неприсоединившихся автократов"
 USoE.Neutral_Autocracy_icon: "£EU_parliament_PG_Neutral_Autocracy"
 USoE.Neutral_Autocracy_desc: "(Нейтральные автократы) - Альянс неприсоединившихся еврократов (AoNA)\n\n"
 USoE.Neutral_conservatism: "£EU_parliament_PG_Neutral_conservatism Европейский союз наций (UEN)"
 USoE.Neutral_conservatism_icon: "£EU_parliament_PG_Neutral_conservatism"
 USoE.Neutral_conservatism_desc: "UEN ранее известная как \"Союз за Европу\", является правой евроскептической консервативной партией. Она стремится децентрализовать USoE и сформировать на его месте конфедерацию суверенных наций. Она придерживается консервативной позиции в отношении социальных прав и экономически поддерживает свободную рыночную капиталистическую систему."
 USoE.Neutral_conservatism_2017: "£EU_parliament_PG_2017_Neutral_conservatism Альянс консерваторов и реформистов в Европе (ACRE)"
 USoE.Neutral_conservatism_2017_icon: "£EU_parliament_PG_2017_Neutral_conservatism"
 USoE.Neutral_conservatism_2017_desc: "ACRE ранее известная как \"Альянс европейских консерваторов и реформистов\" - правая евроскептическая консервативная партия. Она стремится децентрализовать USoE и сформировать на его месте конфедерацию суверенных наций. Она придерживается консервативной позиции в отношении социальных прав и экономически поддерживает свободную рыночную капиталистическую систему."
 USoE.oligarchism: "£EU_parliament_PG_oligarchism Союз олигархов"
 USoE.oligarchism_icon: "£EU_parliament_PG_oligarchism"
 USoE.oligarchism_desc: "(Олигархизм) - Альянс Олигархов (АоО)\n\n"
 USoE.Neutral_Libertarian: "£EU_parliament_PG_Neutral_Libertarian Альянс либертарианцев"
 USoE.Neutral_Libertarian_icon: "£EU_parliament_PG_Neutral_Libertarian"
 USoE.Neutral_Libertarian_desc: "Альянс либертарианцев - это либертарианская партия, которая поддерживает ограниченное вмешательство правительства в экономику и в жизненный выбор отдельного гражданина, полагая, что роль правительства заключается в обеспечении безопасной среды для свободного процветания бизнеса и отдельных лиц. Политическая повестка дня сосредоточена на том, чтобы пожинать плоды Интернета в таких вопросах, как прямая демократия, свобода выражения мнений и авторское право."
 USoE.Neutral_Libertarian_2017: "£EU_parliament_PG_2017_Neutral_Libertarian Европейская Пиратская партия (PPEU)"
 USoE.Neutral_Libertarian_2017_icon: "£EU_parliament_PG_2017_Neutral_Libertarian"
 USoE.Neutral_Libertarian_2017_desc: "Европейская Пиратская партия - это либертарианская партия, которая поддерживает ограниченное вмешательство правительства в экономику и в жизненный выбор граждан, полагая, что роль правительства заключается в обеспечении безопасной среды для свободного процветания бизнеса и отдельных лиц. Политическая повестка дня сосредоточена на том, чтобы пожинать плоды Интернета в таких вопросах, как прямая демократия, свобода выражения мнений и авторское право."
 USoE.Neutral_green: "£EU_parliament_PG_Neutral_Green Зеленые / Европейский свободный альянс (Зеленые/EFA)"
 USoE.Neutral_green_icon: "£EU_parliament_PG_Neutral_Green"
 USoE.Neutral_green_desc: "Зеленые / Европейский свободный альянс является левой партией. Его экономический взгляд отвергает капитализм и исследование постоянного прогресса, веря вместо этого в необходимость \"счастливого роста\" Она решительно выступает против атомной энергетики как источника чистой энергии, веря вместо этого в необходимость временного строительства газовых электростанций для поддержки будущего полного перехода к возобновляемым источникам энергии. Его политическая повестка дня сосредоточена на сокращении неравенства и защите окружающей среды, и партия направлена на то, чтобы сделать это с минимальным количеством государственных расходов."
 USoE.Neutral_green_2017: "£EU_parliament_PG_2017_Neutral_green Европейская партия зеленых (EGP)"
 USoE.Neutral_green_2017_icon: "£EU_parliament_PG_2017_Neutral_green"
 USoE.Neutral_green_2017_desc: "EGP широко известная как \"Зеленые\", это левая экологическая партия. Ее экономический взгляд отвергает капитализм и поиск постоянного прогресса, веря вместо этого в необходимость \"счастливого роста\" Решительно выступает против атомной энергетики как источника чистой энергии, обращая внимание вместо этого на необходимость временного строительства газовых электростанций для поддержки будущего полного перехода к возобновляемым источникам энергии. В целом, политическая повестка дня сосредоточена на сокращении неравенства и защите окружающей среды."
 USoE.neutral_Social: "£EU_parliament_PG_neutral_Social Союз социалистов-демократов"
 USoE.neutral_Social_icon: "£EU_parliament_PG_neutral_Social"
 USoE.neutral_Social_desc: "ASD будучи левой партией парламента USoE, выступает за более высокую степень демократического представительства, основанного на региональной идентичности, стремясь превратить USoE в \"Европу регионов\" Ее политическая повестка дня сосредоточена на социальной справедливости и экономическом равенстве."
 USoE.neutral_Social_2017: "£EU_parliament_PG_2017_neutral_Social Европейский свободный альянс (EFA)"
 USoE.neutral_Social_2017_icon: "£EU_parliament_PG_2017_neutral_Social"
 USoE.neutral_Social_2017_desc: "EFA будучи левой партией парламента USoE, выступает за более высокую степень демократического представительства, основанного на региональной идентичности, стремясь превратить USoE в \"Европу регионов\" Ее политическая повестка дня сосредоточена на социальной справедливости и экономическом равенстве."
 USoE.Neutral_Communism: "£EU_parliament_PG_Neutral_Communism Европейские Объединенные левые / Северные Зеленые Левые (GUE/NGL)"
 USoE.Neutral_Communism_icon: "£EU_parliament_PG_Neutral_Communism"
 USoE.Neutral_Communism_desc: "GUE/NGL является левой политической партией парламента USoE. Она состоит в основном из социалистов и коммунистов, и как таковая отвергает капитализм и традиционную монетаристскую бюджетную политику. Она стремится добиться сдвига общества в сторону социализма, но не имеет четкой позиции относительно того, является ли реформа или революция лучшим способом его достижения. Она выступает против сотрудничества USoE с США и вместо этого считает, что Европа должна идти своим собственным путем."
 USoE.Neutral_Communism_2017: "£EU_parliament_PG_2017_Neutral_Communism Партия европейских левых (PEL)"
 USoE.Neutral_Communism_2017_icon: "£EU_parliament_PG_2017_Neutral_Communism"
 USoE.Neutral_Communism_2017_desc: "GUE/NGL является левой политической партией парламента USoE. Она состоит в основном из социалистов и коммунистов, и как таковая отвергает капитализм и традиционную монетаристскую бюджетную политику. Партия стремится добиться сдвига общества в сторону социализма, но не имеет четкой позиции относительно того, является ли реформа или революция лучшим способом его достижения. Она выступает против сотрудничества USoE с США и вместо этого считает, что Европа должна идти своим собственным путем."
 USoE.Nat_Populism: "£EU_parliament_PG_Nat_Populism Европа демократии и многообразия (EDD)"
 USoE.Nat_Populism_icon: "£EU_parliament_PG_Nat_Populism"
 USoE.Nat_Populism_desc: "EDD ранее известная как \"Европа демократий и различий\", является популистской евроскептической партией парламента USoE. Она решительно выступает против процесса международного объединения, а политические взгляды сосредоточены на антииммиграционной и антиглобалистской позиции и цели введения прямой демократии."
 USoE.Nat_Populism_2017: "£EU_parliament_PG_2017_Nat_Populism Европа Свободы и Прямой демократии (EFDD)"
 USoE.Nat_Populism_2017_icon: "£EU_parliament_PG_2017_Nat_Populism"
 USoE.Nat_Populism_2017_desc: "EFDD, ранее известная как \"Европа демократий и различий\", является популистской евроскептической партией парламента USoE. Она решительно выступает против процесса международного объединения, а политические взгляды сосредоточены на антииммиграционной и антиглобалистской позиции и цели введения прямой демократии."
 USoE.Nat_Fascism: "£EU_parliament_PG_Nat_Fascism Альянс фашистов"
 USoE.Nat_Fascism_icon: "£EU_parliament_PG_Nat_Fascism"
 USoE.Nat_Fascism_desc: "APF является крайне правой евроскептической политической партией парламента USoE. Она состоит в основном из фашистов и ультранационалистов. Политические взгляды сосредоточены на защите христианских традиций, резкой антииммиграционной политике и замене демократии сильной национальной диктатурой."
 USoE.Nat_Fascism_2017: "£EU_parliament_PG_2017_Nat_Fascism Альянс за мир и свободу (APF)"
 USoE.Nat_Fascism_2017_icon: "£EU_parliament_PG_2017_Nat_Fascism"
 USoE.Nat_Fascism_2017_desc: "APF является крайне правой евроскептической политической партией парламента USoE. Она состоит в основном из фашистов и ультранационалистов. Политические взгляды сосредоточены на защите христианских традиций, резкой антииммиграционной политике и замене демократии сильной национальной диктатурой."
 USoE.Nat_Autocracy: "£EU_parliament_PG_Nat_Autocracy (ВШЕС) - Военный штаб Европейского Союза"
 USoE.Nat_Autocracy_icon: "£EU_parliament_PG_Nat_Autocracy"
 USoE.Nat_Autocracy_desc: "EUMS - это политическая ветвь Армии USoE, союз высокопоставленных военачальников армии, которые сформировали военную хунту и взяли под контроль исполнительную власть, осуществляя власть авторитарным способом."
 USoE.Monarchist: "£EU_parliament_PG_Monarchist Альянс монархистов"
 USoE.Monarchist_icon: "£EU_parliament_PG_Monarchist"
 USoE.Monarchist_desc: "Монархисты поддерживают новоявленную династию. Они верят в необходимость абсолютного правителя, освобожденного от оков демократического принятия решений, чтобы вести континент через 21 век."

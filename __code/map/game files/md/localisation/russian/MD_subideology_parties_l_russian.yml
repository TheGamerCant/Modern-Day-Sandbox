 SOV.oligarchism_council_desc: "(Либеральный олигархизм) Либеральная Россия (русский: Либеральная Россия) ЛР была политической партией, которую спонсировал олигарх Борис Березовский, но она была приостановлена ​​из-за нехватки средств. Теперь олигархи вернулись к власти, и им нужна своя партия власти, чтобы контролировать законодательство"

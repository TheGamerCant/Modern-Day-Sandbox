 TAT.Conservative_desc: "Глава (раис) Республики Татарстан, сокращенно — раис Республики Татарстан — глава республики (субъекта, государства) и высшее должностное лицо, возглавляющее систему исполнительных органов государственной власти Татарстана."
 TAT.Communist-State: "£SOV_emerging_communism Коммунистическая партия Татарстана"
 TAT.Communist-State_icon: "£SOV_emerging_communism"
 TAT.Communist-State_desc: "Коммунистическая партия Республики Татарстан (КПРТ) — коммунистическая партия. Создание Коммунистической партии Татарстана отдельно от Коммунистической партии России было, по-видимому, обусловлено принятием в 1990 году декларации о суверенитете Татарской ССР и предстоящим выходом Татарстана из состава России."

 BHR.Western_Autocracy: "£generic_Western_Autocracy_small Дом Халифы"
 BHR.Western_Autocracy_icon: "£BHR_Autocracy_small"
 BHR.neutral_Social: "£generic_neutral_Social_small Национальное демократическое общество"
 BHR.neutral_Social_desc: "Социализм - Национальное демократическое общество действий, в просторечии известное как Ваад, возникло из Народного фронта освобождения Бахрейна, марксистской и арабской националистической группы. С тех пор Ваад смягчил свой подход, продвигая демократические реформы в Бахрейне, а не марксистскую революцию. Партия пользуется некоторой поддержкой среди бахрейнского рабочего класса и является одной из четырех основных оппозиционных партий."
 BHR.Communist-State: "£generic_Communist_State_small Прогрессивная демократическая трибуна"
 BHR.Communist-State_desc: ""
 BHR.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small Движение Хак"
 BHR.Vilayat_e_Faqih_desc: "Шиитские исламисты (хардлайн) - Движение Хак является жесткой отколовшейся группой Wefaq, которая получает поддержку от шиитов Бахрейна, разочарованных отсутствием успеха умеренного подхода Wefaq к реформам. Эти сторонники часто являются шиитской молодежью, которая иногда образовывала небольшие банды, бросающие камни и коктейли Молотова в полицейских. В отличие от Wefaq, движение Хак поддерживает падение династии Аль Халифа и создание Бахрейнской республики."
 BHR.Conservative: "£generic_Conservative_small Аль-Вефак"
 BHR.Conservative_desc: "Шиитская исламистская (умеренная) партия - Al Wefaq является одной из крупнейших партий в Бахрейне и рассматривается как представляющая интересы большинства шиитского арабского населения. Она была самым мощным голосом, призывающим к политическим реформам в Бахрейне, и поэтому была большой занозой для бахрейнской монархии. Несмотря на то, что она представляет интересы шиитского населения Бахрейна, Al Wefaq старалась дистанцироваться от Ирана и использовала умеренную риторику и методы для достижения своих целей."
 BHR.Mod_Vilayat_e_Faqih: "£generic_Mod_Vilayat_e_Faqih_small Партия Амал"
 BHR.Mod_Vilayat_e_Faqih_desc: "Партия Амал (Amal), также известная как Общество исламского действия – это ширазское крыло Аль-Вефака. Она представляет взгляды сторонников Мохаммеда Хуссайни Ширази, шиита, противостоящего Ирану и его форме правления."
 BHR.Kingdom: "£generic_Kingdom_small Исламское общество Аль-Аслах"
 BHR.Kingdom_desc: "Исламское общество Аль-Аслах (Al-Aslah) – это салафистская политическая партия, популярная среди суннитских консерваторов. Она исторически является союзником Аль-Менбара, чтобы противостоять влиянию бахрейнских шиитских исламистов."
 BHR.Caliphate: "£generic_Caliphate_small Аль-Каида"
 BHR.Caliphate_desc: ""
 BHR.Neutral_Muslim_Brotherhood: "£muslim_brotherhood_small Исламское общество Аль-Менбар"
 BHR.Neutral_Muslim_Brotherhood_desc: "Аль-Менбар (Al-Menbar) - это бахрейнское отделение Братьев-мусульман, организации, которая выступает за постепенную исламизацию общества и участие населения в политике демократическими средствами. Аль-Менбар иногда присоединяется к салафитской Аль-Асале, но, как правило, менее социально консервативен."
 BHR.Nat_Fascism: "£generic_Nat_Fascism_small Националистическая демократическая ассамблея"
 BHR.Nat_Fascism_icon: "£IRQ_Nat_Autocracy_small"
 BHR.Nat_Fascism_desc: "Национальная демократическая ассамблея является бахрейнским отделением иракской фракции партии БААС, продолжающей поддерживать Ирак Саддама Хусейна. Партия выступает против натурализации трудовых мигрантов и за приоритетность трудоустройства этнических бахрейнцев."
 BHR.Nat_Autocracy: "£generic_Nat_Autocracy_small Вооружённые силы Бахрейна"
 BHR.Nat_Autocracy_desc: ""

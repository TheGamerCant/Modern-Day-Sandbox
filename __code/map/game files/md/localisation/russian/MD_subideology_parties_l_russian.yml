 KHM.Communist-State_desc: "Коммунистическая партия Российской Федерации (КПРСФСР) — преемница старой Коммунистической партии Советского Союза. Она марксистско-ленинская и вторая по величине политическая партия за всю постсоветскую историю России."
 KHM.Conservative: "£KHM_emerging_reactionary Единая Россия"
 KHM.Conservative_icon: "£KHM_emerging_reactionary"
 KHM.Conservative_desc: "Реакционер - «Единая Россия» провозглашает своей официальной идеологией «русский консерватизм», но на самом деле фактически лишена идеологии и функционирует как широкомасштабная популистская партия, продвигающая стабильность как свою главную добродетель, в противовес революционному хаосу, который был характерен для России в постсоветскую эпоху до прихода Путина к власти."

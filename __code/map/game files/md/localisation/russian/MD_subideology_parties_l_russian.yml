 KEN.Nat_Populism: "£generic_Nat_Populism_small Юбилейная партия Кении"
 KEN.Nat_Populism_desc: "Правый популизм. Просто известная как Юбилейная партия, была основана в результате слияния 11 более мелких партий под руководством Ухуру Кеньятты. Его предшественником был Юбилейный альянс, возникший на выборах 2013 года."

 KHM.liberalism_desc: "Libéral - Le Rossiskaïa obiedinionnaïa demokratitcheskaïa partiïa « Iabloko » (Parti démocratique russe unifié « Iabloko ») est un parti social-libéral qui promeut l'économie de marché et les valeurs démocratiques. « Iabloko », qui signifie « pomme » en russe, a historiquement été la première force politique contre le communisme et le conservatisme en Russie."

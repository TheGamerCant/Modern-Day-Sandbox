 HPR.Communist-State_desc: "Parti communiste - Kharkovskaya Narodnaya Partiya (Parti populaire de Kharkov). Le KPP est un parti communiste pro-russe créé pendant la rébellion de Kharkov. Il est étroitement lié aux communistes russes et défend le marxisme-léninisme."

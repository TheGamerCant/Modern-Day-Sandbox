 SOV.Western_Autocracy: "£SOV_western_autocrat (OHR)Notre maison - Russie"
 SOV.Western_Autocracy_icon: "£SOV_western_autocrat"
 SOV.Western_Autocracy_desc: "(Le réformisme eltsinien) Notre Maison - Russie (en russe : Nash Dom - Rossiya)\n\nNotre Maison - Russie est un parti politique créé dans les années 90 par le président du gouvernement russe - Viktor Tchernomyrdeny. En fait, l'association était un parti au pouvoir et a été créée pour renforcer la position du président de la Fédération de Russie Boris Eltsine à la Douma. Le parti a déclaré une orientation libérale et a coopéré avec tous les mouvements réformistes."
 SOV.Western_Autocracy_ed: "£SOV_western_autocracy (UR) Yedinaya Rossiya - §CAile pro-occidentale§!"
 SOV.Western_Autocracy_ed_icon: "£SOV_western_autocracy"
 SOV.Western_Autocracy_ed_desc: "(Perspective pro-occidentale) Russie unie (en russe : Yedinaya Rossiya)\n\nRU proclame son idéologie officielle comme étant le « conservatisme russe », mais est largement dépourvu d'idéologie réelle et fonctionne comme un parti populiste de grande envergure, promouvant la stabilité comme vertu fondamentale, par opposition au chaos révolutionnaire qui a caractérisé la Russie à l'ère post-soviétique jusqu'à l'arrivée au pouvoir de Poutine."
 SOV.conservatism: "£SOV_western_conservative (URF) Soyuz Pravykh Sil"
 SOV.conservatism_icon: "£SOV_western_conservative"
 SOV.conservatism_desc: "(Libéralité du marché) Union des forces de droite (en russe : Soyuz Pravykh Sil)\n\nL'Union des forces de droite a été fondée en 1999 et promeut la privatisation et le capitalisme de marché libre, et s'oppose fermement à l'autoritarisme."
 SOV.conservatism_1: "£SOV_western_conservative_1 (RPR-PARNAS)Parti de la liberté du peuple."
 SOV.conservatism_1_icon: "£SOV_western_conservative_1"
 SOV.conservatism_1_desc: "(Démocratie libérale) Parti républicain de Russie - Parti de la liberté du peuple. (en russe : Respubikanskaya Partiya Rossii - Partiya Narodnoy Svobody)\n\nLe Parti de la liberté du peuple ou PARNAS est l'un des plus anciens partis, ayant débuté comme l'une des plateformes du PCUS en 1990, puis s'est transformé en un parti distinct. Il a participé aux élections à tous les niveaux, obtenant un succès limité. Le parti défend le libéralisme, l'économie de marché et l'anti-autoritarisme."
 SOV.liberalism: "£SOV_western_liberal (RUDPY) Yabloko"
 SOV.liberalism_icon: "£SOV_western_liberal"
 SOV.liberalism_desc: "(Social-libéralisme) - Parti démocratique unifié russe « Yabloko » (en russe : Rossiyskaya Obyedinennaya Democraticheskaya Partiya « Yabloko »)\n\nYabloko est un parti social-libéral qui promeut l'économie de marché et les valeurs démocratiques. Yabloko, qui signifie « pomme » en russe, a toujours été la principale force politique contre le communisme et le conservatisme en Russie."
 SOV.liberalism_alt: "£SOV_navalnyu (PA) Alliance populaire"
 SOV.liberalism_alt_icon: "£SOV_navalnyu"
 SOV.liberalism_alt_desc: "(Libéralisme progressiste) Alliance populaire (en russe : Narodnyy Al'yans)\n\nL'Alliance populaire est un parti libéral progressiste créé par l'éminent homme politique russe Alexeï Navalny. Il défend la lutte contre la corruption, le libéralisme et l'économie de marché."
 SOV.liberalism_alty: "£SOV_western_social_democrat33 (PP)Parti du progrès"
 SOV.liberalism_alty_icon: "£SOV_western_social_democrat33"
 SOV.liberalism_alty_desc: "(Libéralisme progressiste) Parti du progrès (en russe : Partiya Progressa)\n\nLe Parti du progrès est un parti libéral progressiste créé par l'éminent homme politique russe Alexeï Navalny. Il défend la lutte contre la corruption, le libéralisme et l'économie de marché."
 SOV.liberalism_altyn: "£SOV_future (RF) La Russie du futur"
 SOV.liberalism_altyn_icon: "£SOV_future"
 SOV.liberalism_altyn_desc: "(Libéralisme progressiste) Russie du futur (en russe : Rossiya Budushchego)\n\nRussie du futur est un parti libéral progressiste créé par l'éminent homme politique russe Alexeï Navalny. Il défend la lutte contre la corruption, le libéralisme et l'économie de marché."
 SOV.liberalism_nat: "£SOV_narod (NDAN) NAROD"
 SOV.liberalism_nat_icon: "£SOV_narod"
 SOV.liberalism_nat_desc: "(Démocratie nationale) Parti national-démocrate « NAROD » (en russe : Natsional-democraticheskaya Partiya « NAROD » ou « PEUPLE »)\n\nLe NAROD est un parti national-démocrate créé par l'éminent homme politique russe Alexeï Navalny. Il défend la lutte contre la corruption, le nationalisme et la démocratie."
 SOV.socialism: "£SOV_western_social_democrat (PPRF)Parti populaire de la Fédération de Russie"
 SOV.socialism_icon: "£SOV_western_social_democrat"
 SOV.socialism_desc: "(Centrisme de gauche) Parti populaire de la Fédération de Russie (en russe : Narodnaya Partiya Rossiyskoy Federatsii)\n\nLe Parti populaire de la Fédération de Russie a été créé sur la base de la faction parlementaire Narodnyi Deputat, composée uniquement de députés élus dans des circonscriptions uninominales. Le parti est centriste, mais prône souvent l'expansion des programmes de protection sociale."
 SOV.socialism_1: "£SOV_social_democrat_1 (JR)Une Russie Juste - §CAile pro-occidentale§!"
 SOV.socialism_1_icon: "£SOV_social_democrat_1"
 SOV.socialism_1_desc: "(Démocratie sociale) Une Russie juste (en russe : Spravedlivaya Rossiya)\n\nUne Russie juste est le résultat d'une unification de divers partis nationalistes, socialistes et progressistes de gauche. Bien que le parti se positionne comme socialiste, il s'agit en fait d'une large coalition de gauche composée à la fois de nationalistes de gauche et de libéraux de gauche. Le parti prône l'expansion des programmes sociaux et une plus grande implication de l'État dans l'économie."
 SOV.socialism_alt: "£SOV_socialist_alt (PSR)Parti des socialistes révolutionnaires"
 SOV.socialism_alt_icon: "£SOV_socialist_alt"
 SOV.socialism_alt_desc: "(Socialisme démocratique) Parti des socialistes révolutionnaires (en russe : Partiya Sotsialistov Revolutsionerov)\n\nLe Parti des socialistes révolutionnaires était un parti radical de gauche qui existait dans l'Empire russe. Le parti préconisait de résoudre la question agraire en socialisant la terre par l'État, rendant ainsi la terre commune pour tous, en renversant l'autocratie tsariste et en établissant une république démocratique et en menant de vastes réformes populaires, mais lorsque les bolcheviks arrivèrent au pouvoir, de nombreux membres de la faction de droite furent réprimés ou émigrèrent. Cependant, les idées ne furent pas oubliées. À la suite de la scission de Russie Juste, la faction démocratique décida de quitter le parti et de recréer le PSR."
 SOV.socialism_dem: "£SOV_democratic_soyus (DU)Union démocratique"
 SOV.socialism_dem_icon: "£SOV_democratic_soyus"
 SOV.socialism_dem_desc: "(Radicalisme libéral) Union démocratique (en russe : Democraticheskiy Soyuz)\n\nL'Union démocratique est la plus ancienne organisation politique, fondée en 1988 par des dissidents soviétiques et des militants des droits de l'homme. L'Union prône la démocratisation du système politique, la décommunisation, le pacifisme et s'oppose à l'autoritarisme."
 SOV.Communist-State: "£SOV_emerging_communism (CPRF)Parti communiste de la Fédération de Russie"
 SOV.Communist-State_icon: "£SOV_emerging_communism"
 SOV.Communist-State_desc: "(Le socialisme du XXIe siècle) Parti communiste de la Fédération de Russie (en russe : Kommunisticheskaya Partiya Rossiyskoy Federatsii)\n\nLe PCFR est le successeur de l'ancien Parti communiste de l'Union soviétique. Il est marxiste-léniniste et a été le deuxième plus grand parti politique de toute l'histoire post-soviétique de la Russie."
 SOV.Communist-State_alt: "£SOV_gorba (SDPR)Parti social-démocrate de Russie"
 SOV.Communist-State_alt_icon: "£SOV_gorba"
 SOV.Communist-State_alt_desc: "(Socialisme démocratique) Parti social-démocrate de Russie (en russe : Sotsial-Demokraticheskaya Partiya Rossii)\n\nLe SDPR est un parti socialiste de grande envergure issu du Parti communiste de la Fédération de Russie. Il est socialiste-démocrate et soutient les politiques de la Perestroïka et de la Glasnost."
 SOV.Communist-State_alty: "£SOV_kpss (CPSU)Parti communiste de l'Union soviétique - §GCentre§!"
 SOV.Communist-State_alty_icon: "£SOV_kpss"
 SOV.Communist-State_alty_desc: "(Marxisme-Léninisme) Parti communiste de l'Union soviétique (en russe : Kommunisticheskaya Partiya Sovietskogo Soyuza)\n\nLe PCUS est le parti au pouvoir en Union soviétique. Ressuscité au 21e siècle, le parti défend toujours le marxisme-léninisme et le centralisme démocratique."
 SOV.Conservative: "£SOV_emerging_conserva Yedinstvo"
 SOV.Conservative_icon: "£SOV_emerging_conserva"
 SOV.Conservative_desc: "(Centrisme pro-gouvernemental) Unité (Yedinstvo)\n\nUnité est un parti politique et une organisation sociale née de la fusion d'un grand nombre de partis conservateurs et d'entreprises à la fin de l'année 1999. Unité était censée être un parti de pouvoir et soutenait la politique du premier ministre puis du président de la Russie, Vladimir Poutine. Le parti était présidé par Sergueï Choïgou."
 SOV.Conservative_ed: "£SOV_emerging_reactionary (UR) Yedinaya Rossiya"
 SOV.Conservative_ed_icon: "£SOV_emerging_reactionary"
 SOV.Conservative_ed_desc: "(Grande tente) Russie unie (en russe : Yedinaya Rossiya)\n\nL'UR proclame son idéologie officielle comme étant le « conservatisme russe », mais est largement dépourvue d'idéologie réelle et fonctionne comme un parti populiste à grande tente, promouvant la stabilité comme vertu fondamentale, par opposition au chaos révolutionnaire qui a caractérisé la Russie à l'ère post-soviétique jusqu'à l'arrivée au pouvoir de Poutine."
 SOV.anarchist_communism: "£SOV_left_wing_radical (RPL)Parti de la vie russe"
 SOV.anarchist_communism_icon: "£SOV_left_wing_radical"
 SOV.anarchist_communism_desc: "(Centrisme de gauche) Parti russe de la vie (en russe : Rossiskaya Partiya Zhizni)\n\nLe Parti russe de la vie a été fondé par le président du Conseil de la Fédération Sergueï Mironov. Le parti prône l'expansion des programmes sociaux, l'amélioration du niveau de vie des citoyens et la régulation étatique de l'économie."
 SOV.anarchist_communism_1: "£SOV_left_wing_radical_1 (JR)Une Russie juste"
 SOV.anarchist_communism_1_icon: "£SOV_left_wing_radical_1"
 SOV.anarchist_communism_1_desc: "(Le populisme de gauche) Une Russie juste (en russe : Spravedlivaya Rossiya)\n\nUne Russie juste est le résultat d'une unification de divers partis nationalistes, socialistes et progressistes de gauche. Bien que le parti se positionne comme socialiste, il s'agit en fait d'une large coalition de gauche composée à la fois de nationalistes de gauche et de libéraux de gauche. Le parti prône l'expansion des programmes sociaux et une plus grande implication de l'État dans l'économie."
 SOV.Autocracy: "£SOV_Autocracy (PPUM) Rodina"
 SOV.Autocracy_icon: "£SOV_Autocracy"
 SOV.Autocracy_desc: "(Nationalisme de gauche) Union patriotique populaire « Mère-Patrie » (en russe : Narodno-Patrioticheskiy Soyuz « Rodina »)\n\nLa Mère-Patrie est un parti nationaliste russe de gauche qui promeut le patriotisme, le nationalisme et une intervention gouvernementale étendue dans l'économie russe."
 SOV.Neutral_conservatism: "£SOV_conservative_one (PW)La volonté du peuple"
 SOV.Neutral_conservatism_icon: "£SOV_conservative_one"
 SOV.Neutral_conservatism_1: "£SOV_conservatismus (PU)Union populaire"
 SOV.Neutral_conservatism_1_icon: "£SOV_conservatismus"
 SOV.Neutral_conservatism_2: "£SOV_non_aligned_conservative (ARPU)Union populaire de toute la Russie"
 SOV.Neutral_conservatism_2_icon: "£SOV_non_aligned_conservative"
 SOV.Neutral_Autocracy: "£SOV_non_aligned_autocracy (PRR)Parti de la renaissance russe"
 SOV.Neutral_Autocracy_icon: "£SOV_non_aligned_autocracy"
 SOV.Neutral_Autocracy_desc: "(Patriotisme de gauche) Parti de la renaissance russe (en russe : Partiya Vozrozhdeniya Rossii)\n\nLe Parti de la renaissance russe est un parti politique fondé par le vétéran et homme politique Sergueï Babaurine. Le parti a rassemblé autour de lui d'anciens anti-Eltsinistes tels qu'Alexandre Routskoï et Nikolaï Leonov. Narodnaya Volya soutient les idées de patriotisme, de nationalisme russe et de nationalisme."
 SOV.oligarchism: "£SOV_oligarchists (FAR)Patrie - Toute la Russie"
 SOV.oligarchism_icon: "£SOV_oligarchists"
 SOV.oligarchism_desc: "(Régionalisme) Patrie - Toute la Russie (en russe : Otechestvo - Vsya Rossiya)\n\nLe FAR est un bloc politique créé par le mouvement « Patrie » et « Toute la Russie » du maire de Moscou Iouri Loujkov, organisé par les dirigeants de plusieurs régions russes. Dans le milieu politique, ce bloc était appelé le « Parti des gouverneurs » car il comprenait la majorité de l'élite régionale et des gouverneurs influents. L'objectif du parti était de représenter les intérêts des régions au parlement fédéral."
 SOV.oligarchism_ed: "£SOV_non_aligned_oligarchism Yedinaya Rossiya - §gAile oligarchique§!"
 SOV.oligarchism_ed_icon: "£SOV_non_aligned_oligarchism"
 SOV.oligarchism_ed_desc: "(Oligarchisme) Russie unie (en russe : Yedinaya Rossiya)\n\nL'UR proclame son idéologie officielle comme étant le « conservatisme russe », mais elle est largement dépourvue d'idéologie réelle et fonctionne comme un parti populiste à grande échelle, promouvant la stabilité comme vertu fondamentale, par opposition au chaos révolutionnaire qui a caractérisé la Russie à l'ère post-soviétique jusqu'à l'arrivée au pouvoir de Poutine."
 SOV.Neutral_Libertarian: "£SOV_non_aligned_libertarian (LPR)Parti libertaire de Russie"
 SOV.Neutral_Libertarian_icon: "£SOV_non_aligned_libertarian"
 SOV.Neutral_Libertarian_desc: "(Libertarianisme) Parti libertaire de Russie (en russe : Libertarianskaya Partiya Rossii)\n\nLe Parti libertaire de Russie promeut les idées du libertarisme de la Russie. En tant que parti à large assise, il s'efforce d'attirer un large cercle de personnes qui partagent les idées de liberté absolue et d'inviolabilité des relations de marché. Le parti a une structure organisationnelle complexe et un système complexe de relations entre les branches. Le parti partage les idées de développement libertaire du pays, de système confédéral et de développement des relations de marché."
 SOV.Neutral_Communism: "£SOV_non_aligned_communism (CR)Les communistes de Russie"
 SOV.Neutral_Communism_icon: "£SOV_non_aligned_communism"
 SOV.Neutral_Communism_desc: ""
 SOV.Neutral_Communism_alt: "£SOV_kpss (CPSU)Parti communiste de l'Union soviétique - §gLigne dure§!"
 SOV.Neutral_Communism_alt_icon: "£SOV_kpss"
 SOV.Neutral_Communism_alt_desc: "(Marxisme-Léninisme) Parti communiste de l'Union soviétique (en russe : Kommunisticheskaya Partiya Sovietskogo Soyuza)\n\nLe PCUS est le parti au pouvoir en Union soviétique. Revivifié au 21e siècle, le parti défend toujours le marxisme-léninisme et le centralisme démocratique"
 SOV.Neutral_Communism_alty: "£SOV_neutral_communism_alt (LF)Levyy Front"

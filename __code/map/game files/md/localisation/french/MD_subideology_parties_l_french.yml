 USA.conservatism: "£USA_conservatism_small Parti républicain"
 USA.conservatism_icon: "£USA_conservatism_small"
 USA.conservatism_desc: "Conservateur – Le Parti républicain est le « Grand Old Party » du conservatisme américain. Fondé en tant que parti anti-esclavagiste en 1854, son incarnation moderne a été largement formée par le triomphe du conservatisme de Ronald Reagan sur des valeurs plus libérales. Ces dernières années, le pays a connu un afflux massif de chrétiens évangéliques alors que le parti devenait de plus en plus un parti de conservatisme social. En tant que parti « à large tente », il existe un large spectre d’opinions entre le principal establishment modéré et divers mouvements populaires conservateurs."
 USA.liberalism: "£USA_liberalism_small Parti démocrate"
 USA.liberalism_icon: "£USA_liberalism_small"
 USA.liberalism_desc: "Libéral - Le Parti démocrate, autrefois parti du libéralisme économique, du populisme et du conservatisme social, s'est depuis longtemps transformé en un parti dont les valeurs fondamentales sont la justice sociale, l'égalité et le libéralisme social. Bien que sa principale aile libérale prône le libre-échange et des politiques favorables aux entreprises dans le cadre d'une large coalition centriste, elle compte également de larges ailes de progressistes et de socialistes qui privilégient des solutions beaucoup plus à gauche."
 USA.socialism: "£USA_socialism_small Progressifs"
 USA.socialism_icon: "£USA_socialism_small"
 USA.socialism_desc: "Social-démocrate - L'aile progressiste du Parti démocrate £USA_socialism_small a pour objectif principal de s'attaquer au gouffre grandissant des inégalités de revenus et à l'augmentation de la pauvreté aux États-Unis. Considérant la politique économique de l'establishment démocrate favorable aux entreprises comme du « néolibéralisme », ils préconisent de la freiner par une réforme structurelle de la réglementation et une augmentation des dépenses sociales, ainsi qu'une augmentation des impôts sur les plus riches. Ils promeuvent avec passion les droits des minorités et prônent la justice sociale."
 USA.progressives: "£USA_progressive_party Progressifs"
 USA.progressives_icon: "£USA_progressive_party"
 USA.progressives_desc: "Parti progressiste - Le parti progressiste peut retracer ses principales racines dans l'administration de Teddy Roosevelt. Un fort mélange de réglementation, de protection de l'environnement et de concentration sur la défense régionale plutôt que sur l'international signifie que le parti progressiste est un parti bien équilibré, axé sur le pays. Bien que son homologue moderne ait des ailes plus radicales, le parti partage néanmoins bon nombre des valeurs fondamentales d’égalité et de la mentalité de type Robbin Hood en matière de réglementation économique."
 USA.Communist-State: "£USA_Communist_State_small Parti communiste des États-Unis"
 USA.Communist-State_icon: "£USA_Communist_State_small"
 USA.Communist-State_desc: "État communiste – Le Parti communiste des États-Unis a été créé en 1919 après une scission majeure au sein du Parti socialiste américain. Il est étroitement lié au mouvement syndical américain et à d’autres partis communistes dans le monde. Le CPUSA était une force majeure au début du 20e siècle jusqu'à ce qu'il soit contraint à la clandestinité par la Première Peur Rouge. Le parti a gagné peu de terrain auprès des jeunes foules américaines ces dernières années."
 USA.anarchist_communism: "£USA_anarchist_communism_small PSL"
 USA.anarchist_communism_icon: "£USA_anarchist_communism_small"
 USA.anarchist_communism_desc: "Radical de gauche - Le Parti pour le socialisme et la libération est un parti socialiste révolutionnaire issu du Parti mondial des travailleurs. Il se consacre en grande partie au soutien des mouvements socialistes et communistes mondiaux, ainsi qu’à l’éradication du capitalisme en Amérique."
 USA.shepards_party: "£USA_shepeard_party La fête de Shepard"
 USA.shepards_party_icon: "£USA_shepeard_party"
 USA.shepards_party_desc: "Le Parti de Shepard - Le SP, anciennement connu sous le nom de Parti pour le socialisme et la libération ou PSL, est un parti issu de la coalition des principaux mouvements de gauche américains. Considéré comme un contrepoids à la montée du NFP pour l'aile droite, le Parti de Shepard cherche à prendre ce que veulent les socialistes démocrates d'Europe et d'Amérique, mais à le vendre au peuple américain sous un jour plus clair et moins rose. L'objectif principal est de réformer l'économie dans un environnement socialiste de marché, en donnant au peuple le véritable niveau qu'il mérite. Bien que la politique étrangère soit davantage axée sur l'hégémonie hémisphérique intérieure, l'avenir pourrait changer les désirs des dirigeants du parti eux-mêmes."
 USA.Conservative: "£USA_Conservative_small Le parti America First"
 USA.Conservative_icon: "£USA_Conservative_small"
 USA.Conservative_desc: "Réactionnaire - Le parti America First est un parti qui se consacre principalement aux questions de politique étrangère, cherchant à retirer les États-Unis des Nations Unies et à dissoudre l'OTAN. De plus, le parti souhaite renforcer le droit de porter des armes, expulser tous les immigrants illégaux et promouvoir l'indépendance économique par le biais de tarifs douaniers élevés et de l'élimination des réglementations environnementales."
 USA.Autocracy: "£USA_Autocracy_small SWP"
 USA.Autocracy_icon: "£USA_Autocracy_small"
 USA.Autocracy_desc: "Autocratie - Le Parti socialiste des travailleurs était à l'origine un parti communiste trotskiste qui, au cours de la guerre froide, est passé progressivement sous l'influence de Fidel Castro. Aujourd'hui, il se consacre principalement à la promotion de la « solidarité avec Cuba »."
 USA.Neutral_Muslim_Brotherhood: "£USA_Neutral_Muslim_Brotherhood_small Nation de l'Islam"
 USA.Neutral_Muslim_Brotherhood_icon: "£USA_Neutral_Muslim_Brotherhood_small"
 USA.Neutral_Muslim_Brotherhood_desc: "Islamistes modérés - La Nation de l'Islam est un mouvement politique et religieux afro-américain. Devenu célèbre sous la direction charismatique d'Elijah Muhammad et de Malcolm X, il lutte pour la justice sociale des Afro-Américains, mobilisant des millions de personnes pour des manifestations à Washington DC. Considéré par beaucoup comme un groupe haineux suprémaciste noir et considéré comme hétérodoxe dans son islam par de nombreux érudits sunnites étrangers, il n'en possède pas moins un noyau dur de membres et s'est fait des alliés essentiels au Moyen-Orient et en Afrique du Nord."
 USA.Neutral_conservatism: "£USA_Neutral_conservatism_small Les constitutionnalistes"
 USA.Neutral_conservatism_icon: "£USA_Neutral_conservatism_small"
 USA.Neutral_conservatism_desc: "Conservateurs - L'aile constitutionnaliste et libertarienne du Parti républicain £USA_Neutral_conservatism_small  se considère comme les « vrais conservateurs » à l'image de Goldwater et Reagan. Proclamant que l'Amérique s'est trop éloignée de ses valeurs fondatrices, ils prônent la limitation du pouvoir fédéral sur les États, la promotion du conservatisme fiscal, la baisse des impôts et le retrait de la construction de nations étrangères."
 USA.constitutionalist: "£USA_constitutionalist Parti constitutionnaliste"
 USA.constitutionalist_icon: "£USA_constitutionalist"
 USA.constitutionalist_desc: "Parti constitutionnaliste - Le tremplin vers ce que beaucoup considèrent comme un mouvement d'extrême droite, la plupart des politiques du parti peuvent se résumer par une stricte adhésion à la constitution des États-Unis et une influence écrasante de l'aile évangélique de la société américaine. Bien qu'il ne soit pas d'extrême droite, il s'agit certainement d'un tremplin et d'une nature résolument traditionaliste, si bien que beaucoup ne le voient pas accéder à la présidence de sitôt."
 USA.neutral_Social: "£USA_neutral_Social_small Socialistes démocrates"
 USA.neutral_Social_icon: "£USA_neutral_Social_small"
 USA.neutral_Social_desc: "Socialisme démocratique – L’aile socialiste du £USA_neutral_Social_small  Parti démocrate rejette le libéralisme des principaux dirigeants et le gradualisme des progressistes en faveur d’une solution plus radicale, celle d’établir un État providence fort avec un contrôle démocratique accru sur tous les secteurs importants de l’économie. Ils rejettent le militarisme américain à l’étranger et considèrent que les guerres menées pour « protéger la liberté et la démocratie » ne favorisent que les objectifs étroits de profit de l’élite des entreprises."
 USA.democratic_socialist: "£USA_democratic_socialist Parti de la démocratie rouge"
 USA.democratic_socialist_icon: "£USA_democratic_socialist"
 USA.democratic_socialist_desc: "Parti de la démocratie rouge - Le mouvement socialiste démocratique américain a créé le Parti Robin, plus connu sous le nom de Parti de la démocratie rouge. Ce parti est fortement influencé par ses homologues européens. Les dirigeants du parti comme Bernie Sanders vantent les politiques du parti en utilisant essentiellement le système actuel pour réformer la nation afin d'atteindre l'égalité des moyens sociaux et économiques, ainsi que pour atteindre ces objectifs en transformant le système économique capitaliste en un système économique socialiste par le biais de réformes menées par l'organisme gouvernemental de la nation."
 USA.Neutral_Libertarian: "£USA_Neutral_Libertarian_small Parti libertaire"
 USA.Neutral_Libertarian_icon: "£USA_Neutral_Libertarian_small"
 USA.Neutral_Libertarian_desc: "Libertarien - Le Parti libertarien est, selon les critères américains, un « troisième parti » qui a réussi et qui est régulièrement en compétition sur tous les bulletins de vote. Promouvant le libéralisme social et le conservatisme économique et se considérant comme « l'incarnation de l'esprit américain de l'individualisme », il cherche à libéraliser radicalement la société dans tous ses aspects et à réduire la taille du gouvernement fédéral, rendant ainsi le pouvoir aux États et au peuple. Rejetant à la fois le militarisme et l'internationalisme, il est favorable à une politique étrangère non-interventionniste."
 USA.Neutral_Autocracy: "£USA_Neutral_Autocracy_small Parti réformiste"
 USA.Neutral_Autocracy_icon: "£USA_Neutral_Autocracy_small"
 USA.Neutral_Autocracy_desc: "Paléoconservateur - Le Parti réformiste des États-Unis a été fondé par le milliardaire Ross Perot en désaccord profond avec la politique étrangère « néo-impérialiste » du £USA_conservatism_small Parti républicain, cherchant à ramener les États-Unis à une politique étrangère non-interventionniste après sa victoire dans la guerre froide. Le parti s'oppose à l'ALENA et cherche à réformer la politique américaine par le biais de la limitation des mandats et de la réforme électorale. Ayant atteint un score sans précédent de 18,9 % des voix aux élections de 1992 et ayant élu Jesse Ventura comme gouverneur du Minnesota en 1998, le parti espère répéter ces exploits et fournir une alternative viable aux partis démocrate et républicain."
 USA.Neutral_green: "£USA_Neutral_green_small Parti vert"
 USA.Neutral_green_icon: "£USA_Neutral_green_small"
 USA.Neutral_green_desc: "Verts - Le Parti vert est un parti éco-socialiste et anticapitaliste qui prône l'écologie et le féminisme. Il souhaite réformer l'économie en la basant sur les coopératives et les communautés locales."
 USA.green_party: "£USA_green_party Parti vert"
 USA.green_party_icon: "£USA_green_party"
 USA.green_party_desc: "Parti vert - Le Parti vert américain est un parti qui allie des idéaux progressistes, un écologisme extrême et une vision mondialiste de la manière de résoudre les principaux problèmes sur lesquels se concentre le parti. Le parti peut être considéré comme un parti pacifiste et équilibré en matière de politique intérieure et étrangère."
 USA.Neutral_Communism: "£USA_Neutral_Communism_small WWP"
 USA.Neutral_Communism_icon: "£USA_Neutral_Communism_small"
 USA.Neutral_Communism_desc: "Communiste - Le Parti mondial des travailleurs a été fondé en 1959 en tant que groupe dissident du Parti socialiste des travailleurs trotskistes, qui n'était pas suffisamment trotskiste. Ils ont eux-mêmes abandonné le trotskisme quelques années plus tard. Ils se sont principalement concentrés sur l'activisme de rue."
 USA.Nat_Populism: "£USA_Nat_Populism_small Populistes de droite"
 USA.Nat_Populism_icon: "£USA_Nat_Populism_small"
 USA.Nat_Populism_desc: "Populistes de droite – L’aile populiste et nationaliste du £USA_Nat_Populism_small Parti républicain est traditionnellement ancrée dans le Sud profond, après l’exode massif des ségrégationnistes du Parti démocrate dans les années 1960. Se considérant comme assiégés par les guerres culturelles libérales et les taux élevés d’immigration, ils cherchent à inverser l’érosion de leur culture et de leurs valeurs. Alors que l’externalisation entraîne le déclin de nombreux centres industriels, leur discours sur le fait d’être « vendus par des politiciens mondialistes qui importent des électeurs du Mexique » trouve désormais un écho plus large à travers l’Amérique."
 USA.nationalist_front: "£USA_nationalist_front Le parti du Front nationaliste"
 USA.nationalist_front_icon: "£USA_nationalist_front"
 USA.nationalist_front_desc: "Le NFP est un parti de coalition des penseurs de droite américains, des traditionalistes à l'alt-right. C'est un va-et-vient confus dans les véritables notions politiques, mais la plupart semblent d'accord sur des réformes d'immigration plus restrictives, en se concentrant davantage sur les politiques intérieures pour raviver la famille traditionnelle et un retour à des valeurs plus traditionnelles dans les institutions publiques comme les écoles qui ont un serment d'allégeance et sont en phase avec des valeurs plus chrétiennes."
 USA.Nat_Fascism: "£USA_nazi_party Parti nazi américain"
 USA.Nat_Fascism_icon: "£USA_nazi_party"
 USA.Nat_Fascism_desc: "Fasciste - Le Parti nazi américain est un parti néo-nazi suprémaciste blanc. Bien qu'il ait une longue histoire, il n'a pas eu beaucoup de partisans populaires, ayant été dissous et reconstitué par des personnes différentes au milieu de luttes intestines à plusieurs reprises."
 USA.Nat_Autocracy: "£USA_Nat_Autocracy_small Armée américaine"
 USA.Nat_Autocracy_icon: "£USA_Nat_Autocracy_small"
 USA.Nat_Autocracy_desc: "L'armée américaine est l'une des branches les plus importantes et sans doute les plus influentes du complexe militaro-industriel. Avec des généraux de carrière et un ministère de la Défense bien garni en sa faveur, l'armée américaine a les meilleures chances de mettre en place un nouveau gouvernement si le pire devait arriver dans ces pays."
 USA.Monarchist: "£USA_nationalist_monarchist Mouvement monarchiste américain"
 USA.Monarchist_icon: "£USA_nationalist_monarchist"
 USA.Monarchist_desc: "Le mouvement monarchiste américain est un mouvement marginal pour ceux qui rêvent d'un avenir meilleur. Bien que personne ne prenne le mouvement au sérieux en dehors de ses propres membres, la réalité est que les organisations gouvernementales ne sont pas si différentes dans leur essence. Quelques changements de titre de fonction et boum, vous avez une monarchie constitutionnelle. Mais pour l'instant, le mouvement cherche simplement à se développer à travers des mouvements de base et il est facile de les regrouper en mouvements plus importants pour diffuser passivement leurs idées et leurs idéaux."
 ARG.Western_Autocracy: "£ARG_western_autocracy Engagement fédéral"
 ARG.Western_Autocracy_icon: "£ARG_western_autocracy"
 ARG.Western_Autocracy_desc: "L'Autocratie Occidentale - Engagement Fédéral (en espagnol - Compromiso Federal) est un parti politique péroniste dont l'objectif principal est de mettre en œuvre le modèle de San Luis au niveau national."
 ARG.conservatism: "£ARG_conservatism Action pour la République"
 ARG.conservatism_icon: "£ARG_conservatism"
 ARG.conservatism_desc: "Conservatisme - Action pour la République (en espagnol - Acción por la República) est un parti politique conservateur argentin, fondé en 1997 par Domingo Cavallo en tant que défenseur des idéologies néolibérales."
 ARG.conservatism_alt: "£ARG_conservatism_alt Proposition républicaine"
 ARG.conservatism_alt_icon: "£ARG_conservatism_alt"
 ARG.conservatism_alt_desc: "Conservatisme - Proposition républicaine (en espagnol - Propuesta Republicana) est un parti politique néolibéral conservateur. Il s'agit du principal parti anti-péroniste et son leader est l'ancien président argentin Mauricio Macri."
 ARG.liberalism: "£ARG_liberalism Coalition civique ARI"
 ARG.liberalism_icon: "£ARG_liberalism"
 ARG.liberalism_desc: "Libéralisme - Coalition civique ARI (en espagnol - Coalición Cívica ARI, CC-ARI) est un parti politique social-libéral argentin, fondé en 2001 par Elisa Carrió. Il est membre de Cambiemos, des partis centristes et de centre-droit."
 ARG.socialism: "£ARG_socialism Union civique radicale"
 ARG.socialism_icon: "£ARG_socialism"
 ARG.socialism_desc: "Socialisme - L'Union civique radicale (en espagnol : Unión Cívica Radical, UCR) est un parti politique social-libéral centriste argentin. Fondé en 1891 par des libéraux radicaux, le parti a été idéologiquement hétérogène, allant du social-libéralisme à la social-démocratie. C'est le plus ancien parti politique actif en Argentine après le Parti libéral de Corrientes."
 ARG.Communist-State: "£ARG_Communist_State Parti communiste argentin"
 ARG.Communist-State_icon: "£ARG_Communist_State"
 ARG.Communist-State_desc: "État communiste - Le Parti communiste d'Argentine (en espagnol - Partido Comunista de la Argentina, également connu simplement sous le nom de « PC ») est un parti communiste argentin, fondé le 6 janvier 1918. Dès son origine, il a maintenu un alignement presque automatique avec le Parti communiste de l'Union soviétique, ce qui a généré des frictions avec le reste de la gauche nationale, qui a accusé le parti de lutter davantage pour les intérêts géopolitiques de l'Union soviétique que pour l'émergence effective de la révolution communiste en Argentine."
 ARG.Autocracy: "£ARG_Autocracy Front large"
 ARG.Autocracy_icon: "£ARG_Autocracy"
 ARG.Autocracy_desc: "Autocratie - Le Front Large (en espagnol - Frente Grande) est un parti politique de gauche argentin, fondé en 1993. Le parti a été créé par un groupe de membres du Parti justicialiste de gauche de la Chambre des députés argentine et d'autres personnes de gauche qui étaient agacés par les politiques néolibérales de l'époque."
 ARG.anarchist_communism: "£ARG_left_wing_radical Parti intransigeant"
 ARG.anarchist_communism_icon: "£ARG_left_wing_radical"
 ARG.anarchist_communism_desc: "Le Partido Intransigente (en espagnol : Partido Intransigente) est un parti politique populiste de gauche argentin, fondé en 1963 par Oscar Alende. Ses membres venaient de l'Union civique radicale intransigeante (Unión Cívica Radical Intransigente), l'une des deux factions qui avaient divisé l'Union civique radicale en 1956."
 ARG.Conservative: "£ARG_emerging_reactionary Fête de la victoire"
 ARG.Conservative_icon: "£ARG_emerging_reactionary"
 ARG.Conservative_desc: "Le Parti de la Victoire (en espagnol : Partido de la Victoria) est un parti péroniste de gauche fondé par l'ancien président argentin Néstor Kirchner. Le parti promeut l'idéologie de son leader, le kirchnerisme, qui est considéré comme une branche du péronisme."
 ARG.Neutral_conservatism: "£ARG_Neutral_conservatism Parti démocrate-chrétien"
 ARG.Neutral_conservatism_icon: "£ARG_Neutral_conservatism"
 ARG.Neutral_conservatism_desc: ""

 SOV.Nat_Fascism: "£SOV_nationalist_fascism  (NBP) Natsional-Bolshevistskaya Partiya"
 SOV.Nat_Fascism_icon: "£SOV_nationalist_fascism"
 SOV.Nat_Fascism_desc: "(National Bolchevisme) Parti national-bolchevique (en russe : Natsional Bolshevistskaya Partiya)\n\nLes national-bolcheviques sont un mouvement ultra-nationaliste qui fusionne l'idéologie stalinienne avec des éléments du national-socialisme."
 SOV.Nat_Populism: "£SOV_nationalist_right_wing_populist (LDPR)Parti libéral démocrate de Russie"
 SOV.Nat_Populism_icon: "£SOV_nationalist_right_wing_populist"
 SOV.Nat_Populism_desc: "(National Populisme) Parti libéral démocrate de Russie (en russe : Liberal'no-demokraticheskaya partiya Rossii)\n\nLe LDPR n'est ni libéral ni démocratique, mais cherche plutôt une renaissance autoritaire, populiste et nationaliste d'un empire russe considérablement étendu."
 SOV.Nat_Populism_alt: "£SOV_ldpss (LDPSS)Parti libéral démocrate de l'Union soviétique"
 SOV.Nat_Populism_alt_icon: "£SOV_ldpss"
 SOV.Nat_Populism_alt_desc: "(National Populisme) Parti libéral démocrate de l'Union soviétique (en russe : Liberal'no-demokraticheskaya partiya Sovetskogo Soyuza)\n\nLe LDPSS n'est ni libéral ni démocratique, mais cherche plutôt une renaissance autoritaire, populiste et nationaliste d'un empire russe considérablement étendu."
 SOV.Nat_Autocracy_wagner: "£SOV_Nat_Autocracy_wagner (WP)Le Parti Wagner"
 SOV.Nat_Autocracy_wagner_icon: "£SOV_Nat_Autocracy_wagner"
 SOV.Nat_Autocracy_wagner_desc: "(Patriote mercenaire) Parti Wagner (en russe : Partiya Wagnera)\n\nLe parti a été formé à la suite de l'expansion de l'influence de Prigojine dans le pays. Wagner est devenu une idéologie militariste qui rassemble autour d'elle tous ceux qui la partagent et sont prêts à défendre les intérêts de la Russie avec une mitraillette à la main"

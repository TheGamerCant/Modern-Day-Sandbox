 BLR.liberalism: "£BLR_liberalism Evrapieskaya Biélorussie"
 BLR.liberalism_icon: "£BLR_liberalism"
 BLR.liberalism_desc: "Ce parti est une coalition de partisans pro-européens présents sur le territoire de la Biélorussie. Il a clairement exprimé sa rhétorique anti-russe et son intention de se retirer de tous les accords liés à la Russie après son arrivée au pouvoir."
 BLR.conservatism: "£BLR_conservatism Front biélorusse Narodny"
 BLR.conservatism_icon: "£BLR_conservatism"
 BLR.conservatism_desc: "Le parti a été fondé sur le mouvement public Front populaire biélorusse \"Revival\", fondé en 1988 et prônant l'indépendance de la Biélorussie, la démocratisation du pouvoir, la renaissance de la langue et de la culture biélorusses."
 BLR.socialism: "£generic_socialism_small Belaruskaja Social-Demakratyčnaja Hramada"
 BLR.socialism_desc: "Le Parti social-démocrate biélorusse Gramada, le Parti Gramada est un parti politique biélorusse. Le chef honoraire du parti était un homme politique bien connu, le premier chef de la Biélorussie indépendante Stanislav Shushkevich. Le programme du BSDG, adopté au 2e Congrès en 1999, notait que le BSDG était un parti de type centre-droit. Malgré son nom, il n'adhère pas au principe de régulation étatique de l'économie établi parmi les partis sociaux-démocrates, il prône une économie à plusieurs niveaux et, avant tout, une économie de marché. La deuxième caractéristique du BSDG — également un signe traditionnel du parti pris « de droite » — est qu'un rôle important dans le programme est attribué à la renaissance nationale et au renforcement de l'indépendance de l'État de la Biélorussie."
 BLR.Communist-State: "£BLR_Communist_State Parti communiste de Biélorussie"
 BLR.Communist-State_icon: "£BLR_Communist_State"
 BLR.Communist-State_desc: "Le Parti communiste de Biélorussie est un parti politique de la République de Biélorussie. Il a été créé en 1996 à la suite d'une scission au sein du Parti communiste de Biélorussie, associée à l'existence de points de vue différents au sein du PKB sur la politique menée par le président du pays. Le CPB soutient la politique d'Alexandre Loukachenko et constitue la plus grande organisation communiste de la république."
 BLR.Conservative: "£BLR_Conservative L'autocratie de Loukachenko"
 BLR.Conservative_icon: "£BLR_Conservative"
 BLR.Conservative_desc: "Alexandre Loukachenko tient fermement au pouvoir et ne va pas le céder comme ça. Il rassemble autour de lui d’ardents partisans de ses idées. Son idéologie est clairement pro-russe et s’inscrit dans la plus profonde intégration possible en termes économiques et sociaux. Mais malgré cela, Loukachenka est toujours à la recherche de partenaires tant à l’ouest qu’à l’est – en la personne de la Chine. Il essaie donc de négocier avec la Russie sans devenir complètement sa marionnette."
 BLR.Autocracy: "£BLR_Autocracy \"Sajuz\""
 BLR.Autocracy_icon: "£BLR_Autocracy"
 BLR.Autocracy_desc: "The political party \"Union\" is a party that has been causing a lot of controversy since its inception. Many call it a Russian project, while some believe that it is a conscious association of citizens of Belarus, that they wish not to deviate from the course of integration with Russia."
 BLR.anarchist_communism: "£BLR_anarchist_communism Bielaruskaja patryjatyčnaja partyja"
 BLR.anarchist_communism_icon: "£BLR_anarchist_communism"
 BLR.anarchist_communism_desc: "Belarusian Patriotic Party is a political party of Belarus. It was created in 1996 from among the active supporters of Alexander Lukashenko.The party's goals are to promote the construction of a socially just society; to promote the creation of a renewal of the union of fraternal peoples and, first of all, of Russia, Belarus, and Ukraine; to support the president in his efforts to implement election programs and urgent measures to bring Belarus out of the crisis; to protect the national interests, honor and dignity of Belarus in all spheres"
 BLR.Neutral_conservatism: "£BLR_Neutral_conservatism Respublikanskaya partiya"
 BLR.Neutral_conservatism_icon: "£BLR_Neutral_conservatism"
 BLR.Neutral_conservatism_desc: "Republican Party is a political party in the Republic of Belarus. By its own definition, it is centrist"
 BLR.oligarchism: "£BLR_oligarchism Libieraĺna-Demakratyčnaja Partyja Bielarusi"
 BLR.oligarchism_icon: "£BLR_oligarchism"
 BLR.oligarchism_desc: "Liberal Democratic Party is the largest Belarusian political party, established in 1994 on the basis of the Belarusian branch of the Liberal Democratic Party of the Soviet Union. Since October 1999, the Liberal Democratic Party has positioned itself as a \"constructive opposition\" party."
 BLR.neutral_Social: "£BLR_neutral_Social Belarusian Social Democratic Party (Narodnaya Gramada)"
 BLR.neutral_Social_icon: "£BLR_neutral_Social"
 BLR.neutral_Social_desc: "Bielaruskaja Sacyjal-Demakratyčnaja Partyja (Gramada) is a Belarusian political party. Initially, the party was established on March 2, 1991 as the Belarusian Social Democratic Gramada (abbreviated BSDG) and existed under this name until June 29, 1996, when it merged with the People's Consent Party (PNS), as a result of which it received a new name, the Belarusian Social Democratic Party (Narodnaya Gramada), under which it existed until June 24 June 2005. The BSDP continues the traditions of the Belarusian Socialist Gramada (1902-1918) and the Belarusian Social Democratic Party (1918-1924).The BSDP belongs to the community of parties united in the Socialist International and the Progressive Alliance.The BSDP is in opposition to the regime of President Alexander Lukashenko"
 BLR.Neutral_Communism: "£BLR_Neutral_Communism Bielaruskaja Partyja Lievych «Spraviadlivy Sviet»"
 BLR.Neutral_Communism_icon: "£BLR_Neutral_Communism"
 BLR.Neutral_Communism_desc: "Belarusian Party of the Left \"Just World\" is a political party in the Republic of Belarus.It was founded in 1991 as a result of the suspension of the activities of the CPB — CPSU on the territory of the Republic of Belarus. In 1996, some of the PKB members who supported the policy of A. Lukashenko separated from the party and formed the pro-presidential Communist Party of Belarus. Currently, the Just World Party opposes the regime of President Alexander Lukashenko. The party has an extensive network of regional organizations. It is part of the European Left"
 BLR.Neutral_green: "£generic_Neutral_green_small Bielaruskaja Partyja \"Zialionyja\""
 BLR.Neutral_green_desc: ""
 BLR.Nat_Autocracy: "£BLR_Nat_Autocracy Military Junta"
 BLR.Nat_Autocracy_icon: "£BLR_Nat_Autocracy"
 BLR.Nat_Autocracy_desc: "The military junta of the leading generals of the Armed Forces of Belarus. With an iron grip, they are ready to hold power and protect the country from the enemy from outside"
 BLR.Nat_Fascism: "£BLR_Nat_Fascism Nacyjanal-Baĺšavickaja Partyja"
 BLR.Nat_Fascism_icon: "£BLR_Nat_Fascism"
 BLR.Nat_Fascism_desc: "The National Bolsheviks, supporters of Eduard Limonov, are a political movement operating in Belarus since 1994. Modern National Bolshevism is a flexible ideology that combines the ideas of national and social justice with the requirements of civil liberties. For the National Bolshevik, our Motherland is synonymous with a welfare state and a free country based on the rights of citizens."
 BLR.Nat_Populism: "£BLR_Nat_Populism Biełaruski Narodny Front \"Adradžeńnie\""
 BLR.Nat_Populism_icon: "£BLR_Nat_Populism"
 BLR.Nat_Populism_desc: "The BPF party is a Belarusian center—right party created in 1993 under the name \"Belarusian People's Front\". Its face and leader is Zenon Poznyak. He is known for his anti-Russian views, as well as a supporter of full autonomy of Belarus from the West and East."
 BLR.Monarchist: "£generic_Monarchist_small \"Za Wieru, Ajczynu j Kniazia!\""
 BLR.Monarchist_desc: "The Monarchical League Of The Grand Duchy of Lithuania \"Za Wieru, Ajczynu j Kniazia!\" is a socio—political organization of the monarchical, patriotic, pro-Lithuanian (pro-Belarusian) direction. It operates on the territory of Belarus and Lithuania. Founded on June 30, 2002. The management is located in Minsk. Unites conservatives and supporters of the restoration of the monarchy in Lithuania and Belarus. Advocates the restoration of church and gentry liberties. The League's mission is to revive the Grand Duchy of Lithuania as a Catholic hereditary monarchy, a subject of international law as of 1654."

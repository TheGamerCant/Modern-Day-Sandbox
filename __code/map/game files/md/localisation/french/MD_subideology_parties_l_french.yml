 SOV.oligarchism_council_icon: "£SOV_oligarchs"
 SOV.oligarchism_council_desc: "(Oligarchisme libéral) La Russie libérale (en russe : Liberal'naya Rossiya) était un parti politique parrainé par l'oligarque Boris Berezovskiy, mais il a été suspendu en raison du manque de fonds. Aujourd'hui, les oligarques sont de retour au pouvoir et ils ont besoin de leur propre parti au pouvoir pour contrôler la législation"

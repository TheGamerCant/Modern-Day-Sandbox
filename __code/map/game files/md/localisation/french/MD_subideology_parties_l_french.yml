 attack_Party_0_TT: "§HAttaquer [Western_Autocracy_L] ([?party_pop_array^0|%1])§!\nNous pouvons recourir à des campagnes de désinformation et utiliser les éléments que nous avons recueillis sur les grands partis extérieurs au gouvernement pour porter un coup dur à leur popularité - en nous assurant qu'ils ne soient pas en mesure de contester notre position de pouvoir. Étant donné que toute attention apportera de la popularité aux partis mineurs, cela ne fonctionnera qu'avec les partis majeurs dépassant le seuil électoral de [?election_threshold|%0].\n\n§YPrérequis:§!\n[!opt_party1_attack_button_click_enabled]\n\n§YEffets :§!\n[!opt_party1_attack_button_click]"

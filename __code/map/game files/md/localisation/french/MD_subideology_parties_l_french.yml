 NIG.Caliphate: "£NIG_salafist_jihadism Boko Haram"
 NIG.Caliphate_desc: "Boko Haram est un groupe extrémiste salafiste basé principalement dans l'État de Borno, au nord-est du Nigéria. Il prône l'instauration de la charia et agit sous prétexte d'unifier le pays sous une bannière islamique. Boko Haram est l'un des groupes djihadistes les plus importants d'Afrique de l'Ouest."
 NIG.Neutral_conservatism: "£NIG_non_aligned_conservative People's Democratic Party"
 NIG.Neutral_conservatism_desc: "Neutral Conservatives - The People's Democratic Party has continued to receive support from well across the country. However, it draws its greatest strength from the Chrisitan majority in the South. It is mainly a centre-right party in terms of ideology that supports neoliberal market policies. The party remains one of the largest in Nigerian history and continues to dominate on the political battlefields."

 JAP.Western_Autocracy: "£JAP_conservatism Parti libéral-démocrate « Seiwakai »"
 JAP.Western_Autocracy_icon: "£JAP_conservatism"
 JAP.Western_Autocracy_desc: "Les révisionnistes constituent l’aile droite du PLD et proposent une politique étrangère plus conflictuelle. Ils proposent une adaptation de l'article 9 à la situation mondiale ainsi qu'à la situation régionale. La Chine et la Corée du Nord constituent une menace réelle pour l’État japonais et nous ne pouvons pas compter uniquement sur la protection des États-Unis. Nous devons prendre les choses en main et développer des capacités militaires suffisantes pour protéger nos intérêts. L’émergence de nouvelles méga-entreprises en Chine constitue également un défi majeur pour notre économie. Si nous ne changeons pas notre politique, nous perdrons notre position actuelle dans le monde."
 JAP.conservatism: "£JAP_conservatism Parti libéral-démocrate « Kōchikai »"
 JAP.conservatism_icon: "£JAP_conservatism"
 JAP.conservatism_desc: "Depuis 1955, le parti conservateur LDP est l'un des deux principaux partis du Japon. Son influence a atteint tous les rangs du gouvernement et de la société japonaise ! Mais après de nombreuses années de crise économique et de réticence à s'adapter au monde moderne, il est clair que le parti est divisé. L'aile droite du PLD est favorable à la garantie du commerce et de la coopération avec les États-Unis, tandis que l'aile gauche soutient les revendications chinoises dans la région en échange de relations commerciales plus approfondies. Une approche équilibrée semble impensable et le parti doit décider quelle voie il souhaite suivre. Sinon, il risque de perdre son statut dans les systèmes et d'autres partis prendront sa place !"
 JAP.liberalism: "£JAP_liberalism Parti démocratique du Japon"
 JAP.liberalism_icon: "£JAP_liberalism"
 JAP.liberalism_desc: "Le PDJ a été fondé en 1998 suite à la fusion de quatre partis indépendants et est considéré comme de centre-gauche. Le parti a pour objectif de construire « une nouvelle voie vers le centre démocratique ». Les principaux objectifs sont de créer une société plus transparente et plus juste ainsi que de donner plus de pouvoirs au peuple et aux gouvernements locaux. En outre, il souhaite créer une société inclusive avec des chances égales pour tous. Le parti s'accroche fermement à l'article 9 et au pacifisme. Les JSDF sont, selon eux, nécessaires et importantes pour la sécurité de l'État ainsi que des citoyens."
 JAP.liberalism_alt: "£JAP_liberalism_alt Parti Démocratique Constitutionnel"
 JAP.liberalism_alt_icon: "£JAP_liberalism_alt"
 JAP.liberalism_alt_desc: ""
 JAP.socialism: "£JAP_socialism Komeito"
 JAP.socialism_icon: "£JAP_socialism"
 JAP.socialism_desc: "Komeito est un parti créé récemment en 1998 et se proclame parti du « socialisme humanitaire ». Sa mission est de créer un État avec le peuple au centre et une politique basée sur l'humanitarisme. Toute vie dans le monde doit être abordée avec Le parti a le plus grand respect et le plus grand soin. Le parti a pour objectif de réduire les droits du gouvernement central et d'augmenter l'autonomie des préfectures. Komeito a la prétention de représenter les gens normaux qui n'ont pas le sentiment d'appartenir aux deux grands partis et. leur donner une voix dans l'État. Leur objectif est de créer plus de richesse pour le peuple japonais en augmentant les relations commerciales avec la puissance émergente Chine. Cependant, on ne sait pas comment ce changement de politique étrangère affecterait le Japon et son allié les États-Unis."
 JAP.Communist-State: "£JAP_Communist_State Parti communiste japonais (autoritaire)"
 JAP.Communist-State_icon: "£JAP_Communist_State"
 JAP.Communist-State_desc: "L’aile Emergence du PCJ est une clique non officielle de communistes radicaux soutenant des politiques anti-occidentales, notamment la rupture des liens avec les États-Unis, et une vision pro-orientale, y compris des changements comme une réapproche politico-diplomatique avec la Russie et la Chine."
 JAP.Conservative: "£JAP_conservatism Parti libéral-démocrate « Shisuikai »"
 JAP.Conservative_icon: "£JAP_conservatism"
 JAP.Conservative_desc: "Les protectionnistes sont l’aile gauche du PLD et sont favorables à une politique étrangère davantage axée sur l’économie. Ils voient l’essor de la Chine comme une opportunité et veulent en tirer profit économiquement. Même si cela signifie qu’ils doivent affronter les États-Unis avec des restrictions. Si nous ne coopérons pas avec les Chinois, notre économie s’effondrera et le dur labeur des dernières générations n’aura servi à rien ! Même si la faction protectionniste est pacifiste, elle est ouverte à une réinterprétation de l’article 9 et à la reconnaissance des Forces d’autodéfense."
 JAP.Autocracy: "£JAP_Autocracy Ligue communiste révolutionnaire"
 JAP.Autocracy_icon: "JAP_Autocracy"
 JAP.Autocracy_desc: "La Ligue communiste révolutionnaire est le résultat d'une scission des extrémistes du PCJ en 1957. Le parti est un parti marxiste qui s'oppose à l'impérialisme et à toute forme extrême de « communisme » comme le stalinisme. Le parti a été le plus actif au milieu des années 1960 et 1970. Les radicaux ont organisé plusieurs manifestations et petites émeutes contre la guerre du Vietnam et contre les États-Unis. Durant cette période, le groupe a commis au moins une douzaine d'attaques contre le gouvernement. Le comble de leur terreur a été lorsque le président du comité d'expropriation de la préfecture de Chiba a été assassiné. Après la fin de la guerre du Vietnam, le parti a perdu la plupart de ses soutiens. Même s’ils ont été actifs et ont organisé de nombreuses manifestations, ils n’ont pratiquement aucune influence dans le nouveau millénaire. Mais une opportunité pourrait ou non se présenter lors de la prochaine crise nationale."
 JAP.anarchist_communism: "£JAP_anarchist_communism Confédération anarchiste"
 JAP.anarchist_communism_icon: "£JAP_anarchist_communism"
 JAP.anarchist_communism_desc: "Le mouvement anarchiste fut actif pour la première fois en 1905. Depuis lors, la nature de son mouvement changea rapidement. Après sa refondation officielle en 1956, le parti a soutenu des manifestations fortement anti-américaines comme les manifestations Anpo. Les membres étaient pour la plupart des étudiants en philosophie des universités qui n'étaient pas satisfaits du système politique et économique actuel du Japon. Dans le Japon du nouveau millénaire, les activités des anarchistes sont presque au point mort, mais nous constatons que l'intérêt pour l'anarchisme augmente à nouveau parmi les jeunes."
 JAP.Neutral_conservatism: "£JAP_Neutral_conservatism Nouveau parti populaire"
 JAP.Neutral_conservatism_icon: "£JAP_Neutral_conservatism"
 JAP.Neutral_conservatism_desc: "Le Nouveau Parti du Peuple est un parti conservateur dissident qui a été formé en réaction à la direction que prenait le PLD. Sous Takeshi Noda, le parti a pour objectif de pousser le pays sur une voie plus à droite ainsi que de promouvoir le patriotisme."
 JAP.Neutral_Communism: "£JAP_Communist_State Parti communiste japonais (démocrate)"
 JAP.Neutral_Communism_icon: "£JAP_Communist_State"
 JAP.Neutral_Communism_desc: "Le Parti communiste japonais (Nihon Kyousan-tou) est l'un des plus grands partis communistes non gouvernementaux au monde. Le parti s’est éloigné des idéaux communistes de l’Union soviétique ou de la Chine et est toujours resté éloigné d’eux. Néanmoins, le parti connaît un déclin constant depuis la chute de l'Union soviétique en 1991. Malgré les réformes et les changements apportés au programme du parti, le parti est en crise. Bien qu'il soit le parti le plus progressiste au Parlement et qu'il soit un membre traditionnel de la démocratie, le peuple japonais ne soutient pas la voie socialiste. Jusqu'à son entrée au gouvernement, le JCP restera l'un des principaux partis d'opposition et surveillera de près ses rivaux."
 JAP.Neutral_green: "£JAP_Neutral_green Verts"
 JAP.Neutral_green_icon: "£JAP_Neutral_green"
 JAP.Neutral_green_desc: "Les Verts sont désormais en train de s'organiser et ne sont pas encore un parti politique mais plutôt un groupe politique même s'ils sont représentés dans certaines gouvernements locaux. Ils veulent sensibiliser le public au changement climatique et ont pour objectif de prévenir la crise climatique à venir. Le Japon est également un pays qui dépend fortement d’une énergie nucléaire dangereuse. Les nombreuses centrales nucléaires pourraient toujours être endommagées par l'un des centaines de tremblements de terre que connaît la région, ce qui pourrait créer une crise majeure dans le pays. Ils croient aux trois principes non nucléaires et feront tout leur possible pour rendre le pays plus vert. Même lorsqu’on n’est pas au gouvernement ou au parlement !"
 JAP.Neutral_Libertarian: "£JAP_Neutral_Libertarian Ligue libérale"
 JAP.Neutral_Libertarian_icon: "£JAP_Neutral_Libertarian"
 JAP.Neutral_Libertarian_desc: "La Ligue libérale est composée principalement d'anciens membres du Parti Nouvelle Frontière et a tenté de contester la majorité du LDP aux côtés du PDJ. Le parti vise à soutenir une idéologie libérale et sociale-libérale. Même si les libéraux soutiennent une politique de libre-échange, ils ont à l’esprit la santé du peuple japonais et les protégeront. Même si cela implique des restrictions commerciales ! À l’heure actuelle, le parti se trouve entre deux idéologies extrêmes et il n’est pas sûr qu’il obtienne davantage d’influence ou qu’il perde le minimum dont il dispose actuellement."
 JAP.neutral_Social: "£JAP_neutral_Social Parti social-démocrate"
 JAP.neutral_Social_icon: "£JAP_neutral_Social"
 JAP.neutral_Social_desc: "Après une réforme du Parti socialiste japonais en 1996, le SDP est devenu un parti de centre-gauche dans le but de créer une opposition au LDP et au PDJ. Dans le débat actuel sur l'article 9, le parti le défend et propose même la suppression du JSDF. Le SDP veut créer un système de protection sociale et de santé solide. La belle nature et la faune du Japon seront mieux protégées grâce à la création de davantage de zones de protection. Le peuple japonais ne sait toujours pas ce qu’il attend de ses forces de défense. En attendant, le SDP est dans une situation difficile, car seule une minorité soutient sa politique."
 JAP.Nat_Populism: "£JAP_Nat_Populism Fête de l'innovation au Japon"
 JAP.Nat_Populism_icon: "£JAP_Nat_Populism"
 JAP.Nat_Populism_desc: "Fondé par Ichirō Matsui, le Parti innovant japonais croit en l'amendement de la Constitution japonaise ainsi qu'en la Cour constitutionnelle et en l'enseignement gratuit obligatoire. Dans les médias, le parti est décrit comme centriste, voire libertaire. Sans position officielle sur l'article 9, le JIP critique la faiblesse des dépenses de défense et soutient l'objectif de 2 % ainsi que la création d'une organisation nationale de renseignement. Le parti influence le peuple japonais pour qu'il vote pour lui en promettant des réductions d'impôts, la création d'un pays numérisé, des avantages sociaux ainsi que des réductions du financement des membres du régime."
 JAP.Nat_Autocracy: "£JAP_Nat_Autocracy Force d'autodéfense japonaise"
 JAP.Nat_Autocracy_icon: "£JAP_Nat_Autocracy"
 JAP.Nat_Autocracy_desc: "Les Forces japonaises d’autodéfense ont été créées en 1954 avec l’aide des États-Unis. Jusqu'au 21ème siècle, les forces d'autodéfense étaient principalement utilisées pour des opérations de secours en cas de catastrophe, ce qui a considérablement amélioré l'image du public japonais. Même s’ils n’ont pas connu la guerre, ils restent l’une des armées les plus professionnelles et les plus modernes au monde. Mais dans le nouveau millénaire, on ne sait pas exactement quel rôle ils joueront dans la société japonaise. L’article 9 sera-t-il réinterprété en leur faveur ou vont-ils bénéficier de davantage de restrictions ?"
 JAP.Nat_Fascism: "£generic_Nat_Fascism_small Fête de la réalisation du bonheur"
 JAP.Nat_Fascism_icon: "£JAP_neutral_conservatism"
 JAP.Nat_Fascism_desc: "Le HRP est un parti étrange centré autour de la religion Happy Science qui s’identifie comme conservateur, mais qui n’a pas de programme clair. Il préconise des incitations à la maternité ainsi que l'immigration afin de relancer la croissance démographique du Japon, ainsi que l'établissement d'une dissuasion nucléaire permettant au Japon de se défendre contre la Chine. La Happy Science en tant que religion présente de nombreuses caractéristiques d'une secte, avec son chef, Ryuho Okawa, vénéré comme une divinité par ses membres."
 JAP.Monarchist: "£JAP_Monarchist Fête de la Restauration - Vent Nouveau"
 JAP.Monarchist_icon: "£JAP_Monarchist"
 JAP.Monarchist_desc: "New Wind est un parti qui souhaite restaurer l’empereur japonais à la plus haute forme d’autorité, au-dessus de toutes les autres entités législatives. Le parti n’a pas d’autre programme majeur, et une fois ses objectifs atteints et la constitution du Japon révisée comme il le souhaite, il ne semble pas avoir d’objectifs à long terme pour rester au pouvoir."

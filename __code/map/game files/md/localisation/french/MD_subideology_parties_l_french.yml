 ALB.Western_Autocracy: "£ALB_western_autocracy PLL - Le Parti du Mouvement de la Légalité"
 ALB.Western_Autocracy_icon: "£ALB_western_autocracy"
 ALB.Western_Autocracy_desc: "Autocratie pro-occidentale - Fondé en 1924, le Partia Lëvizja e Legalitetit (ou Parti du mouvement pour la légalité en français) est un parti monarchiste de droite qui cherche à provoquer le retour au pouvoir de la Maison Zogu. Il est membre du groupe de la Conférence monarchiste internationale."
 ALB.conservatism: "£ALB_western_conservative PDSH - Parti démocratique d'Albanie"
 ALB.conservatism_icon: "£ALB_western_conservative"
 ALB.conservatism_desc: "Conservatisme pro-occidental - Fondé en 1990, le Partia Demokratike e Shqipërisë (ou Parti démocratique d'Albanie en français) est majoritairement composé de dissidents de l'ancien régime communiste d'Enver Hoxha, naturellement anticommunistes par nature, étant associé au $USoE.conservatism_2017$, ils sont pro-européens et pro-UE."
 ALB.liberalism: "£ALB_western_liberal PBDNJ - Parti syndical pour les droits de l'homme"
 ALB.liberalism_icon: "£ALB_western_liberal"
 ALB.liberalism_desc: "Libéralisme - Fondé en 1992, le Partia Bashkimi për të Drejtat e Njeriut (ou Parti de l'unité pour les droits de l'homme en français) est un parti social-libéral qui se concentre sur les intérêts de la minorité grecque. Il travaille souvent aux côtés d'OMONOIA - Union démocratique de la minorité grecque pour promouvoir les intérêts des Grecs de souche en Albanie. Bien qu'il ne soit pas membre ou associé à aucun bloc de vote politique de l'UE, il est pro-européen et pro-UE dans son ensemble."
 ALB.socialism: "£ALB_western_social_democrat PS - Parti socialiste d'Albanie"
 ALB.socialism_icon: "£ALB_western_social_democrat"
 ALB.socialism_desc: "Social-démocratie pro-occidentale - Fondé en 1991, le Partia Socialiste e Shqipërisë (ou Parti socialiste d'Albanie en français) est une réforme sociale-démocrate et le successeur du £generic_Communist_State_small PPSh - Partia e Punës e Shqipërisë. Parti beaucoup plus libéral que son parti d'origine hoxhaiste, il est associé à $USoE.socialism$, ce qui en fait un parti pro-européen et pro-UE dans son ensemble."
 ALB.Communist-State: "£ALB_emerging_communism PKSh - Parti communiste d'Albanie"
 ALB.Communist-State_icon: "£ALB_emerging_communism"
 ALB.Communist-State_desc: "Communisme hoxhaiste - Fondé en 1991, le Partia Komuniste e Shqipërisë (ou Parti communiste d'Albanie en français) est le successeur anti-révisionniste du £generic_Communist_State_small PPSh de l'ère hoxhaiste. Il maintient activement sa pensée marxiste-léniniste et hoxhaiste qui avait autrefois dominé la nation. Interdit en 1992, le parti a été autorisé à fonctionner à nouveau librement en 1998."
 ALB.Neutral_conservatism: "£ALB_non_aligned_conservative PR - Parti républicain d'Albanie"
 ALB.Neutral_conservatism_icon: "£ALB_non_aligned_conservative"
 ALB.Neutral_conservatism_desc: "Conservatisme non aligné - Fondé en 1991, le Parti républicain d'Albanie (Partia Republikane e Shqipërisë) est un parti national-conservateur qui a été fortement influencé par le Parti républicain des États-Unis, qu'il considère comme un modèle politique. En tant que partenaire mondial de $USoE.Neutral_conservatism_2017$, le parti cherche à intégrer l'Union européenne."
 ALB.oligarchism: "£ALB_non_aligned_oligarchism Mafia albanaise"
 ALB.oligarchism_icon: "£ALB_non_aligned_oligarchism"
 ALB.oligarchism_desc: "Oligarchisme - Montrant les premiers signes d'activité en 1990, la Mafia Shqiptare (ou Mafia albanaise en français) s'engage dans diverses activités illégales et clandestines à travers le monde, avec des partenariats de travail avec des organisations allant de la 'Ndrangheta en Italie aux cartels sud-américains et même aussi loin qu'Israël."
 ALB.Neutral_green: "£ALB_non_aligned_greens PAS - Parti agraire d'Albanie"
 ALB.Neutral_green_icon: "£ALB_non_aligned_greens"
 ALB.Neutral_green_desc: "Agrarianisme - Fondé en 1991, le Partia Agrare e Shqipërisë (ou Parti agraire d'Albanie en français) est un parti essentiellement agrarien qui souhaite réformer l'État albanais autour d'un système économique de marché libre, en mettant l'accent sur les intérêts des agriculteurs d'Albanie. Ils penchent généralement vers la gauche et coopèrent régulièrement avec le $ALB.socialism$."
 ALB.neutral_Social: "£ALB_neutral_Social PSD - Parti social-démocrate d'Albanie"
 ALB.neutral_Social_icon: "£ALB_neutral_Social"
 ALB.neutral_Social_desc: "Parti social-démocrate d'Albanie - Fondé en 1991, le Parti social-démocrate d'Albanie (ou Partia Socialdemokrate e Shqipërisë en français) est un parti social-démocrate né à l'époque tumultueuse qui a suivi la chute du régime de Hoxha par un ancien ministre de l'Éducation. Bien que pro-européen, le parti n'est ni membre ni associé d'aucun des différents blocs politiques pro-européens."
 ALB.Nat_Populism: "£ALB_Nat_Populism PBK - Parti du Front national albanais"
 ALB.Nat_Populism_icon: "£ALB_Nat_Populism"
 ALB.Nat_Populism_desc: "Populisme de droite - Fondé en 1989, le Partia Balli Kombëtar Shqiptar (ou Front national albanais en français) est un parti multinational d'extrême droite basé à Tirana, Pristina et Tetovo. Il prône une politique d'irrédentisme albanais pour les Albanais de souche, ses vues anticommunistes allant jusqu'à interdire les anciens communistes et même ceux qui appartiennent à un autre parti."
 ALB.Nat_Fascism: "£ALB_Nat_Fascism PUK - Parti de l'unité nationale"
 ALB.Nat_Fascism_icon: "£ALB_Nat_Fascism"
 ALB.Nat_Fascism_desc: "Ultra-nationaliste - Fondé en 1991, Partia e Unitetit Kombëtar (ou Parti de l'unité nationale en anglais) est un parti politique ultra-nationaliste qui recherche et soutient une confédération pan-albanaise avec le Kosovo et les Albanais de souche en Grèce et en Macédoine."
 ALB.Nat_Autocracy: "£ALB_nationalist_military_junta FARSH - Les forces armées de la République d'Albanie"
 ALB.Nat_Autocracy_icon: "£ALB_nationalist_military_junta"
 ALB.Nat_Autocracy_desc: "Junte militaire - Depuis 1912, les Forces armées albanaises (Forcat e Armatosura të Republikës së Shqipërisë) sont chargées de maintenir l'intégrité territoriale de l'Albanie. Au cours des dernières années du régime hoxhaiste, l'armée a exprimé des inquiétudes quant à la possibilité d'arrêter la décommunisation, et s'est retirée volontairement."
 ALB.Monarchist: "£ALB_nationalist_monarchist Maison de Zogu"
 ALB.Monarchist_icon: "£ALB_nationalist_monarchist"
 ALB.Monarchist_desc: "Monarchisme - Fondée en 1928 en tant que maison royale, la Maison de Zogu est le nom dynastique du Royaume d'Albanie de courte durée de 1928 à 1939, dont le titre fut assumé par le roi d'Italie de l'époque, Victor Emmanuel III. Le titre et la revendication du trône albanais ont depuis été transmis le long de la lignée de l'ancien roi d'Albanie, Zog I."
 ALG.conservatism: "£generic_conservatism_small ANR"
 ALG.conservatism_desc: "L'Alliance nationale républicaine (ANR) est un parti politique algérien résolument anti-islamiste. Elle a dénoncé les accords de Sant'Egidio de 1995, qui constituaient un cadre de paix et un plan pour mettre fin à la guerre civile algérienne, qui a duré de 1991 à 2002. Elle a été créée la même année en 1995 et a obtenu 2 % des voix aux élections législatives de 1997, sans toutefois obtenir de siège. Elle a refusé de participer aux élections législatives de 2002, estimant qu'elles seraient truquées. En 2017, elle a obtenu 6 sièges au parlement avec 1,87 % des voix."
 ALG.liberalism: "£generic_liberalism_small RND"
 ALG.liberalism_desc: "Liberal - Rassemblement National Démocratique (Democratic National Rally) is a populist liberal party. It's centre to centre-right on the political spectrum. It was formed in 1997 and was the strongest party in the same year's legislative elections, but had their worst result in the subsequent election at around 8.2%. Since 2007, it has been steady as the second largest party in parliament. In 1999, president Abdelaziz Bouteflika ran under the RND and won with a staggering 85%. Though many believe that this election was unfair, independent spectators believed it to be fair and democratic. They tried running for president again in 2019, but were defeated at 7.3% of the vote."
 ALG.socialism: "£generic_socialism_small UDR"
 ALG.socialism_desc: "Social Democratic - Union pour la Démocratie et la République (Union for Democracy and the Republic) is a social democratic Berber party in Algeria, that occupies the centre-left on the political spectrum. In 2012, it changed its name to Mouvement Populaire Algérien (Algerian Popular Movement)."
 ALG.socialism_2012: "£generic_socialism_small MPA"
 ALG.socialism_2012_desc: "Social Democratic - Mouvement Populaire Algérien (Algerian Popular Movement) is a social democratic Berber party in Algeria, that occupies the centre-left on the political spectrum. Before 2012, it was known as Union pour la Démocratie et la République (Union for Democracy and the Republic). It got 13 seats in the People's National Assembly in 2017."
 ALG.Autocracy: "£ALG_Autocracy_small FLN"
 ALG.Autocracy_icon: "£ALG_Autocracy_small"
 ALG.Autocracy_desc: "Left Wing Autocrat - Front de libération nationale (National Liberation Front) is an Algerian nationalist party. it was the sole legal party until 1989, when it ruled Algeria as a one-party state. After the Algerian Civil War, it regained power in 2002 as the most popular party and remained it ever since. Its ideology follows a pan-Arab nationalist mindset with anti-colonialism as its original core value. It supports socialism, but particularly Arab socialism, as it opposes marxist ideas."
 ALG.Conservative: "£generic_Conservative_small FNA"
 ALG.Conservative_desc: "Reactionary - Front National Algérien (Algerian National Front) is a national conservative party in Algeria. It was one of the most popular right-wing parties since 2002, but lost all of its seats despite getting 9.5% of the cote in the 2017 legislative elections. It ran for president in 2009 and 2014, but got defeated harshly both times."
 ALG.Caliphate: "£generic_Caliphate_small GSPC"
 ALG.Caliphate_desc: "Salafist Jihadism - Groupe Salafiste pour la Prédication et le Combat (Salafist Group for Preaching and Combat) is an salafi-jihadist terrorist organization in Algerian. t was founded in 1998 by Hassan Hattab, a former commander of the Armed Islamic Group, who protested their massacring of civilians. In 2003, he was deposed in favour of Nabil Sahraoui, who declared the GSPCs allegiance towards al-Qaeda. The group was reported to have anywhere from 100 to 4000 members and carried out five attacks, killing 38 people in the process. In January of 2007, the group renamed itself to al-Qaeda in the Islamic Maghreb."
 ALG.Caliphate_2006: "£generic_Caliphate_small al-Qaeda in the Islamic Maghreb (AQIM)"
 ALG.Neutral_Muslim_Brotherhood: "£muslim_brotherhood_small MSP/Hamas"
 ALG.Neutral_Muslim_Brotherhood_icon: "£muslim_brotherhood_small"
 ALG.Neutral_Muslim_Brotherhood_desc: "Moderate Islamist - Mouvement de la société pour la paix (Movement of Society for Peace) is a right-wing to far-right political party in Algeria. It was founded in 1990 by the Muslim Brotherhood, which it remains aligned with. It is Sunni Islamist and follows islamic, conservative democracy. It had its largest success in the 1997 legislative elections, being the second largest party and getting 69 out of 380 seats. It also ran once in the presidential elections in 1995, getting 25.6% of votes. It entered an electoral coalition with the MRN and MRI in 2012. The party is known also as \"Hamas\", as an abbreviation of its Arabic name \"Harakat mujtama' as-silm\"."
 ALG.Neutral_Autocracy: "£generic_Neutral_Autocracy_small MRN/Islah"
 ALG.Neutral_Autocracy_desc: "Right Wing Islamist - Mouvement pour la réforme nationale (Movement for National Reform) is a right-wing islamic democratic party in Algeria. It was created as a breakout from the Ennahda movement in 2002, after it agreed to cooperate with the government of Algeria. It had initial success in the 2002 elections, but fell in popularity since. It entered the \"Green Alliance\" between it, the MSP and the MRI in the 2012 elections. The name Islah is a short form of its Arabic name of \"Harakat Al-Islah Al-Wataniy\"."
 ALG.Neutral_conservatism: "£generic_Neutral_conservatism_small MRI/Nahda"
 ALG.Neutral_conservatism_desc: "Centrist Islamist - Mouvement de la Renaissance Islamique (Islamic Renaissance Movement) is a moderate islamist Algerian political party, that is classified as centre-right to right-wing. It had its biggest success in the 1997 elections, getting 8.7% of the popular vote, but lost a huge amount of votes in 2002 to the Islah movement, getting just 0.6%. It formed the \"Green Algerian Alliance\" between it, the MSP and Islah. Ennahda (sometimes just \"Nahda\") is the shortened form of its Arabic name, \"Ḥarakat An-Nahḑa Al-Islāmiyya\"."
 ALG.neutral_Social: "£generic_neutral_Social_small FFS"
 ALG.neutral_Social_desc: "Democratic Socialist - Front des Forces socialistes (Socialist Forces Front) is a Berber political party in Algeria. It is social democratic and secularist, occupying the centre-left. It had moderate success across the board, but boycotted the 2002 and 2007 legislative and 2009 presidential elections, due to believing they were rigged to favour the governing parties."
 ALG.Neutral_Communism: "£generic_Neutral_Communism_small Workers' Party"
 ALG.Neutral_Communism_desc: "Communist - Parti des Travailleurs (Worker's Party) is a left-wing trotskyist Algerian Party. It was formed in 1990 and advocates for the protection and promotion of trade unions in Algeria, as well as a better distribution of wealth. Its secretary general Louisa Hanoune was the first woman to run for presidency in Algeria in 2004. It always remained in the top 8 parties in the People's National Assembly since 1997, getting the most votes in 2007 as the fourth most popular party at 5.08%."
 ALG.Nat_Populism: "£generic_Nat_Populism_small FJD"
 ALG.Nat_Populism_desc: "Right Wing Populist - Front pour la justice et le développement (Justice and Development Front) is an islamist political party in Algeria. It is right-wing, nationalist, and follows islamic democracy. It was inspired by Turkey's Justice and Development Party. It had success in an election alliance with Ennahda in 2017, them getting 3.7% of the vote"
 ALG.Nat_Fascism: "£IRQ_Nat_Autocracy_small Arab Socialist Ba'ath Party of Algeria"
 ALG.Nat_Fascism_desc: ""
 ALG.Nat_Autocracy: "£generic_Nat_Autocracy_small Algerian People's National Armed Forces"
 ALG.Nat_Autocracy_desc: "Military Junta - Armée nationale populaire (People's National Army) is the military of Algeria. Ever since Algerias independence in 1962, it had a big role in politics. It practically controlled the government until 1988, when a multi-party system was established. It remains to have influence over Algeria's politics though, with the most recent example being president Abdelaziz Bouteflika abdicating in 2019 after protests led to a loss of support by the military."
 AQY.Caliphate: "£generic_Caliphate_small Al-Qaeda in the Arabian Peninsula"
 AQY.Caliphate_desc: ""
 ARM.conservatism: "£ARM_conservatism Parti conservateur (Arménie)"
 ARM.conservatism_icon: "£ARM_conservatism"
 ARM.conservatism_desc: "Conservateur - Parti conservateur d'Arménie. Le parti soutient le renforcement de la sécurité de l'État arménien, la protection de la langue arménienne, de la culture et des traditions chrétiennes, des droits civiques, de la liberté de conscience et des droits de propriété. En outre, le parti croit au développement d'une démocratie forte, d'une société civile et d'un modèle juridique européen, de relations de bon voisinage et d'un système éducatif et économique hautement développés. Le parti proclame que l'intervention de l'État dans les activités quotidiennes de ses citoyens doit être minimale. Le parti s'oppose au concept d'eurasisme. Le parti cherche également à contrer l'influence russe en Arménie et s'oppose à toute base militaire russe en Arménie ou en Artsakh. Le parti a déclaré que l'influence russe a empêché l'Arménie de développer des liens plus étroits avec l'Union européenne et les États-Unis."
 ARM.liberalism: "£ARM_liberalism Congrès national arménien"
 ARM.liberalism_icon: "£ARM_liberalism"
 ARM.liberalism_desc: "Libéralisme - Congrès national arménien. L'ANC croit au maintien de bonnes relations avec les voisins de l'Arménie, notamment la normalisation des relations avec la Turquie et l'Azerbaïdjan, le développement de relations plus étroites avec le Moyen-Orient, l'autodétermination de la République d'Artsakh, l'encouragement d'une plus grande intégration européenne de l'Arménie et l'approfondissement de la coopération avec l'Union européenne, tout en maintenant des relations solides avec les États-Unis, la Russie et les États membres de la CEI."
 ARM.Neutral_Libertarian: "£ARM_democratic_homeland Parti de la patrie démocratique"
 ARM.Neutral_Libertarian_desc: "Le Parti de la patrie démocratique est un parti politique arménien. Le parti a ensuite rejoint le Congrès national arménien et a participé à un bloc électoral avec lui lors des élections parlementaires arméniennes de 2012. Le Congrès national arménien a remporté 7 sièges à l'Assemblée nationale. Avant les élections de 2012, le Parti de la patrie démocratique craignait que les élections soient truquées et a proclamé que le Parti républicain d'Arménie était une organisation criminelle. Le Parti de la patrie démocratique est finalement devenu sceptique et a quitté le Congrès national arménien. Le parti n'a actuellement aucune représentation à l'Assemblée nationale et agit comme une force extraparlementaire."
 ARM.socialism: "£ARM_socialism L'Arménie lumineuse"
 ARM.socialism_icon: "£ARM_socialism"
 ARM.socialism_desc: "Social-démocrates - Arménie lumineuse. Arménie lumineuse est un parti politique libéral et pro-européen. Edmon Marukyan a appelé à élever les relations avec l'Union européenne au niveau d'un partenariat stratégique. Arménie lumineuse soutient l'adhésion pleine et entière de l'Arménie à l'UE et souhaite entamer sans délai les premières étapes des négociations d'adhésion. Le manifeste du parti stipule que l'Arménie doit faire preuve d'initiative dans les processus et structures paneuropéens, en se présentant comme le véritable porteur des valeurs de la civilisation européenne et de la démocratie. Malgré l'orientation pro-européenne du parti, Arménie lumineuse croit également au maintien d'une coopération positive avec la Russie et à la garantie que les intérêts de l'Arménie ne soient pas compromis en faveur d'autres pays."
 ARM.Communist-State: "£ARM_Communist_State Parti communiste arménien"
 ARM.Communist-State_icon: "£ARM_Communist_State"
 ARM.Communist-State_desc: "Communistes - Parti communiste arménien. L'ACP a été décrit comme résolument pro-russe par Radio Free Europe/Radio Liberty, financée par les États-Unis. Lors d'un rassemblement en 1994, le parti a appelé à une nouvelle union avec la Russie, la qualifiant de seul salut pour l'Arménie. Le parti s'oppose à toute nouvelle intégration européenne de l'Arménie."
 ARM.Conservative: "£ARM_Conservative Kocharyan"
 ARM.Conservative_icon: "£ARM_Conservative"
 ARM.Conservative_desc: "Conservateur émergent - Kotcharian. Robert Sedrakovich Kotcharian est un homme d'État et un homme politique arménien. Il a été le premier président de la République non reconnue du Haut-Karabagh, du 29 décembre 1994 au 20 mars 1997. Il a d'importantes relations dans la politique intérieure du pays, des liens avec la Russie, ainsi que des liens avec le monde criminel."
 ARM.Vilayat_e_Faqih: "£ARM_orderfunny Parti de l'Ordre Arméno-Aryen"
 ARM.Vilayat_e_Faqih_desc: "Parti de l'Ordre Arméno-Aryen Schizophrène Émergent. Nous travaillons pour la restauration de ses caractéristiques et de sa fonctionnalité naturelles, au nom du système de valeurs arménien, pour l'unité de la nation et de la patrie, et sa longévité. Les Aryens arméniens ne sont pas guidés par le principe du « contre quelqu'un »."
 ARM.Conservative2: "£ARM_Conservative_alt Parti républicain d'Arménie"
 ARM.Conservative2_icon: "£ARM_Conservative_alt"
 ARM.Conservative2_desc: "Parti républicain d'Arménie. L'idéologie nationale-conservatrice du Parti républicain est basée sur le tseghakron, une idéologie nationaliste arménienne du début du XXe siècle (que l'on peut traduire approximativement par nation-religion). Elle a été formulée par Garegin Nzhdeh et soutient que l'identité nationale et l'État arméniens doivent avoir une signification religieuse pour tous les Arméniens de souche. Tseghakron signifie littéralement porteur de race, se référant à ceux qui représentent et portent ce qui est l'essence spirituelle et biologique de l'Arménien classique. Cependant, il est souvent interprété à tort comme signifiant race-religion."
 ARM.Nat_Autocracy: "£ARM_Nat_Autocracy Forces armées d'Arménie"
 ARM.Nat_Autocracy_icon: "£ARM_Nat_Autocracy"
 ARM.Nat_Autocracy_desc: "Junte militaire - Les forces armées d'Arménie. Les forces armées d'Arménie (en arménien : Hayastani zinvats uzher), parfois appelées l'armée arménienne (en arménien : Haykakan Banak), sont l'armée nationale d'Arménie. Elle se compose de branches de personnel sous l'état-major général des forces armées arméniennes, qui peuvent être divisées en deux branches générales : les forces terrestres et les forces aériennes et de défense aérienne. Bien qu'elle ait été partiellement formée à partir des anciennes forces de l'armée soviétique stationnées dans la RSS d'Arménie (principalement des unités de la 7e armée de gardes du district militaire de Transcaucasie), l'armée arménienne remonte à la fondation de la Première République d'Arménie en 1918."
 ARM.Nat_Fascism: "£ARM_Nat_Fascism Fédération révolutionnaire arménienne"
 ARM.Nat_Fascism_icon: "£ARM_Nat_Fascism"
 ARM.Nat_Fascism_desc: "Socialistes-nationalistes - Dachnakcutyun. La Fédération révolutionnaire arménienne (également connue sous le nom de Dachnaktsutyun et collectivement appelée Dachnaks en abrégé) est un parti politique nationaliste et socialiste arménien. Fondé en 1890 à Tiflis, dans l'Empire russe (aujourd'hui Tbilissi, en Géorgie) par Christapor Mikaelian, Stepan Zorian et Simon Zavarian. Aujourd'hui, le parti opère en Arménie, en Artsakh, au Liban, en Iran et dans les pays où la diaspora arménienne est présente. Bien qu'il ait longtemps été le parti politique le plus influent de la diaspora arménienne, sa présence est comparativement plus faible dans l'Arménie moderne."
 ARM.Nat_Populism: "£ARM_Nat_Populism Parti pan-arménien Sasna Tsrer"
 ARM.Nat_Populis_icon: "£ARM_Nat_Populism"
 ARM.Nat_Populism_desc: "National-populisme - Parti panarménien Sasna Tsrer. Parfois, Sasna Tser a été dépeint comme un nationaliste extrême. Le chef de facto du parti, Jirair Sefilyan, soutient la création d'une Arménie unie. Ils appellent explicitement à l'unification de la République d'Artsakh (Haut-Karabakh) avec l'Arménie. L'objectif stratégique du parti est d'unir les Arméniens en Arménie et à l'étranger, d'assurer la durabilité de la nation arménienne et son influence mondiale. La politique étrangère du parti est fortement antirusse, avec son manifeste appelant à la libération de l'Arménie du joug colonial russe et au retrait des organisations dirigées par la Russie, notamment l'Union économique eurasienne, l'Organisation du traité de sécurité collective et la CEI. Le parti appelle au retrait immédiat des soldats russes d'Arménie et à la fermeture de la 102e base militaire russe à Gyumri."
 ARM.Monarchist: "£ARM_Monarchist Trône d'Arménie"
 ARM.Monarchist_icon: "£ARM_Monarchist"
 ARM.Monarchist_desc: "Les royalistes - Le trône d'Arménie. Après la chute du Royaume d'Arménie au XVe siècle, de nombreuses dynasties ont prétendu être les véritables héritiers du trône arménien. Mais les deux principaux prétendants sont la Maison de Savoie d'Italie et le nouvel héritier autoproclamé de la dynastie des Bagratuni, Roland von Bagratuni. Les Bagrationis géorgiens, qui sont les véritables descendants de la dynastie des Bagratuni, ont également fait valoir leurs revendications, mais ne sont jamais pris au sérieux en Arménie en raison de leur affiliation avec la Géorgie."
 ARM.oligarchism: "£ARM_Neutral_Libertarian Fête de l'Arménie juste"
 ARM.oligarchism_desc: "Les Libertariens - Une Arménie juste. Le parti croit en la création d'un État fort et influent, en l'amélioration du développement socio-économique, en l'élimination de la corruption politique et de toutes les formes de discrimination, en le renforcement de l'État de droit et de la justice sociale, en la protection de l'environnement, en l'encouragement de l'immigration de la diaspora arménienne et en la lutte pour la reconnaissance internationale de l'Arménie. En ce qui concerne les affaires étrangères, le parti est favorable à l'intégration européenne de l'Arménie, tout en affirmant que l'Arménie doit rester membre de l'Union eurasienne et s'y intégrer davantage. Le parti estime que l'Arménie appartient à la « famille européenne » des États et doit mettre pleinement en œuvre l'accord de partenariat global et renforcé Arménie-UE avec l'UE, tout en maintenant des liens économiques forts avec la Russie."
 ARM.Neutral_Autocracy: "£ARM_Neutral_Autocracy Unité nationale"
 ARM.Neutral_Autocracy_icon: "£ARM_Neutral_Autocracy"
 ARM.Neutral_Autocracy_desc: "Autocrates neutres - Parti de l'unité nationale. Le parti prône le renforcement de l'économie arménienne, la protection des droits des minorités, l'approfondissement de l'intégration européenne tout en maintenant des relations étroites avec les autres membres de la Communauté des États indépendants, en particulier avec la Russie. Le parti croit également au maintien de l'Arménie au sein de l'Organisation du traité de sécurité collective et de l'Union eurasienne, mais aussi à l'approfondissement des relations avec les États-Unis et l'OTAN. Cependant, le parti est opposé au déploiement de forces de maintien de la paix de l'OTAN en Arménie. Le parti croit également à l'établissement de la paix avec les voisins de l'Arménie et à la résolution pacifique du conflit du Haut-Karabakh."
 ARM.Neutral_Muslim_Brotherhood: "£ARM_Neutral_Muslim_Brotherhood Parti libéral démocrate arménien"
 ARM.Neutral_Muslim_Brotherhood_desc: "Ramgavars - Parti Ramgavar. Le parti Ramgavar prône le libéralisme et le capitalisme, contrairement aux deux autres partis politiques arméniens classiques, le Parti social-démocrate Hentchakian et la Fédération révolutionnaire arménienne, qui maintiennent tous deux des idéologies de gauche. Les effectifs actuels du parti sont minimes par rapport aux autres partis traditionnels de la diaspora et de l'Arménie. De plus, bien qu'il dispose d'une base électorale solide, la situation a donné lieu à un débat sur l'existence du parti."
 ARM.Western_Autocracy: "£ARM_Western_Autocracy Union pour l'autodétermination nationale"
 ARM.Western_Autocracy_icon: "£ARM_Western_Autocracy"
 ARM.Western_Autocracy_desc: "Union pour l'autodétermination nationale (en arménien : Azgayin inknoroshum miavorum) est un parti politique arménien. Il a été fondé en 1987 par Paruyr Hayrikyan, un dissident soviétique qui réclamait l'indépendance de l'Arménie. Le parti estime que la région du Caucase, y compris l'Arménie, devrait s'orienter vers l'intégration européenne ainsi que vers une intégration croissante avec les pays occidentaux. Le parti maintient depuis 15 ans la position selon laquelle l'intégration de l'Arménie et de l'Azerbaïdjan dans l'Union européenne rendrait le conflit du Haut-Karabakh insensé, et que l'adhésion à l'UE devrait donc être considérée comme une solution durable au conflit."
 ARM.anarchist_communism: "£ARM_anarchist_communism Parti communiste unifié d'Arménie"
 ARM.anarchist_communism_icon: "£ARM_anarchist_communism"
 ARM.anarchist_communism_desc: "Communistes - Le Parti communiste unifié d'Arménie. Le Parti communiste unifié d'Arménie (HMKK, Hayastani Miatsial Komunistakan Kusaktsutyun) est un parti politique communiste arménien. Il a des liens plus étroits avec le gouvernement que le principal parti communiste arménien et ne rejoint pas les fronts d'opposition. Le HMKK a apporté son soutien à la candidature présidentielle réussie du ministre de la Défense Serge Sarkissian."
 ARM.Autocracy: "£ARM_Autocracy L'Arménie prospère"
 ARM.Autocracy_icon: "£ARM_Autocracy"
 ARM.Autocracy_desc: "Autocratie émergente - Arménie prospère. Idéologiquement, le parti se positionne au centre droit sur l'échiquier politique, prône le libéralisme économique, des liens plus étroits avec la Russie et est eurosceptique en ce qui concerne l'Union européenne, tandis qu'il est traditionaliste sur les questions sociales. Le deuxième président de l'Arménie, Robert Kotcharian, a joué un rôle déterminant dans la création du parti (certains prétendent que Kotcharian l'a lui-même fondé). L'influence et le rôle de Kotcharian au sein du parti font l'objet de débats. En 2012, la plupart des analystes pensaient que Kotcharian était étroitement impliqué dans le parti. Certains pensent que Kotcharian est le chef secret du parti, tandis que d'autres pensent qu'il n'a aucune influence sur le PAP. Le parti maintient une idéologie pro-russe et est le seul parti ouvertement eurosceptique en Arménie. Le parti prône la préservation des valeurs nationales et traditionnelles, des familles et des relations entre l'Église et l'État comme priorités les plus importantes."
 ARM.Neutral_conservatism: "£ARM_Neutral_conservatism Puissante patrie"
 ARM.Neutral_conservatism_icon: "£ARM_Neutral_conservatism"
 ARM.Neutral_conservatism_desc: "Le conservatisme est la puissante patrie. Le parti soutient le renforcement des liens entre l'Arménie et la diaspora arménienne ainsi que le renforcement du développement économique du pays."
 ARM.Neutral_green: "£ARM_Neutral_Green Décision citoyenne"
 ARM.Neutral_green_icon: "£ARM_Neutral_Green"
 ARM.Neutral_green_desc: "Les Démocrates verts - une décision citoyenne. Le parti prône l'État-providence, la redistribution des richesses, l'écologie, la santé universelle, l'éducation gratuite, l'égalité des sexes, le soutien aux syndicats et la démocratie directe. En outre, le parti prône l'autodétermination de la République d'Artsakh, l'instauration de la paix dans la région du Caucase et le maintien de relations neutres avec la Russie. Certains membres du parti ont appelé à la renégociation des accords entre l'Arménie et la Russie, en particulier la présence de la base militaire russe en Arménie."
 ARM.neutral_Social: "£ARM_neutral_Social Parti démocratique d'Arménie"
 ARM.neutral_Social_icon: "£ARM_neutral_Social"
 ARM.neutral_Social_desc: "Le Parti démocratique d'Arménie (en arménien Hayastani Demokratakan Kusaktsutyun) est un parti politique socialiste démocratique d'Arménie. Il a été créé en 1991 par Aram Gaspar Sargsyan, le dernier secrétaire du Parti communiste d'Arménie de l'époque soviétique, lorsque le parti dirigeait la République socialiste soviétique d'Arménie (RSS) de 1920 à 1990. Après la dissolution de l'Union soviétique et de la RSS d'Arménie, le Parti communiste d'Arménie au pouvoir était tombé en grande disgrâce. Son secrétaire en exercice, Aram Gaspar Sargsyan, a dissous le parti et créé le Parti démocratique d'Arménie, se désignant lui-même comme premier secrétaire du nouveau parti. Entre-temps, Ruben Tovmasyan et d'autres membres du parti, clairement défavorables à la décision de Sargsyan de dissoudre le Parti communiste d'Arménie d'origine, ont fondé un nouveau Parti communiste arménien peu de temps après."
 ARM.Neutral_Communism: "£ARM_Neutral_Communism Parti populaire d'Arménie"
 ARM.Neutral_Communism_icon: "£ARM_Neutral_Communism"
 ARM.Neutral_Communism_desc: "Communistes - Parti du peuple d'Arménie. Le Parti du peuple d'Arménie (PPA) (en arménien, Hayastani Zhogovrdakan Kusaktsutyun) est un parti politique socialiste de gauche en Arménie. Il a été fondé en 1998 par le parti soviétique et arménien et homme d'État Karen Demirchyan. Avant les élections parlementaires de 1999, le Parti du peuple d'Arménie a formé une alliance politique avec le Parti républicain d'Arménie, connue sous le nom de Bloc de l'unité."
 AUS.Western_Autocracy: "£generic_Western_Autocracy_small SGA - Schwarz-Gelbe Allianz"
 AUS.Western_Autocracy_desc: "Monarchism - Founded in 2004, the Schwarz-Gelbe Allianz (or Black-Yellow Alliance in English) are a monarchist party who seek to return of a hereditary monarchy to power (preferably the Habsburgs) and naturally advocates for a union of Austria, Hungary, Croatia, the Czech Republic, Slovenia and Slovakia under a common emperor, much like the days under the Austro-Hungarian crown."
 AUS.conservatism: "£AUS_western_conservative ÖVP - Österreichische Volkspartei"
 AUS.conservatism_icon: "£AUS_western_conservative"
 AUS.conservatism_desc: "Pro-Western Conservatism - Founded in 1945 in the wake of WWII, the Österreichische Volkspartei (or Austrian People's Party in English) have been the predominant conservative party within Austria since its liberation from Nazi rule. With a focus on both liberal conservatism and Christian democracy, the party is well suited as a member of both the $USoE.neutral_Social_2017$ and the International Democrat Union."
 AUS.liberalism: "£AUS_western_liberal LIF - Liberales Forum"
 AUS.liberalism_icon: "£AUS_western_liberal"
 AUS.liberalism_desc: "Liberalism - Founded in 1993, the Liberales Forum (or Liberal Forum in English) are a classical liberal party that formed due to a disagreement with the $AUS.Nat_Populism$ over the aforementioned party's right-wing populist sentiment. Alongside environmental protections, the LIF supports privatisation efforts, legalising soft drugs, minority equalities, liberalisation of shopping hours and an increase to the voting age."
 AUS.socialism: "£AUS_western_social_democrat SPÖ - Sozialdemokratische Partei Österreichs"
 AUS.socialism_icon: "£AUS_western_social_democrat"
 AUS.socialism_desc: "Pro-Western Social Democracy - Founded in 1889, the Sozialdemokratische Partei Österreichs (or Social Democratic Party of Austria) is the oldest extant political party in Austria. In its long history it has maintained its social democratic values, a member of both the Progressive Alliance and the Socialist International, they enjoy a global presence, whilst within the EU and Europe they are a part of $USoE.socialism$, making them a very pro-European and pro-EU party."
 AUS.Communist-State: "£generic_Communist_State_small VRAÖ - Vereinigung Revolutionärer Arbeiter Österreichs (Marxisten-Leninisten)"
 AUS.Communist-State_desc: "Marxism-Leninism - Founded in 1968 following a split with the £generic_Communist_State_small Marxistisch-Leninistische Partei Österreichs, the Vereinigung Revolutionärer Arbeiter Österreichs (or Union of Revolutionary Workers of Austria in English) have been stalwarts of Marxism-Leninism within Austria. The party is anti-revisionist and has published monthly magazines on and off since its formation."
 AUS.anarchist_communism: "£AUS_emerging_communism KPÖ - Kommunistische Partei Österreichs"
 AUS.anarchist_communism_icon: "£AUS_emerging_communism"
 AUS.anarchist_communism_desc: "Socialism - Founded in 1918, Kommunistische Partei Österreichs (or Communist Party of Austria) has maintained its relevance within Austria, albeit with very little actual representation nationally. Despite its name and history, the KPÖ has moderated considerably and is deemed to be socialist by many. Internationally it has representation within the IMCWP and within Europe it is a member of the $USoE.Neutral_Communism_2017$."
 AUS.Neutral_conservatism: "£AUS_non_aligned_conservative BZÖ - Bündnis Zukunft Österreich"
 AUS.Neutral_conservatism_icon: "£AUS_non_aligned_conservative"
 AUS.Neutral_conservatism_desc: "National Conservatism - Founded in 2005, Bündnis Zukunft Österreich (or Alliance for the Future of Austria in English) is a splinter group of the $AUS.Nat_Populism$, the splintering occurred due to factions within the FPÖ deeming the \"liberalisation\" process a failure. They seek to take ground from $AUS.conservatism$ by supporting the middle class, free markets and reductions to both the bureaucratic spending and government debt as a whole. The party has a softer stance on immigration than the FPÖ, supporting a \"green card\" system."
 AUS.oligarchism: "£generic_oligarchism_small DU - Die Unabhängigen - Liste Lugner"
 AUS.oligarchism_desc: "Oligarchism - Founded in 1998, Die Unabhängigen - Liste Lugner (or The Independents - Lugner's List), expressly formed so as to satiate Viennese master builder Richard Lugner's political desires, seeks to abolish the Federal Council, enact direct wage subsidisation and wants to enact a policy of conscripting the long-term unemployed."
 AUS.Neutral_Libertarian: "£generic_Neutral_Libertarian_small PIRAT - Piratenpartei Österreichs"
 AUS.Neutral_Libertarian_desc: "Pirate Politics - Founded in 2006, the Piratenpartei Österreichs (or Pirate Party of Austria in English) are a party espousing the viewpoints of pirate politics; general reforms to copyright laws and other forms of legislation meant to make the modern world a more free and open-source one. Along with their internationalist viewpoints, within Europe they are affliated with the $USoE.Neutral_Libertarian_2017$."
 AUS.Neutral_green: "£AUS_non_aligned_greens GRÜNE - Die Grünen - Die Grüne Alternative"
 AUS.Neutral_green_icon: "£AUS_non_aligned_greens"
 AUS.Neutral_green_desc: "Green Politics - Founded in 1986 as Grüne Alternative, known since 1993 as Die Grünen - Die Grüne Alternative (or The Greens - The Green Alternative in English), they have been extremely vocal within Austria's political sphere on issues such as environmental protections, minority rights and socio-ecological tax reform. The party is within both $USoE.Neutral_green_2017$ and $USoE.Neutral_green$ and is such, extremely pro-European and pro-EU."
 AUS.neutral_Social: "£generic_neutral_Social_small EL - Enotna Lista"
 AUS.neutral_Social_desc: "Non-Aligned Social Democracy - Founded in 1973, Enotna Lista (or Unity List in English) is a social democratic party based out of Klagenfurt, seeking to push policies that both benefit and serve the Slovene minority populations around the Carinthian regions. They are a member of the $USoE.neutral_Social_2017$."
 AUS.Neutral_Communism: "£AUS_emerging_left_wing_radical SLP - Sozialistisches LinksPartei"
 AUS.Neutral_Communism_icon: "£AUS_emerging_left_wing_radical"
 AUS.Neutral_Communism_desc: "Trotskyism - Founded in 2000, the Sozialistisches LinksPartei (or Socialist Left Party in English) originated from the Sozialistische Offensive Vorwärts during the 1980s, during protests against $AUS.Nat_Populism$'s participation within the government during 2000, the party became known as what it is today. They are a member of the International Socialist Alternative group and are Eurosceptic in nature, seeing it as a neo-liberal organisation that does not serve the workers and as such seeks an alternative \"Workers' EU\"."
 AUS.Nat_Populism: "£AUS_nationalist_right_wing_populist FPÖ - Freiheitliche Partei Österreichs"
 AUS.Nat_Populism_icon: "£AUS_nationalist_right_wing_populist"
 AUS.Nat_Populism_desc: "Right-Wing Populism - Founded in 1956, the Freiheitliche Partei Österreichs (or Freedom Party of Austria in English) are a right-wing party descended from the original pan-Germanic and national liberal parties. Their first leader was Anton Reinthaller, a former Nazi Minister and SS Officer. Since the 1980s however, a more liberal leadership has seen the party soften their stance on some issues."
 AUS.Nat_Autocracy: "£AUS_nationalist_military_junta Bundesheer"
 AUS.Nat_Autocracy_icon: "£AUS_nationalist_military_junta"
 AUS.Nat_Autocracy_desc: "Military Junta - First extant in 1920, the current form of the Bundesheer (or Federal Army in English) has existed since 1955, in the wake of the reunification of Austria that happened that same year. Its current duties as part of the Österreichische Bundesverfassung (Constitution of Austria) are to protect democratic freedoms, maintain order and to render assistance should a disaster occur."
 AUS.Monarchist: "£AUS_nationalist_monarchist House of Habsburg-Lorraine"
 AUS.Monarchist_icon: "£AUS_nationalist_monarchist"
 AUS.Monarchist_desc: "Monarchy - Founded as a royal house in 1736, the House of Habsburg-Lorraine has ruled over many realms, from the Holy Roman Empire to Belgium, more importantly to the Austrians however, the House of Habsburg-Lorraine once ruled over the Austro-Hungarian empire until its eventual dissolution at the end of WWI."

 AFG.liberalism_2017: "£AFG_liberalism_2017 Basej-e Milli"
 AFG.liberalism_2017_desc: "L'Afghanistan Green Trend, également connu sous le nom de Rawand-e Sabz-e Afghanistan (Tendance verte afghane), est un parti politique nationaliste afghan anti-taliban et pro-démocratie. Fondé par l'ancien chef des services de renseignements afghans Amrullah Saleh, le mouvement a débuté comme un effort populaire de promotion de la démocratie et d'opposition aux talibans."
 AFG.socialism: "£generic_socialism_small Hezb-e Muttrqa-e Dimukratik"
 AFG.socialism_desc: ""
 AFG.Western_Autocracy: "£AFG_western_autocracy Indépendants afghans"
 AFG.Western_Autocracy_desc: "Les Afghans indépendants regroupent un groupe de candidats qui se présentent sans affiliation politique et qui sont généralement associés aux institutions occidentales. Ils sont connus pour être parfois corrompus et autocratiques."
 AFG.Communist-State: "£AFG_communist_state Hezb-e Komunist"
 AFG.Communist-State_desc: ""
 AFG.anarchist_communism: "£AFG_anarchist_communism Hezb-e Muttahed-e Melli"

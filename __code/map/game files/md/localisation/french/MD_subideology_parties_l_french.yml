 SEL.Neutral_Autocracy_1: "£SEL_neutral_autocracy Séléka"
 SEL.Neutral_Autocracy_1_desc: "Séléka is an alliance of rebel militia groups in the Central African Republic. The group primarily draws its strength from the Muslim populations of the country and was formed from the \"Fundamental\" splinter group of the Convention of Patriots for Justice and Peace (CPJP) and the Patriotic Convention for Saving the Country (CPSK). It would then incorporate a multitude of other rebel groups with the most notable of the additions being the Union of Democratic Forces for Unity (UFDR) led by Michel Djotodia who would become the leader of the group in the Central African Republic Civil War."
 SEL.Neutral_Autocracy_2: "£SEL_neutral_autocracy ex-Séléka"
 SEL.Neutral_Autocracy_2_desc: "ex-Séléka is the successor coalition of Séléka. It encompasses a group of several splinter groups that openly fought against Anti Balaka, a series of Christian Militias, and the government who did not agree to the dissolution of Séléka by President Michel Djotodia."

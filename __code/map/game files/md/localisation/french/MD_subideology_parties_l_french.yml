 SWE.conservatism: "£SWE_western_conservative Moderaterna"
 SWE.conservatism_icon: "£SWE_western_conservative"
 SWE.conservatism_desc: "Conservateur - Moderata Samlingspartiet (Parti de l'unité modérée) est un parti libéral-conservateur qui s'est historiquement présenté comme l'antithèse des sociaux-démocrates suédois, prônant le libre marché et la baisse des impôts. Cependant, il s'est de plus en plus rapproché du centre politique, prônant la préservation du modèle de protection sociale suédois."
 SWE.liberalism: "£SWE_western_liberal Folkpartiet"
 SWE.liberalism_icon: "£SWE_western_liberal"
 SWE.liberalism_desc: ""
 SWE.liberalism_2017: "£SWE_western_liberal_2017 Liberalerna"
 SWE.liberalism_2017_icon: "£SWE_western_liberal_2017"
 SWE.liberalism_2017_desc: ""
 SWE.socialism: "£SWE_western_social_democrat Socialdemokraterna"
 SWE.socialism_icon: "£SWE_western_social_democrat"
 SWE.socialism_desc: "Le Parti social-démocrate des travailleurs de Suède (Sveriges Socialdemokratiska Arbetareparti) a toujours été le parti le plus important et le plus influent de Suède, n'ayant recueilli que moins de 40 % des voix lors d'une seule élection entre 1932 et 1994. En façonnant la Suède moderne et en construisant le modèle suédois de protection sociale et de coopération entre syndicats et secteur privé, il s'est récemment éloigné du socialisme démocratique pour se placer au centre de la politique suédoise, suivant l'exemple du New Labour de Tony Blair."
 SWE.Communist-State: "£SWE_emerging_communism Les communistes"
 SWE.Communist-State_icon: "£SWE_emerging_communism"
 SWE.Communist-State_desc: ""
 SWE.anarchist_communism: "£SWE_non_aligned_socialist_democrat Le parti de gauche"
 SWE.anarchist_communism_icon: "£SWE_non_aligned_socialist_democrat"
 SWE.anarchist_communism_desc: "Le Parti de gauche (Vänsterpartiet) était considéré comme un parti communiste jusqu'en 1990, adhérant à une doctrine d'eurocommunisme. Depuis lors, le parti a connu un afflux important de nouveaux électeurs, le Socialdemokraterna ayant évolué vers la droite, laissant plus de place à un parti socialiste d'extrême gauche. Le Vänsterpartiet a, en plus du socialisme, adopté le féminisme. Il est opposé à l'Union européenne et prône un embargo sur Israël."
 SWE.Neutral_conservatism: "£SWE_non_aligned_conservative Les démocrates-chrétiens"
 SWE.Neutral_conservatism_icon: "£SWE_non_aligned_conservative"
 SWE.Neutral_conservatism_desc: ""
 SWE.oligarchism: "£SWE_non_aligned_oligarchism La fête du centre"
 SWE.oligarchism_icon: "£SWE_non_aligned_oligarchism"
 SWE.oligarchism_desc: "Parti agraire - Centerpartiet (Parti du centre). Parti traditionnellement rural et agarien, le Centerpartiet a été un élément régulier de tous les gouvernements suédois non socialistes. Le parti a de plus en plus promu des valeurs libérales-conservatrices, tout en soutenant la décentralisation du pouvoir."
 SWE.Neutral_Libertarian: "£SWE_non_aligned_libertarian Le Parti Pirate"
 SWE.Neutral_Libertarian_icon: "£SWE_non_aligned_libertarian"
 SWE.Neutral_Libertarian_desc: "Le Parti pirate (Piratpartiet) est un parti syncrétique qui se consacre à la démocratie électronique, à la réforme des droits d'auteur et aux libertés civiles. Il a été fondé par Piratbyrån, le groupe suédois à l'origine du site Web de torrent The Pirate Bay, le premier du genre au monde."

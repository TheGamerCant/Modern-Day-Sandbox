 GUA.conservatism: "£generic_conservatism_small PAN"
 GUA.conservatism_desc: "Conservateur - Le Partido de Avanzada Nacional (Parti de l'Avancement National) est un parti conservateur de droite au Guatemala. Le parti a été fondé en 1989 et a remporté les élections présidentielles de 1995. Il était également le parti le plus fort lors des élections législatives de la même année. Après cela, il a commencé à se laisser distancer par des partis plus forts, perdant des voix presque à chaque élection suivante."
 GUA.liberalism: "£generic_liberalism_small Parti Patriote"
 GUA.liberalism_desc: "Parti libéral - Le Partido Patriota (Parti patriotique) était un parti libéral conservateur fondé en 2001. Il a connu d'énormes succès lors des élections de 2007 et 2011, mais a perdu beaucoup de soutien par la suite, jusqu'à sa dissolution définitive en 2017. En 2011, il était le parti le plus fort au Congrès avec 56 sièges sur 158."
 GUA.socialism: "£generic_socialism_small UNE"
 GUA.socialism_desc: "L'Unité nationale de l'espoir (UNIE) est un parti social-démocrate du Guatemala. Il se définit également comme social-chrétien et populiste. Après sa fondation en 2002, il a connu un énorme succès aux élections générales de 2003 et a été le plus grand parti au parlement en 2019 et 2007, où il a également remporté l'élection présidentielle. Le parti a remporté le premier tour des élections présidentielles de 2019, mais a perdu au deuxième tour face au candidat de Vamos."
 GUA.Communist-State: "£generic_Communist_State_small URNG-MAIZ"
 GUA.Communist-State_desc: "L'Unité révolutionnaire nationale guatémaltèque (UNG) est un parti communiste du Guatemala. Il défend diverses idéologies, notamment le marxisme-léninisme, le chavisme, le bolivarisme et le populisme. Le parti a été fondé en 1982, mais n'a réussi à entrer au parlement qu'en 2003. Depuis lors, il est toujours resté dans la tranche inférieure des 10 % des voix, ne dépassant jamais 4 %. En 2011 et 2015, il s'est présenté dans une coalition électorale avec Winaq."
 GUA.anarchist_communism: "£generic_anarchist_communism_small Alliance de la Nouvelle Nation"
 GUA.anarchist_communism_desc: "L'Alianza Nueva Nación (Alliance de la nouvelle nation) était un parti politique de gauche. Il est entré au Congrès guatémaltèque en 1999 en tant que troisième parti le plus populaire. Après cela, il a continuellement perdu des voix et a finalement été contraint de se dissoudre en 2007 en raison d'un manque de voix conformément à la loi électorale guatémaltèque."
 GUA.anarchist_communism_2007: "£generic_anarchist_communism_small Winaq"
 GUA.anarchist_communism_2007_desc: "Le parti radical de gauche Winaq a été fondé en 2007 et est un parti socialiste démocratique au Guatemala. Il a ses racines dans les communautés indigènes du Guatemala et milite pour l'égalité entre les ethnies à l'intérieur du pays. Le nom « Winaq » est le mot quiche pour « peuple », les K'iche' étant un peuple amérindien, descendant des Mayas. Ils se sont d'abord présentés dans une coalition avec l'URNG-MAIZ, mais ont quitté la coalition pour les élections de 2019, où ils l'ont dépassé en termes de voix et de sièges."
 GUA.Conservative: "£generic_Conservative_small Parti unioniste"
 GUA.Conservative_desc: "Le Parti unioniste réactionnaire est un parti politique conservateur, nationaliste de droite et libéral sur le plan économique. Son objectif principal est la recréation d'une union centraméricaine. Il a d'abord connu un succès marginal avec plus de 6 %, mais sa popularité a chuté après 2007. Il faisait partie d'une coalition électorale avec Compromiso, Renovación y Orden (CREO) en 2015."
 GUA.Neutral_conservatism: "£generic_Neutral_conservatism_small LIDER"
 GUA.Neutral_conservatism_desc: "Le parti conservateur neutre Libertad Democrática Renovada (Liberté démocratique renouvelée) était un parti de centre-droit de courte durée au Guatemala. Il s'est séparé du parti UNE en 2010 et a connu un premier succès aux élections de 2011, obtenant près de 9 % des voix. Lors des élections suivantes, il a réussi à plus que doubler ses résultats avec près de 19 %. Il a été interdit en 2016 en raison de violations constantes de la loi électorale et des partis politiques. Il aurait également des liens étroits avec des groupes de trafiquants de drogue."
 GUA.Neutral_conservatism_2017: "£generic_Neutral_conservatism_small Vamos"
 GUA.Neutral_conservatism_2017_desc: "Le parti conservateur neutre Vamos est un parti politique conservateur du Guatemala. Il a été fondé en 2017 et est rapidement devenu le deuxième plus grand parti en 2019 et a également remporté le deuxième tour des élections présidentielles la même année. Il est socialement conservateur et économiquement libéral. Son nom officiel complet est « Vamos por una Guatemala Diferente », ce qui signifie littéralement « Nous allons vers un Guatemala différent »."
 GUA.Neutral_Libertarian: "£generic_Neutral_Libertarian_small UCN"
 GUA.Neutral_Libertarian_desc: "Nationaliste - L'Union du changement national (Unión del Cambio Nacional) est un parti nationaliste guatémaltèque. Il a été fondé en 2006 et a obtenu de bons résultats, obtenant plus de 4 % des voix aux élections générales de 2007 et près de 10 % en 2011. Il a légèrement baissé mais est resté au-dessus de 5 % depuis lors."
 GUA.Neutral_green: "£generic_Neutral_green_small Todos"
 GUA.Neutral_green_desc: "Centriste - Todos est un parti politique centriste du Guatemala. Il est nationaliste et défend la démocratie chrétienne et l'humanisme, ainsi que l'économie sociale de marché. Il a été formé après qu'un groupe de députés de l'UNE a quitté le parti et formé une faction gouvernementale connue sous le nom de « Cravates violettes » en raison de leur tenue vestimentaire. Au milieu de l'année 2012, ils ont rejoint les Verts, qui ont changé de nom et de logo et sont devenus « Todos » (qui signifie « Tous » ou « Tout le monde »). Le parti est devenu le troisième plus grand parti en 2015, mais a perdu aux élections suivantes avec moins de la moitié de ses sièges précédents."
 GUA.neutral_Social: "£generic_neutral_Social_small Encuentro"
 GUA.neutral_Social_desc: "Social Democratic - Encuentro por Guatemala (Rencontre pour le Guatemala/Ensemble pour le Guatemala) était un parti social-démocrate du Guatemala. Il défendait avec force les droits des peuples autochtones comme philosophie principale. Son logo représente les quatre groupes autochtones du Guatemala, les Mayas, les Garifunas, les Xincas et les Ladinos, tous réunis. Ils ont connu un succès d'environ 6 % de 2007 à 2015, mais ont perdu durement en 2019, ce qui a conduit à leur dissolution en 2020."
 GUA.Neutral_Communism: "£generic_Neutral_Communism_small MLP"
 GUA.Neutral_Communism_desc: "Le Mouvement communiste pour la libération des peuples (MovP) est un parti indigéniste du Guatemala. Il a été créé en affirmant que Winaq et l'URNG ne représentaient pas les peuples autochtones. Il a été formé fin 2016 mais n'a été légalisé que deux ans plus tard. Lors des élections de 2019, il a obtenu plus de 10 % des voix présidentielles, mais seulement environ 3 % des voix au Congrès."
 GUA.Nat_Populism: "£generic_Nat_Populism_small MLN"
 GUA.Nat_Populism_desc: "Le Mouvement de libération nationale (Movimiento de Liberación Naciona) était un parti politique d'extrême droite au Guatemala. Il a été fondé en 1954 sous le nom de Movimiento Democratico Nacional (Mouvement démocratique national). Le coup d'État de 1963 a fait du MLN la principale plate-forme politique de l'armée. Il a également été classé comme populiste de droite, agrarien, conservateur et libéral sur le plan économique. Il a été dissous en 1999 après avoir perdu tous ses sièges au Congrès lors des élections de cette année-là."
 GUA.Nat_Populism_2008: "£generic_Nat_Populism_small FCN"
 GUA.Nat_Populism_2008_desc: "Le Front de convergence nationale (Front de convergence nationale) est un parti populiste de droite au Guatemala. Fondé en 2008 par des officiers de l'armée à la retraite, il est nationaliste, conservateur sur le plan national et social, anticommuniste et socialiste. Il n'a pas connu de succès lors de ses premières élections en 2011, n'obtenant que 0,5 %, mais a gagné en popularité, obtenant 9 %. En 2019, il a de nouveau perdu une grande majorité de ses sièges."
 GUA.Nat_Fascism: "£generic_Nat_Fascism_small FRG"
 GUA.Nat_Fascism_desc: "Extrême droite - Le Frente Republicano Guatemalteco (Front républicain guatémaltèque) était un parti politique d'extrême droite. Il est conservateur, républicain et anticommuniste, ainsi que populiste de droite. Il a été créé en 1989 par l'ancien président et dictateur du Guatemala Efrain Ríos Montt. Il a connu un énorme succès dans les années 90, étant de loin le plus grand parti en 1999 avec 42 %. Ses votes ont cependant été divisés par deux lors des deux élections suivantes, jusqu'à ce qu'ils atteignent moins de 3 % en 2011. En 2015, il n'a pas réussi à remporter de sièges et s'est dissous plus tard dans l'année. En 2013, il a changé de nom pour devenir le PRI."
 GUA.Nat_Fascism_2013: "£generic_Nat_Fascism_small PRI"
 GUA.Nat_Fascism_2013_desc: "Extrême droite - Le Parti républicain institutionnel (Partido Republicano Institucional) était un parti politique d'extrême droite. Il est conservateur, républicain et anticommuniste, ainsi que populiste de droite. Il a été créé en 1989 par l'ancien président et dictateur du Guatemala Efrain Ríos Montt. Il a connu un énorme succès dans les années 90, étant de loin le plus grand parti en 1999 avec 42 %. Ses votes ont cependant été divisés par deux lors des deux élections suivantes, jusqu'à ce qu'ils atteignent moins de 3 % en 2011. En 2015, il n'a pas réussi à remporter de sièges et s'est dissous plus tard dans l'année. Avant 2013, il était connu sous le nom de FRG."
 GUA.Nat_Autocracy: "£generic_Nat_Autocracy_small Forces armées du Guatemala"
 GUA.Nat_Autocracy_desc: ""
 GUA.oligarchism: "£generic_oligarchism_small Los Huistas (LH)"
 GUA.oligarchism_desc: ""
 GUB.socialism: "£generic_socialism_small PRS"
 GUB.socialism_desc: "Le Parti social-démocrate - Partido da Renovaçao Social (Parti du renouveau social) est un parti social-démocrate de Guinée-Bissau."
 GUB.neutral_Social: "£generic_neutral_Social_small Madem G-15"
 GUB.neutral_Social_desc: "Social Democratic - Movimento Para Alternância Democrâtica (Mouvement pour l'alternative démocratique) est un parti social-démocrate de Guinée-Bissau."
 GUB.Communist-State: "£GUB_emerging_left_wing_radical PAIGC (Ligne dure)"
 GUB.Communist-State_icon: "£GUB_emerging_left_wing_radical"
 GUB.Communist-State_desc: "Le Parti africain pour l'indépendance de la Guinée et du Cap-Vert (PCIG) a été fondé à l'origine pour faire campagne pacifiquement en faveur de l'indépendance du pays vis-à-vis du Portugal. Le parti s'est tourné vers le conflit armé dans les années 1960 et a été l'un des belligérants de la guerre d'indépendance de la Guinée-Bissau. Vers la fin de la guerre, le parti a établi un État à parti unique marxiste-léniniste avant l'instauration de la démocratie au début des années 1990."
 GUB.anarchist_communism: "£GUB_emerging_left_wing_radical PAIGC (Modéré)"
 GUB.anarchist_communism_icon: "£GUB_emerging_left_wing_radical"
 GUB.anarchist_communism_desc: "Le Parti africain pour l'indépendance de la Guinée et du Cap-Vert (Parti africain pour l'indépendance de la Guinée et du Cap-Vert) a été créé à l'origine pour faire campagne pacifiquement en faveur de l'indépendance du Portugal. Le parti s'est tourné vers le conflit armé dans les années 1960 et a été l'un des belligérants de la guerre d'indépendance de la Guinée-Bissau. Vers la fin de la guerre, le parti a établi un État à parti unique marxiste-léniniste avant l'instauration de la démocratie au début des années 1990."
 GUB.Nat_Autocracy: "£generic_Nat_Autocracy_small FARP"
 GUB.Nat_Autocracy_desc: "Junte militaire - Forces armées révolutionnaires du peuple"
 GUI.Western_Autocracy: "£generic_Western_Autocracy_small Union pour le progrès et le renouveau"
 GUI.liberalism: "£generic_liberalism_small Union des Forces Démocratiques de Guinée"
 GUI.Neutral_Autocracy: "£generic_Neutral_Autocracy_small Parti de l'unité et du progrès"
 GUI.neutral_Social: "£generic_neutral_Social_small Rassemblement du peuple guinéen"
 GUY.conservatism: "£GUY_western_conservative Force unie"
 GUY.conservatism_icon: "£GUY_western_conservative"
 GUY.conservatism_desc: "Conservateur - La Force unie est un parti guyanais socialement conservateur. Il est libéral sur le plan économique, suit un sentiment antirusse et est idéologiquement de centre-droit. Il a été formé en 1960 et a continué à se présenter jusqu'aux élections de 2015. Cependant, après 1968, il n'a plus jamais dépassé les 5 % des voix, mais est resté l'un des plus grands petits partis."
 GUY.liberalism: "£GUY_western_liberal Alliance pour le changement"
 GUY.liberalism_icon: "£GUY_western_liberal"
 GUY.liberalism_desc: "L'Alliance pour le changement est un parti politique social-libéral. Il a été fondé en 2005 par trois députés qui ont quitté leurs partis précédents. Il est progressiste et multiracial et occupe une position de centre à centre-gauche. Après sa fondation, il a été continuellement le troisième plus grand parti au parlement. Depuis 2015, il se présente sur une liste unique avec l'APNU."
 GUY.socialism: "£GUY_western_social_democrat Congrès national du peuple"
 GUY.socialism_icon: "£GUY_western_social_democrat"
 GUY.socialism_desc: "Le Parti social-démocrate - Congrès national du peuple-Réforme est un parti social-démocrate du Guyana. Il est également classé comme un parti socialiste démocratique et était autrefois nationaliste et populiste de gauche. Il occupe l'aile centre-gauche de la politique. Il a été fondé en 1957 et est depuis lors l'un des deux grands partis du Guyana, avec le PPP/C. Il est principalement soutenu par les Afro-Guyanais. En 2011, il a formé une alliance électorale avec plusieurs autres partis appelée Partenariat pour l'unité nationale."
 GUY.socialism_2011: "£GUY_western_social_democrat_alt APNU"
 GUY.socialism_2011_icon: "£GUY_western_social_democrat_alt"
 GUY.socialism_2011_desc: "Le Parti social-démocrate - Partenariat pour l'unité nationale a été formé en 2011 pour les élections de la même année par dix partis différents, le Congrès national du peuple étant le plus important et le plus populaire. Il est principalement composé de partis de gauche. En 2011, ils ont formé une coalition avec l'AFC. Ils ont obtenu la majorité des sièges, mais le PPP/C était finalement le plus grand parti au total, ce qui signifie qu'ils ont remporté la présidence. Aux élections suivantes, l'APNU et l'AFC se sont présentés ensemble sur une seule liste, ce qui signifie qu'ils pouvaient se présenter à la présidence en tant qu'entité unique."
 GUY.anarchist_communism: "£GUY_anarchist_communism PPP/C"
 GUY.anarchist_communism_icon: "£GUY_anarchist_communism"
 GUY.anarchist_communism_desc: "Communiste - Le Parti progressiste populaire/Civique est l'un des deux grands partis politiques du Guyana. Il a été créé en 1950 à la suite de la fusion du Parti travailliste de la Guyane britannique et du Comité des affaires politiques. Depuis sa création, il est resté soit le plus grand, soit le deuxième parti guyanais. Il est multiethnique, mais sa base électorale est principalement composée d'Indo-Guyanais. Il est de centre-gauche à gauche et suit une idéologie de social-démocratie, de socialisme démocratique et de populisme de gauche. Dans le passé, il était classé comme nationaliste de gauche et marxiste-léniniste."
 GUY.Neutral_conservatism: "£GUY_non_aligned_conservative ROAR"
 GUY.Neutral_conservatism_icon: "£GUY_non_aligned_conservative"
 GUY.Neutral_conservatism_desc: "Le parti conservateur neutre Rise Organise and Rebuild Guyana est un parti conservateur du Ghana. Il a été le premier parti à se considérer comme un parti ethnique, étant un parti indo-guyanais. Il a été créé en 1999 et a obtenu de mauvais résultats aux élections de 2001. Par la suite, il a formé une alliance avec le GAP et a connu un succès légèrement supérieur, avant que nombre de ses membres ne partent pour l'AFC en 2011 avant les élections de cette année-là."
 GUY.neutral_Social: "£GUY_neutral_Social WPA"
 GUY.neutral_Social_icon: "£GUY_neutral_Social"
 GUY.neutral_Social_desc: "Le Parti socialiste démocrate - L'Alliance des travailleurs est un parti de gauche guyanais. Il a été créé en 1974 en tant qu'alliance de trois partis de gauche et a été officiellement déclaré parti à part entière en 1979. Il a eu peu de succès dans l'ensemble, obtenant ses meilleurs résultats aux élections de 2001, où il s'est présenté aux côtés du GAP."
 GUY.Neutral_Communism: "£GUY_Neutral_Communism GAP"
 GUY.Neutral_Communism_icon: "£GUY_Neutral_Communism"
 GUY.Neutral_Communism_desc: "Communiste - Le Guyana Action Party est un parti politique de gauche du Guyana. Il représente la population amérindienne indigène du pays. Il a été fondé en 1989, mais s'est présenté pour la première fois en 2001, dans le cadre d'une alliance avec la WPA. En 2006, il s'est allié au ROAR et en 2011, il a rejoint l'APNU."
 GUY.Nat_Populism: "£GUY_Nat_Populism Parti républicain uni"
 GUY.Nat_Populism_icon: "£GUY_Nat_Populism"
 GUY.Nat_Populism_desc: "Populiste de droite - Le Parti républicain uni a été fondé en 1985 aux États-Unis, avant d'être lancé en Guyane en 1987. En 1992, il n'a pas réussi à remporter un seul siège. Il n'a recommencé à se présenter aux élections qu'à partir de 2015, avec très peu de succès malgré tout. Il souhaite, entre autres, améliorer le niveau de vie et l'éducation en Guyane."
 GUY.Nat_Autocracy: "£GUY_Nat_Autocracy Forces de défense de la Guyane"
 GUY.Nat_Autocracy_icon: "£GUY_Nat_Autocracy"
 GUY.Nat_Autocracy_desc: ""
 GUY.oligarchism: "£GUY_non_aligned_oligarchism La bande d'Agricola-Buxton (ABG)"
 GUY.oligarchism_icon: "£GUY_non_aligned_oligarchism"
 GUY.oligarchism_desc: ""
 HAI.conservatism: "£HAI_western_conservatives RDNP - Rassemblement des Démocrates Nationaux Progressistes"
 HAI.conservatism_desc: "Le Rassemblement des Démocrates Nationaux Progressistes (ou Rassemblement des Démocrates Nationaux Progressistes en français) est l'un des plus anciens partis politiques encore en activité en Haïti. Fondé en 1979, il a été autorisé à se présenter aux élections en 1987, peu après la chute du deuxième régime de Duvalier.\n\nIl est membre de l'Internationale Démocrate Centriste et de l'Organisation Démocrate Chrétienne d'Amérique."
 HAI.liberalism: "£HAI_western_liberalism  PHTK - Pati Ayisyen Tèt Kale"
 HAI.liberalism_desc: "Libéralisme - Le Pati Ayisyen Tèt Kale (ou Parti Chauve Haïtien en français) est un parti libéral issu d'une scission du RP en août 2012. Bien que Michel Martelly n'ait jamais été membre du PHTK, il a maintenu des liens étroits avec le parti RP."
 HAI.socialism: "£HAI_western_socialism  FL - Fanmi Lavalas"
 HAI.socialism_desc: "Le populisme social-démocrate - Fanmi Lavalas (ou Famille Lavalas en français) est un parti nommé d'après le mouvement politique Lavalas popularisé par la campagne présidentielle de 1990 de Jean-Bertran Aristide, officiellement issu de la scission de l'Òganizasyon Pèp k ap Lite (OPL) en 1996.\n\nLe parti est bien connu pour maintenir une politique de « croissance et d'équité », recherchant les principes sociaux-démocrates d'Europe occidentale tout en refusant les souhaits du FMI de mettre en œuvre des mesures d'austérité."
 HAI.Communist-State: "£HAI_communist_state  NPCH(ML) - Nouveau Parti Communiste Haïtien (Marxiste-Léniniste)"
 HAI.Communist-State_desc: "Le communisme marxiste-léniniste - Le Nouveau Parti Communiste Haïtien (Marxiste-Léniniste) (ou New Haitian Communist Party (Marxist-Leninist) en anglais) est un parti fondé en 2000, le parti accueille un mélange général de marxistes-léninistes, de maoïstes et de staliniens.\n\nIls sont largement considérés comme anti-révisionnistes et sont les descendants idéologiques du Parti Unifié des Communistes Haïtiens, un ancien parti communiste réprimé et finalement exilé sous le règne de François \"Papa Doc\" Duvalier et de son fils Jean-Claude \"Baby Doc\" Duvalier."
 HAI.anarchist_communism: "£HAI_anarchist_communists PPD - Platfòm Pitit Desalin"
 HAI.anarchist_communism_desc: "Dessalinisme - Platfòm Pitit Desalin (ou Plateforme des enfants de Dessalines en français) est un parti socialiste démocratique fondé en décembre 2014 et fortement influencé par les grands principes économiques dessalinistes.\n\nLe parti tire son nom du premier dirigeant d'Haïti après la révolution, Jean-Jacques Dessalines (Jan-Jak Desalin en haïtien). Après avoir interdit l'esclavage de manière permanente, Dessalin a placé toute la production et la transformation des cultures commerciales sous le contrôle du nouveau gouvernement haïtien, s'engageant dans des politiques très protectionnistes pour protéger les intérêts économiques haïtiens. Il n'était généralement pas contre les investissements étrangers, seulement ceux en provenance de France."
 HAI.Neutral_conservatism: "£HAI_neutral_conservatives MCNH - Mouvement Chrétien pour une Nouvelle Haïti"
 HAI.Neutral_conservatism_desc: "Le Mouvement Chrétien pour une Nouvelle Haïti (ou Mouvement Chrétien pour une Nouvelle Haïti en anglais) est un parti démocrate chrétien de centre droit, fondé en 1991 par un conglomérat d'églises protestantes évangéliques en Haïti.\n\nIl a fallu attendre 1999 pour que les autorités électorales reconnaissent le parti comme candidat officiel aux élections."
 HAI.Neutral_green: "£HAI_neutral_green RP - Repons Peyizan"
 HAI.Neutral_green_desc: "Le parti agrarien Repons Peyizan (ou Réponse paysanne en français) est un parti fondé en juillet 2010 en réponse au tremblement de terre qui a dévasté le pays cette année-là. Sa fondation a été rendue possible grâce à Michel Martelly, un musicien Kompa plus connu sous son nom de scène Sweet Micky qui a officiellement rejoint la sphère politique après que les difficultés qui ont suivi la catastrophe ont aggravé les conditions de vie dans le pays."
 HAI.neutral_Social: "£HAI_neutral_socialist OPL - Òganizasyon Pèp k ap Lite"
 HAI.neutral_Social_desc: "Social Democratic - Òganizasyon Pèp k ap Lite (ou Organisation du peuple en lutte en français) est un parti politique fondé en 1991 pendant le mouvement Lavalas.\n\nBien que le parti soit sous l'égide de la social-démocratie, il soutient les mesures de privatisation et d'austérité économique comme moyen de revitaliser l'économie haïtienne en difficulté, ce qui a conduit à la scission idéologique de l'OPL et de la FL en 1996."
 HAI.Nat_Populism: "£HAI_nationalist_populism AAA - Ayiti an Aksyon"
 HAI.Nat_Populism_desc: "Le nationalisme fédéraliste - Ayiti an Aksyon (ou Haïti en action en français) est un parti à la fois nationaliste et fédéraliste. Fondé en 2005, il cherchait à obtenir le contrôle régionaliste et l'autodétermination du département de Latibonit. Le parti a commencé à militer pour la décentralisation et le fédéralisme dans son ensemble peu de temps après."
 HAI.Nat_Fascism: "£HAI_nationalist_fascism PUN - Parti de l'Unité Nationale"
 HAI.Nat_Fascism_desc: "Le Parti de l'Unité Nationale (ou National Unity Party en anglais) est un parti fondé en 1957 comme parti nationaliste anti-américain et haïtien sous François « Papa Doc » Duvalier.\n\nAu fur et à mesure que le règne de Papa Doc se poursuivait, le parti est devenu de plus en plus autoritaire, utilisant son redoutable Tonton Macoute pour écraser toute opposition. Papa Doc Duvalier a un jour utilisé le Tonton Macoute pour rechercher et tuer tous les chiens noirs, croyant que l'ancien chef du Tonton Macoute Clément Barbot s'était transformé en chien noir."
 HAI.Nat_Autocracy: "£HAI_nationalist_junta FAd'H - Forces Armées d'Haïti"
 HAI.Nat_Autocracy_desc: "Régime militaire - Forces Armées d'Haïti (ou Forces Armées d'Haïti en anglais) est le titre officiel de l'armée haïtienne, elle a été suspendue puis dissoute en 1995 en raison de la prévalence des coups d'État et des tentatives de coup d'État au sein du haut commandement militaire."
 HEZ.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small Hezbollah"
 HEZ.Vilayat_e_Faqih_desc: ""
 HKG.conservatism: "£HKG_conservatism Parti démocrate"
 HKG.conservatism_desc: "Centriste - Le Parti démocrate était le plus grand parti de la première législature élue de Hong Kong en 1995. C'est l'un des partis pan-démocrates les plus modérés, cherchant un compromis avec Pékin d'une manière qui a aliéné certains de ses anciens partisans."
 HKG.liberalism: "£generic_liberalism_small Parti des citoyens"
 HKG.liberalism_desc: "Parti libéral - Le Parti des citoyens, comme les autres membres du camp pro-démocratie, prône le suffrage universel et la protection des libertés individuelles. Ce qui le distingue est son souci de la protection de l'environnement et des droits des minorités."
 HKG.liberalism_2006: "£HKG_liberalism_2006 Parti civique"
 HKG.liberalism_2006_desc: "Libéral - Le Parti civique est un parti pro-démocratie traditionnel fondé par un groupe d'avocats qui se concentre sur les questions du suffrage universel, des libertés civiles et de l'état de droit."
 HKG.socialism: "£generic_socialism_small La Frontière"
 HKG.socialism_desc: "Le parti social-démocrate d'Emily Lau, Frontier, est un parti pro-démocratie plus radical que certains autres pan-démocrates, appelant à une nouvelle constitution pour remplacer la Loi fondamentale."
 HKG.socialism_2006: "£generic_socialism_small Ligue des sociaux-démocrates(LSD)"
 HKG.socialism_2006_desc: "Social-démocrate - L'alliance Ligue des sociaux-démocrates est un parti « démocrate progressiste » qui, contrairement aux autres partis pan-démocrates, s'associe étroitement à un programme d'action de rue."
 HKG.socialism_2016: "£generic_socialism_small Le pouvoir populaire – Ligue des sociaux-démocrates(PP-LSD)"
 HKG.socialism_2016_desc: "L'alliance Social-Démocrate - Pouvoir populaire - Ligue des sociaux-démocrates est une combinaison de deux partis « démocrates progressistes » qui, contrairement aux autres partis pan-démocrates, s'associent étroitement à un programme d'action de rue."
 HKG.Communist-State: "£HK_PLA Garnison de l'Armée populaire de libération de Hong Kong"
 HKG.Communist-State_icon: "£HK_PLA"
 HKG.Communist-State_desc: "Communiste - La garnison de l'APL à Hong Kong a pour mission de maintenir la défense de la Région administrative spéciale. Bien que la Loi fondamentale interdise à la garnison d'intervenir dans les affaires locales, elle peut être appelée à rétablir l'ordre public si le gouvernement de Hong Kong le lui demande."
 HKG.Conservative: "£HKG_Conservative Alliance démocratique pour l'amélioration de Hong Kong(DAB)"
 HKG.Conservative_desc: "Conservateur - Le DAB est le principal parti pro-Pékin au Conseil législatif, et continue de soutenir l'intégration avec la Chine continentale. Le parti a également adopté une position sociale conservatrice, s'opposant au mariage homosexuel et entretenant des liens étroits avec des organisations chrétiennes évangéliques."
 HKG.Autocracy: "£HKG_Autocracy Le Nouveau Parti Populaire(NPP)"
 HKG.Autocracy_desc: "Conservateur - Le Nouveau Parti du Peuple est largement considéré comme un véhicule électoral pour l'éminente politicienne pro-Pékin, Regina Ip. Son plaidoyer en faveur de la législation sur la sécurité nationale et ses affirmations selon lesquelles des puissances étrangères ont utilisé les médias sociaux pour interférer dans les manifestations ont fait d'elle une figure controversée."
 HKG.anarchist_communism: "£HKG_anarchist_communism Fédération des syndicats de Hong Kong(HKFTU)"
 HKG.anarchist_communism_desc: "Radicalisme de gauche – La Fédération des syndicats de Hong Kong a longtemps été étroitement associée au PCC en Chine. Le syndicat a joué un rôle majeur dans les émeutes de 1967 contre les autorités coloniales britanniques et maintient aujourd’hui sa position pro-Pékin et ouvrière qui le distingue à la fois des pan-démocrates anti-Pékin et des autres partis pro-Pékin plus bourgeois."
 HKG.Neutral_conservatism: "£generic_Neutral_conservatism_small Le chemin de la démocratie"
 HKG.Neutral_conservatism_desc: "Centriste – Chemin de la démocratie est un petit parti centriste qui se présente comme au-dessus de la distinction binaire entre le camp pro-Pékin et les pan-démocrates. Il prône une approche de compromis entre les deux camps, mais ne recueille que relativement peu de soutiens dans cette entreprise."
 HKG.Neutral_Libertarian: "£generic_Neutral_Libertarian_small Troisième côté"
 HKG.Neutral_Libertarian_desc: "Le Libertarian - Third Side est un petit parti centriste qui se présente comme au-dessus de la distinction binaire entre le camp pro-Pékin et les pan-démocrates. Il prône une approche de compromis entre les deux camps, mais ne recueille que relativement peu de soutiens dans cette entreprise."
 HKG.oligarchism: "£generic_oligarchism_small Parti libéral"
 HKG.oligarchism_desc: "Oligarchique - Le Parti libéral est un parti politique favorable aux entreprises et conservateur sur le plan social. Bien qu'appartenant au camp pro-Pékin, le parti n'a pas toujours été sur la même longueur d'onde que ses prétendus alliés, s'opposant ouvertement au gouvernement à plusieurs reprises."
 HKG.Neutral_green: "£generic_Neutral_green_small Parti vert de Hong Kong"
 HKG.Neutral_green_desc: "Verts - Le Parti vert de Hong Kong est un petit parti écologiste aux idéaux de gauche. Il est membre de la Fédération des Verts d'Asie-Pacifique."
 HKG.Nat_Populism: "£generic_Nat_Populism_small Les localistes"
 HKG.Nat_Populism_desc: "Populisme nationaliste – Les localistes sont un groupe politique qui regroupe un large éventail de partis différents, unis par leur désir d’autodétermination à Hong Kong. Des groupes comme Youngspiration, Demosisto et le Hong Kong National Party se sont fait connaître lors des manifestations de 2014 à Hong Kong et représentent un nouveau type de politique hongkongaise, plus radical et plus populiste, entaché de controverses. Certains localistes prônent la préservation de la culture unique de Hong Kong, d’autres des restrictions sur le tourisme et l’immigration en provenance du continent. Certains des localistes les plus extrêmes prônent l’indépendance ou même un retour temporaire au régime britannique comme mesure transitoire. Quoi qu’il en soit, ils sont considérés avec admiration par une proportion importante de jeunes et avec une désapprobation frisant le dégoût par le segment plus âgé de la population."

 BHR.neutral_Social: "£generic_neutral_Social_small Société nationale d'action démocratique"
 BHR.neutral_Social_desc: "Socialisme - La Société nationale d'action démocratique, familièrement connue sous le nom de Wa'ad, est issue du Front populaire de libération de Bahreïn, un groupe marxiste et nationaliste arabe. Wa'ad a depuis modéré son approche, poussant à une réforme démocratique à Bahreïn plutôt qu'à une révolution marxiste. Le parti bénéficie d'un certain soutien au sein de la classe ouvrière bahreïnienne et est l'un des quatre principaux partis d'opposition."
 BHR.Communist-State: "£generic_Communist_State_small Tribune Démocratique Progressiste"
 BHR.Communist-State_desc: ""
 BHR.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small Haq"
 BHR.Vilayat_e_Faqih_desc: "Islamiste chiite (ligne dure) - Le mouvement Haq est un groupe dissident de la ligne dure du Wefaq qui bénéficie du soutien des chiites bahreïnis déçus par le manque de succès de l'approche modérée de Wefaq en matière de réforme. Ces partisans sont souvent des jeunes chiites qui ont parfois constitué de petits gangs qui lancent des pierres et des cocktails Molotov sur les policiers. Contrairement au Wefaq, le mouvement Haq soutient la chute de la dynastie al Khalifa et l’établissement d’une république bahreïnite."
 BHR.Conservative: "£generic_Conservative_small Al Wefaq"
 BHR.Conservative_desc: "Shia Islamist (Moderate) - Al Wefaq is one of the largest parties in Bahrain and is viewed as representing the interests of the majority Shia Arab population. It has been the most powerful voice calling for political reform in Bahrain, and has therefore been a major thorn in the side of the Bahraini monarchy. Despite representing the interests of Bahrain's Shia population, al Wefaq has been careful to distance itself from Iran and has employed moderate rhetoric and methods to achieve its goals."
 BHR.Mod_Vilayat_e_Faqih: "£generic_Mod_Vilayat_e_Faqih_small Amal Party"
 BHR.Mod_Vilayat_e_Faqih_desc: "Shia Islamist (Shirazi) - The Amal Party, also known as the Islamic Action Society, is al Wefaq's smaller, Shirazi counterpart. It represents the interests of Shia followers of Mohammad Hussaini Shirazi, a prominent Shia figure who came to reject the Islamic Republic of Iran's form of government. Doctrinal differences with al Wefaq has led to friction between the two parties, despite their shared opposition to the al Khalifa dynasty."
 BHR.Kingdom: "£generic_Kingdom_small Al-Asalah Islamic Society"
 BHR.Kingdom_desc: "Salafism - Al-Asalah is a Salafist political party that is popular among Bahrain's Sunni conservatives. It has historically allied itself with Al-Menbar to counter the influence of Bahrain's Shia Islamists."
 BHR.Caliphate: "£generic_Caliphate_small Al-Qaeda"
 BHR.Caliphate_desc: ""
 BHR.Neutral_Muslim_Brotherhood: "£muslim_brotherhood_small Al-Menbar Islamic Society"
 BHR.Neutral_Muslim_Brotherhood_desc: "Moderate Islamism - Al-Menbar is the Bahraini branch of the Muslim Brotherhood, an organization that favors the gradual Islamization of society and popular participation in politics through democratic means. Al-Menbar occasionally aligns itself with the Salafi Al Asalah but is generally less socially conservative."
 BHR.Nat_Fascism: "£IRQ_Nat_Autocracy_small Nationalist Democratic Assembly"
 BHR.Nat_Fascism_icon: "£IRQ_Nat_Autocracy_small"
 BHR.Nat_Fascism_desc: "Baasisme - L'Assemblée nationale démocratique est la branche bahreïnite de la faction irakienne du parti Baas, qui reste favorable à l'Irak de Saddam Hussein. Le parti s'oppose à la naturalisation des travailleurs migrants et favorise la priorité accordée aux Bahreïniens de souche pour l'emploi."

 SWE.Nat_Populism_2017_desc: "Populiste de droite - Sverigedemokraterna (Démocrates de Suède). Tout en émergeant comme un mouvement fasciste et nationaliste blanc, le parti a progressivement modéré et expulsé nombre de ses sympathisants nazis et fascistes. Le parti est fermement opposé à toute immigration et est eurosceptique."

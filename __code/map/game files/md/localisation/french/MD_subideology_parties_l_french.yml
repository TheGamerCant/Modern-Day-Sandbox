 AFG.Conservative: "£AFG_conservative Junbish-i-Milli"
 AFG.Conservative_desc: "Parti politique turc fondé par le maréchal Abdul Rashid Dostum en 1992, composé d'anciens communistes et islamistes. À l'origine une force d'autodéfense pour les champs pétroliers du nord de l'Afghanistan, le Junbish est devenu une force militaire et politique majeure, dominant le nord avec une forte base électorale ouzbèke. Bien que laïc et de gauche, le parti est tristement célèbre pour son rôle dans les violations des droits de l'homme pendant la guerre civile afghane et pour ses alliances changeantes, notamment une alliance temporaire avec les talibans à la fin des années 1990."

 USoE.Western_Autocracy: "£EU_parliament_PG_Western_Autocracy (APWA) - Alliance des autocrates pro-occidentaux"
 USoE.Western_Autocracy_icon: "£EU_parliament_PG_Western_Autocracy"
 USoE.Western_Autocracy_desc: "(Western Autocracy) - Alliance of Pro-Western Autocracy (APWA)\nThe Alliance of Pro-Western Autocrats is a relatively new party on the grand scale of the European Parliament. It maintains a foreign policy of being Western-aligned with autocratic characteristics."
 USoE.conservatism: "£EU_parliament_PG_conservatism (EPP-ED) - Parti populaire européen et Démocrates européens"
 USoE.conservatism_icon: "£EU_parliament_PG_conservatism"
 USoE.conservatism_desc: "(Conseravtism) - European People's Party and European Democrats (EPP-ED)\n\nThe European People's Party and European Democrats (EPP-ED) was born from the merge of the European People's Party, composed primarily by Christian Democrats, and the European Democrat Union, composed of conservatives with a more eurosceptic approach. It's political agenda is focused on respect for traditions and guaranteeing individual social and economical freedoms, and values to pursue with the help of individual responsibility without disregarding the environment and with an eye to the public budget. "
 USoE.conservatism_2017: "£EU_parliament_PG_2017_conservatism (EPP) - Parti populaire européen"
 USoE.conservatism_2017_icon: "£EU_parliament_PG_2017_conservatism"
 USoE.conservatism_2017_desc: "(Conseravtism) - European People's Party (EPP)\n\nThe European People's Party (EPP), formerly known as 'European People's Party and European Democrats', occupies the center-right of the USoE Parliament and is mainly composed of conservatives and Christian democrats. It's political agenda is focused on respect of traditions and guaranteeing individual social and economical freedoms, and values to pursue with the help of individual responsibility without disregarding the environment and with an eye to the public budget."
 USoE.liberalism: "£EU_parliament_PG_liberalism (ELDR) - Parti européen des libéraux démocrates et réformateurs"
 USoE.liberalism_icon: "£EU_parliament_PG_liberalism"
 USoE.liberalism_desc: "(Liberalism) - European Liberal Democrat and Reform Party (ELDR)\n\nThe ELDR, formerly known as 'Liberal and Democratic Reformist Group', occupies the center-left of the USoE parliament and is mainly composed of liberals. It's political agenda is focused on guaranteeing social and economic individual freedom protecting the environment and diminishing the government's role in the economy."
 USoE.liberalism_2017: "£EU_parliament_PG_2017_liberalism (ALDE) - Parti de l'Alliance des démocrates et des libéraux pour l'Europe"
 USoE.liberalism_2017_icon: "£EU_parliament_PG_2017_liberalism"
 USoE.liberalism_2017_desc: "(Liberalism) - Alliance of Liberals and Democrats for Europe Party (ALDE)\n\nThe Alliance of Liberals and Democrats for Europe Party (ALDE), formerly known as 'European Liberal Democrat and Reform Party', occupies the center-left of the USoE parliament and is mainly composed of liberals. It's political agenda is focused on guaranteeing social and economic individual freedom protecting the environment and diminishing the government's role in the economy."
 USoE.socialism: "£EU_parliament_PG_socialism (PES) - Parti des socialistes européens"
 USoE.socialism_icon: "£EU_parliament_PG_socialism"
 USoE.socialism_desc: "(Social Democrats) - Party of European Socialists (PES)\n\nThe Party of European Socialists (PES) occupies the left portion of the USoE parliament and is mainly composed of liberal socialists. It's political agenda is focused on fighting poverty and inequality, guaranteeing social and workers' rights and protecting the environment. It aims to pursue these goals with progressive taxation and moderately higher government intervention while still recognizing the importance of economic freedoms and free trade."
 USoE.socialism_2017: "£EU_parliament_PG_2017_socialism (PES) - Parti des socialistes européens"
 USoE.socialism_2017_icon: "£EU_parliament_PG_2017_socialism"
 USoE.socialism_2017_desc: "(Social Democrats) - Party of European Socialists (PES)\n\nThe PES occupies the left portion of the USoE parliament and is mainly composed of liberal socialists. It's political agenda is focused on fighting poverty and inequality, guaranteeing social and workers' rights and protecting the environment. It aims to pursue these goals with progressive taxation and moderately higher government intervention while still recognizing the importance of economic freedoms and free trade."
 USoE.Communist-State: "£EU_parliament_PG_Communist_State (AoC) - Alliance des communistes"
 USoE.Communist-State_icon: "£EU_parliament_PG_Communist_State"
 USoE.Communist-State_desc: "(Marxist-Leninist) - Alliance of Communists\n\nThe Alliance of Communists (AoC) occupies the far left of the Parliament of the USoE and is mainly composed of communists. It believes in the necessity of replacing capitalism in favor of an economic system where all means of production are owned by the state. It aims to achieve true Socialism with a revolution, violent if necessary, to overthrow the current system, and accept the necessity of a transitional period where the power is held by a dictatorship."
 USoE.Communist-State_2017: "£EU_parliament_PG_2017_Communist_State (INITIATIVE) - Initiative des partis communistes et ouvriers"
 USoE.Communist-State_2017_icon: "£EU_parliament_PG_2017_Communist_State"
 USoE.Communist-State_2017_desc: "(Marxist-Leninist) - The Initiative of Communist and Workers' Parties (INITIATIVE) occupies the far left of the Parliament of the USoE and is mainly composed of communists. It believes in the necessity of replacing capitalism in favor of an economic system where all means of production are owned by the state. It aims to achieve true Socialism with a revolution, violent if necessary, to overthrow the current system, and accept the necessity of a transitional period where the power is held by a dictatorship."
 USoE.anarchist_communism: "£EU_parliament_PG_anarchist_communism (EACL) - Gauche anticapitaliste européenne"
 USoE.anarchist_communism_icon: "£EU_parliament_PG_anarchist_communism"
 USoE.anarchist_communism_desc: "(Left-Wing Radical) - European Anti-Capitalist Left (EACL)\n\nThe European Anti-Capitalist Left (EACL) is a far-left party in the USoE Parliament and is mainly composed of moderate communists. It believes in the necessity of replacing capitalism in favour of an economic system where all means of production are owned by the people. It aims to achieve true Socialism with a democratic and reform-based approach."
 USoE.anarchist_communism_2017: "£EU_parliament_PG_2017_anarchist_communism Maintenant le peuple !"
 USoE.anarchist_communism_2017_icon: "£EU_parliament_PG_2017_anarchist_communism"
 USoE.anarchist_communism_2017_desc: "(Left-Wing Radical) - Now the People! (NP)\n\nNow the People! (NP) is a far-left party in the USoE Parliament and is mainly composed of moderate communists. It believes in the necessity of replacing capitalism in favour of an economic system where all means of production are owned by the state. It aims to achieve true Socialism with a democratic and reform-based approach."
 USoE.Conservative: "£EU_parliament_PG_Conservative (AoR) - Alliance des réactionnaires"
 USoE.Conservative_icon: "£EU_parliament_PG_Conservative"
 USoE.Conservative_desc: "(Reactionary) - Alliance of Reactionaries (AoR)\n\nThe Alliance of Reactionaries (AoR) is a far-right, eurosceptic and nationalist party that seeks to undo the Union and restore Nations based on ethnic groups. It's political views are focused on defending traditions, rejecting immigration and fighting globalization."
 USoE.Conservative_2017: "£EU_parliament_PG_2017_Conservative (AENM) - Alliance des mouvements nationaux européens"
 USoE.Conservative_2017_icon: "£EU_parliament_PG_2017_Conservative"
 USoE.Conservative_2017_desc: "(Reactionary) - Alliance of European National Movements (AENM)\n\nThe Alliance of European National Movements (AENM) is a far-right, eurosceptic and nationalist party that seeks to undo the Union and restore Nations based on ethnic groups. It's political views are focused on defending traditions, rejecting immigration and fighting globalization."
 USoE.Autocracy: "£EU_parliament_PG_Autocracy (AoA) - Alliance des autocrates"
 USoE.Autocracy_icon: "£EU_parliament_PG_Autocracy"
 USoE.Autocracy_desc: "(Emerging Autocrats) - Alliance of Autocrats (AoA)\n\nThe Alliance of Autocrats encompasses a group and new phenonemon with the United States of Europe to move towards Russia and China but with a new method of governance. They focus and campaign on a more autocratic form of government where the state is above all and the people are to be loyal to such."
 USoE.Mod_Vilayat_e_Faqih: "£EU_parliament_PG_Mod_Vilayat_e_Faqih (AoMSR) - Alliance des révolutionnaires chiites modérés"
 USoE.Mod_Vilayat_e_Faqih_icon: "£EU_parliament_PG_Mod_Vilayat_e_Faqih"
 USoE.Mod_Vilayat_e_Faqih_desc: "(Moderate Shiite Revolutionaries) - Alliance of Moderate Shiite Revolutionaries (AoMS)\n\nThe Alliance of Moderate Shiite Revolutionaries (AoMS) is a more moderate version of their sister party the Alliance of Hardline Shiite Revolutionarties seeking to install Shia policy into the government of the United States of Europe without being as fundamentalist and is more open to various lines of thought."
 USoE.Vilayat_e_Faqih: "£EU_parliament_PG_Vilayat_e_Faqih (AoHSR) - Alliance des révolutionnaires chiites radicaux"
 USoE.Vilayat_e_Faqih_icon: "£EU_parliament_PG_Vilayat_e_Faqih"
 USoE.Vilayat_e_Faqih_desc: "(Hardline Shiite Revolutionaries) - Alliance of Hardline Shiite Revolutionaries (AoHSR)\n\nThe Alliance of Hardline Shiite Revolutionaries (AoHSR) represents the Shiite interests of those who closely align with more radical Shiite revoltuionaries. They believe int he radical change of the party towards the Shia way of life and are willing to take any measure to achieve this goal."
 USoE.Kingdom: "£EU_parliament_PG_Kingdom (AoWM) - Alliance des monarchistes wahhabites"
 USoE.Kingdom_icon: "£EU_parliament_PG_Kingdom"
 USoE.Kingdom_desc: "(Wahhabist Monarchism) - Alliance of Wahhabi Monarchist (AoWM)\n\n"
 USoE.Caliphate: "£EU_parliament_PG_Caliphate (AoSJ) - Alliance du djihadisme salafiste"
 USoE.Caliphate_icon: "£EU_parliament_PG_Caliphate"
 USoE.Caliphate_desc: "(Salafist Jihadist) - Alliance of Salafi Jihadist (AoSJ)\n\n"
 USoE.Neutral_Muslim_Brotherhood: "£EU_parliament_PG_Neutral_Muslim_Brotherhood (AoMI) - Alliance des islamistes modérés"
 USoE.Neutral_Muslim_Brotherhood_icon: "£EU_parliament_PG_Neutral_Muslim_Brotherhood"
 USoE.Neutral_Muslim_Brotherhood_desc: "(Moderate Islamists) - Alliance of Moderate Islamist (AoMI)\n\n"
 USoE.Neutral_Autocracy: "£EU_parliament_PG_Neutral_Autocracy (AoNA) - Alliance des autocrates non alignés"
 USoE.Neutral_Autocracy_icon: "£EU_parliament_PG_Neutral_Autocracy"
 USoE.Neutral_Autocracy_desc: "(Neutral Autocrats) - Alliance of Non-Aligned Aurocrats (AoNA)\n\n"
 USoE.Neutral_conservatism: "£EU_parliament_PG_Neutral_conservatism (UEN) - Union pour l'Europe des Nations"
 USoE.Neutral_conservatism_icon: "£EU_parliament_PG_Neutral_conservatism"
 USoE.Neutral_conservatism_desc: "(Neutral Conservatism) - Union for Europe of the Nations (UEN)\n\nThe UEN, formerly known as 'Union for Europe', is a right-wing eurosceptic conservative party. It seeks to decentralize the USoE and form a confederation of sovereign Nations in its place. It has a conservative stance on social rights and it supports a free market capitalist system economically."
 USoE.Neutral_conservatism_2017: "£EU_parliament_PG_2017_Neutral_conservatism (ACRE) - Alliance des conservateurs et des réformistes en Europe"
 USoE.Neutral_conservatism_2017_icon: "£EU_parliament_PG_2017_Neutral_conservatism"
 USoE.Neutral_conservatism_2017_desc: "(Neutral Conservatism) Alliance of Conservatives and Reformists in Europe (ACRE)\n\nThe Alliance of Conservatives Reformists in Europe (ACRE), formerly known as 'Alliance of European Conservatives and Reformists', is a right-wing eurosceptic conservative party. It seeks to decentralize the USoE and form a confederation of sovereign Nations in its place. It has a conservative stance on social rights and it supports a free market capitalist system economically."
 USoE.oligarchism: "£EU_parliament_PG_oligarchism (AoO) - Alliance des oligarques"
 USoE.oligarchism_icon: "£EU_parliament_PG_oligarchism"
 USoE.oligarchism_desc: "(Oligarchism) - Alliance of Oligarchs (AoO)\n\n"
 USoE.Neutral_Libertarian: "£EU_parliament_PG_Neutral_Libertarian (AoL) - Alliance des libertariens"
 USoE.Neutral_Libertarian_icon: "£EU_parliament_PG_Neutral_Libertarian"
 USoE.Neutral_Libertarian_desc: "(Libertarian) - Alliance of Libertarian (AoL)\n\nThe Alliance of Libertarians (AoL) is a libertarian party that supports limited intervention of the government in the economy and in the life choices of individuals, believing instead that the role of the government is to provide a safe environment for business and individuals to thrive freely. It's political agenda is focused on reaping the advantages of the Internet in issues like direct democracy, freedom of expression and copyright."
 USoE.Neutral_Libertarian_2017: "£EU_parliament_PG_2017_Neutral_Libertarian (PPEU) - Parti Pirate Européen"
 USoE.Neutral_Libertarian_2017_icon: "£EU_parliament_PG_2017_Neutral_Libertarian"
 USoE.Neutral_Libertarian_2017_desc: "(Libertarian) - European Pirate Party (PPEU)\n\nThe PPEU is a libertarian party that supports limited intervention of the government in the economy and the life choices of individuals, believing instead that the role of the government is to provide a safe environment for business and individuals to thrive freely. It's political agenda is focused on reaping the advantages of the Internet in issues like direct democracy, freedom of expression and copyright."
 USoE.Neutral_green: "£EU_parliament_PG_Neutral_Green (Greens/EFA) - Les Verts/Alliance libre européenne"
 USoE.Neutral_green_icon: "£EU_parliament_PG_Neutral_Green"
 USoE.Neutral_green_desc: "(Greens) - The Greens/European Free Alliance (Greens/EFA)\n\nThe Greens/European Free Alliance (Greens/EFA), commonly known as 'Greens', is a left-wing party. Its economic view rejects capitalism and the research of constant growth, believing instead in the necessity of a 'happy degrowth'. It strongly opposes nuclear power as a source of clean energy, believing instead in the necessity of temporarily building gas-fired power plants to support a future full renewable energy transition. It's political agenda is focused on reducing inequality and protecting the environment and it aims to do so with large deficit-funded public spending."
 USoE.Neutral_green_2017: "£EU_parliament_PG_2017_Neutral_green (EGP) - Parti vert européen"
 USoE.Neutral_green_2017_icon: "£EU_parliament_PG_2017_Neutral_green"
 USoE.Neutral_green_2017_desc: "(Greens) - European Green Party (EGP)\n\nThe European Green Party (EGP), commonly known as 'Greens', is a left-wing party. Its economic view rejects capitalism and the research of constant growth, believing instead in the necessity of a 'happy degrowth'. It strongly opposes nuclear power as a source of clean energy, believing instead in the necessity of temporarily building gas-fired power plants to support a future full renewable energy transition. It's political agenda is focused on reducing inequality and protecting the environment and it aims to do so with large deficit-funded public spending."
 USoE.neutral_Social: "£EU_parliament_PG_neutral_Social (ASD) - Alliance des Démocrates Socialistes"
 USoE.neutral_Social_icon: "£EU_parliament_PG_neutral_Social"
 USoE.neutral_Social_desc: "(Non-Aligned Socialist Democrats) - Alliance of Socialist Democrats (ASD)\n\nThe Alliance of Socialist Democrats (ASD) is a left-wing party of the USoE Parliament, it advocates for a higher degree of democratic representation based on regional identity, aiming to shape the USoE into a 'Europe of Regions'. Its political agenda is focused on social justice and economical equality."
 USoE.neutral_Social_2017: "£EU_parliament_PG_2017_neutral_Social Alliance libre européenne (EFA)"
 USoE.neutral_Social_2017_icon: "£EU_parliament_PG_2017_neutral_Social"
 USoE.neutral_Social_2017_desc: "The EFA is a left-wing party of the USoE Parliament, it advocates for a higher degree of democratic representation based on regional identity, aiming to shape the USoE into a 'Europe of Regions'. Its political agenda is focused on social justice and economical equality."
 USoE.Neutral_Communism: "£EU_parliament_PG_Neutral_Communism (GUE/NGL) - Gauche unitaire européenne/Gauche verte nordique"
 USoE.Neutral_Communism_icon: "£EU_parliament_PG_Neutral_Communism"
 USoE.Neutral_Communism_desc: "(Neutral Marxist-Leninist) - European United Left/Nordic Green Left (GUE/NGL)\n\nThe European United Left/Nordic Green Left (GUE/NGL) is a left-wing political party of the USoE Parliament. It is mainly composed of socialists and communists and as such it rejects capitalism and traditional monetarist and budget policies. It aims to achieve a shift in society towards Socialism but does not have a clear position on whether reform or revolution is the best way to achieve it. It's opposed to USoE cooperation with the USA and instead believes that Europe should pursue its own way."
 USoE.Neutral_Communism_2017: "£EU_parliament_PG_2017_Neutral_Communism (PEL) - Parti de la gauche européenne"
 USoE.Neutral_Communism_2017_icon: "£EU_parliament_PG_2017_Neutral_Communism"
 USoE.Neutral_Communism_2017_desc: "(Neutral Marxist-Leninist) - Pary of the European Left (PEL)\nParty of the European Left (PEL) is a left-wing political party of the USoE Parliament. It is mainly composed of socialists and communists and as such it rejects capitalism and traditional monetarist and budget policies. It aims to achieve a shift in society towards Socialism but does not have a clear position on whether reform or revolution is the best way to achieve it. It's opposed to USoE cooperation with the USA and instead believes that Europe should pursue its own way."
 USoE.Nat_Populism: "£EU_parliament_PG_Nat_Populism (EDD) - L'Europe des démocraties et des diversités"
 USoE.Nat_Populism_icon: "£EU_parliament_PG_Nat_Populism"
 USoE.Nat_Populism_desc: "(Right-Wing Populism) - Europe of Democracies and Diversities (EDD)\n\nThe Europe of Democracies and Diversities (EDD) is a populist eurosceptic party of the USoE Parliament. It strongly opposed the process of unification and aims to revert it. Its political views are focused on an anti-immigration and anti-globalization stance and the aim of introducing direct democracy."
 USoE.Nat_Populism_2017: "£EU_parliament_PG_2017_Nat_Populism (EFDD) - L'Europe de la liberté et de la démocratie directe"
 USoE.Nat_Populism_2017_icon: "£EU_parliament_PG_2017_Nat_Populism"
 USoE.Nat_Populism_2017_desc: "(Right-Wing Populism) - The Europe of Freedom and Direct Democracy (EFDD)\n\nThe Europe of Freedom and Direct Democracy (EFDD), formerly known as 'Europe of Democracies and Diversities', is a populist eurosceptic party of the USoE Parliament. It strongly opposed the process of unification and aims to revert it. Its political views are focused on an anti-immigration and anti-globalization stance and the aim of introducing direct democracy."
 USoE.Nat_Fascism: "£EU_parliament_PG_Nat_Fascism (AoF) - Alliance des fascistes"
 USoE.Nat_Fascism_icon: "£EU_parliament_PG_Nat_Fascism"
 USoE.Nat_Fascism_desc: "(Fascism) - Alliance of Fascists (AoF)\n\nThe Alliance of Fascists (AoF) is a far-right eurosceptic political party of the USoE Parliament. It is mainly composed of fascists and ultranationalists. Its political views are focused on the defense of Christian tradition, strong anti-immigration policy and replacing democracy with a strong-man dictatorship."
 USoE.Nat_Fascism_2017: "£EU_parliament_PG_2017_Nat_Fascism (APF) - Alliance pour la paix et la liberté"
 USoE.Nat_Fascism_2017_icon: "£EU_parliament_PG_2017_Nat_Fascism"
 USoE.Nat_Fascism_2017_desc: "(Fascism) - Alliance for Peace and Freedom (APf)\n\nThe Alliance for Peace and Freedom (APF) is a far-right eurosceptic political party of the USoE Parliament. It is mainly composed of fascists and ultranationalists. Its political views are focused on the defense of Christian tradition, strong anti-immigration policy and replacing democracy with a strong-man dictatorship."
 USoE.Nat_Autocracy: "£EU_parliament_PG_Nat_Autocracy (EUMS) - État-major de l'Union européenne"
 USoE.Nat_Autocracy_icon: "£EU_parliament_PG_Nat_Autocracy"
 USoE.Nat_Autocracy_desc: "(Military Junta) - European Union Military Staff (EUMS)\n\nThe European Union Military Staff (EUMS) is the political branch of the USoE Army, it's a union of high-ranking military leaders of the army that have formed a military junta and assumed control of the executive, exercising power in an authoritarian way."
 USoE.Monarchist: "£EU_parliament_PG_Monarchist (AoM) - Alliance des monarchistes"
 USoE.Monarchist_icon: "£EU_parliament_PG_Monarchist"
 USoE.Monarchist_desc: "(Absolutist Monarchist) - Alliance of Monarchists (AoM)\n\nThe Monarchists support the newly throned dynasty. They believe in the necessity of an absolute ruler, freed from the shackles of democratic decision making, to lead the continent through the 21st century."

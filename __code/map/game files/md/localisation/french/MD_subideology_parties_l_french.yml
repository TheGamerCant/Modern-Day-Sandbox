 SAU.Vilayat_e_Faqih: "£SAU_hardline_shite (PGH) Parti de Dieu au Hedjaz"
 SAU.Vilayat_e_Faqih_icon: "£SAU_hardline_shite"
 SAU.Vilayat_e_Faqih_desc: "(Révolutionnaires chiites) - Parti de Dieu au Hedjaz (en arabe : Hezbollah al-Hejaz)\n\nLe Hezbollah al-Hejaz est un groupe clandestin qui mène une lutte armée de faible intensité contre le gouvernement saoudien depuis les années 1980. Il cherche à remplacer la Maison des Saoud par une République islamique, inspirée par la révolution iranienne de 1979. Il adhère à l'idéologie de la wilayat al-faqih de Khomeiny, qui concentre le pouvoir entre les mains d'un juriste suprême, et s'est donc aligné sur l'Iran et le Hezbollah au Liban. Contrairement au Mouvement de réforme modéré, il a refusé de se réconcilier avec la monarchie saoudienne et continue de poursuivre des tactiques extrémistes."
 SAU.Mod_Vilayat_e_Faqih: "£generic_Mod_Vilayat_e_Faqih_small (RM) Mouvement de réforme"
 SAU.Mod_Vilayat_e_Faqih_desc: "(Révolutionnaires chiites) - Mouvement de réforme (Shirazi) (arabe : Islahiyyah)\n\nL'Islahiyyah, ou le Mouvement de réforme, est un réseau informel d'érudits chiites de la province orientale de l'Arabie saoudite qui adhère aux enseignements de Mohammad al-Shirazi, une figure chiite de premier plan qui s'est opposée à l'ayatollah Khomeini et à son idéologie de wilayat al-faqih. Alors que le Mouvement de réforme a autrefois mené une insurrection clandestine contre le gouvernement saoudien sous le nom d'Organisation pour la révolution islamique dans la péninsule arabique, dans les années 90, il a modéré sa rhétorique, rompu ses liens avec l'Iran et accepté de se dissoudre afin de parvenir à un accord avec le roi Fahd, qui a accepté de libérer ses membres. Aujourd'hui, les anciens membres du mouvement soutiennent une réforme modérée plutôt qu'une révolution d'inspiration iranienne, une stratégie qui a permis à la monarchie saoudienne de tolérer leur activité continue mais qui a aliéné la jeunesse chiite la plus radicale."
 SAU.Caliphate: "£SAU_salafist_jihadism (AQ) Al-Qaïda"
 SAU.Caliphate_2009: "£SAU_salafist_jihadism (AQIA) Al-Qaïda dans la péninsule arabique"
 SAU.Caliphate_icon: "£SAU_salafist_jihadism"
 SAU.Caliphate_desc: "(Djihadiste salafiste) - Al-Qaïda (arabe : Al-Qaïda)\n\nAl-Qaïda est un mouvement djihadiste salafiste fondé par Oussama ben Laden et d'autres soi-disant « Arabes afghans » qui ont combattu aux côtés des moudjahidines lors de l'invasion de l'Afghanistan par l'Union soviétique. S'appuyant sur l'idéologie de Sayyid Qutb, al-Qaïda est devenue l'organisation la plus communément associée au terrorisme islamique. Son attrait pour le djihad mondial lui a permis de gagner une présence dans tout le monde musulman. Depuis que le roi Fahd a rejeté l'offre d'assistance militaire de ben Laden contre Saddam Hussein lors de l'invasion du Koweït et a plutôt sollicité le soutien américain, al-Qaïda a cherché à renverser la Maison des Saoud par la force."
 SAU.Kingdom: "£SAU_kingdom (HoS) Maison des Saoud"
 SAU.Kingdom_icon: "£SAU_kingdom"
 SAU.Kingdom_desc: "(Monarchiste wahhabite) - Maison des Saoud (arabe : Āl Su'ūd)\n\nDepuis qu'Abdulaziz « Ibn Saud » a conquis la majeure partie de la péninsule arabique au début des années 1900, la Maison des Saoud règne sur les terres du Najd, du Hedjaz, de la province orientale, d'Asir, de Jizan et de Najran. Les al-Saoud se sont appuyés sur une alliance avec les partisans d'al-Wahhab, un religieux salafiste qui prônait un retour à une forme plus « pure » de l'islam sunnite. La légitimité religieuse accordée par le wahhabisme a soutenu le régime saoudien par l'émission de fatwas par des religieux wahhabites qui sanctifient les décisions politiques saoudiennes. Le salafisme saoudien, qui interdit toute forme d'opposition et de protestation politique, se distingue des formes plus populistes de salafisme qui s'opposent à la concentration de l'autorité religieuse dans une élite politique ou prônent le djihad mondial."
 SAU.Neutral_Muslim_Brotherhood: "£muslim_brotherhood_small (IAM) Mouvement du Réveil Islamique"
 SAU.Neutral_Muslim_Brotherhood_desc: "(Islamisme modéré) - Mouvement du réveil islamique (en arabe : Al-Sahwa Al-Islamiyya)\n\nLe Sahwa, ou Mouvement du réveil islamique, est né dans les années 1990 d'un réseau informel de religieux sunnites qui considéraient que la monarchie saoudienne s'éloignait du « véritable » islam. Le mouvement a fait pression pour une véritable réforme politique dans le Royaume d'Arabie saoudite, mais n'a pas réussi à obtenir de succès en raison de l'emprisonnement par la monarchie saoudienne et de la cooptation de religieux dissidents."
 SAU.Neutral_Muslim_Brotherhood_icon: "£muslim_brotherhood_small"
 SAU.Neutral_Muslim_Brotherhood_2011: "£SAU_reformist_shite Parti islamique Umma"
 SAU.Neutral_Muslim_Brotherhood_2011_desc: "Islamistes modérés - Le Parti islamique Oumma est une organisation politique qui rassemble des islamistes saoudiens, des intellectuels, des militants des droits de l'homme et des avocats opposés à la monarchie saoudienne. Le parti représente le courant moderniste en Arabie saoudite, qui cherche à combiner la religiosité du pays avec la réforme politique, par opposition au wahhabisme qui interdit toute forme de dissidence politique."
 SAU.Neutral_Muslim_Brotherhood_2011_icon: "£SAU_reformist_shite"
 SAU.Neutral_green: "£SAU_green Parti vert d'Arabie saoudite"
 SAU.Neutral_green_icon: "£SAU_green"
 SAU.Neutral_green_desc: ""
 SAU.Nat_Fascism: "£IRQ_Nat_Autocracy_small (ABP) Parti Baas Arabe"
 SAU.Nat_Fascism_icon: "£IRQ_Nat_Autocracy_small"
 SAU.Nat_Fascism_desc: ""
 SAU.Nat_Autocracy: "£generic_Nat_Autocracy_small (SAF) Forces armées saoudiennes"
 SAU.Nat_Autocracy_desc: ""
 TUR.Western_Autocracy: "£TUR_Western_Autocracy (HM) Mouvement Hizmet"
 TUR.Western_Autocracy_icon: "£TUR_Western_Autocracy"
 TUR.Western_Autocracy_desc: "(Démocratie islamique) - Mouvement güleniste (en turc : Gülen Hareketi)\n\nHizmet, connu internationalement sous le nom de Mouvement Gülen, est un cercle social islamique transnational dirigé par Fethullah Gülen. Les objectifs du groupe sont de promouvoir le dialogue interreligieux et d'améliorer la position des musulmans dans le monde, avec pour objectif de devenir le premier réseau musulman du monde. Certains craignent que leurs objectifs ne soient pas si différents de ceux des Frères musulmans et que leur objectif principal soit la domination de l'islam.\n\nMilitary §YStanding§! from this party: §R-50§!"
 TUR.conservatism: "£TUR_conservatism (CHP) Parti républicain du peuple"
 TUR.conservatism_icon: "£TUR_conservatism"
 TUR.conservatism_desc: "(Kémalisme) - Parti républicain du peuple (en turc : Cumhuriyet Halk Partisi)\n\nLe Cumhuriyet Halk Partisi (Parti républicain du peuple) est un parti kémaliste social-démocrate fondé par Atatürk lui-même. Le parti est pro-UE et nombre de ses membres soutiennent les droits des LGBT et des femmes. Il est généralement considéré comme l'un des partis les plus occidentaux et les plus progressistes du pays.\n\nMilitary §YStanding§! from this party: §G+100§!"
 TUR.liberalism: "£TUR_liberalism (LDP) Parti libéral démocrate"
 TUR.liberalism_icon: "£TUR_liberalism"
 TUR.liberalism_desc: "(Libéralisme) - Parti libéral-démocrate (en turc : Liberal Demokrat Parti)\n\nLe Parti libéral-démocrate (Liberal Demokrat Parti) est un parti libéral classique fondé par un homme d'affaires turc, Besim Tibuk.\n\nMilitary §YStanding§! from this party: §G+50§!"
 TUR.socialism: "£TUR_socialism (DSP) Parti démocratique de gauche"
 TUR.socialism_icon: "£TUR_socialism"
 TUR.socialism_desc: "(Démocratie sociale) - Parti de la gauche démocratique (en turc : Demokratik Sol Parti)\n\nLe Parti de la gauche démocratique est un parti socialiste kémaliste qui vise à réformer l'économie de la Turquie. Le parti est fortement pro-européen et souhaite une plus grande intégration de la Turquie dans l'UE.\n\nMilitary §YStanding§! from this party: §G+100§!"
 TUR.Communist-State: "£TUR_Communist_State (IP) Parti des travailleurs de Turquie"
 TUR.Communist-State_icon: "£TUR_Communist_State"
 TUR.Communist-State_desc: "(Kémalisme maoïste) - Parti des travailleurs (en turc : İşçi Partisi)\n\nİşçi Partisi (Parti des travailleurs) est un parti kémaliste maoïste qui célèbre Atatürk comme un héros de gauche de la bourgeoisie. Il soutient l'alignement avec d'autres pays socialistes comme Cuba et le Venezuela et s'oppose à l'expansionnisme américain. Son point de vue sur les Kurdes est que les paysans kurdes doivent être libérés de leurs chaînes féodales et rejoindre les Turcs dans une révolution démocratique anti-impérialiste.\n\nMilitary §YStanding§! from this party: §R-25§!"
 TUR.Communist-State_2015: "£TUR_Communist_State_2015 VATAN"
 TUR.Communist-State_2015_icon: "£TUR_Communist_State_2015"
 TUR.Communist-State_2015_desc: "VATAN - Vatan Partisi (Parti Patriotique) est une nouvelle version du Parti des Travailleurs Kémalistes maoïste, qui s'oppose à l'expansionnisme américain. Le parti se revendique comme l'avant-garde des socialistes, des révolutionnaires, des nationalistes et des kémalistes.\n\nMilitary §YStanding§! from this party: §R-25§!"
 TUR.anarchist_communism: "£TUR_anarchist_communism (ODP) Parti de la liberté et de la solidarité"
 TUR.anarchist_communism_icon: "£TUR_anarchist_communism"
 TUR.anarchist_communism_desc: "(Populisme de gauche) - Parti de la liberté et de la solidarité (en turc : Özgürlük ve Dayanışma Partisi)\n\nÖzgürlük ve Dayanışma Partisi (Parti de la liberté et de la solidarité) est un parti socialiste populiste de gauche. Le noyau principal du parti est le socialisme libertaire, modelé sur le mouvement syndical du DEV-YOL des années 1970.\n\nMilitary §YStanding§! from this party: §R-50§!"
 TUR.Conservative: "£TUR_Conservative (FP) Parti de la Vertu"
 TUR.Conservative_icon: "£TUR_Conservative"
 TUR.Conservative_desc: "(Islamisme) - Parti de la Vertu (en turc : Fazilet Partisi)\n\nLe Fazilet Partisi (Parti de la Vertu) est un parti politique islamiste. Nombre de ses membres actuels ont également appartenu à d'autres partis politiques islamistes, tous interdits sous prétexte de laïcité de la République turque.\n\nMilitary §YStanding§! from this party: §R-100§!"
 TUR.Conservative_reform: "£TUR_Conservative_reform (SP) Fête de la Félicité"
 TUR.Conservative_reform_icon: "£TUR_Conservative_reform"
 TUR.Conservative_reform_desc: "(Islamisme) - Parti de la Félicité (en turc : Saade Partisi)\n\nLe Saade Partisi (Parti de la Félicité) est un parti politique islamiste composé des partisans de la ligne dure de l'ancien Fazilet Partisi (Parti de la Vertu), aujourd'hui interdit. Le parti est l'un des principaux concurrents de l'AKP d'Erdogan et il est opposé à la participation de la Turquie à l'UE, aux États-Unis et à Israël. Le parti affirme que la Turquie doit jouer un rôle de premier plan dans la protection du monde musulman contre la menace de l'Occident.\n\nMilitary §YStanding§! from this party: §R-100§!"
 TUR.Autocracy: "£TUR_Autocracy (EMEP) Parti travailliste"
 TUR.Autocracy_icon: "£TUR_Autocracy"
 TUR.Autocracy_desc: "(Marxisme-Léninisme) - Parti travailliste (en turc : Emek Partisi)\n\nEmek Partisi (Parti travailliste) est un parti qui prône le socialisme scientifique avec pour objectif de créer une Turquie démocratique et indépendante.\n\nMilitary §YStanding§! from this party: §R-50§!"
 TUR.Caliphate: "£TUR_Caliphate (İBDA-C) Front des insurgés islamiques du Grand Orient"
 TUR.Caliphate_icon: "£TUR_Caliphate"
 TUR.Caliphate_desc: "(Militarisme islamique) - Front des pillards islamiques du Grand Est (turc : İslami Büyükdoğu Akıncılar Cephesi) \n\nİslami Büyükdoğu Akıncılar Cephesi (Front des pillards islamiques du Grand Est) est une organisation militante islamique suivant les enseignements de Necip Fazıl Kısakürek. Le groupe vise à créer un État fédéral islamique sunnite au Moyen-Orient et à rétablir le califat.\n\nMilitary §YStanding§! from this party: §R-250§!"
 TUR.Neutral_Muslim_Brotherhood_akp: "£TUR_Neutral_Muslim_Brotherhood (AKP) Parti de la justice et du développement"
 TUR.Neutral_Muslim_Brotherhood_akp_icon: "£TUR_Neutral_Muslim_Brotherhood"
 TUR.Neutral_Muslim_Brotherhood_akp_desc: "(Islamisme modéré) - Front du Parti de la justice et du développement (en turc : Adalet ve Kalkınma Partisi)\n\nAdalet ve Kalkınma Partisi (Parti de la justice et du développement) est un parti politique islamiste conservateur centré sur la politique de Recep Tayyip Erdoğan. Tout en se revendiquant laïc, nombre de ses politiques visent à ramener de nombreux éléments de l'islam conservateur, comme la levée de l'interdiction du hijab et la taxation de l'alcool. En ce qui concerne la politique étrangère, le parti s'aligne souvent sur les États-Unis et l'Occident, mais n'a aucun mal à prendre en compte les intérêts propres de la Turquie, et souvent la politique étrangère est menée sans alignement défini.\n\nMilitary §YStanding§! from this party: §R-100§!"
 TUR.Neutral_Muslim_Brotherhood: "£muslim_brotherhood_small Islamistes modérés"
 TUR.Neutral_Muslim_Brotherhood_icon: "£muslim_brotherhood_small"
 TUR.Neutral_Muslim_Brotherhood_desc: ""
 TUR.Neutral_Autocracy: "£TUR_Neutral_Autocracy (GP) Jeune Parti"
 TUR.Neutral_Autocracy_icon: "£TUR_Neutral_Autocracy"
 TUR.Neutral_Autocracy_desc: "(Populisme libéral) - Jeune parti (en turc : GENÇPARTİ)\n\nGENÇPARTİ (Jeune parti) est un parti libéral populiste. Le chef du parti, Cem Uzan, n'a pas peur d'utiliser l'empire médiatique de sa famille pour renforcer sa popularité, et on le soupçonne de participer à des affaires de corruption et de pratiques commerciales douteuses.\n\nMilitary §YStanding§! from this party: §G+50§!"
 TUR.Neutral_Autocracy_reform: "£TUR_Western_Autocracy Mouvement Hizmet"
 TUR.Neutral_Autocracy_reform_icon: "£TUR_Western_Autocracy"
 TUR.Neutral_Autocracy_reform_desc: "(Démocratie islamique) - Mouvement güleniste (en turc : Gülen Hareketi)\n\nHizmet, connu internationalement sous le nom de Mouvement Gülen, est un cercle social islamique transnational dirigé par Fethullah Gülen. Les objectifs du groupe sont de promouvoir le dialogue interreligieux et d'améliorer la position des musulmans dans le monde, avec pour objectif de devenir le premier réseau musulman du monde. Certains craignent que leurs objectifs ne soient pas si différents de ceux des Frères musulmans et que leur objectif principal soit la domination de l'islam.\n\nMilitary §YStanding§! from this party: §R-50§!"
 TUR.Neutral_conservatism: "£generic_Neutral_conservatism_small (MP) Parti de la Nation"
 TUR.Neutral_conservatism_icon: "£generic_Neutral_conservatism_small"
 TUR.Neutral_conservatism_desc: "(Conservatisme) - Parti de la Nation (en turc : Millet Partisi)\n\nMillet Partisi (Parti de la Nation) est un parti politique nationaliste conservateur.\n\nMilitary §YStanding§! from this party: §R-50§!"
 TUR.oligarchism: "£TUR_oligarchism (DYP) Parti du vrai chemin"
 TUR.oligarchism_icon: "£TUR_oligarchism"
 TUR.oligarchism_desc: "(Modérés) - Parti de la juste voie (en turc : Doğru Yol Partisi)\n\nLe Doğru Yol Partisi (Parti de la juste voie) est un parti libéral conservateur. Beaucoup de ses membres ont été impliqués dans le scandale de Susurluk, où il a été révélé que de nombreux députés du parti avaient été impliqués dans la mafia turque.\n\nMilitary §YStanding§! from this party: §R-25§!"
 TUR.oligarchism_2007: "£TUR_oligarchism Parti démocrate"
 TUR.oligarchism_2007_icon: "£TUR_oligarchism"
 TUR.oligarchism_2007_desc: "DP - Demokrat Parti (Parti démocrate) est un parti libéral conservateur, rebaptisé à partir de l'ancien Doğru Yol Partisi (Parti de la juste voie). Beaucoup de ses membres ont été impliqués dans le scandale Susurluk, où il a été révélé que de nombreux députés du parti avaient été impliqués dans la mafia turque.\n\nMilitary §YStanding§! from this party: §R-25§!"
 TUR.oligarchism_mafia: "£generic_oligarchism_small Mafia turque"
 TUR.oligarchism_mafia_icon: "£generic_oligarchism_small"
 TUR.oligarchism_mafia_desc: "Mafia turque - La mafia turque est impliquée dans la politique et la vie quotidienne turques depuis très longtemps. Elle est connue pour mener des activités criminelles à l'intérieur et à l'extérieur du territoire turc. En général, ses opérations extérieures se déroulent en Europe occidentale, mais elle est également connue pour opérer ailleurs.\n\nMilitary §YStanding§! from this party: §R-25§!"
 TUR.Neutral_Libertarian: "£TUR_Neutral_Libertarian (ANAP) Parti de la Mère Patrie"
 TUR.Neutral_Libertarian_icon: "£TUR_Neutral_Libertarian"
 TUR.Neutral_Libertarian_desc: "(Libertarianisme) - Parti de la mère patrie (en turc : Anavatan Partisi)\n\nAnavatan Partisi (Parti de la mère patrie) est un parti néolibéral qui soutient les réformes du marché libre.\n\nMilitary §YStanding§! from this party: §G+50§!"
 TUR.Neutral_green: "£TUR_Neutral_green (HADEP) Parti de la démocratie populaire"
 TUR.Neutral_green_icon: "£TUR_Neutral_green"
 TUR.Neutral_green_desc: "(Démocratie sociale) - Parti de la démocratie populaire (en turc : Halkın Demokrasi Partisi)\n\nHalkın Demokrasi Partisi (Parti de la démocratie populaire) est un parti politique de la minorité kurde. Son programme inclut la démocratie sociale, la politique verte et les droits des minorités et des femmes.\n\nMilitary §YStanding§! from this party: §R-50§!"
 TUR.Neutral_green_phase1: "£TUR_Neutral_green_phase1 DEHAP"
 TUR.Neutral_green_phase1_icon: "£TUR_Neutral_green_phase1"
 TUR.Neutral_green_phase1_desc: "DEHAP - Demokratik Halk Partisi (Parti démocratique du peuple) est un parti politique de la minorité kurde. Son programme inclut la social-démocratie, la politique verte et les droits des minorités et des femmes.\n\nMilitary §YStanding§! from this party: §R-50§!"
 TUR.Neutral_green_phase2: "£TUR_Neutral_green_phase2 DTP"
 TUR.Neutral_green_phase2_icon: "£TUR_Neutral_green_phase2"
 TUR.Neutral_green_phase2_desc: "Le DTP (Demokratik Toplum Partisi) est un parti politique de la minorité kurde. Son programme inclut la social-démocratie, la politique verte et les droits des minorités et des femmes.\n\nMilitary §YStanding§! from this party: §R-50§!"
 TUR.Neutral_green_phase3: "£TUR_Neutral_green_phase3 BDP"
 TUR.Neutral_green_phase3_icon: "£TUR_Neutral_green_phase3"
 TUR.Neutral_green_phase3_desc: "Le BDP - Barış ve Demokrasi Partisi (Parti de la paix et de la démocratie) est un parti politique de la minorité kurde. Son programme inclut la social-démocratie, la politique verte et les droits des minorités et des femmes.\n\nMilitary §YStanding§! from this party: §R-50§!"
 TUR.Neutral_green_phase4: "£TUR_Neutral_green_phase4 HDP"
 TUR.Neutral_green_phase4_icon: "£TUR_Neutral_green_phase4"
 TUR.Neutral_green_phase4_desc: "HDP - Halkların Demokratik Partisi (Parti démocratique des peuples) est un parti politique favorable aux minorités. Son programme inclut la social-démocratie, la politique verte et les droits des minorités et des femmes. Il soutient également la formation de parlements populaires locaux.\n\nMilitary §YStanding§! from this party: §R-50§!"
 TUR.neutral_Social: "£TUR_neutral_Social HEPAR"
 TUR.neutral_Social_icon: "£TUR_neutral_Social"
 TUR.neutral_Social_desc: "HEPAR - Hak ve Eşitlik Partisi (Parti des droits et de l'égalité) est un parti fondé par Osman Pamukoğlu, le « commandant légendaire ». Le parti suit de près le kémalisme, avec pour objectif de créer une société sans classe ni privilège. Contrairement à d'autres partis politiques, HEPAR est entièrement financé par des dons publics.\n\nMilitary §YStanding§! from this party: §G+100§!"
 TUR.Neutral_Communism: "£TUR_Neutral_Communism (PKK) Parti des travailleurs du Kurdistan"
 TUR.Neutral_Communism_icon: "£TUR_Neutral_Communism"
 TUR.Neutral_Communism_desc: "(Militarisme kurde) - Parti des travailleurs du Kurdistan (kurde : Partîya Karkerên Kurdistanê) \n\nPartîya Karkerên Kurdistanê (Parti des travailleurs du Kurdistan) est une organisation militante et politique kurde qui défend les droits politiques et culturels des Kurdes de Turquie. L'idéologie politique du PKK est un mélange de marxisme-léninisme, de nationalisme kurde, de socialisme libertaire et de confédéralisme démocratique.\n\nMilitary §YStanding§! from this party: §R-250§!"
 TUR.Nat_Populism: "£TUR_Nat_Populism (MHP) Parti du mouvement nationaliste"
 TUR.Nat_Populism_icon: "£TUR_Nat_Populism"
 TUR.Nat_Populism_desc: "(Néo-ottomanisme) - Parti du mouvement nationaliste (en turc : Milliyetçi Hareket Partisi)\n\nLe Milliyetçi Hareket Partisi (Parti du mouvement nationaliste) est un parti ultranationaliste. Le parti suit la doctrine des Neuf Lumières telle qu'elle a été énoncée par son fondateur, bien que depuis la fin des années 90, il y ait mélangé des éléments de l'islam conservateur. Certains ont classé le groupe comme néofasciste, en raison de ses liens avec l'organisation des Loups Gris et des propos racistes tenus par nombre de ses membres.\n\nMilitary §YStanding§! from this party: §R-100§!"
 TUR.Nat_Fascism: "£TUR_Nat_Fascism (BK) Loups Gris"
 TUR.Nat_Fascism_icon: "£TUR_Nat_Fascism"
 TUR.Nat_Fascism_desc: "(Fascisme) - Les Loups Gris (en turc : Bozkurtlar)\n\nBozkurtlar (Les Loups Gris) est une organisation d'extrême droite affiliée au MHP. Souvent décrite comme néofasciste, certains la classent comme l'aile paramilitaire du MHP. L'organisation soutient le pan-turquisme. L'organisation est à l'origine de nombreux assassinats et autres crimes violents, et ses combattants participent souvent à des conflits étrangers.\n\nMilitary §YStanding§! from this party: §R-100§!"
 TUR.Nat_Autocracy: "£TUR_Nat_Autocracy (TSK) Forces armées turques"
 TUR.Nat_Autocracy_icon: "£TUR_Nat_Autocracy"
 TUR.Nat_Autocracy_desc: "(Junte militaire) - Forces armées turques (en turc : Türk Silahlı Kuvvetleri)\n\nLes forces armées turques constituent la principale branche militaire de la République de Turquie. L'armée intervient souvent dans la politique et organise des coups d'État chaque fois qu'elle estime que les idéaux kémalistes de la république sont attaqués par les islamistes.\n\nMilitary §YStanding§! from this party: §G+200§!"
 TUR.Monarchist: "£TUR_Monarchist (HoS) Maison d'Osman"
 TUR.Monarchist_icon: "£TUR_Monarchist"
 TUR.Monarchist_desc: "(Monarchie absolue) - Maison d'Osman (en turc : Osmanlı Hanedanı)\n\nLa Maison d'Osman a régné sur l'Empire ottoman pendant 600 ans. La famille a été destituée en 1922 après la guerre d'indépendance turque et a été envoyée en exil (bien que l'exil ait été levé plus tard). Le soutien populaire à la maison royale reste faible en Turquie, car les Turcs considèrent que la Turquie a obtenu son indépendance de l'Empire ottoman plutôt que d'en être la continuation.\n\nMilitary §YStanding§! from this party: §R-100§!"
 UKR.conservatism: "£ukr_fatherland VO \"Patrie\""
 UKR.conservatism_icon: "£ukr_fatherland"
 UKR.conservatism_desc: "Union panukrainienne « Patrie » £ukr_fatherland Le 9 juillet 1999, sur la base du groupe parlementaire et d'un parti plus petit, un nouveau parti politique, l'Union pan-ukrainienne « Patrie », a été fondé et son congrès constitutif. Le parti considère l'adhésion de l'Ukraine à l'Union européenne comme un objectif stratégique. Il est favorable à l'exemption de visa pour les Ukrainiens dans l'UE et souhaite abolir les « régimes de visa humiliants »."
 UKR.liberalism: "£ukr_solidarity BPP « Solidariste »"
 UKR.liberalism_desc: "Le Bloc « Solidarité » de Petro Porochenko £ukr_solidarity est un parti politique ukrainien, issu d'un groupe parlementaire appelé Solidarité datant de 2000 et qui existe depuis sous diverses formes en tant que porte-parole politique de Petro Porochenko. Le parti dénonce officiellement le populisme et prône le pragmatisme et le réalisme. Il prône l'adhésion de l'Ukraine à l'Union européenne, l'aide sociale et la protection sociale pour les citoyens pauvres. Mais il reste en fait le parti de poche du populiste Porochenko."
 UKR.socialism: "£ukr_sdpu SDPU(o)"
 UKR.socialism_desc: "Le Parti social-démocrate d'Ukraine (Uni) £ukr_sdpu est un parti politique ukrainien. Le SDPU(o) se positionne lui-même comme un parti de centre-gauche, ce qui a provoqué une forte dissonance avec la présence de grands oligarques dans sa direction. Malgré son orientation occidentale, il est plus enclin à coopérer avec les partis de gauche neutres et pro-occidentaux en raison d'objectifs communs."
 UKR.socialism_2017: "£ukr_groysman La stratégie ukrainienne de Groysman"
 UKR.socialism_2017_icon: "£ukr_groysman"
 UKR.socialism_2017_desc: "La stratégie ukrainienne de Groysman £ukr_groysman est un parti politique ukrainien fondé par Volodymyr Groysman, ancien Premier ministre d'Ukraine et maire de Vinnitsa. Grâce à ses réformes réussies, il a acquis une certaine popularité dans sa région. La ligne générale du parti est pro-européenne et cherche à construire une démocratie sociale."
 UKR.Western_Autocracy: "£UKR_western_autocracy Parti des Défenseurs de la Patrie"
 UKR.Western_Autocracy_desc: "Le Parti des défenseurs de la patrie £UKR_western_autocracy est un parti qui déclare une politique étrangère pro-occidentale, des sentiments autocratiques et militaristes, créé par un chrétien orthodoxe et avocat honoré de l'Ukraine - Yuriy Karamzin"
 UKR.Communist-State: "£ukr_cpu KPU"
 UKR.Communist-State_icon: "£ukr_cpu"
 UKR.Communist-State_desc: "Parti communiste d'Ukraine £ukr_cpu Avec la chute de l'Union soviétique, le prédécesseur du parti, le Parti communiste d'Ukraine (Union soviétique), a été interdit en 1991 et s'est reformé en Parti socialiste d'Ukraine. Entre 1991 et 1993, plusieurs petites organisations communistes ont été créées dans toute l'Ukraine. « Sans légalité claire », des communistes de toute l'Ukraine se sont réunis le 6 mars 1993 pour la Conférence pan-ukrainienne des communistes dans une tentative de rétablir le KPU. En réaction, la Verkhovna Rada, deux mois plus tard, a légalisé la création de partis communistes."
 UKR.Conservative: "£UKR_emerging_kuchma Pour l’Ukraine unie !"
 UKR.Conservative_icon: "£UKR_emerging_kuchma"
 UKR.Conservative_desc: "Pour l'Ukraine unie ! £UKR_emerging_kuchma - un bloc électoral de cinq partis politiques en Ukraine, créé à l'avance pour participer aux élections de la Verkhovna Rada de 2002. Le bloc soutenait le président Leonid Kuchma et était essentiellement centré sur lui.»"
 UKR.Conservative_2001: "£ukr_regions Parti des Régions"
 UKR.Conservative_2001_icon: "£ukr_regions"
 UKR.Conservative_2001_desc: "Le Parti des régions £ukr_regions  est un parti politique pro-russe fondé fin 1997. Le parti affirme avoir une approche pragmatique de l'adhésion de l'Ukraine à l'UE en ce qui concerne les intérêts économiques extérieurs du pays ; il soutient « la voie de l'intégration européenne et la mise en œuvre des normes correspondantes dans les domaines social et économique ». Cependant, compte tenu de la crise financière européenne, le parti considère la question de l'adhésion de l'Ukraine à l'UE comme « purement théorique »."
 UKR.Conservative_2017: "£ukr_opposition La plateforme de l'opposition est Pour la vie"
 UKR.Conservative_2017_icon: "£ukr_opposition"
 UKR.Conservative_2017_desc: "Plateforme d'opposition - Pour la vie £ukr_opposition est un parti politique ukrainien pro-russe. En tant que nouvelle version du Parti des régions, OPZZh a rassemblé dans ses rangs tous les politiciens et oligarques ukrainiens pro-russes non-gauchistes. En théorie, le parti déclare que les vues social-démocrates et régionalistes constituent la base idéologique de son programme."
 UKR.Autocracy: "£UKR_feminism BNV \"Opposition populaire\""
 UKR.Autocracy_desc: "Le Bloc d'opposition populaire £UKR_feminism est une association de plusieurs partis de droite et de gauche dirigée par Natalia Vitrenko, chercheuse en économie et membre de l'Union de la jeunesse eurasienne. Figure essentiellement unificatrice, elle réunit sous son parti le parti panslave pro-occidental Rus, les bolcheviks nationaux et les communistes chrétiens orthodoxes."
 UKR.anarchist_communism: "£UKR_anarchism_communism Union des Forces de Gauche"
 UKR.anarchist_communism_desc: "L'Union des forces de gauche £UKR_anarchism_communism  est un parti socialiste ukrainien fondé par l'ancien sous-marinier Vasyl Volga. Le parti faisait initialement partie d'un bloc commun avec le SPU, mais s'en est ensuite séparé. Le parti cherche à détruire l'oligarchie en tant que classe exploiteuse et à construire un État-providence."
 UKR.Neutral_conservatism: "£ukr_pmu Mouvement populaire"
 UKR.Neutral_conservatism_icon: "£ukr_pmu"
 UKR.Neutral_conservatism_desc: "Le Mouvement populaire d'Ukraine £ukr_pmu  est un parti politique de centre-droit. Initialement organisé sous le nom de Mouvement populaire d'Ukraine pour la reconstruction (c'est-à-dire pour la perestroïka), Rukh a été fondé en 1989 en tant que mouvement politique civiliste, car aucun autre parti politique n'était autorisé en Union soviétique à l'exception du Parti communiste. L'organisation trouve ses racines dans les dissidents ukrainiens, le plus célèbre d'entre eux étant Viatcheslav Chornovil."
 UKR.oligarchism: "£ukr_udar Alliance démocratique ukrainienne pour la réforme"
 UKR.oligarchism_desc: "L'UDAR (Alliance démocratique ukrainienne pour la réforme) de Vitali Klitschko £ukr_udar est un parti politique fondé par le boxeur professionnel Vitali Klitschko. Grâce à sa popularité en tant que sportif et à son travail caritatif, il s'est bâti une réputation intéressante. Le parti a pour objectif de préserver l'ordre et les traditions conservateurs de l'Ukraine et de nettoyer le pays de la corruption grâce à une frappe vigoureuse du chef du parti."
 UKR.neutral_Social: "£ukr_spu SPU"
 UKR.neutral_Social_icon: "£ukr_spu"
 UKR.neutral_Social_desc: "(Socialistes-démocrates) £ukr_spu Le Parti socialiste d'Ukraine est l'un des plus anciens partis politiques et a été créé par les anciens membres du Parti communiste d'Ukraine de l'ère soviétique à la fin de 1991, lorsque le Parti communiste a été interdit. Il a fait partie du parlement à partir de 1994 et a longtemps été le quatrième plus grand parti d'Ukraine."
 UKR.Neutral_Libertarian: "£UKR_our_ukraine Bloquer \"Notre Ukraine\""
 UKR.Neutral_Libertarian_desc: "Notre Ukraine £UKR_our_ukraine  est un parti politique ukrainien de centre-droit créé en soutien à Viktor Iouchtchenko, le leader élu du parti. Réunissant des nationalistes modérés, des libéraux et des conservateurs, ainsi que des militants pro-russes modérés, le parti est essentiellement un parti modérément pro-occidental et anti-corruption centré autour de Iouchtchenko lui-même."
 UKR.Neutral_Libertarian_2017: "£ukr_servant_of_the_people Le parti Serviteur du Peuple"
 UKR.Neutral_Libertarian_2017_icon: "£ukr_servant_of_the_people"
 UKR.Neutral_Libertarian_2017_desc: "Le parti Serviteur du Peuple £ukr_servant_of_the_people  a été fondé fin 2017 en hommage à l'émission télévisée à succès du même nom. Le parti se concentre principalement sur des politiques populistes à grande échelle, ainsi que sur une politique étrangère pro-européenne. Le parti s'efforce en particulier de mettre un terme à la corruption en Ukraine et d'apporter davantage de démocratie directe au pays."
 UKR.Neutral_Autocracy: "£UKR_neutral_internet Parti Internet d'Ukraine"
 UKR.Neutral_Autocracy_desc: "Parti Internet d'Ukraine £UKR_neutral_internet Fondé et dirigé par Dark Vador, le parti prétend être le premier parti Internet au monde, son slogan est le gouvernement électronique contre la bureaucratie, et il veut créer un gouvernement électronique en Ukraine. En fait, le parti est une blague, cependant, il a gagné beaucoup de popularité et fait souvent des actions anticommunistes. Mais qui sait ce qui se cache derrière le seigneur noir des Sith..."
 UKR.Neutral_Communism: "£UKR_neutral_communism Union des communistes d'Ukraine"
 UKR.Neutral_Communism_desc: "L'Union des communistes £UKR_neutral_communism of Ukraine est un parti communiste marxiste-léniniste anti-révisionniste ukrainien. Etant aliéné de la majorité des partis de gauche pro-russes, le SKU considère tous les conflits modernes comme bourgeois et ne juge pas nécessaire d'y intervenir, car ils ne correspondent pas aux intérêts du prolétariat."
 UKR.Neutral_green: "£UKR_greenone Unité d'Olexandre Omelchenko"
 UKR.Neutral_green_icon: "£UKR_greenone"
 UKR.Neutral_green_desc: "L'Unité d'Oleksandr Omelchenko £UKR_greenone  est un parti politique ukrainien créé en 1999 en tant que parti de protestation contre le système établi. Le parti était dirigé par l'ancien maire de Kiev Oleksandr Omelchenko et défendait des opinions modérées, pro-vertes et agraires."
 UKR.Neutral_Muslim_Brotherhood: "£UKR_neutral_muslim Parti national"
 UKR.Neutral_Muslim_Brotherhood_desc: "Parti national £UKR_neutral_muslim est une organisation non gouvernementale tatare de Crimée modérément pro-russe, qui tire ses racines d'un ancien parti politique du même nom. Elle défend les droits des Tatars de Crimée et fait parfois appel au soutien du gouvernement turc."
 UKR.Nat_Autocracy: "£urk_armed_forces Forces armées ukrainiennes"
 UKR.Nat_Autocracy_desc: "Les forces armées de l'Ukraine £urk_armed_forces désignent les forces militaires de l'Ukraine. Toutes les forces militaires et de sécurité, y compris les forces armées, sont placées sous le commandement du président de l'Ukraine et soumises au contrôle d'une commission parlementaire permanente, la Verkhovna Rada."
 UKR.Nat_Fascism: "£ukr_kongress Congrès des nationalistes ukrainiens"
 UKR.Nat_Fascism_desc: "Le Congrès des nationalistes ukrainiens £ukr_kongress  est un parti politique d'extrême droite en Ukraine. En réunissant sous son aile des organisations paramilitaires telles que l'UNA-UNSO et Trizub, le Congrès s'efforce de construire une grande Ukraine, en intervenant dans tous les conflits possibles dans l'espace post-soviétique pour contrer l'influence russe."
 UKR.Nat_Populism: "£ukr_freedom L'Union pan-ukrainienne « Liberté »"
 UKR.Nat_Populism_icon: "£ukr_freedom"
 UKR.Nat_Populism_desc: "L'Union pan-ukrainienne « Liberté » £ukr_freedom est un parti politique nationaliste ukrainien fondé en 1991 sous le nom de Parti social-national d'Ukraine et qui se présente comme un partisan populiste du nationalisme extrême. Il se positionne entre la droite et l'extrême droite."
 UKR.Monarchist: "£UKR_monarchism Maison de Skoropadskyi"
 UKR.Monarchist_desc: "La famille Skoropadsky £UKR_monarchism est une famille noble ukrainienne d'origine cosaque qui a jeté les bases de l'Ukraine moderne au XVIIe siècle, à la tête de l'armée zaporogue. Après cela, leur famille a dirigé l'État ukrainien en 1918."

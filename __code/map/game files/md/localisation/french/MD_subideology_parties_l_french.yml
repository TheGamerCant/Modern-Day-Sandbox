 HPR.Autocracy_desc: "Autocrates - Svobodnaya Respublica (République libre). SR est un parti politique majeur à Kharkov, créé par les dirigeants de la République populaire de Kharkov. Il milite pour la défense du peuple et de la culture russes à Kharkov et soutient pleinement l'intégration à la Russie"

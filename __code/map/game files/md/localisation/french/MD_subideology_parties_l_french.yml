 BEN.liberalism: "£generic_liberalism_small Fête de la renaissance du Bénin"
 BEN.liberalism_desc: "Libéral - Le \"Parti de la renaissance du Bénin\" est un parti plus ou moins libéral dirigé par Nicéphore Soglo, président du Bénin de 1991 à 1996."
 BEN.socialism: "£generic_socialism_small FARD-Alafia"
 BEN.socialism_desc: "Le Social-démocrate - Front d'action pour le renouveau et le développement a été fondé en 1994, résultat de scissions et de mutations observées au sein de différents partis. De position sociale-démocrate, le parti soutient la candidature de Mathieu Kérékou à l'élection présidentielle de 1996."
 BEN.neutral_libertarian: "£generic_socialism_small Parti du renouveau démocratique"
 BEN.neutral_libertarian_desc: "Libertaires - Le Parti du Renouveau Démocratique est un parti politique béninois dirigé par Adrien Houngbédji. Houngbédji a vécu en exil pendant plusieurs années, mais est revenu au Bénin pour participer à la Conférence nationale de 1990. Il a construit son parti en grande partie autour d'autres Béninois exilés."
 BEN.Communist-State: "£generic_Communist_State_small PCB"
 BEN.Communist-State_desc: "Communiste - Parti Communiste du Bénin (Parti communiste du Bénin) a été fondé en 1977 par l'Union des communistes du Dahomey. Le parti s'appelait initialement Parti communiste du Dahomey (Parti Communiste du Dahomey). Le PCB était un parti illégal, œuvrant de manière clandestine contre le régime de Kérékou, et n'a été légalement reconnu que le 17 septembre 1993."
 BEN.anarchist_communism: "£generic_anarchist_communism_small PCMLB"
 BEN.anarchist_communism_desc: "Radical de gauche - Parti communiste marxiste-léniniste du Bénin (Parti communiste marxiste-léniniste du Bénin) a été fondé à Cotonou en 1999. Yansunnu avait été expulsé du Parti communiste du Bénin en 1998 à la suite d'une crise interne au sein de ce parti."
 BEN.neutral_Social: "£generic_neutral_Social_small Union progressiste"
 BEN.neutral_Social_desc: "L'Union progressiste a été formée par la fusion de plus de 20 partis et alliances, dont l'Union fait la nation, le Parti de la renaissance du Bénin, le Parti social-démocrate, Key Force, le Congrès du peuple pour le progrès, les Forces démocratiques unies, l'Union pour le secours. , l'Union pour la Démocratie et la Solidarité Nationale, l'Alliance Scoute et l'Union pour le Bénin."
 BEN.Neutral_green: "£generic_Neutral_green Les Verts"
 BEN.Neutral_green_desc: "Greens - Les Verts ont été fondés dans les années 1990 et sont affiliés aux Global Greens au niveau international."

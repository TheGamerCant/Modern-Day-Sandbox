 ROJ.neutral_Social: "£ROJ_neutral_Social_small Democratic Union Party"
 ROJ.neutral_Social_icon: "£ROJ_neutral_Social_small"
 ROJ.neutral_Social_desc: "Democratic Confederalism - Partiya Yekîtiya (Democratic Union Party) is the most dominant party in the Autonomous Administration of North and East Syria, also known as Rojava. Following the ideology of Democratic Confederalism, it is a member of the Kurdish umbrella group the KCK, and draws its inspiration from Abdullah Öcalan and the struggle of the PKK. Because of this, the party and the region it controls are labeled as terrorists by Turkey. It enjoys large international sympathy, however, thanks to the successful struggle its military wing, the YPG, has waged against ISIS."

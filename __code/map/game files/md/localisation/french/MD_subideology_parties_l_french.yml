 ban_all_title_tt: "§HDéclarer un État parti§!"
 ban_all_TT: "En tant que seul parti au pouvoir à la tête du gouvernement, nous pouvons légiférer pour déclarer illégaux tous les autres partis politiques.\n\nVive le Parti !\n\n§YPrérequis:§!\n[!opt_partyall_ban_button_click_enabled]\n\n§YEffets :§!\nPoids politique :[!opt_partyall_ban_button_click]"
 allow_all_title_tt: "§HRenoncer à l’État à parti unique§!"

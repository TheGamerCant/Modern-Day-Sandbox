 AFG.Caliphate: "£AFG_salafist_jihadism Taliban"
 AFG.Caliphate_desc: ""
 AFG.Kingdom: "£AFG_kingdom Hezb-e Islami"
 AFG.Kingdom_desc: ""
 AFG.neutral_Social: "£AFG_neutral_social Hezb-e Watan"

 AFG.Neutral_Autocracy_desc: ""
 AFG.Neutral_Muslim_Brotherhood: "£AFG_neutral_muslim_brotherhood Jamiat-e Islami"
 AFG.Neutral_Muslim_Brotherhood_desc: "Parti politique à prédominance tadjike, le Jamiat-e-Islami est la plus ancienne et la plus importante organisation politique d'Afghanistan, fondée par Burhanuddin Rabbani dans les années 1960. À l'origine, il s'agissait d'un mouvement étudiant de l'université de Kaboul, qui s'est transformé en un puissant groupe de moudjahidines pendant la guerre soviéto-afghane. Le parti est basé sur la loi islamique et a une idéologie communautaire. Sous la direction d'Ahmad Shah Massoud, le Jamiat est devenu un acteur clé de la guerre civile afghane et de la résistance contre les talibans, formant plus tard l'Alliance du Nord."
 AFG.Neutral_conservatism: "£AFG_neutral_conservatism Naveen"
 AFG.Neutral_conservatism_desc: "Fondé en 2004 par Yunus Qanuni, ce parti politique a émergé après le départ de ce dernier du Mouvement national afghan. Le parti a brièvement dirigé le Front national d'entente d'Afghanistan, une alliance d'opposition, mais il est devenu inactif peu de temps après. En décembre 2005, une fusion a été tentée avec le Jamiat-e Islami, bien que les rapports soient contradictoires quant à savoir si la fusion a été pleinement réalisée en 2006."

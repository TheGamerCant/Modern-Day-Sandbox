 NOR.conservatism: "£NOR_conservatism_small Aile droite"
 NOR.conservatism_icon: "£NOR_conservatism_small"
 NOR.conservatism_desc: "Conservateur - Høyre (« Droite ») est le parti conservateur prédominant en Norvège. Il œuvre en faveur de la libéralisation économique et de la réduction des impôts. Ils sont en faveur de l'adhésion à l'UE et ont historiquement été pro-américains."
 NOR.liberalism: "£NOR_liberalism_small Aile gauche"
 NOR.liberalism_icon: "£NOR_liberalism_small"
 NOR.liberalism_desc: "Libéral - Venstre (« Gauche ») est le plus ancien parti de Norvège, et a toujours promu les droits libéraux ainsi que l'éducation, l'environnement et la culture."
 NOR.socialism: "£NOR_socialism_small Parti des travailleurs"
 NOR.socialism_icon: "£NOR_socialism_small"
 NOR.socialism_desc: "Social-démocrate - L'Arbeiderpartiet (Parti travailliste) est issu du Parti communiste norvégien, mais a gagné en popularité en devenant un parti social-démocrate. Pendant presque toute l'histoire de l'après-guerre, ce parti a été de loin le plus important et a guidé le développement sociétal de la Norvège. Ils se considèrent comme les défenseurs de l'État-providence et sont favorables à l'UE et à l'OTAN."
 NOR.Western_Autocracy: ""
 NOR.Western_Autocracy_desc: ""
 NOR.Communist-State: "£NOR_Communist_State_small Parti communiste norvégien"
 NOR.Communist-State_icon: "£NOR_Communist_State_small"
 NOR.Communist-State_desc: "Communiste - Le Norges Kommunistiske Parti (Parti communiste norvégien) est un parti communiste stalinien. Il est devenu très populaire après la deuxième guerre mondiale en menant la résistance contre l'occupation nazie. Cependant, ils ont rapidement perdu de leur popularité et ont depuis perdu toute pertinence."
 NOR.anarchist_communism: "£NOR_anarchist_communism_small Rouge"
 NOR.anarchist_communism_icon: "£NOR_anarchist_communism_small"
 NOR.anarchist_communism_desc: "Radical de gauche - Rødt (« Rouge ») est né de la fusion de deux partis marxistes-léninistes et maoïstes. Il a depuis abandonné le communisme pur et dur et privilégie désormais une voie socialiste démocratique. Il souhaite mettre fin au capitalisme et se retirer de l'OTAN."
 NOR.Conservative: "£generic_Conservative_small Les réalistes du climat"
 NOR.Caliphate: "£generic_Caliphate_small Profetens Ummah"
 NOR.Caliphate_icon: "£generic_Caliphate_small"
 NOR.Caliphate_desc: ""
 NOR.Neutral_conservatism: "£NOR_Neutral_conservatism_small Parti populaire chrétien"
 NOR.Neutral_conservatism_icon: "£NOR_Neutral_conservatism_small"
 NOR.Neutral_conservatism_desc: "Conservateur - Le Kristelig Folkeparti (Parti populaire chrétien) est un parti chrétien de centre-droit. Il souhaite que l'État promeuve le christianisme comme religion officielle. En politique étrangère, ils souhaitent promouvoir la paix et favorisent l'augmentation de l'aide aux pays pauvres."
 NOR.oligarchism: "£NOR_oligarchism_small Parti du centre"
 NOR.oligarchism_icon: "£NOR_oligarchism_small"
 NOR.oligarchism_desc: "Le Parti des Paysans - Senterpartiet (Parti du Centre) est un parti essentiellement rural. Il est eurosceptique et n'aime pas le libre-échange. Il œuvre pour un renversement de la centralisation et souhaite augmenter les subventions agricoles."
 NOR.neutral_Social: "£NOR_neutral_Social_small Parti socialiste de gauche"
 NOR.neutral_Social_icon: "£NOR_neutral_Social_small"
 NOR.neutral_Social_desc: "Socialiste démocratique - Le Sosialistisk Venstreparti (Parti socialiste de gauche) a été formé en tant que faction dissidente de l'Arbeiderpartiet car il souhaitait mettre fin à l'adhésion à l'OTAN. Il se situe plus à gauche que l'Arbeiderpartiet et défend le féminisme, l'aide sociale, l'environnement et le capitalisme d'État."
 NOR.Neutral_Libertarian: "£NOR_Neutral_Libertarian_small Les libertariens"
 NOR.Neutral_Libertarian_icon: "£NOR_Neutral_Libertarian_small"
 NOR.Neutral_Libertarian_desc: "Libertaire - Liberalistene (« Les libéraux ») est un parti libertaire assez récent qui prône la fin de la fiscalité, la réduction de l'aide sociale et la réduction du pouvoir de l'État."
 NOR.Neutral_green: "£NOR_Neutral_green_small Le Parti vert écologiste"
 NOR.Neutral_green_icon: "£NOR_Neutral_green_small"
 NOR.Neutral_green_desc: "Écologiste - Le Miljøpartiet De Grønne (Parti de l'environnement - Les Verts) a été formé après s'être inspiré des gains électoraux des Verts allemands et sa cause principale est le respect de l'environnement."
 NOR.Nat_Fascism2: "£NOR_Nat_Fascism_small L'Alliance"
 NOR.Nat_Fascism2_icon: "£NOR_Nat_Fascism_small"
 NOR.Nat_Fascism2_desc: "Fasciste - Alliansen (« L'Alliance ») a été créé pour tenter de constituer un large front contre le Marché commun européen et la libre circulation des travailleurs, mais son principal afflux provient de personnalités d'extrême droite qui souhaitent mettre fin à toute immigration. Ils sont anti-islam et incitent souvent à la haine raciale."
 NOR.Nat_Fascism: "£NOR_vigrid_small Vigrid"
 NOR.Nat_Fascism_icon: "£NOR_vigrid_small"
 NOR.Nat_Fascism_desc: "Fasciste - Vigrid (De l'ancien norrois Vígríðr, relatif au Ragnarok) est un parti et un mouvement néo-nazi qui promeut la religion nordique païenne. Ce sont des suprématistes blancs qui contestent l'Holocauste et idolâtrent Hitler."
 NOR.Nat_Populism: "£NOR_Nat_Populism_small Parti du progrès"
 NOR.Nat_Populism_icon: "£NOR_Nat_Populism_small"
 NOR.Nat_Populism_desc: "Populiste de droite - Le Fremskrittspartiet (Parti du progrès) est à la base un parti populiste. Il est favorable à la fin de l'immigration, en particulier celle en provenance des pays musulmans. Ils sont en faveur d'un État fort et de l'armée, et ont défendu l'augmentation des dépenses publiques pour les autoroutes, les personnes âgées et la santé."
 NOR.Monarchist: "£NOR_nationalist_monarchist Maison de Glücksburg"
 NOR.Monarchist_icon: "£NOR_nationalist_monarchist"
 NOR.Monarchist_desc: ""
 CHI.conservatism: "£CHI_conservative Union des nationalistes chinois"
 CHI.conservatism_icon: "£CHI_conservative"
 CHI.conservatism_desc: "Conservateur pro-occidental - L'Union des nationalistes chinois, également connue sous le nom d'Alliance pan-bleue chinoise, est un parti conservateur libéral qui cherche à réunifier la Chine. Il valorise la démocratie libérale et les trois principes du peuple."
 CHI.liberalism: "£CHI_liberal Parti démocrate chinois"
 CHI.liberalism_icon: "£CHI_liberal"
 CHI.liberalism_desc: "Libéral - Le Parti de la démocratie de Chine est un parti interdit en République populaire de Chine. Le réformisme et la démocratie libérale sont ses valeurs fondamentales. Selon la plupart des sources occidentales, il est composé d'activistes démocrates et d'anciens dirigeants étudiants ayant participé aux manifestations de la place Tian'anmen."
 CHI.socialism: "£CHI_social_democrat Fédération pour une Chine démocratique"
 CHI.socialism_icon: "£CHI_social_democrat"
 CHI.socialism_desc: "Social-démocrate - La FCD (Fédération pour une Chine démocratique) est un groupe basé au Canada qui milite pour la démocratisation de la République populaire. Il s'agit de l'un des plus grands mouvements pro-démocratie en Chine et à l'étranger."
 CHI.Communist-State: "£CHI_communism Parti communiste chinois"
 CHI.Communist-State_icon: "£CHI_communism"
 CHI.Communist-State_desc: "Communiste - Le Parti communiste chinois est le parti fondateur et dirigeant de la République populaire. C'est le seul parti au pouvoir en Chine continentale. Il a été fondé en 1921 et est resté au pouvoir depuis 1949, après la fin de la guerre civile chinoise. Il est également le principal parti du Front uni chinois."
 CHI.Autocracy: "£CHI_pro_emerging_autocrat Ligue démocratique de Chine"
 CHI.Autocracy_icon: "£CHI_pro_emerging_autocrat"
 CHI.Autocracy_desc: "Autocrate - La Ligue démocratique de Chine est l'un des neuf membres du Front uni. C'est également l'un des seuls partis politiques légaux en Chine. Ses membres défendent le patriotisme chinois et le socialisme de base."
 CHI.anarchist_communism: "£CHI_left_wing_radical Comité révolutionnaire du Kuomintang de Chine"
 CHI.anarchist_communism_icon: "£CHI_left_wing_radical"
 CHI.anarchist_communism_desc: "Radical de gauche - Le CRKC est l'un des neuf membres qui composent le Front uni chinois. Il défend les Trois principes du peuple, le nationalisme de gauche et le socialisme démocratique. Le parti est considéré comme le second du PCC et se voit donc attribuer le plus grand nombre de sièges à la Conférence consultative politique du peuple chinois. Par ailleurs, il est l'un des seuls partis mineurs autorisés à gérer et à conserver des actifs."
 CHI.Caliphate: "£CHI_salafist_jihadism Parti islamique du Turkestan"
 CHI.Caliphate_icon: "£CHI_salafist_jihadism"
 CHI.Caliphate_desc: ""
 CHI.neutral_Social: "£CHI_neutral_social_democrat Association chinoise pour la promotion de la démocratie"
 CHI.neutral_Social_icon: "£CHI_neutral_social_democrat"
 CHI.neutral_Social_desc: "Social-démocrate neutre - Le parti a été formé à la fin de 1945 comme une autre alternative au PCC. Il s'agit de l'un des plus grands partis mineurs."
 CHI.Neutral_Communism: "£CHI_neutral_communism Parti communiste maoïste de Chine"
 CHI.Neutral_Communism_icon: "£CHI_neutral_communism"
 CHI.Neutral_Communism_desc: "Communiste - Le Parti communiste maoïste de Chine est un parti communiste antirévisionniste clandestin de la République populaire. Il cherche à renverser le bloc dirigeant révisionniste avec le Parti communiste chinois et à atteindre le vrai communisme."
 CHI.Nat_Autocracy: "£CHI_military_junta Armée populaire de libération"
 CHI.Nat_Autocracy_icon: "£CHI_military_junta"
 CHI.Nat_Autocracy_desc: "Junte militaire - L'APL, ou Armée populaire de libération, a été fondée en 1927 lors du soulèvement de Nanchang. Elle constitue les forces armées de la République populaire de Chine et de son parti politique fondateur."
 CHI.Monarchist: "£CHI_monarchism Maison d'Aisin-Gioro"
 CHI.Monarchist_icon: "£CHI_monarchism"
 CHI.Monarchist_desc: "Monarchiste - La maison impériale d'Aisin-Gioro a gouverné la Chine pendant près de 276 ans jusqu'à ce que l'impératrice Longyu publie un édit impérial entraînant l'abdication de l'enfant empereur Puyi. La dynastie dirigée par les Mandchous a souvent été condamnée dans l’histoire officielle de la Chine pour ses concessions aux puissances étrangères et son oppression de la majorité Han."
 PER.conservatism: "£PER_conservatism (IC) Les conservateurs iraniens"
 PER.conservatism_desc: "(Conservatisme) - Conservateurs iraniens (persan/farsi : Mohafeze Karân)\n\nLes démocrates conservateurs iraniens tentent de rester proches des idéaux traditionalistes et aiment rester dans le cadre général des anciennes coutumes, tout en essayant de promouvoir une société plus libérale. Ils adoptent une approche plus lente en matière de réformes, mettant en œuvre des politiques à un rythme plus lent afin de ne pas causer de problèmes avec les éléments conservateurs de la nation."
 PER.liberalism: "£PER_liberalism (IL) Les libéraux iraniens"
 PER.liberalism_desc: "(Libéralisme) - Les libéraux iraniens (persan/farsi : Liberalân)\n\nLes libéraux iraniens recherchent une forme de gouvernement plus laïque, prônant les droits de l'homme, la liberté individuelle et la démocratie. Ils réclament souvent davantage de libertés civiles, ce qui les met en désaccord avec les groupes conservateurs du pays."
 PER.socialism: "£PER_socialism  (IP) Parti Iranien"
 PER.socialism_icon: "£PER_socialism"
 PER.socialism_desc: "(Démocratie sociale) - Parti iranien (persan/farsi : Hezb-é Iran)\n\nLe Hezb-é Iran, également connu sous le nom de Parti iranien, était souvent considéré comme l'épine dorsale du parti du Front national. Créé par des technocrates issus principalement de l'éducation européenne, le Parti iranien promeut la démocratie sociale et le nationalisme libéral en Iran."
 PER.Western_Autocracy: "£PER_Western_Autocracy  (CPI) Parti constitutionnaliste d'Iran (§CL-D§!)"
 PER.Western_Autocracy_icon: "£PER_Western_Autocracy"
 PER.Western_Autocracy_desc: "(Monarchie constitutionnaliste) - Parti constitutionnaliste d'Iran (en persan/farsi : Hezb-é Mashrut-é Iran - Libéral-démocrate)\n\nLe Parti constitutionnaliste d'Iran (libéral-démocrate) attend le retour de Reza Pahlavi et condamne fermement les révolutionnaires qui l'ont renversé. Bien qu'ils ne souhaitent pas une monarchie absolue, ils ont laissé entendre qu'un contrôle plus direct serait accordé au Shah par rapport aux autres groupes constitutionnalistes."
 PER.Communist-State: "£PER_communism (TPI) Parti Tudeh d'Iran"
 PER.Communist-State_icon: "£PER_communism"
 PER.Communist-State_desc: "(Marxiste-Léninisme) - Parti Tudeh d'Iran (persan/farsi : Hezb-é Tude-ye Irân)\n\nLe Parti des masses d'Iran (Tudeh) a été fondé en 1941, avec Soleiman Mirza Eskandari comme chef, et il a eu une influence considérable dans ses premières années et a joué un rôle crucial pendant la campagne de Mohammad Mosaddegh pour nationaliser la compagnie pétrolière anglo-persane. Le groupe est devenu pro-soviétique après la crise pétrolière iranienne de 1946, et a été brutalement réprimé depuis."
 PER.Conservative: "£generic_Mod_Vilayat_e_Faqih_small Corps des gardiens de la révolution islamique (IRGC) (aile politique)"
 PER.Conservative_desc: "(Militarisme chiite) - Corps des gardiens de la révolution islamique (persan/farsi : Sepāh-é Pāsdarān)\n\nLe Corps des gardiens de la révolution islamique (IRGC) est une branche des forces armées iraniennes, fondée après la révolution iranienne le 22 avril 1979 sur ordre de l'ayatollah Ruhollah Khomeini afin de défendre les frontières iraniennes et de maintenir l'ordre intérieur. L'organisation s'est étendue à la sphère politique, nombre de ses anciens membres se présentant comme des partisans de la ligne dure aux élections."
 PER.Autocracy: "£PER_autocracy (STQ) Enseignants du Séminaire de Qom"
 PER.Autocracy_desc: "(Chiisme radical) - Société des professeurs de séminaire de Qom (persan/farsi : Jâme'e Mādarressin-é Qom)\n\nLa Société des professeurs de séminaire de Qom a été créée par un groupe d'étudiants de l'ayatollah Khomeini, afin d'organiser les activités politiques des partisans de Khomeini et de promouvoir son interprétation révolutionnaire de l'islam, comme l'idée de Vilayat-é Faqih (gouvernement islamique)."
 PER.Vilayat_e_Faqih: "£PER_Vilayat_e_Faqih  (FoP) Adeptes du principe"
 PER.hardline_totalitarian: "£generic_Vilayat_e_Faqih_small Hezb-é Jomhuriye Eslami"
 PER.hardline_totalitarian_desc: ""
 PER.Vilayat_e_Faqih_desc: ""
 PER.Mod_Vilayat_e_Faqih: "£PER_Mod_Vilayat_e_Faqih  (RFS) Réformistes"
 PER.Mod_Vilayat_e_Faqih_desc: ""
 PER.anarchist_communism: "£PER_anarchist_communism (MEK) Organisation des Moudjahidines du peuple d'Iran"
 PER.anarchist_communism_icon: "£PER_anarchist_communism"
 PER.anarchist_communism_desc: "(Islamisme marxiste) - Organisation des Moudjahidines du peuple d'Iran (en persan/farsi : Mojâhedin-é Khalq-é Irân)\n\nLe MEK, également connu sous le nom d'Organisation des Moudjahidines du peuple d'Iran, a été fondé en 1965 en opposition à la dynastie Pahlavi, et ses principes fondateurs ont été fortement influencés par le marxisme et l'islamisme. On le qualifie souvent de groupe « sectaire », car sa structure de parti s'articule autour de Maryam et Massoud Rajavi. Le MEK veut mettre en œuvre une série de plans qui pousseraient l'Iran vers un État plus fédéralisé et socialiste."
 PER.Caliphate: "£generic_Caliphate_small Wilaya du Khorassan"
 PER.Caliphate_desc: ""
 PER.Neutral_conservatism: " £PER_Neutral_conservatism  (NFI) Front national iranien"
 PER.Neutral_conservatism_icon: "£PER_Neutral_conservatism"
 PER.Neutral_conservatism_desc: "(Nationalisme civique) - Front national d'Iran (persan/farsi : Jebhe-ye Melli-ye Irân)\n\nJebhe-ye Melli-ye Iran, ou autrement connu sous le nom de Front national, est un parti nationaliste iranien fondé par Mohammad Mossadegh. Sous le règne de Mohammad Reza Pahlavi, l'atmosphère politique est devenue si restrictive que le Front national a cessé d'exister après quelques années. Finalement, en 1977, alors que le règne du Shah touchait lentement à sa fin, Karim Sanjabi a relancé le Front national et a repris ses activités en Iran, jusqu'à ce qu'il soit interdit par le régime de l'Ayatollah."
 PER.oligarchism: "£generic_oligarchism_small (OI) Les oligarques d'Iran"
 PER.oligarchism_desc: ""
 PER.neutral_Social: "£PER_neutral_Social (FMI) Mouvement pour la liberté d'Iran"
 PER.neutral_Social_desc: "(Démocratie islamique) - Mouvement de libération de l'Iran (en persan/farsi : Nahżat-é āzādi-é Irān)\n\nLe Mouvement de libération de l'Iran se décrit comme « musulmans, iraniens, constitutionnalistes et mossadeghistes ». Il fait partie des plus anciens partis actifs en Iran et est connu pour être un groupe semi-opposant à la République islamique. Le Mouvement de libération de l'Iran est basé sur une interprétation modérée de l'islam. Il rejette à la fois la dictature royale et cléricale et est en faveur du libéralisme politique et économique."
 PER.Neutral_Libertarian: "£generic_Neutral_Libertarian_small (ILT) Les libertariens iraniens"
 PER.Neutral_Libertarian_desc: ""
 PER.Neutral_Autocracy: "£PER_Neutral_Autocracy (RST) Redémarrage"
 PER.Neutral_Autocracy_desc: "(Conspirationnistes de droite) - Redémarrage (persan/farsi : Restârt)\n\nRedémarrage (qui signifie littéralement un nouveau départ) est un parti politique mystique dirigé par Seyed Mohammad Hosseini qui croit en la création d'un empire soufi en Iran. Le groupe a été décrit comme dirigé par des conspirationnistes en raison de leurs croyances, un exemple étant que Khatami est un espion zoroastrien qui veut restaurer la dynastie Pahlavi. De plus, le groupe soutient la création d'une version iranienne du deuxième amendement où les citoyens ont le droit de porter des armes, et leur parti a adopté le slogan « Make Iran Great Again ». Le groupe blâme également les minorités telles que les zoroastriens, les baha'is et les juifs pour les problèmes de l'Iran."
 PER.Neutral_Communism: "£PER_Neutral_Communism (WPI) Parti communiste-ouvrier d'Iran"
 PER.Neutral_Communism_desc: "(Marxisme ouvrier) - Parti communiste-ouvrier d'Iran (en persan/farsi : Hezb-é Kommunist-é Kârgari)\n\nLe Hezb-é Kommunist-é Kargari-ye Iran, également connu sous le nom de Parti communiste-ouvrier d'Iran, a été créé en 1991 pour renverser la République islamique et établir une république socialiste à sa place."
 PER.Neutral_green: "£PER_Neutral_green (GPI) Parti vert d'Iran"
 PER.Neutral_green_desc: "(Politique verte) - Le Parti vert d'Iran (en persan/farsi : Hezb-é Sabzhā-ye Irān)\n\nLe Parti vert d'Iran a une position radicale à l'égard du ministère iranien de l'Environnement et considère cet organisme gouvernemental comme un moyen de dissimuler la mauvaise gestion de la République islamique."
 PER.Neutral_Muslim_Brotherhood: "£PER_Neutral_Muslim_Brotherhood (GPH) Le chemin vert de l'espoir"
 PER.Neutral_Muslim_Brotherhood_desc: "(Républicanisme) - Le Chemin vert de l'espoir (en persan/farsi : Rāh-é Sabz-é Omid)\n\nFondée par Mir-Hossein Mousavi, le Chemin vert de l'espoir est une association iranienne qui cherche à ouvrir la voie à la démocratie par des moyens pacifiques. Mousavi a choisi de choisir le terme « Chemin » plutôt que « Parti » car les partis devaient être approuvés par le gouvernement, ce que Mousavi ne reconnaissait pas comme légitime. Le Chemin vert de l'espoir est un mouvement réformiste, qui intègre les idéaux républicains et islamiques modérés pour former son idéologie fondamentale."
 PER.Nat_Autocracy: "£PER_military_junta  (AJA) Forces armées iraniennes"
 PER.Nat_Autocracy_desc: "(Junte militaire) - L'armée iranienne/Artesh (persan/farsi : Arteš-é Irān)\n\nL'Artesh-é Iran, ou les forces armées iraniennes, a été créée en 550 av. J.-C., sa forme la plus moderne ayant été créée en 1921 lors de la montée de la dynastie Pahlavi. L'Artesh est restée pour la plupart apolitique dans les affaires iraniennes, à la fois à l'époque Pahlavi et à l'époque des Républiques islamiques. Tout au long de l'histoire, l'Artesh est restée fidèle au gouvernement au pouvoir, mais elle est intervenue dans certains cas de l'histoire politique iranienne."
 PER.Nat_Fascism: "£PER_fascism (MAI) Assemblée du Royaume d'Iran"
 PER.Nat_Fascism_desc: "(Monarchisme ultra-nationaliste) - L'Assemblée du Royaume d'Iran (persan/farsi : Anjoman-e Pâdeshâhi-ye Irân/Tondâr)\n\nLe Tondâr (qui signifie Tonnerre en persan) est un parti monarchiste ultra-nationaliste. Le groupe cherche à restaurer une monarchie, que ce soit celle des Pahlavi ou une nouvelle. Le groupe est fortement opposé à l'islam et à la religion dans son ensemble, et le considère comme étranger et extra-terrestre. Il pratique également une forte discrimination à l'encontre des Arabes, utilisant le mot « Tâzi » pour faire une distinction entre les Iraniens et les Arabes."
 PER.Nat_Populism: "£PER_Nat_Populism_small (PIP) Parti pan-iranien"
 PER.Nat_Populism_icon: "£PER_Nat_Populism_small"
 PER.Nat_Populism_desc: "(Pan-Iranisme) - Parti pan-iranien d'Iran (en persan/farsi : Hezb-é Pān-Irānist)\n\nLe Parti pan-iranien a été créé en 1952 pour promouvoir l'unification des peuples iraniens et la restitution des territoires iraniens perdus au cours d'une période d'humiliation et de défaites aux XVIIIe et XIXe siècles. Il s'oppose fermement à l'implication de puissances étrangères en Iran et dans la région, et accorde une grande importance à l'indépendance nationale par-dessus tout."
 PER.nation_party: "£PER_Nat_Populism_small (NPI) Parti de la Nation d'Iran"
 PER.nation_party_desc: "(Démocrates nationalistes) - Parti de la Nation d'Iran (en persan/farsi : Hezb-é Mellat-é Irân)\n\nLe Hezb-e Mellat-e Iran, ou le Parti de la Nation, s'est séparé des pan-iranistes en octobre 1951, à la suite d'un conflit entre Pezekshapour et Forouhar. Forouhar voulait promouvoir un programme plus démocratique, tandis que Pezekshapour voulait pousser le parti vers l'autoritarisme, ce qui a conduit Forouhar à créer le Parti de la Nation."
 PER.Monarchist: "£PER_monarchism (HoP) Maison des Pahlavi"
 PER.Monarchist_icon: "£PER_monarchism"
 PER.Monarchist_desc: "(Monarchie absolue) - Dynastie Pahlavi (persan/farsi : Saltānāt-é Pāhlavi)\n\nLa Maison Pahlavi est souvent citée pour ses réalisations dans la modernisation de l'Iran et pour avoir établi le cadre du nationalisme iranien moderne. La Maison Pahlavi a tenté de faire avancer ses efforts de modernisation en sécularisant largement le pays, ce qui l'a souvent mis en désaccord avec les éléments islamistes du pays."
 POL.conservatism: "£POL_conservatism_small AWS"
 POL.conservatism_icon: "£POL_conservatism_small"
 POL.conservatism_desc: "Conservateur - L'Akcja Wyborcza Solidarność (Alliance électorale Solidarité) est une large coalition politique réunissant des libéraux, des conservateurs et des partis chrétiens."
 POL.conservatism_1: "£POL_conservatism_1_small PiS"
 POL.conservatism_1_icon: "£POL_conservatism_1_small"
 POL.conservatism_1_desc: "Conservateur - Prawo i Sprawiedliwość (Droit et justice) est le parti national-conservateur et chrétien-démocrate dominant en Pologne, combinant l'interventionnisme économique et le bien-être social avec une vision socialement conservatrice. Il prône une coopération prudente avec l'Union européenne et est résolument anti-russe."
 POL.liberalism: "£POL_liberalism_small UW"
 POL.liberalism_desc: "Libéral - L'Unia Wolności (Union pour la liberté) est une fusion de l'Union démocratique (Unia Demokratyczna, UD) et du Congrès libéral-démocrate (Kongres Liberalno-Demokratyczny, KLD). Il représente la tradition démocratique et libérale européenne, défend l'économie de marché et la liberté individuelle, rejette l'extrémisme et le fanatisme."
 POL.liberalism_icon: "£POL_liberalism_small"
 POL.liberalism_1: "£POL_liberalism_1_small PO"
 POL.liberalism_1_desc: "Libéral - La Platforma Obywatelska (Plate-forme civique) est un parti politique polonais centriste de grande envergure qui défend une économie ordolibérale et une position sociale pro-européenne, de centre à centre-droit."
 POL.liberalism_1_icon: "£POL_liberalism_1_small"
 POL.socialism: "£POL_socialism_small SLD"
 POL.socialism_icon: "£POL_socialism_small"
 POL.socialism_desc: "Social-démocrate - La Sojusz Lewicy Demokratycznej (Alliance de la gauche démocratique) est un parti de centre-gauche, de troisième voie, aux racines post-communistes. Ses politiques peuvent être décrites comme pro-européennes, économiquement interventionnistes et socialement centristes."
 POL.Communist-State: "£generic_Communist_State_small Związek Komunistów Polskich « Prolétariat »"
 POL.Communist-State_desc: ""
 POL.Communist-State_2017: "£generic_Communist_State_small Komunistyczna Partia Polski"
 POL.Communist-State_2017_desc: ""
 POL.Conservative: "£POL_Conservative_small Samoobrona"
 POL.Conservative_icon: "£POL_Conservative_small"
 POL.Conservative_desc: "Réactionnaire - La Samoobrona Rzeczpospolitej Polskiej (Autodéfense de la république de Pologne) est un parti populiste de gauche, conservateur, connu pour ses campagnes électorales controversées. Il est eurosceptique, et n'est pas opposé à la coopération avec la Russie et d'autres États post-soviétiques."
 POL.Conservative_2017: "£generic_Conservative_small Partia Zmiana"
 POL.Conservative_2017_desc: "Réactionnaire - Le Partia Zmiana (Parti du changement) est un parti politique pro-russe et anti-occidental, lié aux services de renseignement russes."
 POL.anarchist_communism: "£generic_anarchist_communism_small Polska Partia Socjalistyczna"
 POL.anarchist_communism_desc: ""
 POL.Neutral_conservatism: "£POL_walesa Chrétienne Démocratie de la IIIe République"
 POL.Neutral_conservatism_icon: "£POL_walesa"
 POL.Neutral_conservatism_desc: "La Chrétienne Démocratie de la IIIe République Polonaise (ChDRP) est un parti politique polonais fondé en 1997 par Lech Wałęsa. C'est un parti démocrate-chrétien qui plaide pour une économie de marché libre, la justice sociale et une défense nationale forte. Le parti a été en déclin ces dernières années, mais il reste une force significative dans la politique polonaise."
 POL.Neutral_conservatism_2017: "£POL_Neutral_conservatism_2017_small Kukiz'15"
 POL.Neutral_conservatism_2017_icon: "£POL_Neutral_conservatism_2017_small"
 POL.Neutral_conservatism_2017_desc: "Conservateur - Kukiz'15 est une association regroupant divers militants de centre-droit à droite et de nouveaux venus en politique, qui porte le nom de son leader - un ancien musicien, Paweł Kukiz. Elle est née d'un sentiment contestataire, postulant la rupture du monopole des partis politiques au parlement, la réforme électorale et la démocratie directe."
 POL.oligarchism: "£POL_oligarchism_small PSL"
 POL.oligarchism_icon: "£POL_oligarchism_small"
 POL.oligarchism_desc: "Agraire - Le Polskie Stronnictwo Ludowe (Parti paysan polonais) est un parti agraire, chrétien-démocrate dont l'électorat est majoritairement rural. Il promeut des politiques pro-agricoles et protectionnistes."
 POL.neutral_Social: "£POL_neutral_Social_small Unia Pracy"
 POL.neutral_Social_icon: "£POL_neutral_Social_small"
 POL.neutral_Social_desc: ""
 POL.neutral_Social_2017: "£POL_neutral_Social_2017_small Razem"
 POL.neutral_Social_2017_icon: "£POL_neutral_Social_2017_small"
 POL.neutral_Social_2017_desc: "Socialiste démocratique - Razem (Ensemble) est un parti politique polonais progressiste de gauche qui prône l'introduction d'un système socialiste démocratique avec des lois du travail strictes, une protection sociale et une fiscalité progressive, et qui s'oppose à la privatisation et à la déréglementation."
 POL.Neutral_Libertarian: "£generic_Neutral_Libertarian_small Libertariens"
 POL.Neutral_Libertarian_desc: ""
 POL.Neutral_Libertarian_2017: "£POL_Neutral_Libertarian_2017_small Wolność"
 POL.Neutral_Libertarian_2017_icon: "£POL_Neutral_Libertarian_2017_small"
 POL.Neutral_Libertarian_2017_desc: "Libertaire - Wolność (Liberté) est un parti libéral-conservateur concentré autour de son leader, Janusz Korwin-Mikke, prônant la réduction du rôle du gouvernement, la privatisation généralisée et la dérégulation, tout en maintenant une position idéologique conservatrice."
 POL.Neutral_green: "£generic_Neutral_green_small Polska Partia Ekologiczna - Zielonych"
 POL.Neutral_green_desc: ""
 POL.Neutral_green_2017: "£POL_Neutral_green_2017_small Partia Zieloni"
 POL.Neutral_green_2017_icon: "£POL_Neutral_green_2017_small"
 POL.Neutral_Green_2017_desc: ""
 POL.Nat_Autocracy: "£POL_Nat_Autocracy_small Siły Zbrojne Rzeczypospolitej Polskiej"
 POL.Nat_Autocracy_icon: "£POL_Nat_Autocracy_small"
 POL.Nat_Autocracy_desc: ""
 POL.Nat_Fascism: "£POL_Nat_Fascism_small ONR"
 POL.Nat_Fascism_icon: "£POL_Nat_Fascism_small"
 POL.Nat_Fascism_desc: "Fasciste - L'Obóz Narodowo-Radykalny (Camp national-radical) est un mouvement d'extrême-droite, souvent décrit comme fasciste et parfois comme néo-nazi. L'ONR se considère comme un descendant idéologique du Camp national-radical des années 1930, un mouvement politique fasciste et antisémite."
 POL.Nat_Populism: "£POL_Nat_Populism_small LPR"
 POL.Nat_Populism_icon: "£POL_Nat_Populism_small"
 POL.Nat_Populism_desc: "Populiste de droite - La Liga Polskich Rodzin (Ligue des familles polonaises) est un parti politique de droite qui se considère comme le successeur du mouvement Démocratie nationale d'avant-guerre. Il défend une position nationaliste, proche de l'extrême-droite populiste."
 POL.Nat_Populism_2017: "£POL_Nat_Populism_2017_small Ruch Narodowy"
 POL.Nat_Populism_2017_icon: "£POL_Nat_Populism_2017_small"
 POL.Nat_Populism_2017_desc: "Populiste de droite - Ruch Narodowy (Mouvement national) est une alliance politique polonaise composée de divers mouvements politiques de droite, d'extrême droite et nationalistes. Elle fait référence au mouvement Démocratie nationale d'avant-guerre, avec un point de vue anti-européen, anti-mondialisation et ultraconservateur."
 POL.Monarchist: "£POL_Neutral_Libertarian_small UPR"
 POL.Monarchist_icon: "£POL_Monarchist_small"
 POL.Monarchist_desc: "Libertaire - Unia Polityki Realnej (Union de la Politique Réelle) est un parti conservateur-libéral visant à réduire le rôle du gouvernement à un minimum. Il est généralement socialement conservateur."
 SER.Western_Autocracy: "£SER_western_autocrat Srpski Pokret Obnove"
 SER.Western_Autocracy_icon: "£SER_western_autocrat"
 SER.Western_Autocracy_desc: "Autocrate pro-occidental - Le Srpski Pokret Obnove (Mouvement serbe du renouveau, SPO) est un parti monarchiste orienté vers l'Europe, qui prône la réconciliation avec tous les anciens États yougoslaves, la coopération économique mutuelle et toutes les formes d'intégration euroatlantique, y compris l'adhésion à l'UE et à l'OTAN."
 SER.conservatism: "£SER_western_conservative Nova Srbija"
 SER.conservatism_icon: "£SER_western_conservative"
 SER.conservatism_desc: "Conservateur - La Nova Srbija (Nouvelle-Serbie), un parti monarchiste mineur de centre-droit qui est apparu après que ses membres se soient séparés du SPO en raison de conflits internes au parti et d'allégations de liens entre la direction du SPO et le régime de Milošević."
 SER.liberalism: "£SER_western_liberal Demokratska Stranka"
 SER.liberalism_icon: "£SER_western_liberal"
 SER.liberalism_desc: "Libéral - Le Demokratska Stranka (Parti démocrate, DS) est un parti de centre-gauche libéral pro-occidental et était l'un des plus grands partis de la coalition Demokratska Opozicija Srbije (Opposition démocratique de Serbie). Son leader, Zoran Ðindic, est ensuite devenu Premier ministre du pays, mais en raison de sa « guerre contre le crime » et de ses désaccords avec le leader conservateur du DSS et nouveau président yougoslave, Voislav Kostunica, une nouvelle lutte pour le pouvoir entre les anciens alliés était inévitable."
 SER.socialism: "£SER_western_social_democrat Socijaldemokratska Unija"
 SER.socialism_icon: "£SER_western_social_democrat"
 SER.socialism_desc: "Social-démocrate - La Socijaldemokratska Unija (Union sociale-démocrate) est un parti mineur de gauche, anti-guerre et anti-nationalisme, qui a participé à la coalition de l'Opposition démocratique de Serbie. Comme il est favorable aux droits des LBGT, ses bureaux ont été saccagés et ses membres ont été battus par des nationalistes."
 SER.Communist-State: "£SER_emerging_communism Nova Komunistička Partija Jugoslavije"
 SER.Communist-State_icon: "£SER_emerging_communism"
 SER.Communist-State_desc: "Communiste - Le Nova Komunistička Partija Jugoslavije (Nouveau parti communiste de Yougoslavie, NKPJ) a été formé en 1990 comme une alternative non-titoïste à la Ligue des communistes de Yougoslavie."
 SER.Communist-State_2017: "£SER_emerging_communism_alt Komunistička Partija"
 SER.Communist-State_2017_icon: "£SER_emerging_communism_alt"
 SER.Communist-State_2017_desc: "Communiste - Komunistička Partija (Parti communiste). Le KP est né de la fusion entre le Nouveau Parti communiste de Yougoslavie et les sociaux-démocrates de Novi Sad. Elle est dirigée par le petit-fils de Josip Broz Tito"
 SER.anarchist_communism: "£SER_anarchist_communism Jugoslovenska Levica"
 SER.anarchist_communism_icon: "£SER_anarchist_communism"
 SER.anarchist_communism_desc: "Radical de gauche - La Jugoslovenska Levica (Gauche yougoslave, JUL) a été formé en 1994 par la fusion de 19 partis de gauche sous la direction de la Ligue des communistes. Il s'agissait d'un parti nationaliste et pro-yougoslave qui entretenait certains liens internationaux avec d'autres partis communistes, comme celui de la Chine, de Cuba et de la Corée du Nord. En raison de son étroite collaboration avec ces derniers, son adversaire le qualifiait souvent de « marionnette chinoise »."
 SER.anarchist_communism_2017: "£SER_anarchist_communism_alt Pokret Socijalista"
 SER.anarchist_communism_2017_icon: "£SER_anarchist_communism_alt"
 SER.anarchist_communism_2017_desc: "Radical de gauche - Le Pokret Socijalista (Mouvement des socialistes, PS) est un parti politique populiste et nationaliste de gauche fondé en 2008. Il est formé par d'anciens membres du Parti socialiste de Serbie parce qu'ils n'étaient pas d'accord avec la politique pro-UE du parti."
 SER.Conservative: "£SER_conservatism Sabor Srpskog Jedinstva"
 SER.Conservative_icon: "£SER_conservatism"
 SER.Conservative_desc: "Réactionnaire - Jedinstvena Srbija (Serbie unie) Un parti national-conservateur mineur. Il est résolument conservateur sur le plan social et prône également le régionalisme."
 SER.Autocracy: "£SER_Autocracy Srpska Narodna Partija"
 SER.Autocracy_icon: "£SER_Autocracy"
 SER.Autocracy_desc: "Autocrate - Le Srpska Narodna Partija (Parti populaire serbe, SNP) est un parti populiste de droite russophile. Le parti est favorable à un renforcement des liens entre la Serbie et la Russie et s'oppose à l'adhésion de la Serbie à l'Union européenne."
 SER.Neutral_Muslim_Brotherhood: "£SER_Neutral_Muslim_Brotherhood BDSS"
 SER.Neutral_Muslim_Brotherhood_icon: "£SER_Neutral_Muslim_Brotherhood"
 SER.Neutral_Muslim_Brotherhood_desc: "Islamiste modéré - Le Bošnjačka demokratska stranka Sandžaka (Parti démocratique bosniaque du Sandžak) est un parti mineur qui défend les droits des musulmans bosniaques."
 SER.Neutral_Autocracy: "£SER_emerging_reactionary Sabor Srpskog Jedinstva"
 SER.Neutral_Autocracy_icon: "£SER_emerging_reactionary"
 SER.Neutral_Autocracy_desc: "Autocratie neutre - Sabor Srpskog Jedinstva (Conseil de l'unité serbe) Un parti nationaliste mineur, fondé par Zeljko Raznatovic « Arkan », qui était un chef de l'organisation paramilitaire « Garde des volontaires serbes » et le chef du crime le plus puissant de tous les Balkans. Recherché par l'ONU pour crimes contre l'humanité, il a été assassiné dans les premières semaines de l'année 2000. Le nouveau patron du parti, Borislav Pelevic, n'a jamais été très doué en politique."
 SER.Neutral_Autocracy_alt: "£SER_western_liberal_alt Srpska Napredna Stranka"
 SER.Neutral_Autocracy_alt_icon: "£SER_western_liberal_alt"
 SER.Neutral_Autocracy_alt_desc: "Srpska Napredna Stranka (Parti progressiste serbe). Le SNS est un parti politique populiste de centre-droit fondé par les membres les plus modérés du Parti radical serbe."
 SER.Neutral_conservatism: "£SER_non_aligned_conservative Demokratska Stranka Srbije"
 SER.Neutral_conservatism_icon: "£SER_non_aligned_conservative"
 SER.Neutral_conservatism_desc: "Conservateur - Le Demokratska Stranka Srbije (Parti démocrate de Serbie) est le plus grand parti de la Demokratska Opozicija Srbije (Opposition démocratique de Serbie), une coalition de presque tous les partis d'opposition anti-Milosevic. Le DSS est de nature conservatrice et bénéficie du soutien de la mafia serbe."
 SER.Neutral_Libertarian: "£SER_non_aligned_libertarian Građanski Savez Srbije"
 SER.Neutral_Libertarian_icon: "£SER_non_aligned_libertarian"
 SER.Neutral_Libertarian_desc: "Libertaire - La Građanski Savez Srbije (Alliance civique de Serbie) est un parti pacifique libéral pro-européen très mineur."
 SER.Neutral_green: "£SER_Neutral_green Zeleni Srbije"
 SER.Neutral_green_icon: "£SER_Neutral_green"
 SER.Neutral_green_desc: "Écologiste - Les Zeleni Srbije (Verts de Serbie, ZS) est un parti politique vert en Serbie. Ce parti prône la sagesse environnementale et écologique, la justice sociale et la solidarité, la démocratie directe, l'économie verte, la durabilité, le respect de la diversité et des droits de l'homme, et la prévention de toute forme de violence."
 SER.neutral_Social: "£SER_neutral_Social Socijalistička Partija Srbije - §CAile démocrate§!"
 SER.neutral_Social_icon: "£SER_neutral_Social"
 SER.neutral_Social_desc: "Socialiste démocratique - Le Socijalistička Partija Srbije (Parti socialiste de Serbie). Bien que nominalement un parti socialiste avec une politique économique de gauche et des liens directs avec l'ancienne Ligue des communistes de Serbie, sous Slobodan Milošević, le parti est apparu comme nationaliste, isolationniste et anti-occidental. Après la chute de Milošević, le parti est revenu à ses racines de gauche, et a même adopté une position pro-UE."
 SER.Neutral_Communism: "£SER_Neutral_Communism Savez Komunista Jugoslavije u Srbiji"
 SER.Neutral_Communism_icon: "£SER_Neutral_Communism"
 SER.Neutral_Communism_desc: "Communiste - La Savez Komunista Jugoslavije u Srbiji (Ligue des communistes de Serbie) sont les vestiges de la Ligue yougoslave des communistes de Tito."
 SER.Nat_Populism: "£SER_Nat_Populism Socijalistička Partija Srbije"
 SER.Nat_Populism_icon: "£SER_Nat_Populism"
 SER.Nat_Populism_desc: "Populiste de droite - Le Socijalistička Partija Srbije (Parti socialiste de Serbie). Bien qu'étant nominalement un parti socialiste avec une politique économique de gauche et des liens directs avec l'ancienne Ligue des communistes de Serbie, sous Slobodan Milošević, le parti s'est révélé nationaliste, isolationniste et anti-occidental. Promouvant le nationalisme serbe, il a provoqué l'éclatement de la Yougoslavie et a cherché à maximiser les gains serbes dans les guerres de Yougoslavie qui en ont résulté par divers moyens, dont le nettoyage ethnique."
 SER.Nat_Populism_2017: "£SER_Nat_Populism_alt Srpski Pokret Dveri"
 SER.Nat_Populism_2017_icon: "£SER_Nat_Populism_alt"
 SER.Nat_Populism_2017_desc: "Populiste de droite - Le Pokret Dveri (Mouvement Dveri) est un mouvement politique de droite à extrême droite. Dveri a été créé en 1999 en tant qu'organisation de jeunesse de droite chrétienne réunie autour du magazine étudiant éponyme."
 SER.Nat_Fascism: "£SER_Nat_Fascism Srpska Radikalna Stranka"
 SER.Nat_Fascism_icon: "£SER_Nat_Fascism"
 SER.Nat_Fascism_desc: "Fasciste - Le Srpska Radikalna Stranka (Parti radical serbe) est un parti ultranationaliste et néofasciste dont l'objectif principal est de créer une Grande Serbie."
 SER.Nat_Autocracy: "£SER_Nat_Autocracy JSO"
 SER.Nat_Autocracy_icon: "£SER_Nat_Autocracy"
 SER.Nat_Autocracy_desc: "Junte militaire - La Jedinica za Specijalne Operacije (Unité d'opérations spéciales), également connue sous le nom de « Bérets rouges », cette unité d'élite des forces de police spéciales du Service de sécurité de l'État yougoslave a été formée à partir de membres de la clandestinité paramilitaire et criminelle. Bien qu'ils n'aient jamais été un parti officiel, ils ont exercé un grand pouvoir. Ils ont assassiné le Premier ministre serbe Zoran Djindjic, ce qui a entraîné l'opération « Sabre », leur licenciement et leur chute."
 SER.Monarchist: "£SER_nationalist_monarchist Dynastie Karađorđević"
 SER.Monarchist_icon: "£SER_nationalist_monarchist"
 SER.Monarchist_desc: "Monarchiste - POKS, le Mouvement pour la restauration du royaume de Serbie, cherche à ramener la famille royale Karadordevic au pouvoir."

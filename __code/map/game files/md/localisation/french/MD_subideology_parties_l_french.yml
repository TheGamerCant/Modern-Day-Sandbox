 PMR.Communist-State: "£PMR_emerging_communism Parti communiste de Transnistrie"
 PMR.Communist-State_icon: "£PMR_emerging_communism"
 PMR.Communist-State_desc: "Le PKP déclare la construction d'une société en Transnistrie où prévaudront les idées d'égalité, de liberté et de justice. Le but de la lutte du parti pour le pouvoir est de créer un État socialement juste pour tous. Le parti prône un retour à l'économie planifiée, faisant référence aux succès du développement économique de la Chine, mené par les communistes ; pour la restauration du contrôle de l'État sur la production et la consommation, non-reconnaissance des résultats de la privatisation. Le parti est également favorable à une modification de la législation électorale du PMR, pour que les élections soient organisées selon un système proportionnel plutôt que majoritaire."
 PMR.Communist-State_sov: "£SOV_emerging_communism CPRF"
 PMR.Communist-State_sov_icon: "£SOV_emerging_communism"
 PMR.Neutral_Communism: "£PMR_left_wing_radical Une République Juste"
 PMR.Neutral_Communism_icon: "£PMR_left_wing_radical"
 PMR.Neutral_Communism_desc: "Le parti se positionne comme un parti d'opposition de gauche. Elle allie socialisme et patriotisme et défend l'indépendance de la Transnistrie. Dans son programme de parti, la République Juste a déclaré que son objectif principal était d'unir les peuples en quête de reconnaissance de l'indépendance du PMR. Le parti considérait l’indépendance comme un moyen de construire une société plus juste et plus cohésive."
 PMR.Neutral_Communism_sov: "£SOV_left_wing_radical_1 Une Russie juste"

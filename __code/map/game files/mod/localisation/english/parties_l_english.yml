l_english:
 IDEOLOGY_fascist:0 "Fascist"
 IDEOLOGY_fascist_noun:0 "Fascism"
 IDEOLOGY_fascist_desc:0 "Authoritarian Regime"
 SUBIDEOLOGY_GENERIC_fascist:0 "Fascist"
 SUBIDEOLOGY_GENERIC_fascist_desc:0 "Fascism is an extreme political ideology promoting the ideology and it's leader above all else. The lives of it's people, the functioning of it's economy, and the integrity of it's laws should all be subservient to the sovereign of the nation.\n\nFascism also promotes ideas of struggle between inside groups and outside groups, with the ideology justifying itself as necessary to protect the inside group form the threat of the outsiders."
 
 IDEOLOGY_ultranationalist:0 "Ultranationalist"
 IDEOLOGY_ultranationalist_noun:0 "Ultranationalism"
 IDEOLOGY_ultranationalist_desc:0 "Authoritarian Regime"
 SUBIDEOLOGY_GENERIC_ultranationalist:0 "Ultranationalist"
 SUBIDEOLOGY_GENERIC_ultranationalist_desc:0 "Ultranationalism is the belief that the natural order of civilisation is conflict, and that any and all means are reasonable to protect and strengthen the nation in this conflict. Ultranationalism typically promotes strict adherence to 'tradtional values', militarism and expansionism as ways to strengthen and ensure the nation's very survival. In this worldview, lesser nations are unworthy of existence, and should be destroyed in the world of might makes right."
 
 IDEOLOGY_right_despotist:0 "Right Despotic"
 IDEOLOGY_right_despotist_noun:0 "Right Despotism"
 IDEOLOGY_right_despotist_desc:0 "Authoritarian Regime"
 SUBIDEOLOGY_GENERIC_right_despotist:0 "Right Despotic"
 SUBIDEOLOGY_GENERIC_right_despotist_desc:0 "A loosely-defined ideology, rightist despots use nationalism as a means to justify their regime's legitimacy, as well as ensuring the nation's security forces are well-equipped to deal with any internal and external threats.\n\nTo further ensure regime legitimacy and security, rightist despots typically align themselves with the western bloc, under the guise of anti-communism."
 
 IDEOLOGY_fundamentalist:0 "Fundamentalist"
 IDEOLOGY_fundamentalist_noun:0 "Fundamentalism"
 IDEOLOGY_fundamentalist_desc:0 "Authoritarian Regime"
 SUBIDEOLOGY_GENERIC_fundamentalist:0 "Fundamentalist"
 SUBIDEOLOGY_GENERIC_fundamentalist_desc:0 "Fundamentalism is the belief that all aspects of a society, from how individuals live their lives to the functioning of government, should be determined by a strict interpretation of religious scripture. Fundamentalist regimes are often brutal in their enforcement of such a total societal order, and frequently involve themselves in other countries' politics to spread their religion and destroy non-believers."
 
 IDEOLOGY_monarchist:0 "Monarchist"
 IDEOLOGY_monarchist_noun:0 "Monarchism"
 IDEOLOGY_monarchist_desc:0 "Authoritarian Regime"
 SUBIDEOLOGY_GENERIC_monarchist:0 "Monarchist"
 SUBIDEOLOGY_GENERIC_monarchist_desc:0 "Believing in a divide right to rule, absolute monarchists explicitly reject democracy. They would argue that as monarchs are raised from birth to govern the land, they are the most qualified to lead the country."
 
 IDEOLOGY_populist:0 "Populist"
 IDEOLOGY_populist_noun:0 "Populism"
 IDEOLOGY_populist_desc:0 "Hybrid Regime"
 SUBIDEOLOGY_GENERIC_populist:0 "Populist"
 SUBIDEOLOGY_GENERIC_populist_desc:0 "Often coming to power through democratic means, most populists don't extend such privileges to those who wish to come next. Stirring up division, hatred and fear-mongering to stay in power, populist governments blend democracy with authoritarian tendencies to stay in power and pass through drastic legislation."
 
 IDEOLOGY_libertarian:0 "Libertarian"
 IDEOLOGY_libertarian_noun:0 "Libertarianism"
 IDEOLOGY_libertarian_desc:0 "Democratic Government"
 SUBIDEOLOGY_GENERIC_libertarian:0 "Libertarian"
 SUBIDEOLOGY_GENERIC_libertarian_desc:0 "Libertarianism as an ideology promotes individual liberty above all, emphasising the rollback of state powers as a necessary step to ensure this personal freedom. They also generally take a non-interventionist foreign policy and extreme laissez-faire economics."

 IDEOLOGY_conservative:0 "Conservative"
 IDEOLOGY_conservative_noun:0 "Conservatism"
 IDEOLOGY_conservative_desc:0 "Democratic Government"
 SUBIDEOLOGY_GENERIC_conservative:0 "Conservative"
 SUBIDEOLOGY_GENERIC_conservative_desc:0 "Believing in traditional values and a strong and assertive foreign policy, conservatives believe that preservation of the status quo is best for society in most aspects. Conservatives also view their democratic society as a point of national pride, believing that the power of their democratic institutions makes their country great compared to other authoritarian regimes.\n\nConservative governments also favour the wealthy economically, by maintaining the economic and social structures that allows for their wealth."
 SUBIDEOLOGY_GENERIC_neoconservative:0 "Neoconservative"
 SUBIDEOLOGY_GENERIC_neoconservative_desc:0 "Believing in traditional values and a strong and assertive foreign policy, neoconservatives believe that preservation of the status quo is best for society in most aspects. Neoconservatives also view their democratic society as a point of national pride, believing that the power of their democratic institutions makes their country great compared to other authoritarian regimes.\n\nNeoconservatives also economically favour market and government agency deregulation, believing them to be the best economic system for growth and societal development."
 
 IDEOLOGY_liberal:0 "Liberal"
 IDEOLOGY_liberal_noun:0 "Liberalism"
 IDEOLOGY_liberal_desc:0 "Democratic Government"
 SUBIDEOLOGY_GENERIC_liberal:0 "Liberal"
 SUBIDEOLOGY_GENERIC_liberal_desc:0 "Liberalism as an ideology believes in strong labour unions and large power in democratic institutions as the best means to change society. Liberalism also promotes the reform of societal structures to allow for more representation in government and more social mobility for the lower classes."
 SUBIDEOLOGY_GENERIC_neoliberal:0 "Neoliberal"
 SUBIDEOLOGY_GENERIC_neoliberal_desc:0 "Believing in personal autonomy and free markets, neoliberals work to maintain the western world order and societal structures. Neoliberals also often favour social reforms, such as LGBT rights and liberal access to abortion."
 
 IDEOLOGY_social_democrat:0 "Social Democrat"
 IDEOLOGY_social_democrat_noun:0 "Social Democracy"
 IDEOLOGY_social_democrat_desc:0 "Democratic Government"
 SUBIDEOLOGY_GENERIC_social_democrat:0 "Social Democrat"
 SUBIDEOLOGY_GENERIC_social_democrat_desc:0 "Favouring sweeping progressive policies, Social Democrats believe the state should take a large role in legislating and enforcing progressive social policies. Social Democrats also favour a more regulated market, believing that an unregulated market leads the wealthy to unfairly exploit the lower classes."
 
 IDEOLOGY_socialist:0 "Socialist"
 IDEOLOGY_socialist_noun:0 "Socialism"
 IDEOLOGY_socialist_desc:0 "Authoritarian Regime"
 SUBIDEOLOGY_GENERIC_socialist:0 "Socialist"
 SUBIDEOLOGY_GENERIC_socialist_desc:0 "Adhering loyally to the vision of Marx, socialists believe in strong workers' presence in government and state control over the economy allow the proletariat to prosper and throw off the shackles of previous class structures."
 
 IDEOLOGY_moderate_communist:0 "Moderate Communist"
 IDEOLOGY_moderate_communist_noun:0 "Moderate Communism"
 IDEOLOGY_moderate_communist_desc:0 "Authoritarian Regime"
 SUBIDEOLOGY_GENERIC_moderate_communist:0 "Moderate Communist"
 SUBIDEOLOGY_GENERIC_moderate_communist_desc:0 "Adhering to the principles of Marxism, the more moderate members of the communist movement believe that a slow transformation to a communist society, as well as being open to limited free market and individualistic policies, are the best way to ensure the transition to a communist society envisioned by Marx."
 
 IDEOLOGY_hardline_communist:0 "Hardline Communist"
 IDEOLOGY_hardline_communist_noun:0 "Hardline Communism"
 IDEOLOGY_hardline_communist_desc:0 "Authoritarian Regime"
 SUBIDEOLOGY_GENERIC_hardline_communist:0 "Hardline Communist"
 SUBIDEOLOGY_GENERIC_hardline_communist_desc:0 "Adhering to the principles of Marxism-Leninism, communist hardliners believe that the state should be tooled to ensure vanguard party rule and spread the revolution. No price can be too great in the pursuit of communism in the eyes of a hardliner."
 
 IDEOLOGY_left_despotist:0 "Left Despotic"
 IDEOLOGY_left_despotist_noun:0 "Left Despotism"
 IDEOLOGY_left_despotist_desc:0 "Authoritarian Regime"
 SUBIDEOLOGY_GENERIC_left_despotist:0 "Left Despotic"
 SUBIDEOLOGY_GENERIC_left_despotist_desc:0 "A loosely-defined ideology, leftist despots use class struggle and nationalism as a means to justify their regime's legitimacy, as well as ensuring the nation's security forces are well-equipped to deal with any internal and external threats.\n\nTo further ensure regime legitimacy and security, leftist despots align themselves with more powerful communist regimes, under the guise of anti-imperialism"
 
 IDEOLOGY_anarchist:0 "Anarchist"
 IDEOLOGY_anarchist_noun:0 "Anarchism"
 IDEOLOGY_anarchist_desc:0 "Free Territory"
 SUBIDEOLOGY_GENERIC_anarchist:0 "Anarchist"
 SUBIDEOLOGY_GENERIC_anarchist_desc:0 "Believing the state to be the means of which the bourgeois oppress the people, anarchists support the total dismantlement of the state and it's institutions. In it's place should be various communes, all protected by local and federal armies."


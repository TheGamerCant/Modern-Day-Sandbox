usa_events.1.t:0 "Hillary Clinton Inaugurated"
usa_events.1.desc:0 "[GetCountryEventBanner]Following her election victory in November of the last year, Hillary Clinton has been inaugurated into office today. Hers may be the most controversial election victory in American history, mostly stemming from the narrow results and the unexpected flipping of Texas, which resulted in many accusations of fraud by the far-right, especially Republican nominee Donald Trump, who broke with the party, following his loss of the candidacy to the more moderate former VP, Paul Ryan. Though with this second loss, he has managed to spin the narrative around, calling the voting system rigged and uniting a large portion of the right with an anti-immigration and populist rhetoric.\n\nBut perhaps even more worrying for the Democrats, are the protests that took place all over the country today, organized by the progressive alliance, headed by Alexandria Ocasio-Cortez and Bernie Sanders. Comprising of several left-wing elements, like the LGBTQ and BLM movements. They focused mostly on Washington DC and on the disruption of the inauguration itself, but also taking place in New York City, Los Angeles, Chicago and Seattle, they amassed an estimate of around 500.000 attendants in total. This movement, like it’s right-wing counterpart, also managed to gain the support of a significant number of Democrat voters, on a platform for more social welfare benefits and improvements of working conditions, than the Party offers.\n\nWith general unrest and public dissatisfaction growing on both ends of the political spectrum and the rising numbers of COVID-19 chases ravaging the country, the challenges the new Government must face are clear, though if it will pass the endurance test before it, is yet to be seen."
usa_events.1.a:0 "Good luck Mrs. President"

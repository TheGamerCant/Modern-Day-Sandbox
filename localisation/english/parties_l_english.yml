l_english:
 IDEOLOGY_authoritarian:0 "Authoritarian"
 IDEOLOGY_authoritarian_noun:0 "Authoritarianism"
 IDEOLOGY_authoritarian_desc:0 "Authoritarian Regime"
 SUBIDEOLOGY_GENERIC_authoritarian:0 "Authoritarian"
 SUBIDEOLOGY_GENERIC_authoritarian_desc:0 "Authoritarian regimes usually exist to keep themselves or their leader in power. The well being of the people, if at all considered, is only another means to stay in power."

 IDEOLOGY_hybrid_regime:0 "Hybrid Regime"
 IDEOLOGY_hybrid_regime_noun:0 "Hybrid Democracy"
 IDEOLOGY_hybrid_regime_desc:0 "Hybrid Regime"
 SUBIDEOLOGY_GENERIC_hybrid_regime:0 "Hybrid Regime"
 SUBIDEOLOGY_GENERIC_hybrid_regime_desc:0 "Hybrid regimes are often a between-state, where a hopeful despot seeks to dismantle democracy and build an authoritarian state in their image, but in other cases a hybrid regime can be an end in and of itself, it's proponents often viewing themselves as enlightened and benevolent despots."

 IDEOLOGY_democratic:0 "Democratic"
 IDEOLOGY_democratic_noun:0 "Democracy"
 IDEOLOGY_democratic_desc:0 "Democratic Government"
 SUBIDEOLOGY_GENERIC_democratic:0 "Democratic"
 SUBIDEOLOGY_GENERIC_democratic_desc:0 "Democratic systems of government seek stable and popular government through regular elections, rule of law and strong institutions, although in practice, the implementation of these ideals can be flawed or subverted, often in the name of democracy itself."

 IDEOLOGY_clandestine:0 "Clandestine"
 IDEOLOGY_clandestine_noun:0 "Clandestine Movement"
 IDEOLOGY_clandestine_desc:0 "No Government"
 SUBIDEOLOGY_GENERIC_clandestine:0 "Clandestine"
 SUBIDEOLOGY_GENERIC_clandestine_desc:0 "Clandestine movements are armed movements that very rarely offer any kind of government services, or have anything resembling a government apparatus. Perhaps one day, should they be successful, they will bring order and stability to their nation, but for now, the people will have to find other ways to make do."
 TDA_culture_native_north_american_token_idea:0 "§FNative North American§!"
 TDA_culture_native_north_american_desc_token_idea:0 "After centuries of persecution, the Native population of North America have reached a series of agreements with their national governments, granting them large amounts of autonomy and recognition of self-government. As a result, they have managed to have an outsized role in both local and national politics."
 

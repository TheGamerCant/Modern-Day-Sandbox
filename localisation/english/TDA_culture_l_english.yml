 TDA_culture_atlantic_canadian_token_idea:0 "§tAtlantic Canadian§!"
 TDA_culture_atlantic_canadian_desc_token_idea:0 "Atlantic Canadian culture is defined by it's maritime traditions and access to the coast. Despite it's long history of European settlement and outsized role in Canadian politics, the Atlantic provinces of Canada are some of the poorest regions of Canada, as it's lack of large cities causes a large brain drain to Central Canada. It's economy is largely based on fishing, natural resource extraction and power generation."
 
 TDA_culture_prairie_canadian_token_idea:0 "§rPrairie Canadian§!"
 TDA_culture_prairie_canadian_desc_token_idea:0 "The Prairie provinces of Canada are defined by their well-educated workforce, cultural conservatism and above all - their large oil industry. The Prairie provinces often feel ignored by the so-called 'Lawrentian Elite' of eastern Canada, although outside observations of Prairie separatism are often overblown."
 
 TDA_culture_british_columbian_token_idea:0 "§tBritish Columbian§!"
 TDA_culture_british_columbian_desc_token_idea:0 "As the westernmost province of Canada, British Columbia has a history of settlement from both the eastern provinces of Canada and Asia to the west. It's hilly and mountainous terrain, rich in natural resources, occasionally gives way to flatlands for large settlements, notably Vancouver, home to nearly half of the provinces population.\n\nThis has lead to one of the starkest urban-rural divides in Canada, as the largely white, rural and conservative parts of the provinces often feel ignored by the more diverse and progressive cities."